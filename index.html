 summon creatures that possess Legendary Actions. The creature vanishes when reduced to 0 hit points or when the spell's duration expires.\n\nThroughout the spell's duration, the Elemental regards you and your allies as friendly. During combat, the Elemental follows your initiative count and acts immediately after your turn concludes. It follows any spoken orders you provide (requiring no action from you). If you issue no commands to the Elemental, it protects itself against hostile creatures but otherwise remains inactive.\n\nAt Higher Circles. When you cast this spell using a spell slot of 6th circle or higher, you may choose to summon an Elemental with a CR equal to or lower than the circle of the slot you expend. As an example, using an 8th circle slot permits you to summon an Elemental creature with a CR of 8 or lower.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":["Fire"],"tags":["Damage","Healing","Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Contact Other Plane","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Divination","isRitual":true,"castingTime":"10 minutes","range":"Self","components":"V, M (incense or a sacrificial offering appropriate for the entity contacted worth 25 gp, which the spell consumes)","duration":"1 minute","description":"You reach across the boundaries between worlds to commune with an otherworldly intelligence—perhaps a demigod, the lingering essence of an ancient sage, or some being dwelling in a distant plane. This communion exacts a terrible toll on your mind and consciousness.\n\nWhen you cast this spell, you must make an Intelligence saving throw against a DC of 15. If you fail, you suffer 6d6 psychic damage and become incapacitated until you complete a long rest. While incapacitated by this effect, you cannot perform any actions, cannot comprehend what other creatures communicate to you, cannot read written language, and communicate only through unintelligible babbling. Only a greater restoration spell can lift this condition.\n\nShould you succeed on the save, you may pose up to five questions to the entity before the spell's duration ends. You must voice all your questions before the spell concludes. The GM responds to each question with a single word—examples include \"yes,\" \"no,\" \"maybe,\" \"never,\" \"irrelevant,\" or \"unclear\" when the entity lacks knowledge of the answer. However, if a one-word response would prove deceptive or misleading, the GM may provide a brief response of a few words instead.\n\nIf you cast this spell two or more times before completing your next long rest, each additional casting carries a cumulative 25 percent chance that the entity provides no response whatsoever. The GM determines this outcome in secret. Should you receive no answer from an attempt, you cannot cast this spell again until 24 hours have elapsed.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","M"],"saves":["Intelligence"],"damageTypes":["Psychic"],"tags":["Control","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Contagion","level":5,"circle":"5th-Circle","traditions":["Divine","Primordial"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"7 days","description":"You touch a creature and attempt to infect it with disease.\n\nMake a melee spell attack against a creature you can reach. If you hit, you can choose one disease from the options below to afflict the target.\n\nAt the end of each of the target's turns, it makes a Constitution save. If it fails three saves total, the disease persists for the spell's duration and it stops making these saves. If it succeeds on three saves total, it recovers from the disease and the spell ends.\n\nBecause this spell creates a natural disease in the target, any game effect that cures or negates disease also affects this one.\n\nBlinding Sickness. The creature experiences excruciating pain and its eyes become a clouded white. The creature has disadvantage on Wisdom checks and Wisdom saves, and is blinded.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Strength","Constitution","Wisdom"],"damageTypes":["Bludgeoning"],"tags":["Buff","Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Create Construct","level":5,"circle":"5th-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M (a Medium-sized pile of raw wood, metal, or similar material and a gemstone worth at least","duration":"Concentration, up to 1 hour","description":"Drawing upon raw materials, you weave together a formidable Construct companion.\n\nYou instantiate a Construct servant that materializes in an empty space within your range that you can perceive. Select any Construct with a Challenge Rating of 5 or lower to manifest. (Your Game Master maintains the creature's game statistics.) This spell cannot create creatures possessing legendary actions. The creature dissolves from existence when it reaches 0 hit points or when the spell's duration expires.\n\nThroughout the spell's duration, the Construct functions as an ally to you and your allies. During combat encounters, the Construct shares your initiative and executes its turn directly following yours. It complies with any spoken instructions you provide (requiring no action on your part). When you issue no commands, the Construct takes defensive measures against hostile creatures only, remaining otherwise inactive.\n\nAt Higher Circles. When you cast this spell using a spell slot of 6th circle or higher, you may choose a Construct with a Challenge Rating equal to or lower than the circle level of the expended slot. For instance, expending an 8th-circle slot permits you to create a Construct creature with a Challenge Rating of 8 or lower.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Creation","level":5,"circle":"5th-Circle","traditions":["Arcane"],"school":"Illusion","isRitual":true,"castingTime":"1 minute","range":"30 feet","components":"V, S, M (a tiny piece of matter of the same type of the item you plan to create)","duration":"Special","description":"You weave shadows from the Shadow Realm into tangible matter, conjuring nonliving objects that persist only temporarily.\n\nDrawing wisps of shadow, you fashion a nonliving object or plant matter within range composed of soft materials like cloth and rope, wood, or similar substances. You may alternatively craft mineral objects such as stone, crystal, or metal. The created object cannot exceed a 5-foot cube in size, and you must have previously encountered an example of both its form and material.\n\nThe object's persistence depends on its composition. When multiple materials comprise the object, the shortest duration applies to the entire creation.\n\nMATERIAL DURATION MATERIAL DURATION\nVegetable matter 1 day Gems 10 minutes\nStone or crystal 12 hours Adamantine or mithral 1 minute\nPrecious metals 1 hour\n\nMaterial conjured by this spell cannot serve as a material component for other spells, causing those spells to automatically fail if attempted. Casting this spell a second time while material from the previous casting remains in existence destroys that earlier creation.\n\nAt Higher Circles. Your mastery of this spell increases with access to higher circles. Upon gaining access to 6th-circle spell slots, the maximum cube size increases by 5 feet for each spell slot level you can access beyond 5th.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Demonic Wings","level":5,"circle":"5th-Circle","traditions":["Divine"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a wing from a bat or other similar creature)","duration":"Concentration, up to 10 minutes","description":"A willing creature within your reach develops a pair of tough, barbed wings along its spine. For the spell's duration, the creature gains a flying speed of 60 feet and can remain airborne without moving. As part of the Attack action, the creature may strike with these wings against any creature within 10 feet. A successful wing attack inflicts 4d8 necrotic damage, and the struck creature must make a Constitution save or suffer the poisoned condition until the end of its next turn. Upon the spell's conclusion, the wings dissolve into smoke and dissipate. Should the target still be airborne when the spell ends, it plummets downward until it strikes the ground.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Necrotic"],"tags":["Damage","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Dispel Evil And Good","level":5,"circle":"5th-Circle","traditions":["Divine","Wyrd"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (holy water or powdered silver and iron)","duration":"Concentration, up to 1 minute","description":"A protective aura of shimmering force surrounds you, warding against otherworldly beings. Celestials, Elementals, Fey, Fiends, Undead, and creatures bearing the Outsider tag find themselves at a disadvantage when making attack rolls against you.\n\nYou may dismiss this spell early by invoking one of two effects.\n\nBreak Enchantment. On your turn, you can touch a creature within your reach that suffers from charm, fear, or possession inflicted by one of the aforementioned creature types. Your touch immediately strips away these conditions.\n\nDismissal. On your turn, you can make a melee spell attack against any creature of the listed types within your reach. If your attack connects, the creature must make a Charisma saving throw. On a failed save, it is banished to its home plane if currently elsewhere, or to another plane of the GM's choosing if already at home.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":[],"tags":["Buff","Control","Debuff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Dominate","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You establish a mental bond with a Medium or smaller creature within range, bending its will to yours through sheer force of personality.\n\nSelect a Medium or smaller creature you can see within range. Creatures with immunity to the charmed condition are unaffected by this spell. The target must make a Wisdom saving throw; on a failure, it becomes charmed by you for the duration. The target gains advantage on this saving throw if you or your allies are currently engaged in combat with it.\n\nWhile charmed, you maintain a telepathic connection with the creature provided you both occupy the same plane of existence. Through this link, you may issue telepathic commands to the creature at will while you remain conscious, requiring no action on your part. You can direct it with simple, broad instructions such as \"strike that foe,\" \"move to that location,\" or \"retrieve that item.\" Once the creature fulfills your command and receives no new direction, it acts to defend itself and ensure its own survival as best it can.\n\nYou may spend your action to seize complete and absolute control of the target. Until the end of your next turn, the creature performs only those actions you dictate and refrains from any action you forbid. During this period of total control, you can compel the creature to use a reaction, though doing so requires you to expend your own reaction as well.\n\nWhenever the target suffers damage, it makes another Wisdom saving throw against the spell. Success ends the spell immediately.\n\nAt Higher Circles: When you cast this spell using a 6th-circle slot, concentration lasts up to 10 minutes. With a 7th-circle slot, concentration lasts up to 1 hour. With an 8th-circle slot or higher, concentration lasts up to 8 hours.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Control","Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Dream","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":true,"castingTime":"1 minute","range":"Special","components":"V, S, M (a handful of sand, a dab of ink, and a writing quill plucked from a sleeping bird)","duration":"8 hours","description":"You forge a connection into a creature's sleeping mind to reshape their dreams or relay a message.\n\nSelect a creature you know as your spell's target; that creature must exist on your current plane. Sleepless beings like elves cannot be reached through this magic. You or a willing creature within your reach enters a deep trance, serving as your conduit into the dreamscape. The conduit maintains awareness of the physical world around it but becomes incapable of movement or action.\n\nShould the target be sleeping, your conduit materializes within their dreams and can communicate with them for the spell's full duration while they slumber. Your conduit may reshape the dreamscape itself, conjuring landscapes, structures, and imagery. The conduit can exit this trance at will, ending the spell prematurely. Upon waking, the target remembers every detail of the dream with perfect clarity. If the target remains awake when you cast, your conduit senses this immediately and may either break the trance to end the spell, or remain dormant awaiting the target's sleep before appearing in their dreams.\n\nYou may cause the conduit to manifest as a horrifying creature. If you choose this, the messenger can convey a message limited to ten words, then the target makes a Wisdom save. A failed save causes nightmarish visions born from the phantom monster to plague the target's sleep, the duration lasting through their rest, preventing any benefit from that sleep. Additionally, upon waking, the target suffers 3d6 psychic damage.\n\nIf you possess a body part of the target—such as hair, fingernail clippings, or similar remains—the target makes this save with disadvantage.\n\nAfter casting this spell, you cannot cast it again until you finish a long rest.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":["Psychic"],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Earthen Mantle","level":5,"circle":"5th-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 hour","description":"You encase yourself in a protective shell of earth and stone, hardening your skin with rocky plates. Your unarmored armor class becomes 15 plus your Dexterity modifier, and you gain immunity to acid damage. Terrain made difficult by earth or stone no longer hinders your movement. Additionally, you develop a burrowing speed matching your walking speed, enabling you to move through nonmagical, unworked earth and stone as easily as air. Your passage leaves no trace—the material flows around you without disturbance or tunnels marking your path.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Acid"],"tags":["Damage","Summon"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Feathered Flock","level":5,"circle":"5th-Circle","traditions":["Divine","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a small feather) V, S, M (calico cat whisker) V, S, M (a stringed or wind instrument) V, S","duration":"Concentration, up to 10 minutes","description":"A shimmering magic envelops the bodies you select, sprouting feathered wings from their forms. Choose up to five creatures within range to receive this enchantment, granting each a flight speed of 30 feet while the spell persists. Should the magic fade while any recipient remains airborne, they plummet downward immediately.\n\nWhen cast using a spell slot of 6th circle or higher, you may select one additional creature for each circle above 5th.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Flame Strike","level":5,"circle":"5th-Circle","traditions":["Divine"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a pinch of sulfur)","duration":"Instantaneous","description":"You summon a pillar of celestial flame that descends from above to consume those in its path.\n\nA shaft of holy fire materializes in the sky at a location of your choosing within range. Every creature standing within a 10-foot-radius, 40-foot-high cylinder around that point must succeed on a Dexterity save or suffer the consequences. On a failed save, a creature takes 4d6 fire damage and 4d6 radiant damage. A successful save reduces the damage by half.\n\nWhen Cast at Higher Circles. If you cast this spell using a spell slot of 6th circle or above, you may increase either the fire damage or radiant damage by 1d6 for each slot level beyond the 5th.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Fire","Radiant"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Geas","level":5,"circle":"5th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Enchantment","isRitual":true,"castingTime":"1 minute","range":"60 feet","components":"V, M (a set of silver manacles worth 50 gp, which the spell consumes)","duration":"30 days","description":"You impose a magical compulsion upon a creature you can perceive within range, binding it to either perform a designated service or abstain from a specific action or series of activities as you determine. If the creature comprehends your words, it must make a Wisdom saving throw or fall under your charm for the spell's duration. So long as the creature remains charmed by you, it suffers 5d10 psychic damage whenever it acts in direct opposition to your commands, though this damage occurs no more than once per day. A creature unable to understand you remains unaffected by the spell entirely.\n\nYou may issue any command that suits your purposes. However, if you command the creature toward certain death, the spell immediately terminates.\n\nYou may end the spell prematurely by expending an action to dismiss it. The spells remove curse, greater restoration, or wish can likewise end it.\n\nAt Higher Circles. As your magical knowledge deepens, this compulsion strengthens. Upon gaining access to 7th-circle spell slots, the duration becomes 1 year. Upon gaining access to 9th-circle spell slots, the spell persists indefinitely until ended by one of the aforementioned spells.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","M"],"saves":["Wisdom"],"damageTypes":["Psychic"],"tags":["Control","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Greater Hold","level":5,"circle":"5th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M (a small, straight piece of iron)","duration":"Concentration, up to 1 minute","description":"You render a creature motionless through magical compulsion.\n\nSelect a creature within range that you can perceive. That creature must make a Wisdom saving throw. On a failed save, it becomes paralyzed until the spell ends. At the conclusion of each turn while paralyzed, the creature may attempt another Wisdom saving throw, freeing itself from paralysis on a success. This spell cannot affect Undead creatures.\n\nWhen cast at higher circles: If you use a spell slot of 6th circle or greater, you may affect one additional creature for every slot level above 5th. All targeted creatures must be positioned within 30 feet of one another at the moment of targeting.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Greater Restoration","level":5,"circle":"5th-Circle","traditions":["Divine","Primordial"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (diamond dust worth at least 100 gp, which the spell consumes)","duration":"Instantaneous","description":"You channel restorative magic through touch to mend severe afflictions. Upon touching a willing creature, you channel positive energy that can either diminish their exhaustion by one level or permanently lift one of the following maladies:\n\n• A single enchantment or petrification currently affecting the target\n• One curse binding the target, whether through a magical item they are attuned to or another source\n• Any decrease imposed on one of the target's ability scores\n• A single effect that has lowered the target's maximum hit points","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Control","Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Greater Warding Bond","level":5,"circle":"5th-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (platinum rings worth at least 50 gp each, in an amount equal to the number of targets, which all targets must wear for the duration)","duration":"1 hour","description":"You consecrate up to six rings, binding together the fates of willing creatures who don that enchanted jewelry. This spell creates a mystical link among the touched creatures (potentially including yourself) that persists for the duration. So long as any linked creature remains within 90 feet of at least one other linked creature, it receives a +2 bonus to its armor class and saving throws, and it gains resistance to all damage types. Whenever a linked creature suffers damage, it may designate another linked creature to suffer that same amount of damage in its stead.\n\nThe bond dissolves entirely if every linked creature falls unconscious at 0 hit points. The connection severs for an individual creature if it travels beyond 90 feet from all other linked creatures, or if Greater Warding Bond is cast upon it anew. Any creature bound by this spell may use an action to sever its own connection.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Damage"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Hallow","level":5,"circle":"5th-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":true,"castingTime":"24 hours","range":"Touch","components":"V, S, M (herbs, oils, and incense worth at least 1,000 gp, which the spell consumes)","duration":"Until dispelled","description":"You touch a point and suffuse the surrounding space with sanctified (or profane) essence. The area extends outward in a radius up to 60 feet, and the spell cannot take effect if any portion overlaps with another active hallow spell. This sacred space produces two distinct effects.\n\nFirst, Celestials, Elementals, Fey, Fiends, Undead, and creatures bearing the Outsider tag are barred from entering the zone. Additionally, such creatures lose the ability to charm, frighten, or possess creatures already within it. Any creature currently under the influence of charm, fear, or possession from such an entity immediately shakes off these effects upon crossing the boundary into the area. You may choose to exempt one or more of these creature types from this restriction.\n\nSecond, you inscribe an additional effect into the sanctified space. Select from the list below, or work with your GM to devise an alternative effect. Most of these effects target creatures meeting your criteria; you establish whether it affects all creatures, only those devoted to a particular deity or leader, or creatures matching a specific description such as orcs or trolls. Whenever a creature enters the spell's area for the first time during a turn, or begins its turn within the area, it may attempt a CHA saving throw. Upon success, the creature negates the secondary effect until it exits the space.\n\nCourage. Creatures under this effect cannot experience fear while present in the area.\nDarkness. The area fills with darkness. Ordinary light and magical light generated by spells using lower-level spell slots than the one used for this casting cannot penetrate or dispel it.\nDaylight. The area fills with bright illumination. Magical darkness produced by spells using lower-level spell slots than the one used for this casting cannot overcome or suppress it.\nEnergy Protection. Creatures under this effect gain resistance to one damage type you select, excluding bludgeoning, piercing, and slashing.\nEnergy Vulnerability. Creatures under this effect gain vulnerability to one damage type you select, excluding bludgeoning, piercing, and slashing.\nEverlasting Rest. Corpses buried within the area cannot be reanimated as Undead.\nExtradimensional Interference. Creatures under this effect cannot move or traverse via teleportation, extradimensional passage, or interplanar travel.\nFear. Creatures under this effect experience fear while in the area.\nSilence. All sound is suppressed within the boundaries; nothing within can produce sound that reaches beyond, and no external sound penetrates inward.\nTongues. Creatures under this effect can exchange meaning with any other creature in the area, transcending any language barrier.","classes":["Cleric","Paladin"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":["Bludgeoning","Piercing","Slashing"],"tags":["Buff","Control","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Hellfire Plating","level":5,"circle":"5th-Circle","traditions":["Divine"],"school":"Conjuration","isRitual":true,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Concentration, up to 10 minutes","description":"You call forth cursed plating from the depths of infernal realms to shield a creature within your touch. Dark, smoking metal materializes across the target's form, radiating an intense heat as though freshly pulled from damnation's forges, yet causing no injury to whoever wears it. Throughout the spell's duration, the target gains these benefits:\n\n• Devilish Resilience. The target resists cold damage and nonmagical bludgeoning, piercing, and slashing damage. Furthermore, the target is immune to fire damage, poison damage, and the poisoned condition.\n\n• Infernal Fortitude. The target cannot be charmed or frightened.\n\n• Magic Resistance. The target makes saving throws against spells and magical effects with advantage.","classes":["Cleric","Paladin"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Hidden Path","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":true,"castingTime":"10 minutes","range":"30 feet","components":"V, S, M (an accurate map of the local area around your destination, and 25 gp worth of fine inks which the spell consumes)","duration":"24 hours","description":"You establish a supernatural passage linking two places you know.\n\nWhen you cast this spell, designate a solid surface—such as a wall or cliff—visible within range as your entry point. You must also mentally fix upon a location you have physically been to on the same plane, no more than 100 miles away from where you stand.\n\nUpon completing the incantation, a barely perceptible doorway manifests on the targeted surface. A matching doorway simultaneously appears at your chosen destination, situated on a nearby surface. Both gateways provide access to an otherworldly corridor, lined with intricate passages, flights of stairs, and architectural passages that interweave with one another. This path collapses the travel time to half of what the journey would ordinarily require and shields travelers from environmental dangers, wandering creatures, and other perils of conventional travel. However, travelers must still sustain themselves with food, water, and necessary provisions.\n\nAny creature of Huge size or smaller may pass through either entryway and traverse the passage for the spell's duration.\n\nCreatures unaware of an entryway's precise location must first make a DC 20 Intelligence (Investigation) check to locate it.\n\nYou may re-cast this ritual to sustain the path while traversing inside it, provided you have material components available to consume and adequate time to complete the casting.\n\nShould the spell terminate while a creature remains within the extradimensional path, that creature suffers 10d10 force damage and is instantly relocated to a random location in the vicinity where it would naturally arrive had it traveled the standard route.\n\nIf you cast this ritual without interruption once every 24 hours for 100 consecutive days, the path solidifies permanently.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Intelligence"],"damageTypes":["Force"],"tags":["Damage","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Infernal Command","level":5,"circle":"5th-Circle","traditions":["Divine"],"school":"Divination","isRitual":true,"castingTime":"1 action","range":"Self","components":"V, S, M (a coin etched with infernal runes)","duration":"Concentration, up to 10 minutes","description":"You channel infernal energies to bend the tide of battle in your favor. Drawing power from otherworldly planes, you gain supernatural insight into combat. While this spell persists, you gain advantage on Wisdom (Perception) checks, and you can expend your bonus action on your turn to activate one of the following effects.\n\nInfernal Whispers. You pinpoint the exact location of a single hidden or invisible creature within 60 feet, or you ascertain that no such creatures occupy that range. You may communicate this knowledge to your companions, granting them advantage on their next attack roll against that creature.\n\nTactical Sabotage. One creature within 60 feet of you rolls with disadvantage on its next attack roll or saving throw. Once you use this effect on a creature, that same creature becomes immune to this ability for 24 hours.\n\nWeakening Fear. One creature within 60 feet must succeed on a Wisdom save against your spell save DC or become frightened of you until the start of your next turn. If the creature succeeds on its save, it cannot be affected by this ability for 24 hours.","classes":["Cleric","Paladin"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Control","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Insect Plague","level":5,"circle":"5th-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"300 feet","components":"V, S, M (a few grains of sugar, some kernels of grain, and a smear of fat)","duration":"Concentration, up to 10 minutes","description":"You summon a writhing swarm of ravenous locusts centered on a point within range that you select. The insects form a sphere with a 20-foot radius, bypassing obstacles and spreading freely around corners. This locust cloud persists for the spell's duration and shrouds the area in dim light while rendering it difficult terrain for any creature traversing it.\n\nWhen the swarm materializes, all creatures within it must make a Constitution saving throw. Those who fail suffer 4d10 piercing damage from the insects' relentless assault, while those who succeed take half damage. Any creature that moves into the swarm's area for the first time during a turn, or that ends its turn within the swarm, must repeat this saving throw, taking damage on a failed save as normal.\n\nWhen you cast this spell using a spell slot of 6th circle or higher, add 1d10 to the damage roll for each slot level above 5th.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Piercing"],"tags":["Damage","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Legend Lore","level":5,"circle":"5th-Circle","traditions":["Arcane","Divine"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (incense worth at least 250 gp, which the spell consumes)","duration":"Instantaneous","description":"Upon casting this spell, you immediately gain access to the significant lore surrounding a person, place, or object of legendary stature.\n\nState the name of or provide a description for a person, place, or object. The magic instantly conveys to your mind a concise overview of the notable lore associated with your chosen subject. This lore may encompass widely told contemporary accounts, lost historical records, or even closely guarded knowledge that few or none have ever learned. Should the subject you selected lack legendary significance, the spell yields nothing. Your existing familiarity with the subject directly influences the precision and detail of the information granted—greater prior knowledge results in more specific revelations.\n\nThe lore you receive is truthful in substance, though it may arrive clothed in symbolic or figurative language. As an example, should you possess a cryptic magical axe and cast this spell upon it, you might receive this knowledge: \"Woe to the evildoer whose hand touches the axe, for even the haft slices the hand of the evil ones. Only a true Child of Stone, lover and beloved of the dwarven gods, may awaken the true powers of the axe, and only with the sacred word Rudnoss on the lips.\"","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Lifeblind","level":5,"circle":"5th-Circle","traditions":["Divine","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (eyelashes from a living creature)","duration":"Concentration, up to 10 minutes","description":"When you cast this spell, you impose a perceptual blindness upon your target that obscures all living beings from view. The target must make a Charisma saving throw. If it fails, all creatures that are neither Constructs nor Undead vanish from its sight for the spell's duration, along with any equipment or objects they hold or wear. Should any non-Construct, non-Undead creature strike the target with an attack, that creature's invisibility to the target immediately breaks, and it becomes visible once more.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":[],"tags":["Control","Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Loan","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a loaned item and a piece of chalk)","duration":"Up to 1 week","description":"You enchant an object with a compulsion to reunite with you.\n\nYou designate a single item weighing no more than 1,000 pounds and establish a future moment—anywhere from now until 1 week hence—when it shall return to you. At that designated time, the item instantly translocates to your position, manifesting in an empty space no farther than 5 feet away. The spell proves ineffective if the item occupies a different plane of existence or lies shielded beneath even a thin layer of lead.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Mass Cure Wounds","level":5,"circle":"5th-Circle","traditions":["Divine","Primordial"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"60 feet (30-foot-radius sphere)","components":"V, S","duration":"Instantaneous","description":"A surge of restorative magic emanates from a location you designate within range. Select up to six creatures within a 30-foot-radius sphere centered on that point. Each chosen creature restores hit points equal to 3d8 plus your spellcasting ability modifier. Constructs and Undead gain no benefit from this spell.\n\nWhen you cast this spell using a spell slot of 6th circle or higher, add 1d8 to the healing for each slot level above 5th.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Mislead","level":5,"circle":"5th-Circle","traditions":["Arcane"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"Self","components":"S","duration":"Concentration, up to 1 hour","description":"You vanish from sight while simultaneously conjuring an illusory duplicate at your current location. This phantom double persists throughout the spell's duration, though your invisibility shatters instantly if you deal damage or cast any spell.\n\nOn your turn, you may spend an action to propel your illusory double a distance equal to twice your movement speed. While moving it, you command it to perform gestures, speak words, and act in any manner you dictate.\n\nYou perceive the world through your double's eyes and ears as though you occupied its space. Each turn, you can use a bonus action to shift your perception between the duplicate's senses and your own, or vice versa. When you consciously experience the world through your double's senses, you cannot see or hear anything occurring at your actual location.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["S"],"saves":[],"damageTypes":[],"tags":["Debuff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Modify Memory","level":5,"circle":"5th-Circle","traditions":["Arcane"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You reach out with your mind to reshape another creature's memories.\n\nOne creature you can see must make a Wisdom saving throw. If you and the creature are engaged in combat, it has advantage on this save. When the save fails, the target becomes charmed by you for the spell's duration. The charmed target falls into a state of incapacity and loses awareness of everything around it, though it continues to hear your voice. If the target takes damage or becomes the target of another spell, this spell immediately ends and no memory modifications occur.\n\nDuring the charm, you can work to alter the target's memory of a single event it experienced within the last 24 hours that lasted 10 minutes or less. You may completely erase all memory of the event, restore the target's ability to remember it with perfect clarity and precise detail, alter how the target recalls specific details of the event, or construct an entirely new memory of a different event in its place.\n\nYou must speak directly to the target and explain how you are modifying its memories, and the target must understand your language for the changes to take permanent hold. The target's mind naturally fills in any missing details based on your description. Should the spell end before you finish your explanation, the memory remains unaltered.\n\nOnce you have completed your description and the spell ends, the modified memory becomes permanent.\n\nA creature may not act on a modified memory if it conflicts with the creature's nature, instincts, or deeply held beliefs. Memories that are logically absurd—such as remembering enjoying immersion in acid—may be dismissed as mere dreams or delusions. The GM determines whether a modified memory is too contradictory to meaningfully influence the creature's behavior.\n\nCasting remove curse or greater restoration on the target restores its true memories.\n\nAt Higher Circles. When you cast this spell using a spell slot of 6th circle or higher, you can modify memories of events from further in the past: 7 days ago (6th circle), 30 days ago (7th circle), 1 year ago (8th circle), or any point in the creature's past (9th circle).","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Passwall","level":5,"circle":"5th-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a pinch of sesame seeds)","duration":"1 hour","description":"A passage materializes through a solid barrier of your selection. You designate a point on a wooden, plaster, or stone surface (including walls, floors, or ceilings) within range that you can perceive, and an opening forms there for the spell's duration.\n\nYou determine the size of this opening, up to 5 feet in width, 8 feet in height, and 20 feet in depth. The passage does not compromise the structural integrity of the surrounding construction.\n\nUpon the opening's closure, any creatures or objects remaining inside the passage are gently expelled to the nearest available space adjacent to the surface through which you cast the spell.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Planar Binding","level":5,"circle":"5th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Abjuration","isRitual":true,"castingTime":"1 hour","range":"60 feet","components":"V, S, M (a jewel worth at least 1,000 gp, which the spell consumes)","duration":"24 hours","description":"You bind an extraplanar creature into your service.\n\nYou attempt to bind a Celestial, an Elemental, a Fey, or a Fiend to serve you. The creature must remain within range throughout the entire casting. Typically, the target is first summoned into the center of an inverted magic circle to hold it in place while you perform this spell.\n\nWhen you finish casting, the target must make a Charisma saving throw. If it fails, the creature becomes bound to serve you for the duration. Should the creature have been summoned or created by another spell, that spell's duration extends to match this spell's duration instead.\n\nA creature bound by this spell must obey your commands to the fullest extent of its ability. You may direct it to join you on an adventure, stand guard over a location, or carry a message to another being. The creature adheres to the literal meaning of your instructions, though if it harbors hostility toward you, it will attempt to distort the interpretation of your commands to suit its own goals. Once the creature completes your instructions before the spell's duration expires, it returns to you if you share the same plane of existence to confirm the task is done. If you occupy a different plane, the creature returns to the location where it was bound and waits there until the spell ends.\n\nAt Higher Circles. Your mastery of this ritual deepens as you progress. When you gain access to 6th-circle spell slots, the duration becomes 10 days. Upon reaching 7th-circle spell slots, the duration becomes 30 days. Once you unlock 8th-circle spell slots, the duration becomes 180 days. When you gain access to 9th-circle spell slots, the duration becomes 1 year.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Psychic Barrage","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","description":"You manifest four shimmering lances of pure psychic force and hurl them toward up to four creatures within range. For each lance, you make a ranged spell attack. When a lance strikes its mark, the target suffers 4d8 psychic damage and must succeed on a Constitution saving throw. If the save fails, that creature finds itself at disadvantage on all saving throws it makes for 1 minute. The afflicted creature may attempt another Constitution save at the end of each of its turns, freeing itself from this effect on a success.\n\nAt Higher Circles. When you cast this spell using a spell slot of 6th-circle or higher, you create one additional lance for each slot level above 5th.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Fire","Psychic"],"tags":["Buff","Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Raise Dead","level":5,"circle":"5th-Circle","traditions":["Divine"],"school":"Necromancy","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (a diamond worth at least 500 gp, which the spell consumes)","duration":"Instantaneous","description":"You touch a deceased creature and call its soul back to life, provided the creature has been dead for no more than 10 days. If the creature's soul is willing and free to return to its body, the creature is restored to life with 1 hit point.\n\nThe spell neutralizes any poisons present in the creature's body and cures any nonmagical diseases that were afflicting it at the moment of death. However, the spell cannot remove magical diseases, curses, or other magical afflictions; if any such effects remain, they activate immediately when the creature returns to life. The spell cannot restore an Undead creature to life.\n\nThe spell mends all fatal wounds, though it does not regenerate missing body parts. If the creature is missing essential organs or limbs—such as its head—then the spell fails entirely and has no effect.\n\nReturning from death exacts a terrible toll. The target suffers a −4 penalty to all attack rolls, saving throws, and ability checks.\n\nEach time the target completes a long rest, this penalty decreases by 1 until the penalty reaches zero and disappears entirely.","classes":["Cleric","Paladin"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Reincarnate","level":5,"circle":"5th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (rare oils and unguents worth at least 1,000 gp, which the spell consumes)","duration":"Instantaneous","description":"Through an extended ritual, you call forth a departed soul and bind it within a new physical form, granting it a second chance at life.\n\nYou must touch a deceased Humanoid or remains of one. If the creature has not been dead for more than 10 days, you craft an adult body anew and beckon the soul to inhabit it. The spell fails if the target's soul is bound elsewhere or refuses the summons.\n\nThe magic constructs a new vessel for the creature, and this transformation inevitably alters its ancestral lineage. The GM rolls a d100 and consults the Reincarnation Bodies table to select the creature's new form, or determines one by choice.\n\nThe resurrected creature retains all memories of its previous existence and experiences. It preserves all the capabilities it formerly possessed, save that it surrenders its original lineage and assumes the racial traits of its new form instead.\n\nREINCARNATION BODIES d100 LINEAGE 01–04 Beastkin, Avian 05–08 Beastkin, Agile 09–10 Beastkin, Aquatic 11–13 Beastkin, Sturdy 14–24 Dwarf 25–36 Elf 37–58 Human 59–62 Kobold 63–64 Kobold, Truescale 65–69 Orc 70–75 Syderean, Celestial 76–81 Syderean, Fiendish 82–93 Smallfolk, Gnome 94–00 Smallfolk, Halfling","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Rune Tattoo","level":5,"circle":"5th-Circle","traditions":["Wyrd"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (vial of specially crafted tattoo ink worth 100 gp per spell slot)","duration":"Instantaneous","description":"You infuse magical essence into tattoo pigment, inscribing a spell directly onto your skin for safekeeping and later activation.\n\nYou inscribe a spell's formula upon your body in the form of a magical tattoo, rendered as written text, symbols, or artistic imagery. Upon completing the ritual, the tattoo becomes permanently etched into your flesh. You then designate a specific trigger condition that will automatically activate the stored spell.\n\nWhen your chosen condition manifests, the spell activates immediately. Spells requiring Touch range affect only a creature in physical contact with you. Spells with a range measured in feet automatically target the closest eligible target within that range, as appropriate to the spell's nature. Spells with a range of Self or Sight cannot be converted into rune tattoos. You may maintain a maximum of two rune spell tattoos on your body simultaneously. Tattooing a spell of 1st through 3rd circle with a casting time of 1 action or less requires 100 gp worth of specialized tattoo ink multiplied by the spell's circle.\n\nAt Higher Circles. As you progress through higher circles of magic, this ritual becomes more capable. Once you gain access to 7th-circle spell slots, you may create rune spell tattoos of spells up to 5th circle.","classes":["Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Scrying","level":5,"circle":"5th-Circle","traditions":["Arcane","Divine"],"school":"Divination","isRitual":true,"castingTime":"10 minutes","range":"Self","components":"V, S, M (a focus worth at least 1,000 gp such as a crystal ball, a silver mirror, or a font filled with holy water)","duration":"Concentration, up to 10 minutes","description":"You establish a mystical connection to observe a specific creature or location from a distance.\n\nYou can perceive a particular creature of your choice that currently exists on the same plane of existence as you. The target makes a WISDOM save against a DC determined by your familiarity with them and the nature of your physical connection to them. If the target is aware that you're casting this spell, it may voluntarily fail the save to allow itself to be observed.\n\nYour knowledge of the target modifies the save DC as follows: if you know of the target only through hearsay, the DC increases by 5; if you have personally met the target, the DC is unmodified; if you know the target intimately, the DC decreases by 5.\n\nYour physical connection to the target also modifies the save DC: possession of a likeness or picture decreases the DC by 2; possession of an item belonging to the target decreases the DC by 4; possession of a body part such as hair or fingernails decreases the DC by 10.\n\nIf the target succeeds on the save, it resists the spell's effect, and you cannot attempt to scry upon it again until 24 hours have passed.\n\nIf the target fails the save, you conjure an invisible sensor that manifests within 10 feet of the target. You perceive through this sensor exactly as if you were standing at its location. The sensor remains within 10 feet of the target throughout the spell's duration, moving with it. Creatures capable of perceiving invisible objects perceive the sensor as a glowing orb roughly the size of your closed fist.\n\nAlternatively, you may select a specific location you have previously witnessed as your scrying target instead of a creature. The sensor then materializes at that location and remains stationary there.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Seeming","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"8 hours","description":"You weave an illusory veil across the appearance of creatures within your range. You may alter the illusory appearance of any number of creatures you can see. Each target receives a new, illusory guise of your choosing. Unwilling targets may attempt a Charisma saving throw; those who succeed are not affected.\n\nThis spell transforms the target's physical form along with all visible clothing, armor, weapons, and gear. You can make each creature appear as much as 1 foot taller or shorter, and adjust their apparent build anywhere from thin to stout. You cannot alter a creature's fundamental body type—you must select a form with the same basic limb configuration—but beyond this restriction, the illusion's details are yours to determine.\n\nThe spell persists for its full duration. You may use your action at any time to end it prematurely.\n\nThese illusory alterations cannot withstand physical scrutiny. Should you add a hat to a creature's appearance, solid objects will pass through it; anyone touching it would feel nothing or would contact the creature's actual head and hair instead. If you make yourself appear thinner than you truly are, someone attempting to touch you would meet solid resistance while their hand still seems suspended in empty space.\n\nA creature may spend its action to closely examine a target and make an Intelligence (Investigation) check against your spell save DC. A successful check reveals that the target wears a disguise born of magic.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Intelligence","Charisma"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Spirit Beast Elixir","level":5,"circle":"5th-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":true,"castingTime":"1 minute","range":"Self","components":"V, S, M (bag of dried berries and fruit worth","duration":"1 hour","description":"You petition the spirits dwelling in the jungle wilderness to fashion a draught that grants you their blessing.\n\nYou manifest a full clay jug containing a powerful elixir—a mystical brew distilled from uncommon jungle fruits and botanical materials. Up to four other creatures may drink alongside you, each drawing a cup from the jug. When a creature consumes a cup of this elixir, you roll a d4 to identify which spirit Beast transfers its abilities to that drinker. Beyond this effect, the drinker receives 4d8 temporary hit points that fade after they complete a long rest, provided they remain unused until then.\n\nSpirit Beast Elixir Mystical Effects d4 Effect 1 Boar's Tenacity. You gain resistance to poison damage and advantage on CON saving throws. You also gain advantage on Wisdom (Survival) checks made to track animals or navigate jungle terrain. 2 Gorilla's Might. You gain advantage on Strength checks and STR saving throws. Your unarmed strike damage increases by 1d4 bludgeoning damage. 3 Jaguar's Swiftness. Your movement speed is doubled and you gain advantage on Dexterity (Acrobatics) checks and DEX saving throws. 4 Parrot's Mimicry. You develop the capacity to replicate with perfect accuracy the voice and auditory expressions of any creature whose sounds you have previously encountered. You also gain advantage on Charisma (Deception) and Charisma (Performance) checks.","classes":["Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Spirit Double","level":5,"circle":"5th-Circle","traditions":["Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M (an ornate vial of ashes worth at least","duration":"Concentration, up to 1 minute","description":"You manifest a ghostly echo of yourself to unsettle your enemies.\n\nA translucent duplicate of your form materializes in an unoccupied space within range that you can perceive. This spectral projection is incorporeal and does not physically occupy its location.\n\nThroughout the spell's duration, you may cast spells as if originating from your spirit double's position, though you perceive the world through your own senses when determining spell effects. On your turn, you can use a bonus action to relocate your spirit double up to 30 feet to any unoccupied space within range that you can see.\n\nYou can take an action to command your spirit double to release a horrifying cry. Any creature within 10 feet of the spirit double that perceives it visually or aurally must make a Wisdom saving throw. On a failed save, that creature becomes frightened of your spirit double until the end of your next turn.\n\nAdditionally, whenever a creature within 10 feet of your spirit double attempts an attack roll or saving throw, you can use your reaction to trigger your spirit double's piercing shriek. The targeted creature then makes its roll with disadvantage.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Control","Debuff","Summon"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Starbright","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"1 hour","description":"A corona of luminous stars materializes around you, ready to strike.\n\nYou conjure seven brilliant motes that gleam like distant stars. Throughout the spell's duration, these motes circle your head, casting bright illumination for 30 feet in all directions and dim light an additional 30 feet beyond that.\n\nOn your turn, you may use a bonus action to make a ranged spell attack against a creature within 120 feet of you, launching a single mote toward it. The mote vanishes upon being hurled. When your attack connects, the target suffers 4d8 radiant damage.\n\nThe spell concludes immediately once you exhaust your final mote.\n\nAt Higher Circles. If you cast this spell using a slot of 6th circle or higher, you create two more motes for each circle beyond the 5th.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":["Radiant"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Sucking Mud Pit","level":5,"circle":"5th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M (grains of sand from a quicksand pit)","duration":"Concentration, up to 1 minute","description":"You transform a section of earth into a treacherous quagmire that swallows those within it.\n\nA 20-foot-radius area of ground within range that you can perceive becomes a sucking mud pit that pulls creatures downward. Throughout the spell's duration, this ground functions as difficult terrain.\n\nWhenever a creature enters the affected area or begins its turn there, it must make a Strength saving throw. On a failed save, the creature sinks to the next deeper level.\n\nThe mud has three progressive depths, each imposing additional effects:\n• Depth 1. Mud covers the creature up to its waist; the creature is restrained.\n• Depth 2. Mud covers the creature up to its neck; the creature cannot make attack rolls.\n• Depth 3. The creature becomes fully submerged and starts suffocating.\n\nAny creature, including one already trapped in the mud, can attempt a rescue by using an action to make a Strength or Dexterity check (the rescuer's choice) against your spell save DC. If successful, the trapped creature rises one depth level. If unsuccessful, it remains at its current depth. Additionally, if the rescuer is standing in the mud pit or within 5 feet of it, the rescuer is pulled into the mud and sinks down one depth level. A creature that rises from Depth 1 falls prone.\n\nIf you maintain concentration for the spell's complete duration, the ground solidifies when the spell ends, trapping creatures at their current depths until they are physically excavated. If concentration lapses before the duration expires, the ground becomes ordinary mud that no longer pulls creatures deeper, though they remain mired.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Strength","Dexterity"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Telekinesis","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 10 minutes","description":"Your mind becomes a conduit of invisible force, allowing you to command creatures and objects at a distance throughout the spell's duration.\n\nUpon casting and during each subsequent round, you may spend your action to focus your will upon a single creature or object within range that you can perceive. You maintain the ability to concentrate your efforts on the same target repeatedly, or redirect your attention to a different one as you see fit. Should you shift your focus to a new target, your previous target is freed from the spell's effects.\n\nCreatures: You may attempt to move a creature of Huge size or smaller through sheer mental force. You make an ability check using your spellcasting ability, which the creature opposes with a Strength check. Should your check prevail, you propel the creature up to 30 feet in any direction of your choosing, including vertically, though it cannot move beyond the spell's range. The creature becomes restrained by your telekinetic grip until the end of your next turn, and if lifted into the air, it remains suspended there.\n\nOn subsequent rounds, you may spend your action to maintain your telekinetic grip, making the contested ability check once more.\n\nObjects: You may move an object weighing no more than 1,000 pounds. If the object lies unattended, you automatically move it up to 30 feet in any direction without requiring a check, provided the movement doesn't exceed the spell's range.\n\nIf a creature wears or carries the object, you must make an ability check with your spellcasting ability opposed by the creature's Strength check. If you prevail, you wrench the object from the creature's possession and move it up to 30 feet in any direction within range.\n\nThrough your telekinetic grip, you can exercise precise control: operating simple mechanisms, turning a lock, opening or closing containers, transferring items between open containers, or emptying the contents of a vessel.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Strength"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Telepathic Bond","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (pieces of eggshell from two different kinds of creatures)","duration":"1 hour","description":"You establish a psychic connection linking up to eight willing creatures of your choice within range, uniting each participant in a shared telepathic network that persists for one hour. Creatures possessing an Intelligence score of 3 or lower cannot be affected by this spell. For the duration, all linked targets gain the ability to exchange thoughts telepathically across the bond, transcending any language barrier. This mental communion functions at any distance, yet cannot breach the boundaries between different planes of existence.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Intelligence"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Teleportation Circle","level":5,"circle":"5th-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":true,"castingTime":"1 minute","range":"10 feet","components":"V, M (rare chalks and inks infused with precious gems worth 50 gp, which the spell consumes)","duration":"1 round","description":"You inscribe a 10-foot-diameter circle upon the ground, filling it with arcane sigils that establish a connection between your current location and a permanent teleportation circle you know exists on the same plane. The gateway materializes within the circle you have drawn and remains active until the end of your next turn. Any creature passing through this portal is instantly transported to a point within 5 feet of the destination circle, or to the closest available space if that location is already occupied.\n\nMajor temples, guilds, and institutions of significance maintain permanent teleportation circles within their walls. Each such circle bears a distinctive sigil sequence—a unique arrangement of magical runes that serves as its identifier. When you first learn this spell, the GM grants you knowledge of two sigil sequences leading to destinations on the Material Plane. Additional sequences can be learned as you encounter them during your adventures.\n\nYou may permanently record a new sigil sequence into your memory by observing it for 1 minute.\n\nA teleportation circle becomes permanent if you cast this spell at the same location every day for one year consecutively. You need not actually use the circle for teleportation during these castings to establish its permanence.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Tree Stride","level":5,"circle":"5th-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 minute","description":"By expending 5 feet of your movement, you can step into the trunk of any living tree that is at least your size. Upon entering, you perceive the exact locations of all other trees of that same species within 500 feet of you. As part of the same movement action, you may travel through the tree's interior and emerge from any of these distant trees, or simply exit the tree you initially entered. When you emerge, you appear in an unoccupied space within 5 feet of your chosen destination tree, using an additional 5 feet of movement to do so. If you lack sufficient movement remaining to reach a destination tree, you instead appear within 5 feet of the tree you entered. This transportation ability can be activated once per round for the spell's duration, and you cannot end your turn while inside a tree.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Wall Of Force","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (a pinch of powder made by crushing a clear gemstone)","duration":"Concentration, up to 10 minutes","description":"At a point within range, you conjure an impenetrable barrier of pure magical force that becomes visible only by its effects. You determine its form—a horizontal or vertical plane, an angled surface, a hemispherical dome, or a complete sphere—all with a maximum radius of 10 feet. Alternatively, you can construct a flat wall composed of up to ten adjoining panels, each measuring 10 feet by 10 feet. The barrier can float freely or rest against a solid surface. Regardless of its configuration, the wall measures precisely 1/4 inch in thickness and persists for the spell's duration. Should the wall materialize through a creature's position, that creature is displaced to whichever side of the wall you designate.\n\nThe wall presents an absolute physical obstruction that nothing can penetrate. It withstands all forms of damage without degradation and remains unaffected by the dispel magic spell. Only a disintegrate spell can obliterate the wall instantaneously. Additionally, the barrier's effect extends into the Ethereal Plane, preventing any ethereal movement across its surface.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Wall Of Stone","level":5,"circle":"5th-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (a small block of granite)","duration":"Concentration, up to 10 minutes","description":"From a point within range, you conjure into being a nonmagical stone wall, bridge, or ramp of your design.\n\nThe wall consists of ten panels, each measuring 10 feet by 10 feet and standing 6 inches thick. Alternatively, you may fashion the panels to be 10 feet by 20 feet while reducing their thickness to 3 inches. Each panel must connect to at least one other panel.\n\nWhen the wall materializes, any creature whose space it occupies gets pushed to one side of your choosing. A creature that finds itself completely enclosed by the wall and other solid surfaces may attempt a Dexterity save. On a successful save, the creature can use its reaction to move up to its speed away from the enclosure.\n\nYou may shape the wall however you wish, though it cannot overlap with creatures or objects. The wall may be angled or curved and requires no foundation—however, it must connect to and be supported by existing stone, allowing you to bridge gaps or construct inclines.\n\nShould you create a span exceeding 20 feet in length, you must reduce each panel to half size to provide necessary supports.\n\nYou can fashion the wall's surface with crude details such as crenellations or battlements.\n\nThe wall functions as a stone object subject to damage. Each panel has AC 15 and 30 HP per inch of thickness. Destroying a panel reduces it to 0 HP and may cause adjacent panels to collapse at the GM's discretion.\n\nIf you concentrate on this spell for its entire duration, the wall becomes permanent and cannot be dispelled. If your concentration breaks before the duration ends, the wall vanishes.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Battle Blessing","level":6,"circle":"6th-Circle","traditions":["Divine"],"school":"Enchantment","isRitual":true,"castingTime":"10 minutes","range":"30 feet","components":"V, S, M (a vial of holy water, which the spell consumes)","duration":"8 hours","description":"You infuse a group of willing creatures with divine favor before they enter combat.\n\nEach willing creature within the spell's area receives a blessing of your choice, which must be activated during its next battle and lasts for the duration. The spell concludes when that combat ends. Select one of the following boons for each target:\n\nBlade Ward. The creature gains resistance to nonmagical bludgeoning, piercing, and slashing damage.\n\nCourage. The creature automatically succeeds on its next save against a fear effect and gains advantage on all subsequent saves against fear effects.\n\nDeadly. The creature's next critical hit inflicts maximum damage. Throughout the duration, it treats attacks that hit on a 19–20 as critical hits.\n\nEnergy Protection. The creature gains resistance to a damage type of your choice, excluding bludgeoning, piercing, and slashing.\n\nPowerful. For the duration of the combat, creatures have disadvantage on saving throws against spells cast by the target.\n\nRelentless. The creature automatically succeeds on its next save against effects that immobilize, paralyze, or restrain it, and gains advantage on all further saves against such effects.\n\nAt Higher Circles. When you gain access to 8th-circle spell slots, each targeted creature may receive 2 boons of your choice instead of one.\n\nWhen you gain access to 9th-circle spell slots, each targeted creature may receive 3 boons of your choice instead of one.","classes":["Cleric","Paladin"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Blade Barrier","level":6,"circle":"6th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S","duration":"Concentration, up to 10 minutes","description":"You voice an arcane incantation while sweeping your hand through the air, manifesting a barrier of spinning blades that slice through anything in its path.\n\nA vertical construct of whirling magical blades appears within range, its form entirely of your choosing. You may shape it as a straight wall stretching up to 100 feet in length, standing 20 feet tall, and measuring 5 feet in depth, alternatively you may arrange it as a ringed wall with a diameter up to 60 feet, the same height of 20 feet, and identical thickness of 5 feet. The blades provide three-quarters cover to any creature positioned behind them, and the area occupied by the wall counts as difficult terrain.\n\nWhenever a creature moves into the wall's space for the first time during a turn or begins its turn already within the wall's space, that creature must succeed on a Dexterity saving throw. If the creature fails this save, it takes 6d10 slashing damage; a successful save reduces the damage by half.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Slashing"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Chain Lightning","level":6,"circle":"6th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"150 feet","components":"V, S, M (a bit of fur; a piece of amber, glass, or a crystal rod; and three silver pins)","duration":"Instantaneous","description":"You hurl a lightning bolt toward a creature or object you designate within range that lies in your view. From that initial target, three additional bolts branch outward, each striking a separate target positioned within 30 feet of the primary target. Each secondary target must be a creature or object, and no target may be struck by more than one bolt.\n\nEach target must attempt a Dexterity saving throw. On a failed save, a target suffers 10d8 lightning damage. A successful save reduces the damage to half.\n\nAt Higher Circles. If you cast this spell using a spell slot of 7th circle or higher, an additional bolt branches from the first target for each slot level above 6th.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Lightning"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Chromatic Halo","level":6,"circle":"6th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":true,"castingTime":"1 minute","range":"Self","components":"V, S, M (a diamond worth at least 50 gp, which the spell consumes)","duration":"8 hours","description":"Six luminous orbs of distinct chromatic hues materialize and orbit lazily around your head throughout the spell's duration. Each orb corresponds to a particular damage type: red for fire, orange for acid, yellow for lightning, green for poison, blue for cold, and purple for thunder. Whenever a creature within 90 feet of you attacks you, you may expend your reaction to launch one of these orbs toward your attacker. The struck creature must succeed on a Dexterity save or take 8d8 damage of the type matching the mote's color. A successful save reduces the damage by half. Each mote can be used only once and vanishes after being deployed. The spell concludes once all six motes have been expended.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Acid","Cold","Fire","Lightning","Poison","Thunder"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Circle Of Death","level":6,"circle":"6th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"150 feet","components":"V, S, M (the powder of a crushed black pearl)","duration":"Instantaneous","description":"You unleash a wave of corrupting force that spreads outward in all directions. Negative energy expands from a point you choose within range, forming a sphere that extends 60 feet in every direction. Every creature caught within this sphere of decay must attempt a Constitution saving throw. Those who fail take 8d6 necrotic damage as the energy withers their flesh and bone, while those who succeed take half damage.\n\nWhen you cast this spell using a spell slot of 7th circle or higher, you add 2d6 additional necrotic dam
