ioned within 10 feet of the explosion must make a Dexterity save, taking 4d6 lightning damage on a failed save or half that damage on a successful one.\n\nWhen you cast this spell using a spell slot of 3rd circle or higher, increase the damage by 1d6 for each slot level above 2nd.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Lightning"],"tags":["Damage","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Liquid Memory","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"Touch","components":"V, S, M (liquid in a puddle or container)","duration":"Instantaneous","description":"By touching a body of liquid, you attune yourself to its history and glimpse a pivotal moment from its past.\n\nYou select a liquid contained within a puddle or vessel measuring no more than 5 feet across. As you make contact, the liquid's surface becomes a window into memory, revealing a single crucial event that transpired in that location during the preceding seven days. The vision connects directly to the liquid's presence—a puddle formed by recent rainfall might show you an action that unfolded while the rain fell, or spilled tavern ale might display the person responsible for the spill and the circumstances leading to it. You cannot direct which memory surfaces; instead, the spell naturally gravitates toward the event most significant to that liquid's circumstances.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Locate","level":2,"circle":"2nd-Circle","traditions":["Arcane","Divine","Primordial","Wyrd"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"Self (1 mile)","components":"V, S, M (a figurine of a bloodhound worth at least 25 gp, which the spell consumes)","duration":"Concentration, up to 10 minutes","description":"Through this spell, you gain awareness of the direction and distance toward objects or creatures you seek.\n\nName or describe a particular category of object (such as a specific style of clothing, a piece of jewelry, a tool, or a weapon) or a particular type of creature (such as a human or a unicorn).\n\nIf an appropriate target exists within the spell's range, you perceive the direction toward the nearest matching creature or object. Should the target move, you remain aware of the direction it travels.\n\nThis spell cannot reveal the location of a creature or object that has been transformed, such as by polymorph magic, or that is protected by divination-blocking effects like nondetection.\n\nYou may maintain only one active casting of this spell at a time. Should you cast it again while another casting persists, the previous casting ends immediately.\n\nAt Higher Circles. As you progress into higher circles, this ritual increases in effectiveness. Once you gain access to 4th-circle spell slots, you can employ this spell to locate a specific creature or object with which you are familiar. Additionally, the spell's duration becomes concentration, lasting up to 1 hour.","classes":["Bard","Cleric","Druid","Paladin","Ranger","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Lockjaw","level":2,"circle":"2nd-Circle","traditions":["Primordial","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (rusted metal)","duration":"Concentration, up to 10 minutes","description":"You clamp shut your target's mouth, rendering speech impossible.\n\nA creature within range must make a Constitution saving throw. On a failure, the creature's jaw becomes locked in place. While under this effect, the creature rolls with disadvantage on any Charisma ability check that involves speaking. Furthermore, whenever the creature attempts to cast a spell requiring a verbal component, it must succeed on a Constitution saving throw or the spell fails entirely—the action is lost, though no spell slot is consumed.\n\nAt Higher Circles. When you cast this spell using a spell slot of 3rd circle or higher, you may affect one additional creature for each slot level above 2nd.","classes":["Druid","Ranger","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Constitution","Charisma"],"damageTypes":[],"tags":["Buff","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Magic Mouth","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":true,"castingTime":"10 minutes","range":"30 feet","components":"V, S, M (a small bit of honeycomb and jade dust worth at least 10 gp, which the spell consumes)","duration":"Until dispelled","description":"You imbue an object with enchanted speech, causing it to speak when a specific condition is satisfied.\n\nSelect an object within your range that you can perceive and that no other creature is wearing or holding. Speak aloud the message you wish the object to deliver—this message cannot exceed twenty-five words in length, though its recitation may take up to 10 minutes to complete. Then specify the trigger condition that will activate the spell's effect.\n\nWhen the trigger condition manifests, a magical mouth materializes upon the object and speaks your message aloud in your own voice at the volume you used when speaking it. Should the chosen object possess an actual mouth or mouth-like feature (such as the mouth of a statue), the magical mouth appears in that location, making the words seem to originate from the object itself.\n\nYou may choose whether the spell terminates after delivering its message once, or whether it persists to repeat the message each time the trigger condition occurs.\n\nThe trigger condition may be as broad or as specific as you determine, provided it relies entirely on visual or audible phenomena that take place within 30 feet of the object. For instance, you might set the mouth to speak whenever any creature enters the 30-foot radius around the object, or whenever a silver bell produces sound within 30 feet of it.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Magic Weapon","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 bonus action","range":"Touch","components":"V, S","duration":"Concentration, up to 1 hour","description":"Through touch, you imbue an ordinary weapon with arcane power. The targeted nonmagical weapon gains magical properties that persist for the spell's duration, granting a +1 bonus to both its attack rolls and damage rolls.\n\nWhen cast using a 4th-circle spell slot or higher, the weapon's bonus increases to +2 instead.\n\nWhen cast using a 6th-circle spell slot or higher, the weapon's bonus increases to +3 instead.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Magnetize","level":2,"circle":"2nd-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 ft.","components":"V, S, M (a pouch of iron filings)","duration":"Concentration, up to 1 minute","description":"You establish a magnetic field around yourself that grants you dominion over metal objects.\n\nWhen you cast this spell, and whenever you use an action during subsequent rounds while the spell persists, you may direct your magnetic force toward a single metal item within range that lies within your sight. You retain the option to maintain focus on the same target or redirect your attention to a different one. Should you shift your focus to a new target, your previous target immediately ceases to be affected by the spell's influence.\n\nYou may attempt to manipulate a metal item weighing no more than 1,000 pounds. When the item rests unattended—neither worn nor held by a creature—you automatically propel it in a straight line up to 30 feet in your chosen direction, either toward or away from your position, provided it does not travel beyond the spell's maximum range.\n\nWhen a creature wears or carries the metal item, you must engage in an opposed ability check: you roll using your spellcasting ability while your opponent rolls Strength. If you prevail, you wrench the item from their grasp and move it in a straight line up to 30 feet toward or away from you, staying within the spell's range limit. However, if the item is affixed to the body such that removal proves difficult—as with a suit of armor—and your check fails, the creature holding the item is drawn along with it. Should the item and creature together exceed 1,000 pounds in total weight, you cannot move either of them.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Strength"],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Maleficent Effigy","level":2,"circle":"2nd-Circle","traditions":["Divine","Wyrd"],"school":"Necromancy","isRitual":true,"castingTime":"10 minutes or 1 minute (see text)","range":"300 feet","components":"V, S, M (clay, mud or wax, and a body part or personal possession of a creature)","duration":"1 hour","description":"You craft a sympathetic effigy to channel harm onto a distant target.\n\nWhen you cast this spell, you spend 10 minutes constructing a humanoid doll from clay, mud, or wax. The doll must incorporate a part of the target creature—such as hair, nail clippings, or blood—or alternatively, a small object of genuine or sentimental importance to them, like a ring or keepsake. Once completed, you can recast this spell on the same target after 1 minute without fashioning a new doll, provided the existing doll remains intact and in your possession.\n\nFor the duration, while you hold the doll, you may produce the following effects.\n\nCast Spell. Through the effigy, you can cast blindness/deafness, hold, or inflict wounds on the target creature, provided they remain within range. (See Player's Guide for spell details.)\n\nCause Pain. You can use an action to subject the doll to harm—piercing it, exposing it to flame, dripping corrosive substances upon it—and the target suffers 1d8 damage of the corresponding type.\n\nSpasm. When the target creature makes an attack roll or a Strength or Dexterity check or save, you can use your reaction to torment the doll with a pin, flame, or similar method, provided you can see the creature and it remains in range. The target has disadvantage on that roll.\n\nSpontaneous Harm. At the GM's discretion, you can use an action to inflict creative injury not covered by this spell's standard effects. For instance, you might attack the doll's leg, forcing the target to make a Dexterity save against your spell save DC or be knocked prone.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Mirror Image","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"1 minute","description":"You create three shimmering illusory duplicates of yourself that occupy your space alongside you.\n\nFor the spell's duration, your duplicates remain in your presence and precisely mirror your movements and actions, repositioning themselves continuously so observers cannot determine which figure is genuinely you. You may expend your action to voluntarily dispel the illusory duplicates.\n\nWhenever a creature makes an attack roll targeting you while this spell remains active, roll a d20 to determine if the attack strikes one of your duplicates instead of you. If you maintain three duplicates, you succeed on a result of 6 or higher. If two duplicates remain, you need an 8 or higher. With only one duplicate left, you require an 11 or higher.\n\nEach duplicate possesses an AC equal to 10 plus your Dexterity modifier. When an attack successfully hits a duplicate, that duplicate immediately vanishes.\n\nDuplicates can only be destroyed by attacks that directly targeted you (and consequently the duplicate). Area effects such as fireball cannot harm them, and they are unaffected by all other damage and magical effects. The spell concludes once all three duplicates have been destroyed.\n\nThis spell provides no benefit against creatures lacking vision, creatures relying on non-visual senses such as blindsight, or creatures able to see through illusions via abilities like truesight.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":[],"tags":["Buff"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Misty Step","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V","duration":"Instantaneous","description":"A shimmering veil of pale fog envelops you as you instantaneously shift your position to an unoccupied location within 30 feet that lies within your line of sight.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Moonbeam","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (several seeds of any moonseed plant and a piece of opalescent feldspar)","duration":"Concentration, up to 1 minute","description":"You summon a shaft of lunar radiance that pierces through darkness and strips away deception.\n\nA column of pale, ethereal moonlight extends downward in a cylinder with a 5-foot radius and 40-foot height, anchored at a point of your choosing within range. Whenever a creature first enters this luminous column during a turn or begins its turn within it, spectral flames engulf it in agonizing brilliance. The creature must succeed on a Constitution saving throw or suffer 2d10 radiant damage, taking half damage on a successful save.\n\nShapechangers make this saving throw with disadvantage. Should a Shapechanger fail the save, it immediately reverts to its true form and remains unable to adopt any other form for as long as it remains within the spell's light.\n\nOn each of your subsequent turns, you may spend an action to reposition the beam up to 60 feet away in any direction you wish.\n\nAt Higher Circles. If you cast this spell using a spell slot of 3rd circle or higher, the radiant damage increases by 1d10 for each slot level above 3rd.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Radiant"],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Orbital Spheres","level":2,"circle":"2nd-Circle","traditions":["Arcane","Divine"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self (5-foot radius)","components":"V, S, M (a tiny gold sphere worth 25 gp)","duration":"Concentration, up to 1 minute","description":"Magical force spheres materialize and circle around you in a protective formation. You conjure four orbiting spheres of pure magical energy that rotate about your person.\n\nAs a bonus action during the spell's effect, you may launch one of these spheres as a ranged spell attack. When the sphere strikes its target, it inflicts 1d6 + 1 force damage before dissipating entirely.\n\nWhenever an opponent's weapon attack connects with your body, you may spend your reaction to position a sphere between yourself and the blow. The sphere absorbs 1d6 + 1 of the incoming damage and shatters in the process.\n\nAt Higher Circles. If you cast this spell using a 3rd circle slot or any slot of greater power, the initial formation gains one additional sphere for each circle above 2nd.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Pain Wrack","level":2,"circle":"2nd-Circle","traditions":["Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V","duration":"Concentration, up to 1 minute","description":"You channel waves of torment into a living creature's body.\n\nA creature within range must make a Constitution saving throw. On a failure, it suffers a persistent ache. For the spell's duration, whenever that creature takes an action, you may spend your reaction to amplify this pain, imposing disadvantage on its first d20 roll made during that action. The creature then makes another Constitution saving throw. If it fails, it takes 1d6 psychic damage.\n\nAt Higher Circles. When you cast this spell using a spell slot of 3rd circle or higher, the psychic damage dealt increases by 1d6 for each spell slot level above 2nd.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V"],"saves":["Constitution"],"damageTypes":["Psychic"],"tags":["Buff","Damage","Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Paranoid Delusions","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"1 minute","description":"You plant seeds of fear and suspicion into a creature's psyche, warping its perception of those nearby.\n\nA creature of your choice within range must make a Wisdom saving throw. On a failed save, it becomes consumed by suspicion, perceiving all creatures standing within 5 feet of it as hostile threats. The affected creature expends its action each turn to strike out at any of these perceived enemies within 5 feet, choosing targets at random if multiple threats surround it. At the end of each of its turns, the creature may repeat the Wisdom saving throw, freeing itself from this mental compulsion on a success.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Pass Without Trace","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (ashes from a burned leaf of mistletoe and sprig of spruce)","duration":"Concentration, up to 1 hour","description":"You summon concealing shadows that envelop you and nearby allies in obscurity. A cloak of darkness and hush emanates outward from your position, obscuring you and your chosen associates from notice. While the spell persists, any creature within 30 feet of you that you designate—yourself included—gains a +10 bonus when making Dexterity (Stealth) checks and cannot be pursued through normal tracking methods, only through the use of magic. Those blessed by this enchantment leave behind no footprints, disturbed ground, broken branches, or any other evidence of their passage.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Perceive Vulnerability","level":2,"circle":"2nd-Circle","traditions":["Arcane","Divine","Primordial","Wyrd"],"school":"Divination","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, S, M (a glass lens)","duration":"Concentration, up to 1 minute","description":"This spell attunes your senses to perceive the fundamental weaknesses in your enemies' armor and physiology. When you land a critical hit or execute a successful sneak attack against a target during the spell's duration, you roll all damage dice twice and apply whichever result is higher.\n\nAdditionally, you may spend a bonus action to scrutinize a creature within 30 feet. Make a Wisdom (Perception) check opposed by a DC equal to 10 plus the target's CR. If you succeed, you gain knowledge of that creature's damage type vulnerabilities and identify which damage types are capable of bypassing its regeneration or equivalent abilities.","classes":["Bard","Cleric","Druid","Paladin","Ranger","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Portal Jaunt","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":true,"castingTime":"10 minutes","range":"300 feet","components":"V, S, M (a small brass key)","duration":"1 minute","description":"You weave magic between two constructed portals.\n\nYou transform a door, gate, doorway, archway, or similar artificial aperture into a singular-direction magical passage connecting to another crafted entrance within range. This spell affects only deliberately constructed openings—natural formations like cavern mouths or wall fissures cannot serve as portals. You must either know of your destination or be able to perceive it directly from your casting location.\n\nUpon casting, the initial door swings open to display a rippling vision of the space beyond your chosen destination. You may step through this threshold and immediately emerge from the destination door. Alternatively, you may permit one other consenting creature to traverse the portal instead. Any belongings you transport pass through alongside you, including additional creatures regardless of their willingness.\n\nThroughout the spell's duration, all locks, chains, and magical barriers—including those created by arcane lock—cease to function. You can only reach a door's side that you currently observe or have previously stood before; magical sight such as clairvoyance satisfies this requirement. The moment you or a willing creature crosses the threshold, both doors seal shut and the spell concludes.\n\nAt Higher Circles. As your magical studies advance: Upon accessing 3rd-circle spell slots, the range extends an additional 300 feet for every circle above 2nd that you can access, and one more creature of your selection gains passage before termination. Upon accessing 6th-circle spell slots, the spell persists for 10 minutes, and the portal becomes bidirectional, permitting you and designated creatures unrestricted passage between both doors until completion. Upon accessing 7th-circle spell slots, range becomes unlimited provided both doors exist on the same plane.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Prayer Of Healing","level":2,"circle":"2nd-Circle","traditions":["Divine"],"school":"Necromancy","isRitual":true,"castingTime":"10 minutes","range":"30 feet","components":"V","duration":"Instantaneous","description":"You channel restorative energy across a distance, mending the wounds of those around you.\n\nSelect up to six creatures within range that you can perceive. Each regains a number of hit points equal to 2d8 plus your spellcasting ability modifier. Constructs and Undead gain no benefit from this spell's magic.\n\nYou must finish a long rest before you can cast this spell again.\n\nWhen Cast at Higher Circles. If you have access to spell slots of 3rd circle or higher, the spell's healing increases. For each circle above 3rd, add an additional 1d8 to the healing roll.","classes":["Cleric","Paladin"],"source":"Player's Guide 1 (Rituals)","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Protection From Poison","level":2,"circle":"2nd-Circle","traditions":["Divine","Primordial"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"1 hour","description":"You make contact with a creature and begin cleansing its body of toxins while fortifying it against future harm. If the creature suffers from poisoning, you purge one poison from its system—either one you can identify or one chosen randomly if multiple poisons plague the target.\n\nFor the duration of the spell's effect, the creature gains advantage on all saving throws made to resist poison and takes only half damage from poison sources.\n\nAt Higher Circles. When you expend a spell slot of 3rd circle or above to cast this spell, you may extend its protection to one additional creature for each circle above 2nd.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Poison"],"tags":["Buff","Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Psychic Block","level":2,"circle":"2nd-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"1 minute","description":"You weave psychic interference around your presence, making yourself difficult to locate. Select a creature within range that can hear you; that creature must make a Wisdom saving throw. If you are engaged in initiative against this creature, it gains advantage on this save. When the save fails, the target suffers disadvantage on Wisdom (Perception) checks used to perceive you. Should the target attempt to attack you, it must immediately make another Wisdom saving throw. If this second save fails, the target cannot direct its attack toward you and must choose a different creature as its target or use its action on something other than attacking.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":["Psychic"],"tags":["Buff","Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Quill Growth","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (quill or spine from a Beast)","duration":"Concentration, up to 1 hour","description":"Upon casting this spell, you cause razor-edged quills to erupt from the target's body. The target must be willing to receive this magic.\n\nAny creature that moves within 5 feet of the affected target and strikes it with a melee attack or makes physical contact must attempt a Dexterity saving throw. On a failed save, the creature suffers 1d10 piercing damage and 1d4 poison damage.\n\nIf a creature is currently grappling the affected target, it takes this damage automatically at the start of each of its turns, with no saving throw allowed.\n\nWhen you cast this spell using a spell slot of 3rd circle or higher, add an additional 1d4 poison damage for each circle above the 2nd.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Piercing","Poison"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Ray Of Enfeeblement","level":2,"circle":"2nd-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"A tendril of weakening force erupts from your fingertip, streaking toward a creature you can see within range. You make a ranged spell attack roll against that creature. If you hit, the target's Strength-based attacks deal half their normal damage for the spell's duration.\n\nAt the conclusion of each turn the target takes, it may attempt a Constitution saving throw against your spell save DC. A successful save ends the spell immediately.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Strength","Constitution"],"damageTypes":[],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Read Object","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"Touch","components":"V, S","duration":"Concentration, up to 1 minute","description":"By grasping and examining an object, you perceive the psychic impressions lingering upon its surface, allowing you to discern details of its past. Once you initiate this spell, you must maintain physical contact with the item as you delve into its residual memories, continuing to read any","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S"],"saves":[],"damageTypes":["Psychic"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Reassuring Visage","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, S, M (a small mirror)","duration":"10 minutes","description":"An illusory charm settles upon you, molding each observer's perception to see you as trustworthy and unthreatening. When you cast this spell, enchanted glamour wraps around you, crafting a distinct reassuring facade for any creature you communicate with that understands your words. That creature must make a Wisdom saving throw; if it fails, its disposition toward you shifts one degree closer to friendship—creatures viewing you with hostility instead regard you neutrally, while those who were indifferent become fond of you. Any creature whose attitude transforms to friendliness grants you advantage on Charisma checks you roll to sway or persuade it throughout the spell's duration.\n\nEach creature perceives a different version of you while this magic persists—the illusions are tailored and distinct. However, if two or more affected creatures compare notes about your appearance, the inconsistencies become apparent, and they see through the deception. When your next turn begins, you lose advantage on these checks, and every creature's attitude reverts to what it was before the spell took hold.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Wisdom","Charisma"],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Redirect Missile","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":false,"castingTime":"1 reaction, when you are targeted by a ranged weapon attack that you can see","range":"30 feet","components":"S","duration":"Instantaneous","description":"When you perceive a ranged weapon attack aimed at you, you may use your reaction to summon a barrier of telekinetic energy that intercepts the projectile and sends it hurtling toward a different creature. You may choose any target within 30 feet of you as the new destination for this missile, even the original attacker if they fall within that range. The attack roll already made is then applied against your chosen target's AC to see if the redirected attack successfully strikes them.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["S"],"saves":[],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Restoration","level":2,"circle":"2nd-Circle","traditions":["Divine","Primordial"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Instantaneous","description":"You reach out and place your hand upon a creature, instantly purging a single affliction from its body. You may end either one disease or one condition that burdens the target. If you choose to end a condition, it must be one of the following: blinded, deafened, paralyzed, or poisoned.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Control","Debuff"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Rope Trick","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a length of rope up to 60 feet long)","duration":"1 hour","description":"You conjure a hidden pocket dimension by enchanting a rope. When you touch a rope measuring up to 60 feet in length, it becomes magically animated and stretches upright until it hangs completely vertical against the ground. At its highest point, an unseen doorway materializes, granting access to a tiny extradimensional chamber that persists as long as the spell remains active.\n\nThose who wish to enter must physically climb the rope to its summit. The pocket dimension can accommodate as many as eight creatures of Medium size or smaller. Once someone reaches the interior, the rope itself can be drawn up into the space, rendering it invisible to observers outside.\n\nThe threshold between the extradimensional space and the material plane blocks all weapon attacks and magical effects from passing through in either direction. However, inhabitants of the pocket dimension retain visibility to the outside world, viewing it through what functions as a 3-foot-by-5-foot transparent panel positioned along the rope's length.\n\nWhen the spell's duration expires, any creatures or objects housed within the extradimensional space are deposited onto the ground.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Scorching Ray","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","description":"You conjure streaks of flame and direct them toward your enemies. You form three distinct rays of searing fire and launch them at any targets you can see within range, distributing them among one or more creatures as you wish. For each ray, you must make a ranged spell attack roll against your target. When a ray strikes true, the target suffers 2d6 fire damage.\n\nWhen you cast this spell using a spell slot of 3rd circle or higher, you generate one additional ray for each level of the spell slot above 2nd.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Fire"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"See Invisibility","level":2,"circle":"2nd-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (a pinch of talc and a small sprinkling of powdered silver)","duration":"1 hour","description":"For the spell's duration, your vision pierces through invisibility and illusion. Invisible creatures and objects become fully perceptible to you as though they possessed physical form and color. Additionally, your eyes gain the ability to perceive the Ethereal Plane, where creatures and objects manifest as spectral and semi-transparent versions of themselves.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Shadow Flame Crown","level":2,"circle":"2nd-Circle","traditions":["Divine"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 minute","description":"You conjure a spectral crown of dark, roiling flames that settle upon your head.\n\nFive shadowy embers dance and flicker around your crown, emanating an unsettling radiance that illuminates a 20-foot radius with dim light. Throughout the spell's duration, you gain advantage on Wisdom (Perception) checks made within this radius. Additionally, any Charisma check you make while communicating with a Fiend benefits from advantage.\n\nWhenever you witness a creature striking you or an ally positioned within 20 feet of you with an attack roll, you may use your reaction to snuff out one ember. When you do, that creature must reroll its attack. The second roll stands as the final result, regardless of outcome.\n\nThe spell terminates immediately when the final ember is extinguished.\n\nAt Higher Circles. If you cast this spell using a spell slot of 6th circle or higher, your crown manifests with ten embers rather than five.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Wisdom","Charisma"],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Shadow Guardians","level":2,"circle":"2nd-Circle","traditions":["Divine","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Self (15-foot radius)","components":"V, S","duration":"Concentration, up to 10 minutes","description":"You conjure spectral entities of living shadow that encircle you in an aura extending outward 15 feet. Any creature that moves into this zone or begins its turn within it finds its movement speed reduced by half and rolls all attacks against you and your companions within the radius with disadvantage. Throughout the spell's duration, whenever you attempt a Dexterity (Stealth) check to conceal yourself in dim light, darkness, or areas of magical darkness, you roll with advantage.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":[],"tags":["Buff","Debuff","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Shatter","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a chip of mica)","duration":"Instantaneous","description":"A deafening sonic wave explodes outward from a point you designate within range, wreaking havoc on both living creatures and inanimate matter.\n\nFrom your chosen location, a piercing shriek of unbearable volume tears through the air. Every creature within a 10-foot-radius sphere centered on that point must succeed on a Constitution save or suffer the spell's effects. Those who fail the save take 3d8 thunder damage, while those who succeed take half damage. Creatures composed of inorganic substances—such as stone, crystal, or metal—make this save at disadvantage.\n\nNonmagical objects that lie within the spell's radius and are neither worn nor carried by anyone are also damaged by the sonic blast.\n\nAt Higher Circles. If you cast this spell using a spell slot of 3rd circle or above, the damage increases by 1d8 for each slot level above 2nd.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Thunder"],"tags":["Buff","Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Silence","level":2,"circle":"2nd-Circle","traditions":["Divine","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Concentration, up to 10 minutes","description":"An invisible barrier of absolute quiet emanates from a point of your choosing within range, extending outward in a 20-foot-radius sphere. For the spell's duration, this zone of silence functions as follows: sound cannot originate within its bounds, nor can noise penetrate its barrier from outside. Anything wholly contained within the sphere gains protection from thunder damage and becomes unable to hear. Additionally, any creature entirely within the sphere cannot cast spells that require verbal components, as their words produce no sound.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Thunder"],"tags":["Damage","Debuff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Spider Climb","level":2,"circle":"2nd-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a drop of bitumen and a spider)","duration":"Concentration, up to 1 hour","description":"You imbue a willing creature you touch with an extraordinary talent for scaling surfaces. For the duration of this spell, the target can traverse vertical walls, horizontal ceilings, and other steep terrain such as cliffs or tree trunks. It moves with complete freedom across these surfaces—ascending, descending, and traversing sideways—while keeping both hands unoccupied. The target gains a climbing speed equal to its walking speed.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Spike Growth","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"150 feet","components":"V, S, M (seven sharp thorns or seven sharpened twigs)","duration":"Concentration, up to 10 minutes","description":"You cause the earth to erupt with jagged spikes and thorns, creating treacherous ground that conceals its true nature.\n\nThe terrain within a 20-foot radius centered on a point within range becomes twisted and overgrown with sharp spikes and thorns. This area counts as difficult terrain for the duration. Whenever a creature enters or moves through the area, it suffers 2d4 piercing damage for every 5 feet of movement it completes.\n\nThe magical transformation appears natural and unaltered to the naked eye. Any creature unable to observe the area when you cast the spell must succeed on a Wisdom (Perception) check against your spell save DC in order to discern that the terrain is dangerous before moving into it.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":["Piercing"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Spirit Sensing","level":2,"circle":"2nd-Circle","traditions":["Divine","Wyrd"],"school":"Divination","isRitual":true,"castingTime":"1 hour","range":"Self (60-foot radius)","components":"V, S M (animal bones etched with symbols)","duration":"Concentration, up to 8 hours","description":"You open yourself to the unseen forces that permeate the world around you, attuning your senses to the spiritual realm and the natural energies that flow through your immediate surroundings. While this attunement persists, you gain the following capabilities.\n\nObject Divination. You may examine the spiritual essence of natural objects situated within this spell's area. By concentrating upon any object, you perceive its resonance with the spirit world, discern any magical enchantments or divine blessings imbued within it, and comprehend the deeper meanings encoded in runes or symbolic markings upon its surface. This perception extends to revealing the magical properties of enchanted items, accompanied by an intuitive understanding of the item's essential nature and purpose. For instance, you might perceive the faint, lingering aura of a blade stained by ritual sacrifice.\n\nSpirit Echo Vision. You become aware of spiritual presences that linger in the space around you and perceive the faint impressions of events long past. These impressions manifest as translucent, wavering currents of energy that shimmer across your field of vision. Additionally, you sense the emotional imprint left behind by these spirits and events. For example, you can distinguish whether a spirit experienced joy or was consumed entirely by dread.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Spirit Ward","level":2,"circle":"2nd-Circle","traditions":["Wyrd"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"1 minute","description":"You entreat the spirits to shield a creature of your choosing that you can perceive within casting range. That creature receives 2d8 temporary hit points as spiritual guardians fortify them. While these temporary hit points remain, the creature gains resistance against a single damage type you select from among bludgeoning, piercing, or slashing. The temporary hit points and damage resistance both fade after 1 minute, or earlier if depleted.\n\nWhen you cast this spell using a higher-circle slot, the protection intensifies. Each spell slot above 2nd circle adds an additional 1d8 to the temporary hit points granted. Should you employ a 6th-circle slot or higher, you expand your selection of resistible damage types to include acid, cold, fire, force, necrotic, poison, and radiant alongside the original three options.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Buff","Healing"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Spiritual Weapon","level":2,"circle":"2nd-Circle","traditions":["Divine","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 bonus action","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"You conjure an ethereal weapon that materializes within range and persists for the spell's duration, or until you cast this spell again. You may shape this phantom armament into any form you envision. Upon casting, you can immediately direct the weapon to strike a creature within 5 feet of it, making a melee spell attack. If the attack succeeds, the target suffers force damage equal to 1d8 + your spellcasting ability modifier.\n\nOn each of your turns thereafter, you may spend a bonus action to propel the weapon up to 20 feet away and compel it to attack any creature positioned within 5 feet of the weapon's new location, repeating the same attack.\n\nAt Higher Circles. If you cast this spell using a 3rd circle spell slot or higher, the force damage dealt increases by 1d8 for each pair of spell slot levels above 2nd.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Star Bolt","level":2,"circle":"2nd-Circle","traditions":["Divine","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","description":"You conjure three luminous bolts wreathed in stellar radiance and launch them toward your foes. You may direct these bolts at one target or spread them among multiple targets within range. For each bolt, make a ranged spell attack. When a bolt connects, the struck creature suffers 1d10 radiant damage and must make a CON saving throw. If it fails, that creature remains blinded until the end of its next turn.\n\nEach bolt that strikes detonates in a brilliant flash of light. The hit creature and any other creatures within a 5-foot radius of it must make a DEX saving throw. Those who fail are enveloped in a shimmering blue-white aura that produces dim light in a 10-foot radius, persisting until the start of your next turn. While adorned with this radiant shroud, any attack roll directed at the affected creature is made with advantage if the attacker has line of sight, and the affected creature cannot benefit from invisibility.\n\nWhen you cast this spell using a spell slot of 3rd circle or higher, you create one additional star bolt for each circle above 2nd.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity","Constitution"],"damageTypes":["Radiant"],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Suggestion","level":2,"circle":"2nd-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, M (a snake’s tongue and either a bit of honeycomb or a drop of sweet oil)","duration":"Concentration, up to 8 hours","description":"You magically persuade a creature to pursue a course of action you recommend.\n\nYou propose a specific course of activity—described in one or two sentences—and use magic to sway a creature within range that you can see, hear, and understand you. Creatures immune to being charmed cannot be affected by this spell. Your suggestion must be framed in language that presents the proposed action as sensible and logical. If you suggest the creature harm itself directly—such as stabbing, burning, or inflicting other obvious damage upon itself—the spell immediately terminates.\n\nThe target makes a Wisdom saving throw. If it fails, the creature follows your suggested course of action as best it can. This suggested action persists for the entire duration of the spell. However, if the suggested activity can be accomplished faster, the spell ends once the creature completes what you requested.\n\nYou may also establish conditions that trigger a secondary activity during the spell's duration. For instance, you could suggest that a knight present her warhorse to the first beggar she encounters. Should this condition fail to occur before the spell's duration expires, the suggested activity never takes place.\n\nThe spell ends immediately if you or any of your allies deal damage to the target.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Temple Manifestation","level":2,"circle":"2nd-Circle","traditions":["Divine"],"school":"Conjuration","isRitual":true,"castingTime":"10 minutes","range":"Touch","components":"V, S, M (religious emblem)","duration":"10 hours","description":"You consecrate a portable structure into a hidden temple.\n\nYou attach a religious emblem to a portable structure measuring at least 10 square feet, such as a large tent. This spell transforms the interior into a hidden sanctuary while leaving the structure's outward form unaltered. The entrance remains unobstructed and unprotected by magical means. Within, the space expands to accommodate a foyer and five separate bedchambers. The foyer serves as a space for worship and contemplation, furnished with a seat and an altar bearing iconography of the religion represented by your emblem. Each bedchamber is appointed with a comfortable bed and a small table bearing candlelight. Every interior surface bears religious artwork and symbolic decorations matching the emblem's faith.\n\nYou may permit up to five other creatures to enter this manifested temple. Should the structure sustain damage, those sheltering inside receive immediate warning. Should the structure be destroyed entirely, the spell terminates at once, and all occupants are forced outside, landing prone in the nearest available spaces.","classes":["Cleric","Paladin"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Control","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Thunderburst","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S","duration":"Instantaneous","description":"You unleash a violent burst of thunder that radiates outward from a point within your range that you can perceive. Every creature positioned within 10 feet of that point must succeed on a Constitution saving throw or suffer the full force of the detonation. Those who fail take 2d6 thunder damage and are thrust 10 feet away from the explosion's center. Creatures that resist the saving throw take half damage instead and remain unmoved by the blast.\n\nThe explosion's force also affects loose objects in the area—anything not secured, worn, or held in hand is propelled 10 feet away from the point of origin. The detonation produces a thunderous report audible to creatures within 300 feet.\n\nWhen you cast this spell using a spell slot of 3rd circle or higher, add 1d6 additional thunder damage for each slot level beyond 2nd.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Thunder"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Vengeful Smite","level":2,"circle":"2nd-Circle","traditions":["Divine","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, M (a melee weapon)","duration":"Concentration, up to 1 minute","description":"You imbue a weapon you hold with vengeful power that wounds the spirit and breaks the will.\n\nWhen you hit a creature with the enchanted weapon for the first time before this spell ends, that creature takes an additional 2d6 psychic damage. The struck creature is also frightened of you for the duration of the spell. At the end of each of the frightened creature's turns, it may attempt a Wisdom saving throw to end the frightened condition on a success.\n\nWhen you cast this spell using a spell slot of 3rd circle or higher, the extra psychic damage increases by 1d6 for each slot level above 2nd.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","M"],"saves":["Wisdom"],"damageTypes":["Psychic"],"tags":["Control","Damage"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Veteran Spirit","level":2,"circle":"2nd-Circle","traditions":["Divine","Wyrd"],"school":"Necromancy","isRitual":true,"castingTime":"1 minute 1 hour","range":"30 feet 1 mile","components":"V, S, M (a small gold wheel worth 25 gp) V, S, M (a golden model of a warship worth","duration":"1 hour Instantaneous","description":"You summon the ephemeral form of a departed master to lend you its expertise.\n\nDrawing upon the ethereal realm, you beckon forth a ghostly apparition of a legendary expert who manifests in an unoccupied space within range. The spirit materializes visibly and audibly only to you.\n\nThroughout the spell's duration, the spirit remains bound to augment your capabilities through its specialized knowledge. You select one of the following specializations.\n\nMaster Sage. You invoke a spirit versed in scholarship and arcane understanding. You gain advantage on Intelligence checks while receiving the spirit's instruction.\n\nSeasoned Performer. You evoke a spirit accomplished in oratory and artistic display. You gain advantage on Charisma checks when acting upon the spirit's direction.\n\nWise Savant. You invoke a spirit practiced in communion with living beings and natural forces. You gain advantage on Wisdom checks when employing the spirit's counsel.\n\nWar Vessel. 7th-Level Arcane Ritual (Conjuration). Casting Time: 1 hour. Range: 1 mile. Components: V, S, M (a golden model of a warship worth at least 500 gp, which the spell consumes). Duration: Instantaneous.\n\nA colossal wooden warship materializes upon a body of water of your choosing within range that you can observe. That body of water must be sufficiently expansive to contain the vessel—at minimum 100 feet long, 20 feet wide, and 15 feet deep—and entirely unobstructed by other watercraft or structures.\n\nThe warship functions as a Gargantuan vehicle spanning 100 feet in length and 20 feet in width. Four siege weapons crown its deck: two ballistae and two cannons.\n\nThe interior comprises two decks accessible via wooden stairs: an upper lower deck and a storage hold. Below-deck spaces are furnished and decorated according to your preference, stocked daily with provisions sufficient for a nine-course feast serving up to 60 individuals. Furnishings, provisions, and objects conjured by this spell disintegrate to dust if transported beyond the ship's confines.\n\nForty invisible servants, bound to obey commands from creatures you designate upon casting, crew the vessel. Each servant operates identically to those created by the unseen servant ritual.\n\nThe warship and its siege weapons, constructed of wood and metal, resist poison and psychic harm. The hull possesses AC 15 and 500 hit points.\n\nEach ballista has AC 15 and 50 hit points. Each cannon has AC 19 and 75 hit points. For additional vehicular mechanics not addressed here, consult the galley rules in Chapter 5 of the Player's Guide.\n\nThe vessel persists indefinitely unless destroyed. Casting this spell while another vessel exists destroys the previous one instantly.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Warding Bond","level":2,"circle":"2nd-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a pair of platinum rings worth at least 50 gp each, which you and the target must wear for the duration)","duration":"1 hour","description":"You consecrate a pair of rings, forging an invisible thread between yourself and a willing creature you touch. This mystical link persists until the spell concludes, binding your fates together through shared fortune and suffering.\n\nFor the duration, while your bonded companion remains within 60 feet of you, they receive a +1 bonus to their armor class and to all saving throws. Additionally, they gain resistance to all forms of damage. Yet this protection comes at a cost: whenever your bonded companion sustains damage, you suffer an identical amount of damage.\n\nThe bond severs if you are reduced to 0 hit points, if the distance between you and your bonded companion exceeds 60 feet, or if either of you becomes the target of this spell again. You may also dismiss the bond at will, requiring only an action to sever the connection.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Web","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a bit of spiderweb)","duration":"Concentration, up to 1 hour","description":"You weave a dense network of tacky strands at a location you designate within range. This webbing occupies a 20-foot cube centered on that point and persists for the duration. The webbing functions as difficult terrain and provides light obscurement throughout its area. Should the webbing lack proper support—such as being suspended between two sturdy structures like walls or trees, or spread across a horizontal or vertical surface—it collapses immediately, and the spell terminates at the beginning of your next turn. When webbing covers a flat surface, it extends 5 feet deep.\n\nAny creature beginning its turn within the webbing or moving into it must succeed on a Dexterity save or become restrained. A creature restrained in this manner remains so while within the webbing unless it escapes. A restrained creature may expend its action to make a Strength check opposed to your spell save DC; success frees it from the restraint.\n\nThe webbing readily ignites. Each 5-foot cube exposed to flames is consumed in 1 round, and any creature starting its turn in the burning webbing takes 2d4 fire damage.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength","Dexterity"],"damageTypes":["Fire"],"tags":["Control","Damage","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Wildsense","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Touch","components":"S","duration":"1 hour","description":"You establish a supernatural connection with a willing Beast or creature bearing the Animal tag through touch, maintaining this bond throughout the spell's duration. While this link persists, you may spend an action to perceive reality through your linked creature's faculties—viewing through its eyes, hearing through its ears, and accessing any extraordinary sensory abilities it possesses. During this perception, you lose the ability to see and hear through your own body. You may use an action to return to your normal senses at will. Should you wish to sever the connection entirely, you can spend an action to do so, instantly terminating the spell.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["S"],"saves":[],"damageTypes":[],"tags":["Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Zone Of Truth","level":2,"circle":"2nd-Circle","traditions":["Divine"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"10 minutes","description":"You establish a magical barrier against falsehood within a 15-foot-radius sphere centered on a point you select within range. For the duration of this spell, any creature entering this enchanted area for the first time during a turn, or any creature beginning its turn within the sphere, must succeed on a Charisma saving throw. If a creature fails this save, it becomes unable to speak intentional lies while remaining within the sphere's boundaries. You are aware of which creatures succeed and which fail their saving throws.\n\nA creature subject to this spell understands the magic at work and can therefore refuse to answer questions that would require a false response. However, such a creature may still provide evasive or partial answers, so long as every word spoken remains technically truthful.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Charisma"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Abjuring Smite","level":3,"circle":"3rd-Circle","traditions":["Divine","Wyrd"],"school":"Abjuration","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, M (a melee weapon)","duration":"Concentration, up to 1 minute","description":"You imbue a weapon in your grasp with abjuring magic, channeling it toward creatures from beyond the material world. When you strike a creature with this enchanted weapon before the spell concludes, that attack inflicts an additional 3d8 force damage. Should the target originate from a plane of existence other than your own, it sustains an extra 1d8 force damage and suffers disadvantage on all Intelligence, Wisdom, and Charisma saving throws while the spell persists.\n\nWhen you cast this spell using a spell slot of 4th circle or higher, add 1d8 force damage to the initial damage for each slot level beyond the 3rd.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","M"],"saves":["Intelligence","Wisdom","Charisma"],"damageTypes":["Force"],"tags":["Buff","Damage","Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Animal Aspect","level":3,"circle":"3rd-Circle","traditions":["Primordial","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Concentration, up to 1 hour","description":"You infuse a willing creature with primal animal traits through touch, temporarily reshaping its physical form to grant a single bestial gift. Choose one benefit below to bestow upon the target for this spell's duration:\n\n• Keen Senses. The creature develops heightened sensory awareness, gaining keensense out to 60 feet.\n\n• Prehensile Tail. The creature sprouts a functional tail capable of grasping and transporting objects weighing up to 50 pounds. This tail can manipulate nearby objects and interact with the environment independently, freeing the creature's hands for weapon wielding or carrying additional cargo. The tail cannot serve as a weapon or shield.\n\n• Rapid Movement. The creature's locomotion accelerates, increasing one of its movement speeds by 10 feet.\n\n• Thickened Hide. The creature's skin hardens and toughens, providing a +1 bonus to its AC.\n\n• Venom. The creature's body produces toxic secretions that coat its weapons, causing melee weapon attacks to inflict an additional 1d6 poison damage when they hit.\n\n• Wings. The creature manifests functional wings, granting it a flying speed of 30 feet.","classes":["Druid","Ranger","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":["Poison"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Animate Dead","level":3,"circle":"3rd-Circle","traditions":["Arcane","Divine"],"school":"Necromancy","isRitual":true,"castingTime":"1 minute","range":"10 feet","components":"V, S, M (a bloodstone worth at least 10 gp, which the spell consumes)","duration":"Instantaneous","description":"You infuse a corpse or skeletal remains with profane energy, compelling it to rise as your undead thrall.\n\nSelect a Medium or Small Humanoid corpse or collection of bones within range. The spell animates the remains, transforming bones into a skeleton or a corpse into a zombie under your dominion.\n\nEach of your turns, you may spend a bonus action to issue mental commands to any undead you've created with this spell, provided it remains within 60 feet of you. You can direct multiple creatures simultaneously, delivering identical orders to all of them. You dictate the creature's actions and movement for its next turn, or you can issue standing instructions such as commanding it to defend a specific location.\n\nWithout your command, the creature responds only to aggression directed against it. Once ordered to perform a task, the creature persists in that task until completion.\n\nYour control extends for 24 hours. After this duration, the creature ceases obeying your commands. To extend your dominion for another 24 hours, you must recast this spell on the creature before the current period expires. Recasting renews your grip on an existing servant rather than animating a new one.\n\nYou may maintain control of no more than 4 creatures spawned from this spell simultaneously. Should you attempt to animate additional undead beyond this threshold, the creature that has served you longest is instantly destroyed.\n\nAt Higher Circles: When you gain access to 4th circle spell slots or beyond, your capacity for undead servants expands. For each slot level above 3rd, you may command two additional undead creatures, with a maximum total determined by your highest available slot level. Each creature must originate from a separate corpse or skeleton.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Aqueous Form","level":3,"circle":"3rd-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a drop of prepared water)","duration":"Concentration, up to 1 hour","description":"You touch a willing creature and transmute it into a formless body of water, encompassing all its equipment and possessions for the duration. The transformation ends immediately if the creature's hit points fall to 0.\n\nIn this aqueous state, the target moves at a speed of 15 feet and gains a swimming speed of 30 feet. It can respire through both air and water without difficulty. The target may move freely through the spaces occupied by other creatures regardless of their size. It possesses resistance to damage dealt by nonmagical weapons and attacks, and rolls with advantage on Strength, Dexterity, and Constitution saving throws. The target is able to seep through small apertures, tight passages, and hairline fissures. It can flow through other liquids without harm, though caustic or destructive substances such as acid and lava inflict damage upon it.\n\nWhile transformed into this watery form, the target cannot speak or handle objects. Any items previously carried or held become inaccessible and cannot be released, employed, or engaged with in any manner. The target cannot make attacks or use spell slots to cast spells.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Aspect of the Cobra","level":3,"circle":"3rd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (a fang from a venomous snake)","duration":"Concentration, up to 1 minute","description":"Your body transforms with serpentine characteristics, granting you venomous capabilities.\n\nYou develop fangs that transform your unarmed strikes into a melee bite attack. When you hit with this bite, you deal 1d4 piercing damage plus your choice of your DEX or STR modifier, and the target takes an additional 4d6 poison damage. A target struck by your bite can make a Constitution save, reducing the poison damage by half on a successful save.\n\nAdditionally, you can use a bonus action to unleash a spray of venom toward any creature within 20 feet, making a ranged weapon attack against it. If this attack hits, the target must succeed on a Constitution save or become poisoned and blinded for 1 minute. At the end of each turn while affected, the target can repeat the Constitution save, freeing itself from this condition on a success.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Strength","Dexterity","Constitution"],"damageTypes":["Piercing","Poison"],"tags":["Damage","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Aura of Bane","level":3,"circle":"3rd-Circle","traditions":["Divine","Wyrd"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Concentration, up to 1 minute","description":"A sphere of corrupting power radiates outward from your position, extending 10 feet in all directions. This dark aura remains centered upon you, shifting and moving as you do.\n\nWhile the effect persists, any creature you designate within the aura must add a d4 roll to its fate whenever it attempts an attack or saving throw—but instead of gaining fortune, it subtracts this value from the total.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Beacon Of Hope","level":3,"circle":"3rd-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Self (30-foot radius)","components":"V, S","duration":"Concentration, up to 1 minute","description":"Your presence radiates resolute determination, fortifying the spirits and bodies of those nearby.\n\nChoose any number of creatures within range. For the duration, each chosen creature gains advantage on Wisdom saving throws and death saving throws. Additionally, whenever a chosen creature receives healing from any source, it regains the maximum number of hit points that the healing would normally restore, rather than rolling to determine the amount.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Healing"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Bestow Curse","level":3,"circle":"3rd-Circle","traditions":["Divine","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Concentration, up to 1 minute","description":"You touch a creature, forcing it to make a Wisdom saving throw. On a failed save, the creature becomes cursed for the spell's duration.\n\nWhen casting this spell, select one curse effect from the options below:\n\n• Designate one ability score. The cursed creature has disadvantage on ability checks and saving throws using that ability.\n\n• The cursed creature has disadvantage on attack rolls made against you.\n\n• At the start of each of the cursed creature's turns, it must make a Wisdom saving throw. If it fails, it loses its action that turn and cannot act.\n\n• Your weapon attacks and spells deal an extra 1d8 necrotic damage to the cursed creature.\n\nThe curse ends if the target is affected by a remove curse spell. The GM may permit alternative curse effects of comparable power to those listed above.\n\nAt Higher Circles: When you cast this spell using a 4th circle slot or higher, the duration requires concentration and lasts up to 10 minutes. Using a 5th circle slot or higher grants a duration of 8 hours without concentration. Using a 7th circle slot or higher extends the duration to 24 hours without concentration. Using a 9th circle slot makes the curse permanent until dispelled, without requiring concentration.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":["Necrotic"],"tags":["Buff","Damage","Debuff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Blink","level":3,"circle":"3rd-Circle","traditions":["Arcane","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"1 minute","description":"You slip between your current plane of existence and the Ethereal Plane, using the latter as shelter from danger.\n\nAt the end of each turn while this spell persists, you roll a d20. If the result is 11 or higher, you slip away from your current plane and materialize on the Ethereal Plane (however, if you were already on the Ethereal Plane when you cast this spell, it fails immediately and the casting is consumed). When your next turn begins, or if the spell ends while you occupy the Ethereal Plane, you return to an unoccupied space of your choice within 10 feet of where you vanished, provided you can see it. Should no such space exist within that distance, you reappear in the nearest unoccupied space instead (determined randomly if multiple spaces are equally close). You may use an action to end this spell at any time.\n\nWhile occupying the Ethereal Plane, you perceive your origin plane in grayscale tones and cannot see beyond 60 feet within it. You can only interact with and be affected by creatures also on the Ethereal Plane.\n\nCreatures not on the Ethereal Plane cannot see you, hear you, or influence you unless they possess the ability to perceive into the Ethereal Plane through see invisibility or equivalent magic.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Butterfly Spies","level":3,"circle":"3rd-Circle","traditions":["Primordial"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"60 feet","components":"V, S","duration":"8 hours","description":"You summon a swarm of butterflies to serve as your remote sensory instruments.\n\nUpon casting, all butterflies within range become attuned to your will. You select a location you know well—an area spanning no more than 500 square feet and positioned no farther than 1 mile away. These butterflies depart for that location and perceive through all senses: sight, sound, smell, and touch, cataloging their observations for the spell's duration. The insects remain stationary in this designated area unless subject to magical force; relocating them requires you to cast this spell again.\n\nBy expending an action, you can perceive the world through the butterflies' senses. Doing so blinds and deafens you to your own surroundings, though you remain conscious and capable of standing. You retain awareness of pain and physical disturbance affecting your body.\n\nYou may dismiss the spell whenever you choose. Upon dismissal or when the spell concludes, the butterflies return to your location. By investing time equal to the duration the butterflies spent away, you can extract the complete sensory record they gathered during their watch.\n\nAny creature that observes the butterflies for 1 minute or more may attempt an Intelligence (Nature) check contested by your spell save DC to recognize their behavior as magically influenced.","classes":["Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S"],"saves":["Intelligence"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Call Lightning","level":3,"circle":"3rd-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Concentration, up to 10 minutes","description":"You summon a towering storm cloud that channels destructive lightning at your command.\n\nA cylindrical storm cloud materializes in a location you designate, measuring 10 feet in height with a 60-foot radius. The cloud's center must be positioned 100 feet directly above you at a point you can see. The spell cannot be cast if no suitable point exists for the cloud to manifest (such as indoors where the ceiling prevents its formation).\n\nUpon casting, designate a point within range that you can see. A lightning bolt descends from the cloud and strikes that location. Every creature within 5 feet of the strike point must succeed on a Dexterity save or suffer 3d10 lightning damage, taking half damage on a successful save. On each of your subsequent turns while the spell persists, you may spend your action to call down another lightning bolt, either s
