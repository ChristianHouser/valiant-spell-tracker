<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ToV Spells</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }
:root {
  --bg: #0f0f13; --bg2: #17171f; --bg3: #1e1e2a; --bg4: #252535;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
  --text: #e8e6f0; --text2: #9b98b0; --text3: #5a5870;
  --accent: #c89b4a; --accent2: #a07830; --accent-bg: rgba(200,155,74,0.12);
  --arcane: #7c6fd4; --divine: #d4a043; --primordial: #5daa6f; --wyrd: #b05daa;
  --r: 8px; --r-lg: 14px; --tab-h: 68px;
}
body.light {
  --bg: #f2f0eb; --bg2: #ffffff; --bg3: #eae8e3; --bg4: #dddbd5;
  --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.13);
  --text: #1a1820; --text2: #5a5870; --text3: #9898b0;
  --accent: #8a6020; --accent2: #6a4810; --accent-bg: rgba(138,96,32,0.1);
  --arcane: #5548b8; --divine: #9a6a10; --primordial: #2a7a40; --wyrd: #882888;
}
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; overflow-x: hidden;
}

/* ── SHARED ── */
.logo { font-family: 'Cinzel', serif; font-size: 17px; font-weight: 600; color: var(--accent); letter-spacing: 0.04em; white-space: nowrap; }
.logo small { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 400; color: var(--text); margin-left: 6px; }
.icon-btn { width: 36px; height: 36px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
.icon-btn:hover { background: var(--bg4); }
.filter-badge-wrap { position: relative; }
.filter-badge { position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; background: var(--accent); border-radius: 50%; font-size: 10px; color: var(--bg2); display: flex; align-items: center; justify-content: center; font-weight: 600; pointer-events: none; }
.search-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; padding: 7px 12px 7px 38px; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
.search-input:focus { border-color: var(--accent2); }
.search-input::placeholder { color: var(--text3); }
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text); font-size: 20px; pointer-events: none; }
.filter-label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; color: var(--text); text-transform: uppercase; margin-bottom: 7px; display: block; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; transition: background 0.08s, color 0.08s, border-color 0.08s; -webkit-tap-highlight-color: transparent; white-space: nowrap; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
@media (hover: hover) { .chip:hover { border-color: var(--accent2); color: var(--text); } }
.chip.on { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.chip.on.t-arcane { background: rgba(124,111,212,0.15); border-color: var(--arcane); color: var(--arcane); }
.chip.on.t-divine { background: rgba(212,160,67,0.15); border-color: var(--divine); color: var(--divine); }
.chip.on.t-primordial { background: rgba(93,170,111,0.15); border-color: var(--primordial); color: var(--primordial); }
.chip.on.t-wyrd { background: rgba(176,93,170,0.15); border-color: var(--wyrd); color: var(--wyrd); }
.spell-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; gap: 12px; -webkit-tap-highlight-color: transparent; transition: background 0.1s; }
.spell-row:hover, .spell-row:active { background: var(--bg3); }
.spell-row.selected { background: var(--accent-bg); border-left: 2px solid var(--accent); padding-left: 14px; }
.level-badge { width: 32px; height: 32px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text2); flex-shrink: 0; } .add-spell-btn { width: 30px; height: 30px; border-radius: 50%; background: transparent; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 300; color: var(--accent); flex-shrink: 0; cursor: pointer; line-height: 1; -webkit-tap-highlight-color: transparent; transition: background 0.12s; } .add-spell-btn:hover { background: var(--accent-bg); }
.spell-info { flex: 1; min-width: 0; }
.spell-name { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.spell-meta { font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.spell-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.ritual-r { font-size: 10px; color: var(--accent); border: 1px solid rgba(200,155,74,0.4); border-radius: 4px; padding: 1px 4px; }
.trad-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.d-arcane { background: var(--arcane); } .d-divine { background: var(--divine); } .d-primordial { background: var(--primordial); } .d-wyrd { background: var(--wyrd); }
.level-header { background: var(--bg3); border-top: 1px solid var(--border2); border-bottom: 1px solid var(--border2); padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 3px 6px rgba(0,0,0,0.14); position: relative; z-index: 2; }
.level-header-name { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
.level-header-count { font-size: 11px; font-weight: 600; color: var(--text); letter-spacing: 0.06em; text-transform: uppercase; }
.spell-detail-header {
  background: #1a3a5c;
  padding: 12px 16px 10px;
}
.spell-detail-title {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1.2;
}
.spell-detail-subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.75);
  font-style: italic;
  margin-top: 3px;
}
.spell-detail-body { padding: 14px 16px 32px; }
.spell-field-row { margin-bottom: 8px; font-size: 15px; line-height: 1.55; }
.spell-field-label { font-weight: 700; color: #1a3a5c; }
body.light .spell-field-label { color: #1a3a5c; }
body:not(.light) .spell-field-label { color: #6a9fd4; }
.spell-field-val { color: var(--text); }
.spell-flavor {
  font-style: italic;
  color: #1a3a5c;
  margin: 12px 0 10px;
  font-size: 15px;
  line-height: 1.7;
}
body:not(.light) .spell-flavor { color: #7aafdf; }
.spell-body-text { font-size: 15px; line-height: 1.8; color: var(--text); margin-bottom: 10px; }
.spell-bullet { display: flex; gap: 8px; margin-bottom: 8px; font-size: 15px; line-height: 1.7; color: var(--text); }
.spell-bullet-dot { color: #1a3a5c; flex-shrink: 0; }
body:not(.light) .spell-bullet-dot { color: #6a9fd4; }
.spell-higher {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border2);
  font-size: 15px;
  line-height: 1.8;
  color: var(--text);
}
.spell-higher-label { font-weight: 700; font-style: italic; color: #1a3a5c; }
body:not(.light) .spell-higher-label { color: #6a9fd4; }
.spell-classes-section {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--border2);
}
.spell-source-line {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text3);
  font-style: italic;
}
.detail-name { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.25; margin-bottom: 4px; }
.detail-circle { font-size: 14px; color: var(--text2); margin-bottom: 14px; }
.detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
.detail-tag { padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; letter-spacing: 0.02em; border: 1px solid transparent; }
.dt-arcane { background: rgba(124,111,212,0.15); color: var(--arcane); border-color: rgba(124,111,212,0.3); }
.dt-divine { background: rgba(212,160,67,0.15); color: var(--divine); border-color: rgba(212,160,67,0.3); }
.dt-primordial { background: rgba(93,170,111,0.15); color: var(--primordial); border-color: rgba(93,170,111,0.3); }
.dt-wyrd { background: rgba(176,93,170,0.15); color: var(--wyrd); border-color: rgba(176,93,170,0.3); }
.dt-school { background: var(--bg3); color: var(--text2); border-color: var(--border2); }
.dt-ritual { background: var(--accent-bg); color: var(--accent); border-color: rgba(200,155,74,0.3); }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.stat-block { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; }
.stat-lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 3px; }
.stat-val { font-size: 14px; color: var(--text); line-height: 1.4; }
.divider { border: none; border-top: 1px solid var(--border2); margin: 16px 0; }
.detail-desc { font-size: 15px; line-height: 1.8; color: var(--text); }
.detail-desc p { margin-bottom: 10px; }
.detail-desc .bullet { display: flex; gap: 8px; margin-bottom: 8px; }
.detail-desc .bullet-dot { color: var(--accent); flex-shrink: 0; }
.classes-lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin: 18px 0 8px; }
.class-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.class-chip { padding: 4px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; font-size: 13px; color: var(--text2); }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; color: var(--text3); gap: 10px; text-align: center; }
.empty-icon { font-size: 36px; opacity: 0.25; }
.empty-text { font-size: 15px; }

/* ── BOTTOM TAB BAR ── */
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--tab-h); background: var(--bg2); border-top: 1px solid var(--border2); display: flex; z-index: 400; padding-bottom: env(safe-area-inset-bottom); }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; border: none; background: transparent; color: var(--text3); -webkit-tap-highlight-color: transparent; transition: color 0.15s; padding: 8px 0; }
.tab-btn.active { color: var(--accent); }
.tab-icon { font-size: 26px; line-height: 1; }
.tab-icon-spells { font-size: 32px; line-height: 1; }
.tab-label { font-size: 13px; font-weight: 500; letter-spacing: 0.02em; }

/* ── MOBILE SPELL TAB ── */
.mobile-layout { display: flex; flex-direction: column; background: var(--bg); min-height: 100dvh; }
.m-header { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border2); display: flex; align-items: center; padding: 0 16px; gap: 10px; z-index: 200; }
.m-header .logo { flex: 1; }
.m-searchbar { position: fixed; top: 56px; left: 0; right: 0; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 16px; z-index: 190; }
.m-scroll { margin-top: 113px; overflow-y: auto; height: calc(100dvh - 113px - var(--tab-h)); -webkit-overflow-scrolling: touch; background: var(--bg); }
.m-scroll .level-header { position: sticky; top: 0; z-index: 5; }
.m-filter-overlay { display: none; position: fixed; top: 113px; left: 0; right: 0; bottom: var(--tab-h); z-index: 180; background: rgba(0,0,0,0.5); flex-direction: column; }
.m-filter-overlay.open { display: flex; }
.m-filter-actions { background: var(--bg2); border-bottom: 1px solid var(--border2); padding: 8px 16px; display: flex; justify-content: flex-end; align-items: center; gap: 8px; flex-shrink: 0; }
.m-filter-panel { background: var(--bg2); padding: 14px 16px 20px; overflow-y: auto; max-height: 65vh; }
.m-filter-section { margin-bottom: 14px; }
.m-clear-btn { background: transparent; border: 1px solid var(--border2); border-radius: var(--r); color: var(--text3); font-family: 'Inter', sans-serif; font-size: 13px; padding: 6px 14px; cursor: pointer; }
.m-done-btn { background: var(--accent-bg); border: 1px solid var(--accent2); border-radius: var(--r); color: var(--accent); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; padding: 6px 18px; cursor: pointer; }
.m-detail-overlay { display: none; position: fixed; inset: 0; z-index: 600; background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch; }
.m-detail-overlay.open { display: block; }
.m-detail-topbar { position: sticky; top: 0; background: var(--bg2); border-bottom: 1px solid var(--border2); padding: 12px 16px; display: flex; align-items: center; gap: 12px; z-index: 10; }
.m-back-btn { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r); color: var(--text2); font-family: 'Inter', sans-serif; font-size: 15px; padding: 6px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.m-topbar-title { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.m-detail-body { padding: 20px 16px 40px; }

/* ── DESKTOP LAYOUT ── */
.desktop-layout { display: none; flex-direction: column; height: 100vh; }
.d-header { height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border2); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; z-index: 100; }
.d-header .logo { flex: 1; }
.d-body { display: flex; flex: 1; overflow: hidden; }
.d-sidebar { width: 240px; min-width: 240px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.d-sidebar-search { padding: 12px; border-bottom: 1px solid var(--border); }
.d-sidebar-filters { flex: 1; overflow-y: auto; padding: 14px 12px; }
.d-filter-section { margin-bottom: 16px; }
.d-clear-btn { width: 100%; margin-top: 4px; padding: 7px; background: transparent; border: 1px solid var(--border2); border-radius: var(--r); color: var(--text3); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; }
.d-clear-btn:hover { color: var(--text2); background: var(--bg3); }
.d-list-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.d-list-header { padding: 9px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg2); flex-shrink: 0; }
.d-list-count { font-size: 13px; color: var(--text); }
.d-list-scroll { flex: 1; overflow-y: auto; }
.d-list-scroll .level-header { position: sticky; top: 0; z-index: 5; }
.d-detail { width: 360px; min-width: 360px; background: var(--bg2); border-left: 1px solid var(--border); overflow-y: auto; }
.d-detail-inner { padding: 20px; }
.d-detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text3); gap: 10px; }

/* Desktop tab bar styled as top nav tabs */
.d-tabs { display: flex; gap: 0; border-right: 1px solid var(--border); }
.d-tab-btn { padding: 0 20px; height: 56px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--text3); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
.d-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.d-tab-btn:hover { color: var(--text2); }

/* ── CHARACTERS PAGE ── */
.chars-page { flex: 1; overflow-y: auto; padding: 16px; }
.chars-page-desktop { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
.chars-inner { width: 100%; max-width: 560px; } .chars-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.chars-title { font-size: 20px; font-weight: 700; color: var(--text); }
.add-char-btn { display: flex; align-items: center; gap: 6px; background: var(--accent-bg); border: 1px solid var(--accent2); border-radius: var(--r); color: var(--accent); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; padding: 7px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.chars-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; color: var(--text3); gap: 12px; text-align: center; }
.chars-empty-icon { font-size: 48px; opacity: 0.2; }
.chars-empty-text { font-size: 16px; font-weight: 500; color: var(--text2); }
.chars-empty-sub { font-size: 14px; color: var(--text3); }

/* Character card */
.char-card { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r-lg); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: background 0.1s; display: flex; align-items: center; gap: 14px; -webkit-tap-highlight-color: transparent; }
.char-card:hover { background: var(--bg3); }
.char-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-bg); border: 2px solid var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
.char-info { flex: 1; min-width: 0; }
.char-name { font-size: 16px; font-weight: 600; color: var(--text); }
.char-sub { font-size: 13px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-arrow { color: var(--text3); font-size: 16px; }

/* ── CREATE CHARACTER OVERLAY ── */
.create-overlay { display: none; position: fixed; inset: 0; z-index: 550; background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch; }
.create-overlay.open { display: block; }
.create-topbar { position: sticky; top: 0; background: var(--bg2); border-bottom: 1px solid var(--border2); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
.create-title { font-size: 17px; font-weight: 700; color: var(--text); }
.create-close { background: transparent; border: none; color: var(--text3); font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; }
.create-body { padding: 20px 16px 40px; max-width: 560px; margin: 0 auto; }
.create-field { margin-bottom: 14px; }
.create-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; padding: 13px 16px; outline: none; -webkit-appearance: none; }
.create-input:focus { border-color: var(--accent2); }
.create-input::placeholder { color: var(--text3); }
.create-select-btn { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; padding: 13px 16px; text-align: left; cursor: pointer; display: flex; align-items: center; justify-content: space-between; -webkit-tap-highlight-color: transparent; }
.create-select-btn.placeholder { color: var(--text3); }
.create-select-btn:hover { border-color: var(--accent2); }
.create-section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; margin-top: 4px; }

/* Level inputs per class */
.level-list { background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px; overflow: hidden; }
.level-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.level-row:last-child { border-bottom: none; }
.level-row-name { font-size: 15px; color: var(--text); }
.level-input { width: 56px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; text-align: center; padding: 6px; outline: none; -webkit-appearance: none; }
.level-input:focus { border-color: var(--accent2); }

/* Expandable section */
.expand-btn { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; padding: 13px 16px; text-align: left; cursor: pointer; display: flex; align-items: center; justify-content: space-between; -webkit-tap-highlight-color: transparent; margin-bottom: 0; }
.expand-btn .arrow { transition: transform 0.2s; font-size: 12px; color: var(--text3); }
.expand-btn.open .arrow { transform: rotate(180deg); }
.expand-content { display: none; border: 1px solid var(--border2); border-top: none; border-radius: 0 0 12px 12px; overflow: hidden; margin-top: -1px; margin-bottom: 14px; }
.expand-content.open { display: block; }

/* Create button */
.create-btn { width: 100%; background: var(--accent-bg); border: 2px solid var(--accent); border-radius: 14px; color: var(--accent); font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; padding: 16px; cursor: pointer; margin-top: 20px; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
.create-btn:hover { background: var(--accent); color: var(--bg); }

/* ── CLASS PICKER SHEET ── */
.picker-overlay { display: none; position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.6); align-items: flex-end; }
.picker-overlay.open { display: flex; }
.picker-sheet { background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-height: 80vh; overflow-y: auto; padding-bottom: env(safe-area-inset-bottom); }
.picker-topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border2); }
.picker-title { font-size: 17px; font-weight: 700; color: var(--text); }
.picker-close { background: transparent; border: none; color: var(--text3); font-size: 22px; cursor: pointer; padding: 0; line-height: 1; }
.picker-item { display: flex; align-items: center; justify-content: center; padding: 15px 20px; border-bottom: none; cursor: pointer; -webkit-tap-highlight-color: transparent; position: relative; }
.picker-item:not(:last-child)::after { content: ""; display: block; position: absolute; bottom: 0; left: 20px; right: 20px; height: 1px; background: var(--border2); }
.picker-item:hover, .picker-item:active { background: var(--bg3); }
.picker-item-name { font-size: 16px; color: var(--text); text-align: center; flex: 1; }
.picker-check { color: var(--accent); font-size: 18px; font-weight: 700; position: absolute; right: 20px; }
.picker-confirm { margin: 12px 16px; width: calc(100% - 32px); background: var(--accent-bg); border: 2px solid var(--accent); border-radius: 12px; color: var(--accent); font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; padding: 14px; cursor: pointer; }

@media (min-width: 768px) {
  .mobile-layout { display: none !important; }
  .desktop-layout { display: flex; }
}

@media (min-width: 768px) {
  .picker-overlay { align-items: center; justify-content: center; }
  .picker-sheet { width: 40% !important; max-width: 420px; border-radius: 16px; max-height: 70vh; }
}
</style>

<div id="root"></div>
<script>// ── SPELL DATA ─────────────────────────────────────────────────
// To swap spells: edit spells.json (same folder) OR replace the
// inline array below. The app tries spells.json first.
let SPELLS_DATA = [{"name":"Acid Splash","level":0,"circle":"Cantrip","traditions":["Arcane"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"You conjure a corrosive orb of acid that erupts in a spray. Select a single creature you can reach, or pick two creatures within your range that are no more than 5 feet apart. Each target must make a Dexterity save; those who fail take 1d6 acid damage.\n\nThe destructive power of this spell grows as you advance in your abilities: at 5th level your damage increases to 2d6, at 11th level to 3d6, and at 17th level to 4d6.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Acid"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Canteen Catch-All","level":0,"circle":"Cantrip","traditions":["Arcane","Divine"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (an item that can be used as a container)","duration":"Up to 1 hour","description":"You transform any concave item into a functional vessel for containing liquids, bypassing the object's material properties and structural integrity. A felt hat might hold holy water, or a strainer could transport a potion—the item's original design becomes irrelevant. Once filled, the liquid remains secured within the container and cannot spill, regardless of how open or porous the item is, until you deliberately empty it. However, the container offers no airtight seal, so the liquid remains subject to environmental exposure and degradation.\n\nThis spell permits you to transport up to 1 vial (4 ounces) of water or similar nonmagical liquid. Living creatures cannot be carried through this method. If you cast this spell a second time while a container remains active from a previous casting, the earlier spell's effect ends immediately.\n\nYour carrying capacity expands at specific character milestones. Upon reaching 5th level, you can transport 1 bottle or 1 pint of alchemist's fire, poisons, potions, or holy water. At 11th level, your capacity grows to 1 waterskin or 4 pints of acid. By 17th level, you can carry 1 pitcher or 1 gallon of lava.\n\nGame Masters may extrapolate from these thresholds when determining how this spell functions with other liquids.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Conjure Missile","level":0,"circle":"Cantrip","traditions":["Arcane","Divine"],"school":"Conjuration","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, S","duration":"1 round","description":"With a gesture, you summon a single piece of nonmagical ammunition into being. This conjured projectile persists only briefly—if you do not fire it in a ranged attack before your next turn begins, it dissipates into nothing. Should you unleash it as part of a ranged attack, it vanishes once that attack and all its resulting damage have been fully resolved.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Summon"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Crimson Forge","level":0,"circle":"Cantrip","traditions":["Arcane","Primordial"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a drop of your blood)","duration":"1 hour","description":"You blend together raw biological material into a tangible weapon through dark magic.\n\nBy consuming 1 pound of vegetation, bones, or flesh, you conjure either a simple weapon or three pieces of ammunition that persists for the spell's duration. The resulting weapons bear obvious signs of magical creation but function as ordinary nonmagical weapons. You may sustain up to three separate weapons or nine pieces of ammunition created through this spell simultaneously. Should you cast this spell a fourth time, the effects of all previously created weapons cease immediately.\n\nYour mastery over this spell deepens as you grow in power. Upon reaching 5th level, you gain the ability to forge martial weapons through this spell. At 11th level, weapons and ammunition you create become treated as magical for the purpose of penetrating resistances and immunities to nonmagical damage. When you attain 17th level, all weapons and ammunition produced by this spell gain a magical enhancement of +1 to both attack rolls and damage rolls.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Dancing Lights","level":0,"circle":"Cantrip","traditions":["Arcane","Primordial","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (a bit of phosphorus or wychwood, or a glowworm)","duration":"Concentration, up to 1 minute","description":"Through the manipulation of an enchanted glowworm and rhythmic incantations, you summon forth magical luminescence at your command.\n\nYou conjure up to four lights of torch-brightness within range, which you may shape to resemble torches, lanterns, or radiant spheres that remain suspended aloft throughout the spell's duration. Alternatively, you can consolidate all four lights into a single glowing form roughly humanoid in appearance and Medium in size. Regardless of which configuration you select, each individual light radiates dim illumination extending 10 feet in all directions.\n\nDuring your turn, you may use a bonus action to reposition these lights, moving them as far as 60 feet to any location still within range. Each light must remain tethered to at least one other light produced by this spell, maintaining a maximum separation of 20 feet. Should any light venture beyond the spell's range, it immediately extinguishes.","classes":["Bard","Druid","Ranger","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Dander Ball","level":0,"circle":"Cantrip","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"S, M (fur from an allergenic animal)","duration":"Instantaneous","description":"You hurl a sphere of irritant particles up to 90 feet away, where it detonates in a 10-foot-radius cloud at a location of your choosing. Every creature within the affected area must make a Constitution save; those who fail become poisoned until the end of their next turn.\n\nAs you advance in power, the cloud's radius expands: it grows to 20 feet at 5th level, 30 feet at 11th level, and 40 feet at 17th level.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["S","M"],"saves":["Constitution"],"damageTypes":[],"tags":["Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Demonic Pact","level":0,"circle":"Cantrip","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You call upon an infernal entity, pledging your service in exchange for protective power. A creature within range that you can see becomes enveloped in a crimson glow. When that creature sustains damage for the first time during the spell's duration, it rolls a d4 and subtracts the result from the total damage taken. As the harm dissipates, wisps of smoke curl from the target's form.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Damage","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Druidcraft","level":0,"circle":"Cantrip","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Instantaneous","description":"You conjure a benign manifestation of the natural world.\n\nBy communing with nature's essence, you produce one of the following effects within range:\n\n• You manifest a minute, harmless sensory phenomenon that reveals the weather conditions that will prevail at your current location throughout the next 24 hours. This phenomenon might take the form of a shimmering golden sphere signifying fair skies, a billowing cloud for rainfall, descending snow crystals for snowfall, or similar representations. The phenomenon remains visible for 1 round.\n\n• You cause a flower to unfold its petals, a seed pod to burst open, or a leaf bud to unfurl into full growth instantaneously.\n\n• You produce a momentary, harmless sensory phenomenon—such as drifting autumn leaves, a gust of air, the chirp of a small creature, or a subtle musky scent. This phenomenon occupies no more than a 5-foot cube of space.\n\n• You instantly ignite or extinguish a candle, torch, or modest cooking fire.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Electric Jolt","level":0,"circle":"Cantrip","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","description":"A crackling surge of electrical energy lashes out toward your chosen target. You fling a bolt of lightning at any creature or object you can see within range, making a ranged spell attack roll against it. When your attack connects, the target suffers 1d8 lightning damage. If the target is composed of metal or is clad in metal armor, add double your proficiency bonus to your attack roll.\n\nAs you grow in spellcasting power, this spell's destructive potential expands. At 5th level, the damage becomes 2d12. At 11th level, it increases to 3d12. At 17th level, it reaches 4d12.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":["Lightning"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Fire Bolt","level":0,"circle":"Cantrip","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","description":"You conjure a blazing projectile and launch it toward your target. Choose a creature or object you can see within range, and hurl a burning missile at it.\n\nMake a ranged spell attack roll against your target. If your attack connects, the target suffers 1d10 fire damage. Any flammable object struck by this spell catches fire, provided it is neither worn nor carried by anyone.\n\nThe destructive power of this spell grows as you advance in power: when you attain 5th level, the damage becomes 2d10; at 11th level, it becomes 3d10; and upon reaching 17th level, it becomes 4d10.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Fire"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Grave Touch","level":0,"circle":"Cantrip","traditions":["Arcane","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"1 round","description":"A spectral hand of bone manifests within reach of your target, through which you channel the deathly chill of eternity. Make a ranged spell attack against the creature. If your attack succeeds, the target suffers 1d8 necrotic damage and loses the ability to recover hit points until the start of your next turn, while the ghostly hand remains affixed to it.\n\nShould your attack strike an Undead creature, that creature also rolls attack rolls against you with disadvantage until the end of your next turn.\n\nThe necrotic damage dealt by this spell increases by 1d8 at character levels 5 (2d8), 11 (3d8), and 17 (4d8).","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Necrotic"],"tags":["Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Guidance","level":0,"circle":"Cantrip","traditions":["Divine","Wyrd"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Concentration, up to 1 minute","description":"You place your hand upon a willing creature within reach. Until the spell concludes, that creature gains the ability to roll a d4 once and add the result to a single ability check it makes, whether before or after rolling for that check. Once the creature uses this benefit, the spell's effect ceases.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Hoarfrost","level":0,"circle":"Cantrip","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V","duration":"Instantaneous","description":"A shimmering layer of crystalline ice forms across one creature within your range that you can perceive. That creature must make a Constitution saving throw. On a failed save, it takes 1d8 cold damage and its movement speed is reduced to half its normal value until the conclusion of its next turn.\n\nThe potency of this spell's cold increases as you grow in power. At 5th level, the damage rises to 2d8. At 11th level, it becomes 3d8. At 17th level, it reaches 4d8.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V"],"saves":["Constitution"],"damageTypes":["Cold"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Infernal Fire","level":0,"circle":"Cantrip","traditions":["Divine"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"You hurl a searing streak of hellish flame toward a creature within range that you can perceive. Make a ranged spell attack against your target. If your attack connects, the creature suffers 1d6 fire damage and must succeed on a Constitution saving throw or be paralyzed by the agonizing sound of infernal cackling that fills its mind. A failed save prevents the target from using reactions until the start of its following turn. Celestial beings make this saving throw at disadvantage.\n\nWhen you reach 5th circle, this spell's damage becomes 2d6 fire damage. The damage increases further to 3d6 at 11th circle and 4d6 at 17th circle.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Fire"],"tags":["Buff","Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Influence","level":0,"circle":"Cantrip","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"S, M (a dab of perfume)","duration":"Concentration, up to 1 minute","description":"You subtly manipulate a creature's perception, causing it to regard you with favor and goodwill.\n\nSelect a single creature within range that you can perceive and that harbors no hostility toward you or your companions. Throughout the spell's duration, whenever you make a Charisma ability check to engage with this creature, you roll twice and use the higher result.\n\nWhen the spell's effects cease, the target instantly becomes aware that magic was used to sway its feelings. It immediately turns hostile toward you and your allies.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["S","M"],"saves":["Charisma"],"damageTypes":[],"tags":["Buff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Invigorate","level":0,"circle":"Cantrip","traditions":["Divine","Primordial"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"1 round","description":"You touch a creature and channel vitality into its body. If that creature has any hit points remaining, it receives temporary hit points equal to 1d10 plus your spellcasting ability modifier. These temporary hit points vanish when the spell concludes.\n\nAs you grow more powerful, the temporary hit points you grant improve: at 5th level your touch grants 2d10 temporary hit points, at 11th level it grants 3d10, and at 17th level it grants 4d10, each plus your spellcasting ability modifier.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Healing"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Light","level":0,"circle":"Cantrip","traditions":["Arcane","Divine"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a firefly or phosphorescent moss)","duration":"1 hour","description":"By touching an object, you cause it to radiate illumination in all directions.\n\nYou establish contact with a single object measuring no more than 10 feet across in any direction. For the duration of this spell, the object produces bright light extending 20 feet outward, followed by an additional zone of dim light stretching another 20 feet beyond that. You may select any color for this illumination. Any opaque material placed completely over the object prevents the light from emanating outward.\n\nThe spell ceases functioning if you cast it once more or use an action to dismiss it.\n\nShould you attempt to target an object that a hostile creature holds or has equipped upon their body, that creature may make a Dexterity saving throw to resist the spell's effects.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Luck Bait","level":0,"circle":"Cantrip","traditions":["Arcane","Divine","Wyrd"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"1 minute","description":"You touch a willing creature and weave fortune into their destiny. Until the spell ends, whenever that creature fails a saving throw or attack roll by exactly 1, they gain a +1 bonus to that roll. The spell then concludes.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Buff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Mage Hand","level":0,"circle":"Cantrip","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"1 minute","description":"You summon an ethereal hand composed of magical force that materializes at a location of your choice within range. This phantom appendage persists for the spell's duration or may be dismissed by you as an action. The hand dissipates if it ever exceeds 30 feet of distance from your position, or if you cast this spell a second time.\n\nBy expending your action, you direct the hand's movements and functions. The hand proves capable of manipulating ordinary objects, unlocking unmagicked doors or containers, placing items into or extracting them from open containers, and pouring liquids from vessels. Each time you activate the hand, you may reposition it up to 30 feet.\n\nThe hand remains unable to make attacks, operate enchanted items, or support weight exceeding 10 pounds.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Measure","level":0,"circle":"Cantrip","traditions":["Arcane","Divine"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Instantaneous","description":"You call upon your senses to perceive an object's true proportions and mass.\n\nChoose an item within range that you can perceive. You instantly discern its exact measurements and weight. The spell produces no effect if the target item lies under protection from divination magic.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Mending","level":0,"circle":"Cantrip","traditions":["Arcane","Divine"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (two lodestones)","duration":"Instantaneous","description":"You touch an object and restore it to wholeness. This spell mends a single fracture or damage in an object you are in contact with—such as a severed chain link, a broken key split in two, a ripped garment, or a punctured container. Provided the damage spans no more than 1 foot across any direction, you seal it completely, erasing all signs of harm. When applied to an object possessing hit points, this spell restores up to 1 HP with each casting, though it cannot exceed half the object's maximum hit points. The spell may address surface imperfections on magical items and Constructs for aesthetic purposes only, but it cannot recover their magical properties or restore their hit points.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Message","level":0,"circle":"Cantrip","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (a short piece of copper wire)","duration":"1 round","description":"You designate a creature within range and whisper a secret message. Only your intended recipient perceives this mental communication and may whisper a response that reaches your ears alone.\n\nIf you know the target's location and are acquainted with them, the message passes through intervening solid barriers without impediment.\n\nThe spell's transmission halts if blocked by magical silence, one foot of stone, one inch of common metal, a thin sheet of lead, or three feet of wood. The message's path need not be direct—it winds freely around obstacles and through gaps.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Minor Illusion","level":0,"circle":"Cantrip","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"S, M (a bit of fleece)","duration":"1 minute","description":"You conjure either a sound or a visual phantom within range that persists until the spell ends. You may terminate the illusion at will as an action, or casting this spell again will dismiss it.\n\nWhen you fashion a sound, you control its volume anywhere from barely audible to ear-splitting intensity. The sound can mimic your own voice, another's voice, the roar of a beast, percussion striking, or any noise you envision. This sound resonates continuously for the full duration, though you may also produce separate sounds at intervals before the spell concludes.\n\nWhen you fashion an image of an object—such as furniture, tracks in mud, or a locked box—it cannot exceed a 5-foot cube in dimension. This illusory image produces no sound, illumination, odor, or other sensory phenomena.\n\nAny creature that physically attempts to interact with the image discovers its true nature immediately, as solid matter passes straight through the phantom.\n\nA creature spending its action to closely scrutinize the sound or image may attempt an Intelligence (Investigation) check opposed by your spell save DC to discern the deception. Should a creature successfully identify the illusion, it perceives the phantom as translucent and faint thereafter.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["S","M"],"saves":["Intelligence"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Moonfang Strike","level":0,"circle":"Cantrip","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (a broken arrowhead)","duration":"1 round","description":"Visible breath mists from your mouth as crystalline frost forms across your skin.\n\nAs part of this spell's somatic component, you make a ranged weapon attack using a bow, crossbow, or thrown weapon. When your attack hits, the target suffers your weapon's normal damage and becomes marked by a luminous, phantom wolf's eye hovering above its head. This mark persists until the beginning of your next turn. Should the marked target expend its reaction before your next turn begins, it suffers 1d6 cold damage and the mark vanishes.\n\nAt 5th level, this spell's added damage becomes 2d6 cold damage. At 11th level, it increases to 3d6 cold damage. At 17th level, it reaches 4d6 cold damage.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":["Cold"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Placate","level":0,"circle":"Cantrip","traditions":["Primordial"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (rations or other food)","duration":"10 minutes","description":"You extend a portion of food toward a Beast or creature bearing the Animal tag, attempting to win its temporary favor through a simple offering.\n\nWhen you cast this spell, choose a Beast or creature with the Animal tag within range. That creature must make a Wisdom saving throw. If it fails, the creature accepts your food and disregards you and your allies for the duration. If it succeeds, the creature may either accept your food and disregard you and your allies for the duration, or refuse the offering entirely. Any creature with an Intelligence score of 3 or lower makes this saving throw with disadvantage. Should the target accept your food but then suffer damage, the spell's effect immediately ends.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Intelligence","Wisdom"],"damageTypes":[],"tags":["Buff","Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Poison Spray","level":0,"circle":"Cantrip","traditions":["Arcane","Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"10 feet","components":"V, S","duration":"Instantaneous","description":"You thrust your palm forward at a visible creature within range, releasing a cloud of toxic vapor toward them. The target must make a Constitution saving throw. On a failed save, the creature takes 1d12 poison damage. The spell's destructive power intensifies as you grow in power—at 5th level your damage becomes 2d12, at 11th level it becomes 3d12, and at 17th level it becomes 4d12.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Poison"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Prestidigitation","level":0,"circle":"Cantrip","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"10 feet","components":"V, S","duration":"Up to 1 hour","description":"You conjure a trivial magical effect within range.\n\nThis fundamental cantrip serves as a training ground for beginning practitioners of the arcane arts. You manifest one of the following magical phenomena:\n\n• You generate a momentary, harmless magical impression on one of the senses—perhaps a cascade of sparks, a gust of air, distant melodic tones, or an unusual scent.\n• You instantly ignite or extinguish a candle, torch, or small campfire.\n• You instantly tidy or befoul an object measuring no more than 1 cubic foot.\n• You alter the temperature of or change the taste of up to 1 cubic foot of inanimate substance, maintaining this effect for 1 hour.\n• You cause a hue, modest inscription, or sigil to materialize upon an object or surface for 1 hour.\n• You fabricate a nonmagical bauble or conjure an illusory form small enough to rest in your palm, persisting until your next turn concludes.\n\nShould you cast this cantrip repeatedly, you may sustain up to three of its lasting effects simultaneously. You may terminate any such sustained effect by spending an action.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Produce Flame","level":0,"circle":"Cantrip","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"10 minutes","description":"You summon a dancing flame into your palm that persists throughout the spell's duration without causing harm to you or your possessions. This radiant fire casts bright illumination up to 10 feet away, with its glow extending dimly for another 10 feet beyond that. You may terminate the spell by using an action to dismiss it, or the spell automatically ends if you cast it again.\n\nThe flame can serve as a weapon, though hurling it in this manner immediately concludes the spell. Either when you initially cast this spell or during a subsequent turn by spending an action, you may fling the flame toward any creature you can see within 30 feet. You must make a ranged spell attack roll against your target. If your attack connects, the creature suffers 1d8 fire damage.\n\nThe flame's destructive power grows stronger as you advance in your spellcasting abilities. When you attain 5th level, the damage increases to 2d8. At 11th level, it becomes 3d8. Finally, upon reaching 17th level, the damage rises to 4d8.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Fire"],"tags":["Damage","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Ray Of Frost","level":0,"circle":"Cantrip","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"You conjure a lance of crystalline frost that pierces across the space between you and your foe. Target a creature within range and make a ranged spell attack roll against it.\n\nIf your attack succeeds, the creature suffers 1d8 cold damage and finds its movement hampered, with its speed diminished by 10 feet until the start of your next turn.\n\nAs you grow more proficient in spellcasting, this ray's potency expands. At 5th level, the damage increases to 2d8. At 11th level, it becomes 3d8. At 17th level, it becomes 4d8.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Cold"],"tags":["Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Resistance","level":0,"circle":"Cantrip","traditions":["Divine","Primordial"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a miniature cloak)","duration":"Concentration, up to 1 minute","description":"You place your hand upon a willing creature you can touch, imbuing them with fortitude. At any point before this spell's magic fades, the creature may roll a d4 and add the result to a single saving throw of its choosing—whether before or after rolling for that save. Once they use this benefit, the spell ceases.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Sacred Flame","level":0,"circle":"Cantrip","traditions":["Divine"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"You call down brilliant divine light upon a target within your sight. A creature of your choice that you can see at range must make a Dexterity saving throw. On a failed save, the target takes 1d8 radiant damage. Cover provides no protection against this saving throw.\n\nWhen you reach 5th level, the damage increases to 2d8. At 11th level, it increases to 3d8. At 17th level, it increases to 4d8.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Radiant"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Shillelagh","level":0,"circle":"Cantrip","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (mistletoe, a shamrock leaf, and a club or quarterstaff)","duration":"1 minute","description":"You infuse a wooden club or quarterstaff you're holding with primal magic, transforming it into a formidable melee weapon. While the spell persists, you may substitute your spellcasting ability for Strength when making attack rolls and calculating damage with this weapon, and its damage die increases to a d8. The weapon gains the magical property if it lacks one already. You may immediately make one melee attack using the enchanted weapon as part of the action spent casting this spell, provided your target remains within striking distance. The spell's magic dissipates if you cast this spell again or if you release your grip on the weapon.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Shocking Grasp","level":0,"circle":"Cantrip","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Instantaneous","description":"A jolt of electrical force surges from your hand toward a creature within reach. Make a melee spell attack roll against your target. If the target has metal armor or wears armor without the Natural Materials property, you roll your attack with advantage. When your attack connects, the creature suffers 1d8 lightning damage and loses the ability to use reactions until its next turn begins.\n\nAt character levels 5, 11, and 17, this spell's damage output increases to 2d8, 3d8, and 4d8 respectively.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Lightning"],"tags":["Buff","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Spare The Dying","level":0,"circle":"Cantrip","traditions":["Divine"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"10 feet","components":"V, S","duration":"Instantaneous","description":"You place your hand upon a creature at death's door, anchoring it back to life.\n\nWhen you touch a living creature that has been reduced to 0 hit points, that creature stabilizes immediately. The spell proves useless against Constructs and Undead, offering them no benefit whatsoever.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Swift Stash","level":0,"circle":"Cantrip","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"S","duration":"Concentration, up to 1 minute","description":"With a subtle flick of your wrist, you conceal an object from plain sight by slipping it into a fold of space itself. An item you currently hold that weighs no more than 1 pound vanishes into an extradimensional compartment. You may spend a bonus action to withdraw any stored item from this hidden space. When this spell's duration expires or whenever you retrieve a stored item, it materializes in the hand from which it disappeared—or drops to the ground at your feet if that hand is no longer free to receive it.\n\nAs you grow in magical power, the weight limit of items you can store expands: at 5th level it becomes 3 pounds, at 11th level it becomes 5 pounds, and at 17th level it becomes 7 pounds.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Thaumaturgy","level":0,"circle":"Cantrip","traditions":["Divine","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V","duration":"Up to 1 minute","description":"You manifest a minor supernatural phenomenon within range. Choose one of the following effects:\n\n• Your voice amplifies to three times its normal volume for 1 minute.\n• You manipulate nearby flames, causing them to flicker, intensify, dim, or shift in color for 1 minute.\n• You generate harmless trembling sensations across the ground for 1 minute.\n• You produce an instantaneous sound of your choosing that emanates from a point within range, such as thunder, an animal cry, or cryptic utterances.\n• You instantly force an unlocked door or window to swing open or snap shut.\n• You change the visual appearance of your eyes for 1 minute.\n\nWhen you cast this spell on multiple occasions, up to three of its effects that last 1 minute can be maintained simultaneously. You may dismiss any such active effect by taking an action.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":["Thunder"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Upright","level":0,"circle":"Cantrip","traditions":["Divine","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 bonus action","range":"60 feet","components":"V","duration":"Instantaneous","description":"You reach out to a conscious ally within range whom you can perceive and help them regain their footing, immediately removing their prone condition. Should the target already be standing, they gain advantage on their next saving throw made within 1 minute against any effect that would impose the paralyzed, prone, restrained, or stunned conditions upon them.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Buff","Control","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Vicious Mockery","level":0,"circle":"Cantrip","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V","duration":"Instantaneous","description":"You hurl a barrage of magically-infused taunts at a creature within range that you can perceive. The target need only hear your words—comprehension is unnecessary—but must make a Wisdom saving throw. On a failed save, the creature takes 1d4 psychic damage and suffers disadvantage on its next attack roll before the end of its following turn.\n\nThe potency of this spell's damage grows as you gain power: at 5th level it deals 2d4 psychic damage, at 11th level it deals 3d4 psychic damage, and at 17th level it deals 4d4 psychic damage.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":["Wisdom"],"damageTypes":["Psychic"],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Alarm","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":true,"castingTime":"1 minute","range":"30 feet","components":"V, S, M (silver hand bell worth at least 10 gp)","duration":"8 hours","description":"You establish a protective ward that triggers when someone breaches the guarded space. You designate a singular door, window, or region spanning no more than a 20-foot cube within range as your warded area. For the spell's duration, any Tiny creature or larger that makes physical contact with or crosses the threshold of this space triggers the alarm. At the moment of casting, you may specify which creatures are exempt from activating the alarm. You also determine whether the alarm manifests as a mental or audible signal.\n\nIf you select the mental alarm, it sends a sharp mental pulse to you whenever a creature triggers it, provided you remain within 1 mile of the warded area. This pulse breaks through sleep, rousing you if you slumber.\n\nIf you select the audible alarm, it emits the clear ringing of a hand bell that continues for 10 seconds and can be heard by anyone within 60 feet.\n\nShould you cast this ritual a second time while a previous alarm spell remains active, the earlier alarm ceases immediately.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Animal Friendship","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a morsel of food)","duration":"24 hours","description":"You focus your intent on a nearby animal, projecting peaceful intentions through your presence and voice. Select a Beast or creature bearing the Animal tag within your range that you can perceive. The creature must be able to see and hear you for this magic to take hold. Should the creature possess an Intelligence of 4 (−3) or greater, your spell fails entirely and produces no effect. Otherwise, the creature must make a Wisdom saving throw; on a failure, it becomes charmed by you and remains so for the spell's duration, which lasts for a day. However, if you or your allies deal any harm to the target creature, the charm breaks immediately and the spell ends.\n\nWhen you cast this spell using a spell slot of 2nd circle or higher, you may target one additional creature for each slot level above 1st.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Intelligence","Wisdom"],"damageTypes":[],"tags":["Control"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Animated Housecleaning","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":true,"castingTime":"1 action","range":"30 feet","components":"V, S (collection of various household objects)","duration":"8 hours","description":"Your thoughts command up to four Tiny domestic items—such as a broom, cooking pot, or eating utensil—to animate and drift through the air at a flying speed of 10 feet. These objects respond instantly to your mental direction and execute their assigned duties with tireless efficiency. They prove especially valuable when assisting with household cleaning, meal preparation, and other domestic activities, granting you advantage on ability checks related to cooking and cleaning while they aid you.\n\nThe items remain amicable toward all creatures by default, though you may instruct them to assault foes. During combat encounters, these items move on your initiative count and act immediately following your turn each round. When attacking, each item uses your melee spell attack bonus and inflicts 1 bludgeoning, piercing, or slashing damage upon a successful hit, with the damage type determined by the object's natural attack method (a broom strikes with bludgeoning force, whereas a paring knife would deal slashing damage, for instance).","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S"],"saves":[],"damageTypes":["Bludgeoning","Piercing","Slashing"],"tags":["Buff","Damage","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Bane","level":1,"circle":"1st-Circle","traditions":["Divine","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a drop of blood)","duration":"Concentration, up to 1 minute","description":"You weave a curse of misfortune upon your foes. Choose up to three creatures you can see within range; each must make a Charisma saving throw or fall under this curse's effect.\n\nWhile cursed, whenever a target makes an attack roll or saving throw before the spell ends, they must roll a d4 and subtract that result from their total.\n\nWhen you cast this spell using a 2nd-circle spell slot or higher, you may curse one additional creature for each slot level above 1st.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":[],"tags":["Debuff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Bless","level":1,"circle":"1st-Circle","traditions":["Divine"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a sprinkling of holy water)","duration":"Concentration, up to 1 minute","description":"You petition divine forces to grant your allies favor in battle and adversity. You may select up to three creatures within range to receive this blessing. Whenever a blessed creature makes an attack roll or saving throw before this spell concludes, that creature may roll a d4 and add the result to their roll. If you cast this spell using a spell slot of 2nd circle or higher, you may bless one additional creature for each circle above 1st.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Bloodhound","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (tuft of bloodhound fur)","duration":"8 hours","description":"You imbue a beast with supernatural tracking prowess through touch. The target must be a willing Beast or creature bearing the Animal tag with an INT score of 3 (−4) or lower. Throughout the spell's duration, the creature gains the ability to make Wisdom (Survival) checks to track prey, adding your spellcasting modifier and proficiency bonus to these rolls. Should the animal possess heightened sensory capabilities, it rolls these tracking checks with advantage whenever those senses apply—advantage on smell-based tracking for creatures with keen scent, or advantage on sight-based tracking for visual pursuit. Furthermore, the creature cannot be surprised at the start of combat, and this immunity extends to all other creatures within 10 feet of it.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Intelligence","Wisdom"],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Bountiful Stamina","level":1,"circle":"1st-Circle","traditions":["Divine","Primordial"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a piece of ginseng root, which the spell consumes)","duration":"24 hours","description":"You infuse a creature with renewed vigor, bolstering its physical resilience. The affected creature gains advantage on any saving throw made to resist exhaustion-inducing effects and spells. Should the creature accumulate one or more levels of exhaustion while under this spell's effect, it experiences a surge of revitalizing energy that eliminates one exhaustion level and causes the spell to conclude. When cast upon a creature already burdened by exhaustion, the spell immediately dispels one such level but confers no additional benefits.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Burning Hands","level":1,"circle":"1st-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self (15-foot cone)","components":"V, S","duration":"Instantaneous","description":"Flames erupt outward from your splayed hands in a shimmering wall of heat and light. Every creature standing within a 15-foot cone must attempt a Dexterity save to resist the inferno. Those who fail the save suffer 3d6 fire damage, while those who succeed take half that amount.\n\nAny flammable materials in the affected area—provided they are neither worn as clothing nor held in someone's possession—catch fire from the intense heat.\n\nAt Higher Circles. When you expend a spell slot of 2nd circle or above to cast this spell, you add 1d6 additional fire damage for each circle level beyond the 1st.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Fire"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Charm","level":1,"circle":"1st-Circle","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"1 hour","description":"Your captivating presence and gestures cause a creature to perceive you as trustworthy. You direct this magic at one creature within range that you can see. The target must comprehend at least one language to be susceptible, though it need not be one you know. The target makes a Wisdom save, gaining advantage on this save if you or your allies are currently engaged in combat with it. If the save fails, the creature becomes charmed by you for the spell's duration or until you or your companions inflict harm upon it. While charmed, the creature views you as a friendly associate. Upon the spell ending, the creature becomes aware of the charm you placed upon it.\n\nAt Higher Circles. When you expend a spell slot of 2nd circle or higher to cast this spell, you may affect one additional creature for each circle level above 1st. All targeted creatures must remain within 30 feet of one another at the moment of targeting. Furthermore, if you expend a spell slot of 4th circle or higher, the targeted creatures no longer require the ability to understand any language to be susceptible to the charm.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Control","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Choking Fumes","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"1 round","description":"You conjure a billowing cloud of acrid vapor that advances toward your chosen target. The creature you designate, provided it lies within range and you possess line of sight to it, must make a Constitution saving throw. If the creature fails this save, it cannot produce speech or cast any spell requiring verbal components for the duration of this spell's effect.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Poison"],"tags":["Control","Damage"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Cobblecraft","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"10 minutes","range":"5 feet","components":"V, S, M (silver thread worth at least 25 gp, which the spell consumes)","duration":"1 hour","description":"You weave together plants and stones, coaxing them into the forms of practical implements.\n\nBy gathering nearby natural materials—stones, wood, vegetation, and earth—you fashion them into a single useful object. This item must be worth no more than 100 gp, occupy no more space than Medium size (fitting entirely within a single 5-foot cube), and be something you could reasonably craft from such raw elements. Common creations include mundane tools, exploration supplies, simple melee weapons, or light protective gear. Each casting produces only one item, which remains intact and serviceable for 1 hour before degrading into its constituent materials.\n\nThe objects produced this way function adequately but bear obvious signs of crude, hasty construction. Their value as trade goods is negligible.\n\nThis spell cannot create living creatures or magical items.\n\nYou cannot use this spell to produce items of complex construction or fine artisanship—such as intricate mechanisms, alchemical preparations, martial-grade weapons, or medium or heavy armor.","classes":["Druid","
