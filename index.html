Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Coiled Strike","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (cobra hood)","duration":"Concentration, up to 10 minutes","description":"You touch a willing creature to attune it to sudden moments of advantage. Until the spell ends, whenever the creature expends its reaction, it gains the ability to recover that reaction one time—solely for the purpose of making an opportunity attack until the start of its next turn. However, the creature cannot use this recovered reaction to deliver a second opportunity attack against the same target during that target's turn.\n\nAt Higher Circles. When you cast this spell using a spell slot of 2nd circle or higher, you can affect one additional willing creature for each slot level above 1st.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Color Spray","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"Self (15-foot cone)","components":"V, S, M (a pinch of powder or sand that is colored red, yellow, and blue)","duration":"1 round","description":"From your outstretched hand erupts a brilliant cascade of shimmering light that overwhelms the senses of those caught within. Roll 8d10; the total represents a pool of hit points you can affect with this spell's blinding radiance.\n\nAll creatures within a 15-foot cone emanating from you become potential targets, though unconscious creatures and those unable to see are excluded. You apply the spell's blinding effect to creatures in order from lowest to highest current hit points.\n\nEach affected creature suffers blindness for the spell's duration. As you affect each creature, subtract its current hit points from your remaining pool. A creature only succumbs to the spell if its hit points do not exceed what remains of your pool.\n\nWhen you cast this spell at 2nd circle or higher, add an additional 2d10 to your initial roll for each circle above the 1st.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Debuff","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Command","level":1,"circle":"1st-Circle","traditions":["Divine","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V","duration":"Instantaneous","description":"You issue an authoritative command that compels obedience.\n\nYou speak a single word of command to one creature within range that you can see. That creature must make a Wisdom saving throw. On a failed save, it must obey your command at the beginning of its next turn. The spell fails to take effect if the target is Undead, does not comprehend your language, or if your command would cause direct harm to the creature.\n\nBelow are several example commands and their typical results. You may attempt a command not listed here; if so, the GM adjudicates the target's behavior. Should the target prove unable to follow your command, the spell terminates.\n\nApproach. The target travels toward you along the shortest available path, concluding its turn once it comes within 5 feet of you.\n\nDrop. The target releases whatever object it holds in its grasp and then concludes its turn.\n\nFlee. The target dedicates its turn to moving away from you using its most efficient method of movement available.\n\nGrovel. The target immediately falls prone and then concludes its turn.\n\nHalt. The target cannot move and cannot take actions. A creature with a flying speed remains airborne provided its abilities permit, or flies the minimum distance necessary to maintain flight.\n\nWhen you expend a spell slot of 2nd circle or above to cast this spell, you may target one additional creature for every slot level above 1st. All targeted creatures must be within 30 feet of one another when you select them.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Comprehend Languages","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (a pinch of soot and salt)","duration":"1 hour","description":"Your mind opens to the languages around you, granting you sudden fluency in communication.\n\nFor the duration, any spoken words you hear become clear to you—you grasp the literal meaning of all languages, whether common or exotic. Similarly, you can read and comprehend any written language, provided you maintain physical contact with the surface bearing those words. Reading a single page of text requires approximately 1 minute.\n\nThis spell pierces only the surface of language itself. It cannot unravel hidden messages woven into text or decipher glyphs and sigils that exist outside the bounds of conventional written language.\n\nAt Higher Circles. When you cast this spell using a spell slot of 2nd circle or higher, you may extend its benefits to one additional willing creature for each slot level above 1st. All targeted creatures must stand within 30 feet of you at the moment of casting.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Cornucopia","level":1,"circle":"1st-Circle","traditions":["Divine","Primordial"],"school":"Conjuration","isRitual":true,"castingTime":"1 minute","range":"30 feet","components":"V, S, M (a tiny horn)","duration":"Instantaneous","description":"With a gesture of arcane generosity, you manifest a sumptuous feast before you. This conjured meal, complete with both sustenance and refreshment, can feed up to six creatures. The food and drink remain present for up to 1 hour while those partaking consume it, after which any remnants vanish. Each creature that eats from this repast receives enough nourishment to satisfy their needs for 1 day and gains 1d8 temporary hit points.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Healing","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Corpse Limn","level":1,"circle":"1st-Circle","traditions":["Divine","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (dead firefly)","duration":"Instantaneous","description":"You emit a pulse of diseased golden radiance that reveals how long the dead have lain still. Any corpse within range absorbs this light and glows for a duration based on its time of death: one week or less generates light for 1 minute, one month produces light for 8 rounds, one year yields light for 6 rounds, ten years creates light for 4 rounds, one century manifests light for 2 rounds, and one millennium or longer illuminates instantly before fading. Undead creatures likewise absorb and reflect this radiance, though an undead with an INT of 4 (−3) or greater may attempt a Charisma save to resist the effect entirely.\n\nAny creature that glows from this spell grants advantage on attack rolls made against it by attackers who can perceive it. Additionally, an illuminated creature cannot gain the benefits of invisibility.\n\nWhen you cast this spell using a spell slot of 2nd circle or higher, the range extends by 5 feet for each slot level above 1st.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Intelligence","Charisma"],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Corrosive Spray","level":1,"circle":"1st-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self (15-foot cone)","components":"V, S","duration":"Instantaneous","description":"You summon a burst of corrosive liquid that erupts outward in a destructive wave. Acrid vapors and caustic droplets stream forth from your palms in a 15-foot cone. Every creature caught within this noxious spray must attempt a Dexterity saving throw. Those who fail their save suffer 2d4 acid damage, while those who succeed take half the damage.\n\nWhen you cast this spell using a spell slot of 2nd circle or higher, the destructive potency increases. For each circle above 1st, add an additional 2d4 acid damage to the total.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Acid"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Create Familiar","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"5 feet","components":"V, S, M (a life-sized statue, puppet, stuffed animal, or other suitable vessel worth at least 10 gp, which the spell consumes)","duration":"Instantaneous","description":"You gain a loyal animal companion to serve as your aide and confidant.\n\nThrough this ritual, you transfer a portion of your own vital essence into a chosen vessel, crafting an arcane familiar bound to your will.\n\nYour familiar takes the shape of an animal you select from these forms: bat, cat, crab, frog (toad), hawk, lizard, octopus, owl, poisonous snake, fish (quipper), rat, raven, seahorse, spider, or weasel (see Appendix C: Creature Statistics). When the ritual concludes, your familiar materializes in an empty space no more than 5 feet away from you. Though it bears the statistics of its chosen form, it functions as a Construct for the purposes of any spells or effects that distinguish between creature types, rather than as a Beast.\n\nBound in Blood. Upon your familiar's creation, your maximum hit points decrease by one. Should you choose to permanently dismiss your familiar or it suffers permanent destruction, your maximum hit points return to their normal value.\n\nThis reduction cannot be reversed by any method for as long as your familiar endures.\n\nCommunicating with Your Familiar. While your familiar shares your plane or realm of existence, it can telepathically relay its perceptions to you, and you may converse with it in kind.\n\nControlling Your Familiar. Your familiar operates autonomously but unfailingly obeys your instructions.\n\nDuring combat, it determines its own initiative and takes its own turn. A familiar cannot make attacks, though it may perform any other action available to creatures.\n\nWhen you cast a spell with a range of touch, your familiar may serve as its conduit, delivering the spell as though it had cast the magic itself. Your familiar must remain within 100 feet of you to do this, and it must expend its reaction to deliver the spell at the moment you cast it. Should the spell demand an attack roll, you apply your spell attack modifier to that roll.\n\nBy touching your familiar as an action, you can draw it back into yourself. It absorbs into your form, remaining dormant until you summon it forth. While incorporated, you may use an action to release it from your body, allowing it to emerge in an empty space within 5 feet of you.\n\nDestroying Your Familiar. When a familiar is reduced to 0 hit points, its body is obliterated at once. If you survive, your familiar regenerates a new body after 1 hour passes, returning with full hit points and resuming activity. This new body appears in an empty space within 5 feet of you. Should you die, your familiar perishes permanently, and you must perform the ritual anew to obtain another. At any point, you can use an action to irrevocably dismiss your familiar, immediately destroying it.\n\nYou may maintain only one familiar simultaneously. If you attempt to perform this ritual while a current familiar still lives, the ritual produces no effect.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Force"],"tags":["Damage","Healing","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Create Or Destroy Water","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a drop of water if creating water or a few grains of sand if destroying it)","duration":"Instantaneous","description":"Upon casting, you select one of two distinct effects to manifest.\n\nTo Create Water, you conjure up to 10 gallons of potable water within range, placing it in an open vessel. As an alternative, you may cause this water to descend as rainfall throughout a 30-foot cube within range, which simultaneously smothers any exposed flames present in that area.\n\nTo Destroy Water, you eliminate up to 10 gallons of water contained in an open vessel within range. Alternatively, you may disperse fog occupying a 30-foot cube within range.\n\nWhen you employ a spell slot of 2nd circle or higher, the spell's potency increases: you may create or destroy an additional 10 gallons of water for each slot level above 1st, or you may expand the cube's dimensions by 5 feet per slot level above 1st.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Cretify","level":1,"circle":"1st-Circle","traditions":["Arcane","Primordial","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a piece of chalk, which the spell consumes)","duration":"Instantaneous","description":"You transform plant matter into brittle chalk, rendering it inert and harmless.\n\nUpon casting, choose either a 20-foot square or a 10-foot wide, 40-foot-long line. All plants within that area petrify into white, crumbling chalk. Any difficult terrain created by these plants becomes easily passable. This spell cannot affect areas currently protected by magical effects, including the entangle spell or a Leaf druid's Sacred Grove class feature (see Player's Guide for both).\n\nAlternatively, you may target a single creature with the Plant type. That creature must succeed on a Constitution save or suffer disadvantage on all attacks, saves, and ability checks for a number of rounds equal to your proficiency bonus.\n\nAt Higher Circles. When you cast this spell using a spell slot of 2nd circle or higher, increase the affected area by an additional 20-foot square or 40-foot line for each slot level above 1st.","classes":["Bard","Druid","Ranger","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":[],"tags":["Buff","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Cure Wounds","level":1,"circle":"1st-Circle","traditions":["Divine","Primordial"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Instantaneous","description":"You lay hands upon an injured being and speak words of restoration, mending their wounds through magic.\n\nWhen you touch a creature, it recovers hit points equal to 1d8 plus your spellcasting ability modifier. Constructs and Undead cannot benefit from this magic.\n\nIf you cast this spell using a spell slot of 2nd circle or higher, add an additional 1d8 to the healing for each slot level above 1st.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Deathblindness","level":1,"circle":"1st-Circle","traditions":["Divine","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (eyelashes from a corpse)","duration":"Concentration, up to 10 minutes","description":"When you cast this spell, choose a creature within range. That creature must make a Charisma saving throw. On a failed save, it becomes unable to perceive corpses or undead creatures for the duration—both stationary remains and animated undead alike fade from its sight.\n\nThis blindness persists until the spell ends, with one exception: if an invisible undead creature attacks the affected target, that undead instantly becomes visible to the target until the end of the target's next turn.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":[],"tags":["Control","Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Detect Evil And Good","level":1,"circle":"1st-Circle","traditions":["Divine","Wyrd"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 10 minutes","description":"You attune yourself to the presence of otherworldly forces in your vicinity.\n\nWhile this spell remains active, you gain awareness of any Aberration, Celestial, Elemental, Fey, Fiend, or Undead creature positioned within 30 feet of you, and you perceive their exact location. You also sense any location or object within 30 feet of you that bears the magical imprint of consecration or desecration.\n\nYour senses pierce through most physical barriers with ease, though certain materials prove impenetrable to this detection: a foot-thick expanse of stone, a full inch of ordinary metal, a thin layer of lead, or three feet of wood or earth will completely block your perception.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Detect Magic","level":1,"circle":"1st-Circle","traditions":["Arcane","Wyrd"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 10 minutes","description":"Your magical senses sharpen, attuning you to arcane forces in your immediate surroundings. Throughout the spell's duration, you become aware of any magical presence within 30 feet of your position. Upon detecting magic this way, you may expend an action to perceive a subtle radiance encircling any visible creature or object nearby that possesses magical properties, simultaneously discerning which school of magic influences it, if any such affiliation exists. Your magical perception penetrates nearly all obstacles, yet remains obstructed by barriers of sufficient density: a stone wall at least 1 foot thick, common metal plating no less than 1 inch thick, a sheet of lead however thin, or wood or earth measuring 3 feet or greater in depth.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Detect Poison And Disease","level":1,"circle":"1st-Circle","traditions":["Divine","Primordial"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"Self","components":"V, S, M (a dried snake rattle)","duration":"Concentration, up to 10 minutes","description":"Your senses sharpen to perceive all poisons, diseased creatures, and toxic afflictions nearby.\n\nThroughout the spell's duration, you become aware of any poisons and diseases present within 30 feet of you, and you can pinpoint their exact locations. The spell grants you awareness of creatures currently suffering from poison or disease, creatures whose very nature inflicts poison damage upon others, and creatures capable of spreading disease to their prey—such as ghouls or mummies. Furthermore, you automatically identify the specific type of poison, creature variety, or disease you sense in each instance.\n\nMost physical barriers offer no obstruction to this perception, though the spell cannot penetrate 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Poison"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Disguise Self","level":1,"circle":"1st-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"1 hour","description":"You weave illusions across your appearance, transforming how others perceive you.\n\nYou alter the illusory appearance of yourself and everything you carry—clothing, armor, weapons, and other possessions—for the duration of the spell, or until you use an action to end it. You may appear 1 foot shorter or taller than your actual height, and you can make yourself seem muscular, heavyset, or anywhere in between. Your basic body structure cannot change, meaning any disguise must maintain the same fundamental limb arrangement as your true form. Beyond these constraints, the specifics of your illusion are yours to determine.\n\nThe illusion cannot withstand direct physical contact. Should someone touch what you've made appear in your disguise—such as a fabricated hat or altered contours—their hand will pass through false elements or feel your actual form beneath. For instance, an illusory hat offers no physical substance, and if you appear thinner through this spell, a hand reaching toward what seems like empty air will make contact with your true body.\n\nA creature can attempt to see through your disguise by spending an action to scrutinize your appearance carefully. That creature must succeed on an Intelligence (Investigation) check against your spell save DC to recognize that you are disguised.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Intelligence"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Distance Dilation","level":1,"circle":"1st-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (cracked lens)","duration":"Concentration, up to 1 minute","description":"Your target's perception of space becomes unreliable and confusing.\n\nThis spell warps how a creature perceives distances around it. The target must succeed on a Wisdom saving throw or fall under the spell's effects for the duration. While affected, whenever the target needs to judge distance using sight, it rolls a d6 to determine the outcome. This altered perception applies to all movement (including climbing, flying, walking, and magical teleportation), ranged attack rolls, and any ability checks that depend on distance judgment.\n\nDistance Dilation Effects d6 Effect 1–2 The target perceives distances as farther than they truly are, moving only half as far as intended. When making ranged attacks or distance-based ability checks, it rolls with disadvantage. 3–4 The target's distance perception aligns with reality, and it functions normally without penalty. 5–6 The target perceives distances as closer than they truly are, moving twice as far as intended. Should this cause the target to collide with an obstacle, it must make a Dexterity saving throw. On a failure, it takes 1d6 bludgeoning damage and falls prone. When making ranged attacks or distance-based ability checks, it rolls with disadvantage.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Dexterity","Wisdom"],"damageTypes":["Bludgeoning"],"tags":["Buff","Control","Damage","Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Divine Favor","level":1,"circle":"1st-Circle","traditions":["Divine"],"school":"Evocation","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, S","duration":"Concentration, up to 1 minute","description":"You call upon divine power through fervent prayer, infusing your strikes with celestial force. For the duration of this spell, whenever you hit a target with a weapon attack, that attack inflicts an additional 1d4 radiant damage.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Radiant"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Elemental Burst","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"You channel raw elemental force to a visible location within range, detonating it in a violent 5-foot radius explosion. Before casting, you select whether the burst deals cold, fire, lightning, or thunder damage. All creatures caught in the blast radius must succeed on a Dexterity save or suffer 2d8 damage of your chosen type; those who save take half damage instead.\n\nAt Higher Circles. When you cast this spell using a spell slot of 2nd circle or higher, the damage increases by 1d8 for each slot above 1st.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Cold","Fire","Lightning","Thunder"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Entangle","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"From a point you designate within range, tangled vegetation erupts across a 20-foot square, creating a writhing mass of vines and undergrowth. This overgrown terrain becomes difficult to traverse for the duration. Any creature present when the spell takes effect must make a Strength save or become trapped by the animated plants until the spell ends. A trapped creature may spend an action to attempt a Strength check against your spell save DC, escaping on a successful check. Once the spell concludes, the summoned vegetation decays and disappears.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Strength"],"damageTypes":[],"tags":["Control","Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Expeditious Retreat","level":1,"circle":"1st-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, S","duration":"Concentration, up to 1 minute","description":"This spell infuses you with supernatural speed. Upon casting and as a bonus action on each subsequent turn while the spell persists, you may immediately take the Dash action.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Extendable Limbs","level":1,"circle":"1st-Circle","traditions":["Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 hour","description":"Your limbs become unnaturally flexible and elastic.\n\nFor the spell's duration, you can use a bonus action to extend or contract either your arms or legs. Stretching your arms outward grants you an additional 5 feet of reach when attacking, though your strikes become less precise, imposing disadvantage on attack rolls. Elongating your legs increases your walking speed by 10 feet, but your balance suffers, giving you disadvantage on saving throws and ability checks made to resist being knocked prone.\n\nAt Higher Circles. When you cast this spell using a 3rd-circle spell slot or higher, you can manipulate both your arms and legs simultaneously as a bonus action instead of choosing one set. When you cast this spell using a 5th-circle spell slot or higher, the penalties from extending either your arms or legs no longer apply.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Buff","Control","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Faerie Fire","level":1,"circle":"1st-Circle","traditions":["Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V","duration":"Concentration, up to 1 minute","description":"You coat your surroundings in shimmering fey light that strips away concealment and exposes targets to harm.\n\nSelect a 20-foot cube within range. Every object in this space glows with your choice of blue, green, or violet radiance. Any creature occupying the cube when you cast this spell must make a Dexterity save; those who fail also become outlined in this same light. For the spell's duration, both objects and creatures affected by this magic emit dim light in a 10-foot radius.\n\nAttack rolls made against any affected creature or object gain advantage if the attacker has line of sight to the target. Additionally, affected creatures and objects lose any benefit they would normally gain from invisibility.","classes":["Warlock","Witch"],"source":"Player's Guide 1","componentList":["V"],"saves":["Dexterity"],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"False Life","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (a small amount of alcohol or distilled spirits)","duration":"1 hour","description":"You channel necromantic energies to fortify your vitality. Drawing upon the same dark forces that sustain the undead, you reinforce your body's resilience. For the spell's duration, you gain 1d4 + 4 temporary hit points.\n\nWhen you cast this spell using a spell slot of 2nd circle or greater, you gain 5 additional temporary hit points for each circle above the 1st.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":["Force"],"tags":["Damage","Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Feather Fall","level":1,"circle":"1st-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 reaction, when you or a creature within","range":"60 feet","components":"V, M (a small feather or piece of down)","duration":"1 minute","description":"You hurl a feather skyward, invoking magic that gentles the descent of those who plummet toward the earth.\n\nSelect up to five creatures that are falling, provided they are within range. Each affected creature's descent decelerates to 60 feet per round for the duration of the spell. Should any creature touch ground before the spell concludes, that creature suffers no damage from the fall, lands upright without harm, and the spell's effect ceases for them.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","M"],"saves":[],"damageTypes":[],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Find Familiar","level":1,"circle":"1st-Circle","traditions":["Wyrd"],"school":"Conjuration","isRitual":true,"castingTime":"1 hour","range":"10 feet","components":"V, S, M (charcoal, incense, and herbs collectively worth 10 gp, which the spell consumes)","duration":"Instantaneous","description":"Through an arcane ritual, you forge a mystical bond with a spirit companion. You acquire a familiar—an otherworldly entity that manifests in one of fifteen Beast forms of your selection: bat, cat, crab, frog, hawk, lizard, octopus, owl, poisonous snake, quipper, rat, raven, seahorse, spider, or weasel (detailed in Appendix C: Creature Statistics). Once the ritual concludes, your familiar materializes in an unoccupied space within 10 feet of you. It adopts the statistics of your chosen form, but is classified as a Celestial, Fey, or Fiend (your choice) rather than a Beast for the purposes of spells and magical effects.\n\nYour familiar shares sensory perception with you across any distance, provided you inhabit the same plane of existence. You maintain telepathic contact with it at all times when this condition is met.\n\nYour familiar operates with independent agency yet remains wholly obedient to your commands. During combat, it maintains its own initiative count and takes turns separately from you. Though unable to make attacks, it may perform any other action available to a creature. When you cast a touch-range spell, your familiar can serve as its conduit—provided it remains within 100 feet of you and expends its reaction when you cast the spell. Attack rolls for spells delivered this way use your spell attack modifier.\n\nAs an action, you may temporarily dismiss your familiar into a pocket dimension. While sequestered there, you can use another action to recall it, causing it to materialize in any unoccupied space within 30 feet of you.\n\nShould your familiar be reduced to 0 hit points, it vanishes without leaving a corpse, but returns whenever you cast this spell again. Alternatively, you can expend an action to permanently dismiss it. The next time you cast this spell afterward, you may summon a different familiar entirely.\n\nYou may maintain only one familiar at any given time. If you cast this spell while a familiar already serves you, it instead transforms into a new form from the familiar list that you designate.","classes":["Warlock","Witch"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Fire Under The Tongue","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"5 feet","components":"V, S","duration":"24 hours","description":"You draw nonmagical fire into your mouth, containing it safely until you release it as a weapon.\n\nYou can ingest a nonmagical fire up to the size of a Small campfire within range. The fire remains harmless within your mouth and vanishes without consequence if you fail to expel it before the spell concludes.\n\nAfter ingesting the fire, you can expel it as an action.\n\nTo direct the flames at a specific creature or target, make a ranged spell attack with a range of 10 feet. A Small campfire-sized flame inflicts 2d6 fire damage upon a hit, while a Tiny torch-sized flame inflicts 1d6 fire damage. The expelled fire extinguishes immediately after leaving your mouth unless it contacts flammable material capable of sustaining it.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Fire"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Fling","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"S, M (A targetable item)","duration":"Instantaneous","description":"You propel a nearby object through the air as a weapon, sending it careening toward distant targets.\n\nSelect an unattended item within range weighing at most 5 pounds. You launch this item in a straight line of your choosing, propelling it up to 90 feet away. The projectile ceases its flight and drops upon reaching the maximum distance or striking an obstacle.\n\nWhen the traveling item would pass through a creature's space, that creature must succeed on a Dexterity save or suffer the consequences. If the save fails, both the creature and the item sustain 3d8 bludgeoning damage. A successful save negates damage to the creature, though the item maintains its trajectory.\n\nShould the item collide with a solid structure, both the structure and the item take 3d8 bludgeoning damage.\n\nAt Higher Circles. When you cast this spell using a spell slot of 2nd circle or higher, the maximum weight of the targetable item increases by 5 pounds and the damage increases by 1d8 for each circle above 1st.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["S","M"],"saves":["Dexterity"],"damageTypes":["Bludgeoning"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Floating Disk","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a drop of mercury)","duration":"1 hour","description":"You conjure a floating platform to transport objects for you.\n\nThis spell creates a circular plane of force, 3 feet in diameter and 1 inch thick, that hovers 3 feet above the ground in an unoccupied space within range that you can see. The disk persists for the duration and can support up to 500 pounds. Should the weight exceed this limit, the spell terminates immediately, and all objects on the disk fall to the ground.\n\nThe disk remains stationary while you stand within 20 feet of it. When you move beyond 20 feet from the disk, it travels after you to maintain a distance of no more than 20 feet. The disk can traverse uneven ground, climb or descend stairs and slopes, but cannot cross elevation changes of 10 feet or greater. It cannot traverse a 10-foot pit, for instance, nor escape from within one if created there.\n\nIf the distance between you and the disk exceeds 100 feet (typically because it cannot navigate around an obstacle to pursue you), the spell ends.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":["Force"],"tags":["Damage","Summon"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Fog Cloud","level":1,"circle":"1st-Circle","traditions":["Arcane","Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Concentration, up to 1 hour","description":"You summon a thick cloud of mist in a 20-foot-radius sphere at a point you can reach. This fog billows around obstacles and corners, rendering everything inside nearly impossible to see. The cloud persists for its full duration unless a moderate wind or stronger (moving at least 10 miles per hour) sweeps it away.\n\nWhen you cast this spell using a spell slot of 2nd circle or above, you increase the sphere's radius by 20 feet for each slot level beyond the 1st.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Follow Through","level":1,"circle":"1st-Circle","traditions":["Arcane","Divine"],"school":"Enchantment","isRitual":false,"castingTime":"1 reaction, when a creature you can see within 60 feet of you misses with a melee attack","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"When you cast this spell as a reaction, you inspire your ally to press their advantage. The target of this spell gains the ability to make an additional melee attack against the same creature it just missed, using identical attack conditions to the original attempt. This follow-up attack carries a −2 penalty to the attack roll, and should it connect, it inflicts half the normal damage of a standard attack.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Goodberry","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a handful of berries)","duration":"Instantaneous","description":"You imbue ordinary berries with restorative magic, granting them potent healing properties.\n\nYou infuse up to ten berries that you hold with magical energy, which remains active for up to 24 hours. Any creature may spend an action to consume one of these berries, restoring 1 HP and gaining sufficient nourishment to meet its daily sustenance needs—however, a creature cannot rely on these berries as its sole food source for more than one consecutive day. The berries' magical properties fade completely if not eaten within 24 hours of when you cast this spell.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Grease","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a bit of pork rind or butter)","duration":"1 minute","description":"You anoint a surface with slippery fat, transforming it into a treacherous expanse. A 10-foot square of ground centered on a point within range becomes covered in oily grease, functioning as difficult terrain throughout the spell's duration. Any creature standing within the greased area when it forms must make a Dexterity save or be knocked prone. Additionally, any creature that moves into the area or concludes its turn there must succeed on a Dexterity save or fall prone.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":[],"tags":["Control","Summon"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Guiding Bolt","level":1,"circle":"1st-Circle","traditions":["Divine","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"1 round","description":"You release a bolt of radiant energy at a creature within range, striking it with supernatural force. Make a ranged spell attack roll against your target.\n\nIf your attack hits, the creature suffers 4d6 radiant damage. Until the end of your next turn, the target shimmers with an ethereal glow, causing the next attack roll made against it to be made with advantage.\n\nWhen you cast this spell using a spell slot of 2nd circle or higher, increase the damage by 1d6 for each slot level above the 1st circle.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Radiant"],"tags":["Buff","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Guiding Counsel","level":1,"circle":"1st-Circle","traditions":["Divine"],"school":"Enchantment","isRitual":false,"castingTime":"1 reaction, when an ally makes an ability check","range":"30 feet","components":"V, S","duration":"Instantaneous","description":"As you cast this spell, you offer insightful guidance to a companion undertaking an ability check. Your ally may add your Wisdom modifier to the total of that ability check.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Healing Word","level":1,"circle":"1st-Circle","traditions":["Divine"],"school":"Necromancy","isRitual":false,"castingTime":"1 bonus action","range":"60 feet","components":"V","duration":"Instantaneous","description":"Speaking a benediction from a distance, you channel restorative magic toward your ally. Choose a creature within range that you can perceive; that creature recovers hit points equal to 1d4 + your spellcasting ability modifier. Constructs and Undead are unaffected by this spell's mending power.\n\nWhen you expend a spell slot of 2nd circle or higher to cast this spell, the healing grows by an additional 1d4 for each circle above the 1st.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Hellfire Brand","level":1,"circle":"1st-Circle","traditions":["Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V","duration":"Concentration, up to 1 minute","description":"Your weapon ignites with a searing flame bordered in black and radiating a baleful crimson light. When you make a melee weapon attack and hit a creature during the spell's duration, your weapon becomes engulfed in hellfire for the duration, casting bright light in a 10-foot radius and dim light for an additional 20 feet.\n\nThat hit deals an additional 1d4 necrotic damage. Furthermore, you may select up to two other creatures within 15 feet of your target—each must make a Constitution save or take 1d6 fire damage as hellfire consumes them.\n\nAt Higher Circles. If you cast this spell using a spell slot of 2nd circle or higher, increase both the necrotic damage and the fire damage by 1d4 and 1d6 respectively for each slot level above 1st.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V"],"saves":["Constitution"],"damageTypes":["Fire","Necrotic"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Hellish Rebuke","level":1,"circle":"1st-Circle","traditions":["Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 reaction, when damaged by a creature within 60 feet of you that you can see","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"When a creature wounds you, you channel infernal retribution through a swift gesture. Your target becomes engulfed in searing hellfire and must succeed on a Dexterity save or suffer the full fury of the flames. A failed save deals 2d10 fire damage to the creature, while a successful one reduces the damage by half.\n\nIf you cast this spell using a spell slot of 2nd circle or higher, add 1d10 fire damage for each slot level beyond the 1st.","classes":["Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Fire"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Heroism","level":1,"circle":"1st-Circle","traditions":["Divine"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Concentration, up to 1 minute","description":"You place your hand upon a consenting creature, suffusing it with courage and fortitude. Until this spell's magic fades, the target becomes immune to fear effects and gains temporary hit points at the beginning of each of its turns equal to your spellcasting ability modifier. Any remaining temporary hit points granted by this spell vanish when the spell ends.\n\nAt Higher Circles. When you cast this spell using a spell slot of 2nd circle or higher, you may touch one additional creature for each slot above 1st.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Control","Healing"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Hideous Laughter","level":1,"circle":"1st-Circle","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (tiny tarts and a feather that is waved in the air)","duration":"Concentration, up to 1 minute","description":"You afflict a creature with overwhelming, involuntary mirth that renders it helpless.\n\nChoose a creature within range that you can perceive. That creature finds everything impossibly amusing and bursts into uncontrollable laughter if your magic takes hold. The target must make a Wisdom save; if it fails, it drops prone and becomes incapacitated, unable to rise for the spell's duration. Creatures with an INT of 3 (−4) or lower cannot be affected by this spell.\n\nAt the end of each turn the target takes and whenever it suffers damage, it may attempt another Wisdom save to break free of the spell's effects. When the target triggers a save by taking damage, it makes the save with advantage.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Intelligence","Wisdom"],"damageTypes":[],"tags":["Buff","Control","Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Identify","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"Touch","components":"V, S, M (a pearl worth at least 100 gp and an owl feather)","duration":"Instantaneous","description":"You place your hand upon an object or a living creature to discern enchantments and magical influences acting upon it.\n\nWhen you select an object and maintain contact with it for the spell's full duration, you gain complete knowledge of its magical nature. Should the object possess magical properties, you discover what those properties are and the methods required to activate them. You ascertain whether the item demands attunement before use and learn the total number of charges it contains, if applicable. You also perceive any active spells currently influencing the object and identify each one by name. If a spell originally brought the item into being, you learn which spell was responsible for its creation.\n\nAlternatively, if you maintain physical contact with a creature throughout the casting, you gain awareness of all spells presently acting upon that creature.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Illusory Script","level":1,"circle":"1st-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":true,"castingTime":"1 minute","range":"Touch","components":"V, S, M (a lead-based ink worth at least 10 gp, which the spell consumes)","duration":"10 days","description":"You inscribe an enchanted illusion onto parchment, paper, or comparable writing surface that persists for the spell's duration.\n\nTo you and any creatures you select at the moment of casting, the text displays as ordinary writing in your own handwriting, communicating precisely what you intended. To all other observers, the script appears as mysterious or arcane symbols they cannot comprehend. You may alternatively make the writing seem like a completely different message penned in a different hand and language, provided you are familiar with that language.\n\nShould the illusion be dispelled, both the true script and the false illusion vanish entirely.\n\nA creature possessing truesight can perceive the authentic message beneath the deception.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Infernal Shield","level":1,"circle":"1st-Circle","traditions":["Divine"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"Acrid smoke coalesces into the forms of tiny imps, circling protectively around a visible creature within range. Throughout the spell's duration, these demonic sentries grant the target a +2 bonus to their Armor Class and allow them to reroll a single failed Constitution saving throw once each turn. Upon the spell's conclusion, the sharp scent of sulfur persists in the air for 1 round.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Constitution"],"damageTypes":[],"tags":["Buff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Inflict Wounds","level":1,"circle":"1st-Circle","traditions":["Divine","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Instantaneous","description":"You channel destructive force through your body to harm a creature within your grasp. Make a melee spell attack targeting a creature within your reach. If your attack lands, the creature suffers 3d10 necrotic damage.\n\nWhen cast using a spell slot of 2nd circle or higher, add an additional 1d10 of necrotic damage for each circle beyond the 1st.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Necrotic"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Lesser Conjure Animals","level":1,"circle":"1st-Circle","traditions":["Primordial","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Concentration, up to 1 hour","description":"You conjure fey spirits that manifest as ordinary beasts in vacant spaces you can perceive within range.\n\nSelect one of these configurations for what materializes:\n• One Beast of CR 1/2 or lower.\n• Two Beasts of CR 1/4 or lower.\n• Four Beasts of CR 1/8 or lower.\n\nEach summoned Beast counts as a Fey creature and vanishes when reduced to 0 hit points or when the spell's duration expires.\n\nAt Higher Circles. When you cast this spell using a spell slot of 3rd-circle or higher, the damage increases by 1d12 for each slot above 2nd.\n\nThe conjured creatures regard you and your allies as friends. They roll initiative together with you and act immediately after your turn concludes. They respond to any spoken commands you give (requiring no action from you). If you provide no commands, they defend themselves against hostile creatures but take no other actions. The Game Master maintains and resolves their statistics.","classes":["Druid","Ranger","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Summon"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Longstrider","level":1,"circle":"1st-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a pinch of dirt)","duration":"1 hour","description":"When you touch a creature, you imbue it with heightened mobility. The target's movement speed increases by 10 feet, and it can jump three times as far as it normally would. These enhancements persist for the spell's duration.\n\nWhen you cast this spell using a spell slot of 2nd circle or higher, you may touch one additional creature for each slot level above 1st.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Lucky Charm","level":1,"circle":"1st-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (an amulet fashioned of gold, rare woods, or semi-precious stone, worth at least 25 gp)","duration":"24 hours","description":"You weave fortune into a specially crafted amulet, creating a reservoir for Luck itself.\n\nTo complete this ritual, you or another participant must contribute 1 Luck from their own reserves. That creature willingly surrenders this Luck, which becomes bound within the amulet.\n\nAny creature who wears the amulet gains access to 1 Luck that exists separately from their normal Luck maximum.\n\nWhen the wearer expends Luck, they may draw from the amulet's supply alongside their own, or use only the amulet's Luck instead. The amulet becomes inert once its Luck is fully consumed and cannot function again until you recast this ritual. Should the amulet's Luck remain untapped when the duration expires, that stored fortune evaporates.\n\nAt Higher Circles. Your mastery over this ritual deepens as you advance. Upon gaining access to 2nd-circle spell slots, the duration extends by 24 hours for each circle level you can access beyond 2nd. When you gain access to 3rd-circle spell slots, the amulet can hold an additional 1 Luck. A further 1 Luck capacity becomes available once you gain access to 6th-circle spell slots, allowing the amulet to store a maximum of 3 Luck.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Mage Armor","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a piece of cured leather)","duration":"8 hours","description":"You place your hand upon a willing creature devoid of armor, suffusing their form with arcane protection that persists for the spell's duration.\n\nThe creature's armor class is calculated as 13 plus its dexterity modifier for as long as the spell remains active. Should the target equip any form of armor, the spell immediately terminates. Alternatively, you may use an action to dismiss the spell at will.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Magic Missile","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","description":"You conjure shimmering projectiles of pure magical force that unerringly strike their marks. Three darts materialize and fly toward creatures you designate, each one within range and visible to you. You may direct multiple darts at a single target or spread them among different creatures as you see fit. Every dart that strikes its intended target inflicts 1d4 + 1 force damage.\n\nWhen you cast this spell using a spell slot of 2nd circle or higher, you create one additional dart for each circle above the 1st.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Nourishing Repast","level":1,"circle":"1st-Circle","traditions":["Divine"],"school":"Transmutation","isRitual":true,"castingTime":"1 minute","range":"Touch","components":"V, S","duration":"24 hours","description":"You may enchant food through touch, imbuing it with restorative magic. A single casting can transform enough provisions to sustain up to six creatures. This enchantment persists for 24 hours or until the food is consumed, whichever comes first. Should a creature consume the enchanted food during a short rest, any hit die spent to recover hit points gains a +1 bonus, capped at the die's maximum value. Alternatively, if the food is eaten during a long rest, each creature who partakes gains advantage on saving throws against disease and poison for the next 8 hours.","classes":["Cleric","Paladin"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S"],"saves":[],"damageTypes":["Poison"],"tags":["Buff","Damage","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Pendulum","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a small pendulum or metronome made of brass and rosewood worth 10 gp)","duration":"Concentration, up to 1 minute","description":"You touch a creature and impose rhythmic certainty upon its actions and destiny. An unwilling target must succeed on a Wisdom saving throw or fall under this spell's effect. For the spell's duration, the affected creature foregoes rolling a d20 for attack rolls, ability checks, and saving throws. Instead, its results proceed through a fixed sequence: 1, 20, 2, 19, 3, 18, 4, 17, continuing in this alternating pattern. At the end of each of its turns, the creature may repeat the Wisdom saving throw, ending the spell on a success. The spell also terminates if the sequence of possible results is completely exhausted.\n\nThis spell's mechanical structure prevents luck-based abilities from influencing the sequence. However, advantage and disadvantage remain functional, each consuming the next two consecutive values from the predetermined sequence.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Debuff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Protection From Evil And Good","level":1,"circle":"1st-Circle","traditions":["Divine","Wyrd"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (holy water or powdered silver and iron, which the spell consumes)","duration":"Concentration, up to 10 minutes","description":"You weave protective magic around a willing creature you touch, shielding them from otherworldly threats until the spell concludes.\n\nThe warded creature gains protection against six categories of beings: Aberrations, Celestials, Elementals, Fey, Fiends, and Undead.\n\nThis protection manifests in multiple ways. When creatures from these categories attempt to strike the protected creature, they roll their attack rolls at disadvantage. Additionally, the protected creature cannot be charmed, frightened, or possessed by such creatures. Should the protected creature already be under the effects of charm, fear, or possession from one of these creatures, they gain advantage on any saving throw made against that ongoing effect.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Control","Debuff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Purify Food And Drink","level":1,"circle":"1st-Circle","traditions":["Divine","Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"1 minute","range":"10 feet","components":"V, S","duration":"Instantaneous","description":"You touch a point within range and emit a cleansing aura that spans a 5-foot-radius sphere. All nonmagical food and drink contained within this sphere becomes purified, stripped of all poisons and diseases that would render it unsafe to consume.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S"],"saves":[],"damageTypes":["Poison"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Radiant Smite","level":1,"circle":"1st-Circle","traditions":["Divine","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, M (a melee weapon)","duration":"Concentration, up to 1 minute","description":"You channel celestial fire into a weapon you currently hold. Upon your next successful strike with that weapon before the spell concludes, your target suffers an additional 1d8 radiant damage and becomes engulfed in consecrated flames. Each turn as the afflicted creature begins its turn, it must attempt a Constitution saving throw. If it fails, it endures 1d8 radiant damage from the burning. If it succeeds, it takes no damage and the sacred fire extinguishes.\n\nWhen you employ a spell slot of 2nd circle or greater to cast this spell, the initial bonus damage rises by 1d8 for every slot level above 1st.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","M"],"saves":["Constitution"],"damageTypes":["Fire","Radiant"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Sanctuary","level":1,"circle":"1st-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 bonus action","range":"30 feet","components":"V, S, M (a small silver mirror)","duration":"1 minute","description":"You invoke divine protection over a nearby ally, wreathing them in spiritual deterrence.\n\nYou envelop a creature you can reach with warding magic. While this enchantment persists, any creature attempting to harm the protected creature through an attack or damaging spell must succeed on a Wisdom save or be forced to redirect their action elsewhere—they cannot proceed with their original attack or spell. This protective magic offers no defense against spells that affect multiple targets in an area, such as a fireball's detonation.\n\nThe moment the protected creature themselves attacks another creature or directs a spell at an enemy, the ward shatters and the spell immediately ends.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Sapping Smite","level":1,"circle":"1st-Circle","traditions":["Divine","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, M (a melee weapon)","duration":"Concentration, up to 1 minute","description":"You channel rotting energy into a weapon you currently carry. Upon the next successful strike with that weapon before the spell concludes, your target suffers an additional 1d6 necrotic damage and becomes afflicted with creeping rot. For the duration of this spell, the infected creature must attempt a Constitution saving throw at the beginning of each of its turns. If the save fails, the creature takes 1d6 necrotic damage and its movement speed becomes halved until the start of its next turn. If the save succeeds, the creature avoids the damage and the affliction ends.\n\nWhen you cast this spell at 2nd circle or higher, the initial weapon strike deals 1d6 additional necrotic damage for each circle above 1st.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","M"],"saves":["Constitution"],"damageTypes":["Necrotic"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Shield","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":false,"castingTime":"1 reaction, when you are hit by an attack or targeted by the magic missile spell","range":"Self","components":"V, S","duration":"1 round","description":"A shimmering ward of arcane energy materializes around you, turning aside harm. Until the beginning of your next turn, your AC increases by 5, and this bonus applies even to the attack that triggered the spell. Additionally, you gain complete immunity to damage dealt by magic missile during this time.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Shield Of Faith","level":1,"circle":"1st-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 bonus action","range":"60 feet","components":"V, S, M (a small parchment with a bit of holy text written on it)","duration":"Concentration, up to 10 minutes","description":"A luminous protective barrier materializes around a creature you designate within range, bolstering its defenses and granting it a +2 bonus to its Armor Class for the spell's duration.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Silent Image","level":1,"circle":"1st-Circle","traditions":["Arcane"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a bit of fleece)","duration":"Concentration, up to 10 minutes","description":"You conjure a visual phantom within a confined space.\n\nYou fabricate the appearance of an object, creature, or other visible phenomenon no larger than a 15-foot cube. This phantom materializes at a location you choose within range and persists for the spell's duration. The illusion engages only the sense of sight; no sound, scent, or tactile sensations accompany it.\n\nBy spending your action, you can reposition the phantom to any point within range. As you move it, you may simultaneously adjust its form so that the transitions appear seamless and realistic. Should you manifest an illusory creature, for instance, you can modify its appearance as you shift its location to suggest natural movement like walking.\n\nAny physical contact with the phantom unmasks its true nature, as solid objects pass directly through it. A creature expending its action to scrutinize the phantom can discern the deception by succeeding on an Intelligence (Investigation) check against your spell save DC. Once a creature penetrates the illusion's facade, that creature thereafter perceives through the image entirely.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Intelligence"],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Sleep","level":1,"circle":"1st-Circle","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M (a pinch of fine sand, rose petals, or a cricket)","duration":"1 minute","description":"You weave magic that compels creatures into an enchanted sleep.\n\nCast this spell to force nearby creatures into magical slumber. Roll 8d8; this total represents the hit points worth of creatures you can affect. All creatures within 20 feet of a point you designate within range become potential targets, processed in ascending order by their current hit points (excluding any already unconscious).\n\nBeginning with the creature possessing the lowest current hit points, each affected creature succumbs to unconsciousness. This unconscious state persists until the spell ends, the sleeping creature takes any damage, or another creature uses an action to shake or slap the sleeper awake. After each creature falls asleep, subtract its hit points from your total. Continue to the next creature with the lowest hit points. A creature can only be affected if its maximum hit points do not exceed the remaining total from your roll.\n\nUndead creatures and those possessing immunity to the charmed condition cannot be affected by this spell.\n\nAt Higher Circles. When you cast this spell using a spell slot of 2nd circle or higher, roll an additional 2d8 for each slot level above 1st.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Control","Damage","Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Slither","level":1,"circle":"1st-Circle","traditions":["Primordial","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a piece of snakeskin)","duration":"1 hour","description":"You touch a willing creature and grant it serpentine locomotion. The target can move at its full speed while lying prone, bypassing the usual half-speed penalty for crawling. Additionally, the creature gains the ability to navigate through spaces only large enough to accommodate a creature one size category smaller without suffering the normal movement penalties from squeezing. Difficult terrain continues to impede the target's movement as it normally would.","classes":["Druid","Ranger","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Speak With Animals","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"10 minutes","description":"For the spell's duration, you unlock the capacity to both comprehend and converse with Beasts and creatures bearing the Animal tag. These creatures understand you equally well. However, the depth of their understanding and the complexity of what they can communicate remain constrained by their Intelligence score. Even so, they can reliably share details about the terrain and creatures in their vicinity, including anything they have directly sensed or encountered within the past day. Through persuasion, you may be able to convince such a creature to perform a minor task on your behalf, though the GM has final say on whether they comply.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Intelligence"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Stumble","level":1,"circle":"1st-Circle","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 reaction, when a creature you can see within range moves","range":"30 feet","components":"V, S","duration":"Instantaneous","description":"As a creature within your view starts to move, you briefly disorient its thoughts. That creature must make a Charisma saving throw. On a failed save, its movement is reduced to half its normal speed until the beginning of its next turn. If the creature is traveling using its walking speed and fails the save by 5 or more, it also falls prone.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Charisma"],"damageTypes":[],"tags":["Control"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Subtext","level":1,"circle":"1st-Circle","traditions":["Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Concentration, up to 1 minute","description":"Your voice carries a hidden layer of meaning perceptible only to those you designate.\n\nWhen you cast this spell, select any creatures within your sight. As you speak thereafter, you may cause your chosen creatures to perceive an alternate message—one distinct and concealed from all others who hear you. Any creature that perceives either version of your speech may attempt a Wisdom (Insight) check against your spell save DC. If successful, that creature discerns that you have spoken two separate statements, though it does not actually hear the content of the second message.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V"],"saves":["Wisdom"],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Tenacity","level":1,"circle":"1st-Circle","traditions":["Primordial"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (wolverine whisker)","duration":"1 minute","description":"You channel an ally's fury toward a singular foe.\n\nChoose a willing creature within range. For the duration, the target gains advantage on attack rolls and saving throws made against a creature it designates. Additionally, whenever the target rolls damage dice, any result of 1 is treated as a 2 instead.\n\nThis intense focus comes at a cost: the target suffers disadvantage on attack rolls and saving throws against any creature other than its chosen enemy. Furthermore, all other creatures gain advantage on attack rolls made against the target.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Thunderwave","level":1,"circle":"1st-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self (15-foot cube)","components":"V, S","duration":"Instantaneous","description":"You unleash an expanding pulse of concussive force that emanates outward from your position. Every creature occupying space within a 15-foot cube centered on you must succeed on a Constitution save or suffer the spell's full effect. Those who fail the save take 2d8 thunder damage and are forcibly thrust 10 feet away from you in a straight line. Creatures that make the save take half damage and remain in place. The spell's detonation also automatically displaces any unsecured objects lying entirely within the affected area, hurling them 10 feet from you. The thunderous report is audible to any creature within 300 feet.\n\nWhen you cast this spell using a slot of 2nd circle or higher, increase the damage by 1d8 for each slot level above 1st.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Force","Thunder"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Unseen Servant","level":1,"circle":"1st-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":true,"castingTime":"1 minute","range":"60 feet","components":"V, S, M (a piece of string and a bit of wood)","duration":"1 hour","description":"You summon a bodiless, invisible servant bound to your will.\n\nThis spell conjures an invisible, formless force lacking any mind of its own that carries out straightforward tasks at your direction for the spell's duration. The servant materializes in an empty space on the ground within range. It possesses AC 10, 1 HP, a Strength score of 3 (−4), and cannot make attacks. The spell immediately ends if the servant is reduced to 0 HP.\n\nOnce per turn, you may use a bonus action to mentally direct the servant to move up to 15 feet and manipulate an object. The servant can execute straightforward tasks comparable to those performed by a mundane servant, including bringing objects to you, cleaning, repairing items, arranging garments, igniting flames, presenting meals, and dispensing beverages. After you issue a command, the servant works toward completing that task as effectively as it can, and once finished, stands idle awaiting further instruction.\n\nThe spell ends immediately if you command the servant to travel beyond 60 feet of your position.\n\nShould you cast this spell while a servant summoned by an earlier casting remains active, the previously summoned servant vanishes instantly.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Strength"],"damageTypes":["Force"],"tags":["Damage","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Void Glimpse","level":1,"circle":"1st-Circle","traditions":["Wyrd"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Instantaneous","description":"You gaze into the infinite darkness beyond reality and touch upon secrets forbidden to mortal minds. Within the next minute, your next
