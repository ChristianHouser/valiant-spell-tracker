age for each slot level beyond the 6th.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Necrotic"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Cleave Chasm","level":6,"circle":"6th-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 round","range":"120 feet","components":"V, S","duration":"Permanent","description":"You violently rupture the earth beneath you, tearing open a fissure that devastates everything in its path.\n\nYou slam your hand or weapon into the ground, forcing a massive chasm to split open in a direction you designate, extending up to 120 feet away from you in a straight line. This chasm measures 10 feet across and plunges 1d6 × 10 feet downward. Any creature standing where the chasm tears open must make a Dexterity save. Those who fail tumble into the depths, while those who succeed sidestep the rupture, positioning themselves on whichever edge of the chasm they prefer.\n\nSmaller structures measuring 30 feet wide or less that lie in the chasm's path are completely destroyed. Structures exceeding this width suffer only partial devastation across a 30-foot section centered on the chasm line.\n\nCreatures caught within the zone of structural collapse must attempt a Dexterity save. Those failing take 5d6 bludgeoning damage, fall prone, and become trapped beneath debris. Freeing a buried creature requires another character to succeed on a DC 17 Strength (Athletics) check to clear the rubble. The GM may modify this DC based on the rubble's composition. Those succeeding on their save take half damage and remain upright and unburied.\n\nThe GM determines whether additional effects manifest based on the surrounding terrain. A chasm opened beneath water, for instance, might reduce the water level or drain it entirely depending on the chasm's dimensions.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Strength","Dexterity"],"damageTypes":["Bludgeoning"],"tags":["Control","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Conjure Giant","level":6,"circle":"6th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 hour","description":"You call forth a Fey spirit that manifests in the form of a Giant, materializing in an empty space within range that you can perceive.\n\nYou must designate which Giant of CR 6 or lower shall take physical form. The Game Master possesses the creature's game statistics. This spell cannot summon any creatures that possess legendary actions. The Giant vanishes when reduced to 0 hit points or when the spell's duration expires.\n\nThroughout the spell's duration, the Giant regards you and your allies as friendly. During combat encounters, the Giant rolls initiative alongside you and acts immediately following your turn in the initiative order. The Giant complies with any spoken orders you give it without requiring any action from you.\n\nShould you refrain from issuing commands to the Giant, it will only take actions to defend itself against creatures that pose a threat to it, remaining otherwise inactive.\n\nWhen you expend a spell slot of 7th circle or higher to cast this spell, you may instead select a Giant whose CR does not exceed the circle level of the slot you spent. For instance, using a 9th-circle spell slot permits you to summon a Giant of CR 9 or lower, such as a cloud giant or fire giant.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":["Fire"],"tags":["Damage","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Contingency","level":6,"circle":"6th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":true,"castingTime":"10 minutes","range":"Self","components":"V, S, M (a statuette of yourself carved from ivory and decorated with gems worth at least 1,500 gp)","duration":"10 days","description":"You weave a spell into a magical trigger that activates under conditions you set.\n\nSelect a spell of 5th circle or lower that you are capable of casting, requires only 1 action to cast, and can affect you as a target. You cast this contingent spell immediately as part of casting contingency, consuming the appropriate spell slot, yet the contingent spell remains dormant and produces no effect. When you specify a particular circumstance during the casting of both spells, the contingent spell will activate instead. As an illustration, contingency combined with water breathing might activate the water breathing once you become submerged in water or comparable liquid.\n\nThe moment the circumstance occurs for the first time, the contingent spell triggers automatically without exception—regardless of your wishes—and contingency thereafter ceases.\n\nEven though the contingent spell could normally affect multiple creatures or targets, it manifests only upon you. Only a single contingency spell can remain active through you at any given time. Should you cast contingency again, any existing contingency spell already affecting you ends immediately.\n\nFurthermore, contingency dissipates if you ever cease carrying its material component on your body.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Create Undead","level":6,"circle":"6th-Circle","traditions":["Arcane","Divine"],"school":"Necromancy","isRitual":true,"castingTime":"1 minute","range":"10 feet","components":"V, S, M (one pot filled with grave dirt, one pot filled with brackish water, and one 150 gp black onyx stone for each corpse, which the spell consumes)","duration":"Instantaneous","description":"You animate corpses into undead servants that obey your will.\n\nYou may only cast this spell during nighttime hours. Select up to three corpses belonging to Medium or Small Humanoids within range. Each corpse rises as a ghoul under your command (consult your GM for their statistics).\n\nOn each of your turns, you may use a bonus action to issue mental commands to any creature animated through this spell, provided it remains within 120 feet of you. If controlling multiple creatures, you can command any or all simultaneously with identical orders. You direct the creature's specific actions and movement for its next turn, or assign a general directive such as defending a location. Without explicit instructions, the creature merely defends itself against attackers. Once ordered, a creature pursues its task until completion.\n\nYour control persists for 24 hours, then ceases. To extend control for another 24 hours, recast this spell before the current period expires. Recasting reasserts dominion over up to three previously animated creatures rather than creating new ones.\n\nIf you cast this spell again while undead from your previous casting remain active, those earlier undead immediately break free from your control and turn hostile toward you.\n\nAt Higher Circles: Upon gaining access to 6th-circle spell slots, you may animate or reassert control over four ghouls. Upon gaining access to 8th-circle spell slots, you may animate or reassert control over five ghouls, two ghasts, or two wights. Upon gaining access to 9th-circle spell slots, you may animate or reassert control over six ghouls, three ghasts, three wights, or two mummies.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Cyclone Cloak","level":6,"circle":"6th-Circle","traditions":["Primordial","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 hour","description":"A whirlwind of protective air currents swirls constantly around your form. These churning winds shield you from harm in several ways: you gain immunity to damage and effects from gases and inhaled poisons, as the gusts sweep such threats harmlessly away. When others attack you from a distance, their shots are deflected by the turbulent air, giving them disadvantage on their ranged attack rolls. Should you plummet through the air, whether by accident or choice, the winds slow your descent to no more than 60 feet per round, nullify any falling damage, and allow you to land gracefully without injury for the spell's duration. Moreover, you can harness the swirling currents to steer your fall: for every 5 feet you descend, you may shift your position up to 5 feet in any horizontal direction.","classes":["Druid","Ranger","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Buff","Damage","Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Delay Spell","level":6,"circle":"6th-Circle","traditions":["Arcane","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 reaction, when you or another creature you can see within 90 feet of you casts a spell","range":"90 feet","components":"S, M (a time-keeping device)","duration":"Instantaneous","description":"You weave temporal magic around active spell energy, causing its manifestation to pause momentarily.\n\nYou interrupt a creature (including yourself) who is currently casting a spell, forcing that spell's effects to manifest later rather than immediately. If the interrupted spell is 6th circle or lower, you choose how many rounds pass before its effects occur, up to a maximum of 6 rounds. If the interrupted spell is 7th circle or higher, you must make an ability check using your spellcasting ability against a DC of 10 plus the spell's circle. If you succeed, you choose how many rounds pass before its effects occur, up to a maximum of 6 rounds. During the intervening rounds, the spell's caster cannot alter any aspect of the spell's effects or parameters.\n\nAt Higher Circles. When you cast this spell using a spell slot of 7th circle or higher, you automatically delay any target spell whose circle is equal to or lower than the circle of the spell slot you expend.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Disintegrate","level":6,"circle":"6th-Circle","traditions":["Arcane","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a lodestone and pinch of dust)","duration":"Instantaneous","description":"You project a luminous emerald beam from your outstretched finger toward a creature, object, or magical construct within range that you can perceive. The target must succeed on a Dexterity saving throw or suffer the spell's full effect.\n\nIf the target fails its saving throw, it takes 10d6 + 40 force damage. Should this damage reduce the target's hit points to zero, complete annihilation occurs.\n\nWhen a creature is annihilated by this spell, its body and all nonmagical items it possessed transform into fine gray powder. Only true resurrection or wish can restore such a creature to life. Any magic items the creature carried remain intact and fall to the ground where the creature previously stood.\n\nNonmagical objects and magical constructs are subject to automatic annihilation if they are Large or smaller. Objects or constructs of Huge size or greater are only partially destroyed—the spell disintegrates a 10-foot-cube section of the target. Magic items cannot be affected by this spell.\n\nWhen you cast this spell using a spell slot of 7th circle or higher, increase the damage by 3d6 for each slot level above the 6th.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Force"],"tags":["Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Eyebite","level":6,"circle":"6th-Circle","traditions":["Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 minute","description":"Your eyes transform into swirling voids brimming with eldritch power that devastate those who meet your gaze.\n\nFor the duration of this spell, your eyes become a dark abyss radiating supernatural dread. Choose one creature within 60 feet of you that you can see; it must make a Wisdom saving throw. On a failed save, it suffers one effect of your choice that persists for the spell's duration. On each of your subsequent turns, you may use your action to target a different creature, but you cannot affect a creature again if it has already succeeded on a Wisdom save against this casting of eyebite.\n\nAsleep. The target falls into unconsciousness. It awakens if it receives any damage or if another creature uses an action to rouse it.\n\nPanicked. The target becomes frightened of you. On each of its turns, the frightened creature must use the Dash action to move away from you along the safest and shortest available path, unless no path exists. If the target reaches a location at least 60 feet away from you where you are no longer visible to it, this effect ends.\n\nSickened. The target suffers disadvantage on all attack rolls and ability checks. At the conclusion of each of its turns, the target may repeat the Wisdom saving throw. If it succeeds, this effect ends.","classes":["Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control","Debuff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Find The Path","level":6,"circle":"6th-Circle","traditions":["Primordial"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"Self","components":"V, S, M (a set of divinatory tools—such as bones, ivory sticks, cards, teeth, or carved runes—worth","duration":"Concentration, up to 1 day","description":"Your magical senses attune to a specific location, revealing the quickest path forward.\n\nYou establish a supernatural connection to a fixed destination you know well, provided it exists on your current plane. The spell cannot function if you attempt to target a location on a different plane, a destination that shifts position, or a location defined too vaguely to pinpoint. When you name such an invalid target, the spell produces no effect.\n\nThroughout the spell's duration, you remain aware of the destination's distance and direction so long as you inhabit the same plane. During your journey, whenever you encounter a fork in the road or multiple possible routes, you instinctively identify which option constitutes the shortest and most direct course to your target—though this path may expose you to greater dangers than safer alternatives would.","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Flesh To Stone","level":6,"circle":"6th-Circle","traditions":["Divine"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a pinch of lime, water, and earth)","duration":"Concentration, up to 1 minute","description":"You attempt to petrify a creature you can perceive within range. If the target is composed of flesh, it must succeed on a Constitution saving throw or become restrained as its body begins to calcify. A successful save negates this effect entirely.\n\nEach turn, a restrained creature makes another Constitution saving throw at the end of its turn. The spell ends if the target accumulates three successful saves. If it instead accumulates three failed saves, the creature transforms into stone and gains the petrified condition for the duration. Successes and failures need not occur consecutively—track both outcomes until one reaches three.\n\nIf the petrified creature sustains physical damage that breaks or removes parts of its form, it takes equivalent damage when returning to flesh. The creature dies automatically if the damage would require a vital area—such as its head or any section containing vital organs—to function.\n\nShould you maintain concentration for the entire possible duration without the spell ending early, the creature remains permanently transformed to stone until the effect is dispelled through other means.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Forbiddance","level":6,"circle":"6th-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":true,"castingTime":"10 minutes","range":"Touch","components":"V, S, M (a sprinkling of holy water, rare incense, and powdered ruby worth at least 1,000 gp)","duration":"1 day","description":"You establish a protective barrier across a designated region to prevent extraplanar incursion and unauthorized magical entry.\n\nThis spell creates a ward spanning up to 40,000 square feet of floor area and extending 30 feet upward. For the duration, no creature can teleport into this space, nor can they use portals such as those from the gate spell to cross its boundary. The ward seals the area against all forms of planar transit, blocking access via the Astral Plane, Ethereal Plane, Shadow Realm, Summerlands, and the plane shift spell.\n\nAdditionally, you can configure the spell to harm specific creature types of your choosing. Select one or more of these categories: Celestials, Elementals, Fey, Fiends, Undead, and creatures bearing the Outsider tag. Whenever a chosen creature type first enters the warded area during a turn or begins its turn within it, that creature suffers 5d10 radiant or necrotic damage—you decide which damage type applies when casting the spell.\n\nYou may establish a password when casting this spell. Any creature speaking this password upon entering the area avoids taking damage from the ward.\n\nThe warded area cannot overlap with any other forbiddance spell's area. By casting forbiddance at the same location every day for 30 consecutive days, the spell becomes permanent until dispelled, and the material components are expended upon the final casting.","classes":["Cleric","Paladin"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Necrotic","Radiant"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Freezing Sphere","level":6,"circle":"6th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"300 feet (60-foot-radius sphere)","components":"V, S, M (a small crystal sphere)","duration":"Instantaneous","description":"You hurl a sphere of intense cold that erupts at a location you designate within range, detonating in a 60-foot-radius sphere. Every creature caught in this area must succeed on a Constitution save or suffer 10d6 cold damage; those who save take half damage instead.\n\nWhen this sphere contacts a body of water or primarily water-based liquid (excluding water-form creatures), the liquid solidifies to a depth of 6 inches across a 30-foot square. This ice persists for 1 minute. Any creatures swimming atop the frozen surface become trapped within the ice. A trapped creature may spend an action and make a Strength check against your spell save DC to escape.\n\nInstead of immediately releasing the sphere, you may choose to hold it. A small globe roughly the size of a sling stone, cool to the touch, materializes in your hand. You or any recipient can later throw this globe up to 40 feet away or launch it via a sling at the sling's standard range. Upon impact, it shatters and produces the same effect as casting the spell normally. Alternatively, you can place the globe down without shattering it. If the globe remains intact after 1 minute, it detonates automatically.\n\nWhen you cast this spell using a spell slot of 7th circle or higher, increase the damage by 1d6 for each slot level above 6th.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength","Constitution"],"damageTypes":["Cold"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Ghostly Form","level":6,"circle":"6th-Circle","traditions":["Arcane","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (a piece of gauze, which the spell consumes)","duration":"Concentration, up to 1 minute","description":"You assume an incorporeal state, becoming a ghostly specter.\n\nYour body grows translucent and fades away, along with all equipment and objects you carry at the moment of casting. Your standard locomotion transforms into a flying speed, granting you the ability to hover in place. You can glide through other creatures and solid matter as though traversing difficult terrain. However, concluding your turn within an object inflicts 1d10 force damage upon you. You develop resistance to acid, fire, lightning, and thunder damage, as well as to bludgeoning, piercing, and slashing damage dealt by nonmagical sources. Additionally, you cannot be harmed by cold damage and cannot be affected by the grappled, paralyzed, prone, or restrained conditions.\n\nThroughout this transformation, others can perceive your spectral form, but you cannot interact with or influence any creatures or objects—save for the equipment and belongings you possessed when the spell took effect. Any item you release reverts to its normal physical state at the end of that turn.\n\nShould this spell conclude while your incorporeal form occupies an object's space, you suffer 4d10 force damage and are forcefully displaced to the nearest empty space adjacent to the object.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Globe Of Invulnerability","level":6,"circle":"6th-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Self (10-foot radius)","components":"V, S, M (a glass or crystal bead that shatters when the spell ends)","duration":"Concentration, up to 1 minute","description":"A shimmering, stationary barrier materializes in a 10-foot radius centered on you, persisting for the duration of the spell. This protective shell shields all creatures and objects sheltered within its confines from external magical harm.\n\nSpell attacks originating from sources beyond the barrier prove ineffective against those within. Additionally, any spell of 5th circle or lower cast from outside the barrier cannot penetrate it to affect creatures or objects inside, regardless of whether a higher-circle spell slot was expended to cast the spell. Though such spell attacks and spells may be directed at targets within the barrier, they simply fail to produce any effect upon them.\n\nFurthermore, the barrier's interior remains excluded from the areas of effect produced by such spells cast from outside.\n\nWhen you cast this spell using a spell slot of 7th circle or higher, the barrier's protection extends to block spells of one additional circle for each slot level above 6th.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Control"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Guardian Shield","level":6,"circle":"6th-Circle","traditions":["Arcane","Divine"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"10 feet","components":"V, S, M (a shield)","duration":"8 hours","description":"You call forth a spiritual presence that binds itself to a shield, animating it to guard an ally.\n\nUpon casting this spell, an incorporeal force inhabits a shield that you touch, which then hovers beside a creature of your choice within your reach. Throughout the spell's duration, the shield remains adjacent to the protected creature, maintaining its position relative to them as they move.\n\nWhenever the protected creature faces an attack, the animated shield instantly interposes itself between the attacker and the creature, granting the protected creature a +2 bonus to its AC (the GM may increase this bonus if a magical shield serves as the ritual's material component). This protection functions even against attacks launched from concealment, from invisible attackers, or during surprise rounds. Once the spell concludes, the shield drops to the ground in a space adjacent to the creature it was protecting.\n\nAt Higher Circles. As you advance through higher spell circles, this ritual becomes increasingly effective. When you gain access to 7th-circle spell slots, the AC bonus increases by 1 for each spell circle you can access beyond 6th circle.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Guards And Wards","level":6,"circle":"6th-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":true,"castingTime":"10 minutes","range":"Touch","components":"V, S, M (burning incense, a small measure of brimstone and oil, a knotted string, and a silver rod worth at least 10 gp)","duration":"24 hours","description":"You weave a protective enchantment across a location, filling it with disorienting illusions and strategic hazards.\n\nYou establish a ward encompassing up to 2,500 square feet of floor space (representable as a 50-foot square, or one hundred 5-foot squares, or twenty-five 10-foot squares). The protected area can reach up to 20 feet in height and takes whatever shape you designate. You may protect multiple levels of a structure by dividing the area between them, provided each contiguous section remains accessible to you on foot during the spell's casting.\n\nUpon casting, you may designate specific creatures to remain unaffected by any or all of the effects you choose to implement.\n\nYou may also establish a spoken password that grants the speaker immunity to these effects.\n\nGuards and wards produces these effects throughout the warded area:\n\nCorridors. Heavy fog permeates all corridors within the ward. Additionally, wherever a corridor splits or intersects with multiple directions available, there is a 50 percent chance that any creature other than yourself will perceive itself traveling in the opposite direction from its actual choice.\n\nDoors. Every door within the warded area becomes magically locked, functioning as though sealed by an arcane lock spell. Furthermore, you may veil up to ten doors with illusions (matching the illusory object aspect of minor illusion) to disguise them as ordinary wall sections.\n\nStairs. All stairways in the warded area become filled with webs identical to those created by the web spell. These webs regenerate within 10 minutes if destroyed by fire or torn away while guards and wards persists.\n\nOther Spell Effect. You may select one of the following magical effects to place within the warded area:\n\n• Establish dancing lights in four corridors with a simple repeating program that continues for the spell's duration.\n\n• Establish magic mouth in two locations.\n\n• Establish stinking cloud in two locations, appearing at your designated positions and reappearing within 10 minutes if scattered by wind while guards and wards lasts.\n\n• Establish constant gust of wind in one corridor or room.\n\n• Establish suggestion in one location. You select a 5-foot square area, and any creature entering or passing through receives the suggestion mentally.\n\nThe entire warded area emits magical aura. A dispel magic targeting a specific effect removes only that effect if successful.\n\nYou may create a permanent warded location by casting this spell at that site daily for one year.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Harm","level":6,"circle":"6th-Circle","traditions":["Divine","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"You project a malignant affliction toward a creature within range that you can perceive. That creature must succeed on a Constitution saving throw or suffer the spell's effects. On a failed save, the creature takes 14d6 necrotic damage; a successful save reduces this damage by half. The creature's hit points cannot be reduced below 1 by this damage. Should the creature fail its saving throw, its maximum hit points are diminished for 1 hour by a number equal to the necrotic damage it sustained. Any magic or effect capable of curing diseases restores the creature's maximum hit points to their normal value before the hour elapses.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Necrotic"],"tags":["Damage","Debuff","Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Heal","level":6,"circle":"6th-Circle","traditions":["Divine","Primordial"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"You designate a single creature within your range that remains visible to you. Restorative energy floods through the target's body, restoring 70 hit points to it. Simultaneously, the spell strips away blindness, deafness, and any diseases that plague the creature. Constructs and Undead cannot benefit from this magic.\n\nWhen you expend a spell slot of 7th circle or above to cast this spell, the healing increases by 10 hit points for each circle above 6th.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Hell Wagon","level":6,"circle":"6th-Circle","traditions":["Divine"],"school":"Conjuration","isRitual":true,"castingTime":"1 minute","range":"30 feet","components":"V, S, M (a small iron wheel etched with infernal runes, worth 250 gp)","duration":"1 hour","description":"A swirling gateway of acrid smoke splits open, and from it emerges a colossal war machine of black iron wreathed in hellfire, drawn forward by two shadowy, flame-wreathed steeds.\n\nYou summon a Huge war wagon constructed from black iron and hellfire within an unoccupied space measuring 15 feet by 10 feet that you can see within range. Two phantom steeds of smoke and brimstone-scented vapor pull the wagon forward. You and up to seven other Medium or smaller creatures of your choosing may enter the war wagon and remain unharmed by its presence. Any creature other than those designated that touches the war wagon or moves within 5 feet of it sustains 3d6 fire damage and 5d8 necrotic damage.\n\nThe war wagon possesses an AC of 18 and 80 hit points. It is immune to fire, poison, psychic, and necrotic damage, and resists all nonmagical damage. Passengers gain none of these protections but receive three-quarters cover against external attacks.\n\nAs your action, you may pilot the war wagon in place of moving. The wagon travels at 30 feet per round and possesses a flying speed of 30 feet. Consult Chapter 5 of the Player's Guide for any vehicular rules not addressed here.\n\nWhen the war wagon concludes its movement in a space containing Medium or smaller creatures, those creatures must succeed on a Strength saving throw. Those who fail take damage as though they had made contact with the wagon, are shoved to the nearest unoccupied space, and fall prone. Those who succeed take half damage, are shoved to the nearest safe unoccupied space, and remain standing.\n\nThe war wagon disappears when reduced to 0 hit points, depositing its riders in adjacent unoccupied spaces. Should the wagon vanish while airborne, all riders plummet downward.","classes":["Cleric","Paladin"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Strength"],"damageTypes":["Fire","Necrotic","Poison","Psychic"],"tags":["Control","Damage","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Instant Summons","level":6,"circle":"6th-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":true,"castingTime":"1 minute","range":"Touch","components":"V, S, M (a sapphire worth 1,000 gp)","duration":"Until dispelled","description":"You establish a mystical connection to an object, binding it to you through an enchanted sapphire so you can retrieve it at will across any distance.\n\nYou touch an object that weighs no more than 10 pounds and measures no longer than 6 feet at its greatest length. The spell imprints an unseen mark upon the object's surface and secretly records the object's name within the sapphire serving as your material component. You must use a new sapphire each time you cast this spell.\n\nWhenever you wish, you can use an action to speak the object's name aloud and shatter the sapphire. The object instantaneously transfers into your hand, unaffected by walls, distance, or the boundaries between planes, and the spell concludes.\n\nShould another creature have possession of the object, the sapphire's destruction does not pull the object toward you. Instead, you gain immediate knowledge of the creature's identity and receive a general sense of its current location.\n\nIf someone successfully casts dispel magic or uses a comparable effect against the sapphire itself, this spell's effect is negated.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Irresistible Dance","level":6,"circle":"6th-Circle","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V","duration":"Concentration, up to 1 minute","description":"You force a creature into an uncontrollable display of movement, leaving it vulnerable to harm.\n\nSelect one creature within range that you can perceive. That creature is seized by an irrepressible urge to dance in its current location for the duration, moving about with shuffles, foot-taps, and exaggerated flourishes. Any creature immune to the charmed condition cannot be affected by this spell.\n\nWhile dancing, the creature expends all available movement each turn performing these gyrations and cannot move away from its space. The creature suffers disadvantage on all Dexterity saving throws and attack rolls it attempts. Additionally, any creature attacking the dancing target gains advantage on its attack rolls against it. On each of its turns, the dancing creature may use an action to make a Wisdom saving throw. If the save succeeds, the spell's effect immediately ends.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":["Dexterity","Wisdom"],"damageTypes":[],"tags":["Buff","Control","Debuff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Magic Jar","level":6,"circle":"6th-Circle","traditions":["Wyrd"],"school":"Necromancy","isRitual":true,"castingTime":"1 minute","range":"Self","components":"V, S, M (a gem, crystal, or ornamental container worth at least 500 gp)","duration":"Until dispelled","description":"Your soul departs your body and inhabits a magical vessel designated as the spell's material component, leaving your physical form in an inert, unconscious state. While your essence resides within the container, you perceive the world from its location but cannot move or take reactions. Your only available action is to project your soul outward to a distance of up to 100 feet, either to return to your living body and terminate the spell, or to attempt possession of a humanoid creature.\n\nYou may target any humanoid you can see within 100 feet of you for possession, unless that creature is protected by protection from evil and good or a magic circle spell. The target must succeed on a Charisma saving throw or be possessed. If it fails, your soul inhabits the target's body while its soul becomes imprisoned in your container. If it succeeds, the creature repels your possession attempt, and you cannot attempt to possess that same target again for 24 hours.\n\nWhen you successfully possess a creature's body, you command it entirely. Your ability scores and game statistics transform to match the creature's, except you retain your own personality, Intelligence, Wisdom, and Charisma scores. You continue to benefit from your class features. However, if the possessed creature possesses any class levels, you cannot access any of its class features.\n\nThe trapped soul in the container experiences sensory perception through its own senses but cannot move or perform any actions whatsoever.\n\nWhile inhabiting a host body, you may use your action to depart to the container if it remains within 100 feet of you, returning the host creature's soul to its body. Should the host body die while you occupy it, that creature dies and you must make a Charisma saving throw against your own spellcasting save DC. On a success, you return to the container if it is within 100 feet; otherwise, you die.\n\nIf the container is destroyed or the spell ends, your soul instantly returns to your body. Should your body be more than 100 feet distant or dead when you return to it, you die. Should another creature's soul occupy the container when it is destroyed, that soul returns to its body if the body is alive and within 100 feet; if not, that creature dies.\n\nUpon the spell's conclusion, the container is destroyed.","classes":["Warlock","Witch"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Intelligence","Wisdom","Charisma"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Mass Suggestion","level":6,"circle":"6th-Circle","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, M (a snake’s tongue and either a bit of honeycomb or a drop of sweet oil)","duration":"24 hours","description":"You weave enchantment magic to implant suggestions in the minds of multiple creatures at once.\n\nYou propose a specific course of action, expressed in one or two sentences, and magically sway up to twelve creatures you select that you can perceive within range and that can both hear and comprehend your words. Any creature immune to being charmed cannot be affected by this spell. Your suggestion must be framed in language that presents the suggested action as a sensible choice. If you suggest that a creature harm itself—such as driving a blade through its own body, impaling itself, setting itself aflame, or performing any other patently self-destructive act—the spell automatically fails.\n\nEach targeted creature makes a Wisdom saving throw. Those who fail the save will attempt to carry out your suggestion to the fullest extent of their ability. The suggested course of action persists throughout the spell's duration, though if the action can logically conclude sooner, the spell ends once the target completes the task.\n\nYou may also establish conditions that prompt an alternate activity while the spell remains active. For instance, you might suggest that soldiers surrender all their coin to the first beggar they encounter. Should these triggering conditions never occur before the duration expires, that activity never takes place.\n\nIf you or any of your allies inflict damage upon a creature under this spell's influence, the spell ceases to affect that creature.\n\nAt Higher Circles. When you cast this spell using a 7th-circle slot, the duration becomes 10 days. Using an 8th-circle slot extends it to 30 days. Using a 9th-circle slot makes the duration one year and one day.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Move Earth","level":6,"circle":"6th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (an iron blade and a small bag containing a mixture of soils—clay, loam, and sand)","duration":"Concentration, up to 2 hours","description":"You channel your magic to reshape the very ground beneath your feet, molding earth to your will.\n\nWithin range, designate a terrain area measuring no more than 40 feet along each side. For the duration of the spell, you may freely reshape any dirt, sand, or clay found within this region according to your design. You can adjust elevation, create or eliminate trenches, raise or demolish walls, and construct pillars. The magnitude of alterations cannot surpass half the selected area's largest dimension. Should you target a 40-foot square, you might raise a 20-foot pillar, shift elevation by 20 feet in either direction, excavate a 20-foot trench, or combine effects to equivalent measure. These transformations require 10 minutes to fully manifest.\n\nUpon completing each 10-minute interval of concentration, you may redirect the spell's effect toward a fresh terrain section. The gradual nature of this reshaping prevents creatures from being crushed or harmed by the shifting ground. The spell cannot alter natural stone or worked stone structures themselves. Instead, rocky formations and constructed buildings settle into alignment with the revised terrain. Should your reshaping destabilize a structure, it risks collapsing.\n\nThe spell exerts no direct influence over vegetation. Plants rooted in moved earth become displaced alongside their earthen foundation.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Pack Bond","level":6,"circle":"6th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"30 feet","components":"V, S, M (a wooden bowl and a small amount of blood from each participant, which the spell consumes)","duration":"24 hours","description":"You weave together the essence of willing creatures within range, establishing a mystical connection that enhances their coordinated efforts.\n\nEach bound creature gains the following benefits:\n\n• A bound creature may use a bonus action to take the Help action, assisting another bound creature.\n\n• Should a bound creature fall victim to immobilization, paralysis, or unconsciousness, any other bound creature that can perceive it may expend its reaction to move up to its speed toward that creature.\n\n• When a bound creature stands within 5 feet of a target, all remaining bound creatures gain advantage on attack rolls made against that target.\n\n• During any round where surprise would normally occur, if even one bound creature avoids being surprised, all bound creatures within 30 feet of that creature likewise avoid surprise.\n\nIf any bound creature refuses the bond, the spell immediately terminates for that creature alone. The spell persists for its full duration unless a bound creature's death breaks the connection entirely.","classes":["Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Control","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Planar Ally","level":6,"circle":"6th-Circle","traditions":["Divine","Wyrd"],"school":"Conjuration","isRitual":true,"castingTime":"10 minutes","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"By speaking the names and titles of an extraplanar entity, you petition for their intervention and assistance.\n\nYou call upon a being of otherworldly power—whether a deity, a demon lord, or another cosmic force—to send aid. That entity dispatches a Celestial, an Elemental, or a Fiend in its service to manifest in an unoccupied space within range. Should you know a specific creature's name, you may invoke it during the casting to request that particular being, though the entity may choose to send a different creature instead (at the GM's discretion).\n\nUpon arriving, the creature owes you no obligation to act in any manner you desire.\n\nYou may propose a task to the creature in exchange for compensation, but the creature may decline. Tasks can be straightforward (\"carry us across this ravine\" or \"join us in combat\") or elaborate (\"gather intelligence on our foes\" or \"safeguard us within the depths below\"). To arrange terms, you must be able to communicate with the creature.\n\nThe payment takes many forms. A Celestial might seek a substantial gift of coin or magical objects for a sympathetic temple, while a Fiend could demand a living offering or precious treasures. Other creatures may accept service in exchange for a quest you undertake.\n\nAs general pricing: tasks requiring minutes cost 100 gp per minute; tasks lasting hours cost 1,000 gp per hour; tasks spanning days (maximum 10 days) cost 10,000 gp per day. The GM may modify these rates according to the spell's circumstances. If the task aligns with the creature's nature, the price may be reduced by half or waived entirely. Routine tasks usually require only half the standard rate, while perilous tasks may demand greater compensation.\n\nCreatures seldom accept tasks that endanger them.\n\nOnce the creature finishes the task or the agreed service period concludes, it returns to its home plane after briefing you (if the task permits and circumstances allow). Should you and the creature reach no agreement on payment, it immediately departs to its home plane.\n\nYou cannot maintain more than one ally simultaneously.\n\nAfter casting this spell, you cannot call upon the same entity again with this spell until 7 days have elapsed.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Pluck Soul","level":6,"circle":"6th-Circle","traditions":["Arcane","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"150 feet","components":"V, S, M (a gem worth at least 250 gp)","duration":"Until dispelled","description":"You reach out and wrench a humanoid's soul from its physical form, trapping it within a magical container prepared through your spell's material component.\n\nYou make an attempt to extract the soul from a Humanoid within range that you can perceive, forcing it into the container you designated as the spell's material component. When the target creature possesses 40 hit points or fewer, its soul tears free from its body and becomes confined within the container, leaving the body unconscious and unresponsive. The soul persists in this state until you end the spell without requiring an action or until you spend an action to shatter the gem.\n\nShould you shatter the gem, the soul is consumed by you, and you restore your hit points to your maximum. Furthermore, you are cleansed of all diseases currently afflicting you, and any of the following conditions end: blinded, deafened, and poisoned.\n\nShould you end the spell, the soul escapes the container and strives to rejoin its original body. Provided the body remains on the same plane as the soul, the soul immediately returns and reanimates the creature with 1 hit point restored.\n\nIf the body has been killed and destroyed or exists on a different plane of existence than the soul, the soul fades from existence and the creature dies.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Debuff","Healing"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Portentous Dreams","level":6,"circle":"6th-Circle","traditions":["Divine","Wyrd"],"school":"Divination","isRitual":true,"castingTime":"1 hour","range":"Self","components":"V, S, M (rare incense and herbal teas worth","duration":"24 hours","description":"Through this ritual, you attune yourself to receive visions of significance and consequence that manifest in your sleeping mind.\n\nWhen you complete a long rest after performing this ritual, your subconscious processes premonitory impressions that you can consciously access and act upon throughout the following day. During the spell's duration, you gain six instances in which you can focus on an object and perceive the psychic impressions left upon it. Once per round, you may receive one piece of information from the GM concerning the item's ownership history and prior handling. The GM determines whether a particular object retains sufficient psychic resonance to yield coherent impressions.\n\nThe information you obtain may include any of the following examples:\n\n• A mental image of the creature who originally fashioned or owned the item.\n• A mental image of the most recent creature to physically touch the item.\n• A sensed understanding of the emotional condition experienced by the last creature to handle the item.\n• If the item serves or has served as a weapon, a mental image of the last creature it wounded or killed.\n• Details pertaining to the item's historical importance or legacy.\n• The item's designation or true name, should it possess one.\n\nKnowledge acquired through this ritual proves suitable for use as a focus or component for other divination magic, including locate and scrying spells. When employing scrying based on information from this ritual, treat any creature you perceive through that spell as though you had personally encountered them when originally casting scrying.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Psychic"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Prismatic Longbow","level":6,"circle":"6th-Circle","traditions":["Arcane","Divine"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 minute","description":"A prismatic longbow materializes in your hands, its limbs swirling with rainbow light. You must keep both hands free to summon this bow and must employ both hands when drawing and firing it.\n\nUpon the bow's creation, you select one of seven arrow colors and make a ranged spell attack roll against any creature visible to you within 150 feet. When your attack hits, the target sustains 4d8 force damage plus an additional effect based on your chosen arrow color.\n\nOn each subsequent turn while the spell persists, you may spend an action to pick a different arrow color and make a ranged spell attack against a creature within 150 feet.\n\nRed. The target takes an additional 4d8 fire damage.\nOrange. The target takes an additional 4d8 acid damage.\nYellow. The target takes an additional 4d8 lightning damage.\nGreen. The target takes an additional 4d8 poison damage.\nBlue. The target takes an additional 4d8 cold damage.\nIndigo. The target must make a CON saving throw. On a failure, it begins turning to stone and becomes restrained. At the end of its next turn, the restrained creature must repeat this save; a failure results in petrification while a success ends the effect. Any petrification lasts 1 minute or until the creature benefits from greater restoration or similar magic.\nViolet. The target must make a CHA saving throw. On a failure, it is banished to a harmless demiplane where it remains incapacitated. After 1 minute, the target returns to the space it vacated or the nearest unoccupied space if its original location is taken.\n\nEach arrow color fires only once; selecting an arrow exhausts that color for the spell's duration. When all seven colors have been used, the bow immediately vanishes. Otherwise, it persists for the full duration.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Constitution","Charisma"],"damageTypes":["Acid","Cold","Fire","Force","Lightning","Poison"],"tags":["Control","Damage","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Programmed Illusion","level":6,"circle":"6th-Circle","traditions":["Arcane"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (a bit of fleece and jade worth at least 25 gp)","duration":"Until dispelled","description":"You weave together a dormant illusion that manifests only when specific conditions are met. You conjure the image of an object, creature, or other visible phenomenon within range, but it remains hidden from perception until your designated trigger activates it. The illusion cannot exceed a 30-foot cube in size, and you establish its behavior and acoustic properties at the moment of casting. The illusory performance can persist for up to 5 minutes.\n\nUpon the occurrence of your chosen condition, the illusion materializes and executes its predetermined routine. Once this performance concludes, the illusion vanishes and enters a dormant state lasting 10 minutes, after which it becomes capable of activating again.\n\nYour triggering condition may be broad or precise as you determine, but it must depend on visual or audible phenomena occurring within 30 feet of the spell's location. You might, for instance, fashion an illusion of yourself that appears to discourage those approaching a trapped door, or configure the trigger to respond only when a specific word or phrase is spoken aloud.\n\nAny attempt to physically interact with the image exposes its false nature, as solid matter passes through it unimpeded. A creature dedicating its action to scrutinize the image can identify it as illusory through a successful Intelligence (Investigation) check against your spell save DC. Once a creature pierces this deception and recognizes the illusion, it gains the ability to see past the image entirely, and any sounds the illusion produces become distinctly hollow and unreal to that creature's perception.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Intelligence"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Pronouncement of Doom","level":6,"circle":"6th-Circle","traditions":["Divine","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"150 feet","components":"V, S, M (a bell or gong)","duration":"Concentration, up to 1 minute","description":"You speak a terrible curse upon your foes, weakening their martial prowess and exposing their vulnerabilities. Select up to eight creatures within range that are visible to you. Each targeted creature must succeed on a Charisma saving throw or suffer the spell's effects: while the spell persists, that creature rolls attack checks with disadvantage, and any creature attacking it rolls with advantage.\n\nA remove curse spell cast upon an affected target immediately dispels this spell's effects.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":[],"tags":["Buff","Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Restore Item","level":6,"circle":"6th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (a diamond worth at least 250 gp, which the spell consumes)","duration":"Instantaneous","description":"You channel magical essence through yourself to replenish a magic item's spent power. Choose a magic item within arm's reach that expends charges to function. That item regains 1d3 charges. The item cannot exceed its maximum charge capacity, and any charges that would surpass this limit fade away without consequence—unless the item possesses a retributive strike ability. Should a retributive strike item be overcharged beyond its limit, it detonates immediately as though you had activated its retributive strike, triggering all associated effects.\n\nAt Higher Circles. When you gain access to 7th-circle spell slots, this ritual's effectiveness increases. For each circle of spell access you possess above 6th, you restore 1 additional charge along with the base 1d3.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Righteous Fervor","level":6,"circle":"6th-Circle","traditions":["Divine"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (your holy symbol)","duration":"Concentration, up to 1 minute","description":"You kindle within your allies a passionate devotion that steels them against their foes.\n\nSelect any number of creatures within range. Until the spell concludes, each chosen creature gains advantage on saving throws made against being charmed or frightened. Any targeted creature already suffering from the charmed condition, the frightened condition, or both may immediately attempt a fresh saving throw against each such effect, ending it upon success. Whenever a target makes an attack roll while the spell persists, it may roll a d4 and add the result to that attack roll. When a target hits with an attack, it adds your WIS modifier to the damage dealt.\n\nShould a target be brought to 0 hit points before the spell ends, that creature is restored to 1 hit point instead. Each target benefits from this protective effect only once per casting.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Control","Debuff","Healing"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Sunbeam","level":6,"circle":"6th-Circle","traditions":["Divine","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self (60-foot line)","components":"V, S, M (a magnifying glass)","duration":"Concentration, up to 1 minute","description":"Clutching a magnifying glass, you channel pure sunlight into a devastating ray of radiant energy.\n\nA brilliant beam of light erupts from your hand in a straight line 5 feet wide and 60 feet long. Each creature caught within this line must succeed on a Constitution saving throw or suffer the beam's full force. Those who fail take 6d8 radiant damage and become blinded until the start of your next turn. Creatures that succeed on the save take half damage and avoid the blinding effect. Undead creatures make this saving throw at disadvantage.\n\nOn each of your subsequent turns while the spell persists, you may use your action to project a new beam of radiance along a different path.\n\nFor the spell's duration, your hand radiates a point of brilliant light. This luminous radiance casts bright light in a 30-foot radius around you, with dim light extending an additional 30 feet beyond that. The light produced counts as sunlight.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Radiant"],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Transport Via Plants","level":6,"circle":"6th-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"10 feet","components":"V, S","duration":"1 round","description":"You establish a magical connection between a Large or larger nonmagical plant you can reach and another plant elsewhere on the same plane of existence, provided you have previously seen or touched that destination plant. The connection functions as a traversable passage: any creature may enter the origin plant and emerge from the destination plant by expending 5 feet of movement. This spell cannot affect plants of the Plant creature type. The magical link persists for the spell's duration.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Summon"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"True Seeing","level":6,"circle":"6th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (ointment made from powdered mushrooms and saffron worth 25 gp, which the spell consumes)","duration":"1 hour","description":"You make contact with a creature that accepts your touch, bestowing upon it extraordinary visual clarity. For the spell's duration, the touched creature perceives reality with perfect accuracy, seeing through illusions, magical deceptions, and dimensional obscurements within 120 feet of itself.\n\nWhen you channel this spell through a spell slot of 7th circle or above, you may extend this gift to additional willing creatures. For each circle of the slot beyond the 6th, you grant one more creature the same truesight ability.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Void Bubble","level":6,"circle":"6th-Circle","traditions":["Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"150 feet","components":"V, S","duration":"1 minute","description":"You conjure an expanding sphere of frigid, lightless void that consumes all illumination and saps the vitality of those caught within it.\n\nA 30-foot-radius sphere of impenetrable magical darkness materializes at a point within range that you can perceive. This darkness flows freely around obstacles and barriers. Even creatures blessed with darkvision cannot pierce its depths, and ordinary light proves unable to penetrate or dispel it.\n\nWhenever a creature enters this sphere for the first time on a turn or begins its turn there, that creature must succeed on a Wisdom saving throw. If it fails, it suffers 4d8 necrotic damage and 4d8 cold damage, and its movement speed becomes halved until the start of its next turn. If it succeeds, it takes half damage and experiences no reduction to its speed.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":["Cold","Necrotic"],"tags":["Damage","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Wall Of Ice","level":6,"circle":"6th-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (a small piece of quartz)","duration":"Concentration, up to 10 minutes","description":"You conjure a rigid barrier of glacial ice upon a solid surface within range. This frozen construction can take the form of a hemispherical dome or sphere with a radius up to 10 feet, alternatively, you may fashion a flat plane composed of ten contiguous 10-foot-square sections. Regardless of its shape, the wall measures 1 foot in thickness and persists for the duration.\n\nWhen the wall materializes, any creature whose space it occupies is shunted to either side of the wall (your choice) and must succeed on a Dexterity save or take 10d6 cold damage, taking half damage on a successful save.\n\nThe wall functions as a destructible object with AC 12 and 30 HP per 10-foot section. It is vulnerable to fire damage. When a 10-foot section is reduced to 0 HP, that section is obliterated, leaving behind a lingering zone of frigid atmosphere in its place. The first time a creature enters this frigid air on a turn, it must make a Constitution save, taking 5d6 cold damage on a failure or half that damage on a success.\n\nAt Higher Circles. When you cast this spell using a spell slot of 7th circle or higher, the initial damage increases by 2d6 and the frigid air damage increases by 1d6 for each slot level above 6th.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity","Constitution"],"damageTypes":["Cold","Fire"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Wall Of Thorns","level":6,"circle":"6th-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (a handful of thorns)","duration":"Concentration, up to 10 minutes","description":"You conjure a dense barrier of thorny vegetation that manifests as either a linear wall or circular enclosure. This formidable tangle of sharp, woody growth emerges on a solid surface within range and persists throughout the spell's duration. You may shape it as a wall extending up to 60 feet in length, 10 feet in height, and 5 feet in thickness, or alternatively as a circular formation with a 20-foot diameter, reaching up to 20 feet high and 5 feet thick. The wall obstructs vision.\n\nUpon the wall's creation, every creature occupying or entering its space must succeed at a Dexterity save or suffer 7d8 piercing damage, taking only half this damage on a successful save.\n\nPassage through the wall is possible but agonizing and arduous. For each foot of movement a creature travels through the thorny barrier, it consumes 4 feet of its available movement. Additionally, whenever a creature enters the wall for the first time during a turn or remains within it at a turn's end, that creature must make a Dexterity save. A failed save inflicts 7d8 slashing damage; success reduces this to half damage.\n\nAt Higher Circles. When you cast this spell using a spell slot of 7th circle or higher, both damage amounts increase by 1d8 for each slot level above 6th.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Piercing","Slashing"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Ward Dwelling","level":6,"circle":"6th-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 hour","range":"50 feet","components":"V, S, M (a vial of holy water, which the spell consumes)","duration":"3 days","description":"You consecrate a building and shield those who reside within it.\n\nYou bestow divine favor upon a structure, establishing sacred wards that protect the building itself, its permanent inhabitants, and any individuals granted permission to enter. The spell encompasses a building with up to 3,600 square feet per level, spanning no more than three levels. The protection encompasses all creatures who consider the building their home as well as any guests invited inside at the time of casting—including those granted entry before the spell's duration concludes. Throughout the spell's effect, the structure gains resistance to fire and lightning damage.\n\nAny doors and windows gain an additional 5 to their DC when someone attempts to force them open or pick their locks.\n\nAll creatures under the spell's protection benefit from the effects of a protection from evil and good spell (see Player's Guide) while present inside the building. Whenever a protected creature receives healing magic, that creature rolls twice for the healing and applies the higher result to determine the total hit points restored.","classes":["Cleric","Paladin"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Fire","Lightning"],"tags":["Damage","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Water Sentinel","level":6,"circle":"6th-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You conjure a sentient water elemental in the form of a 5-foot-diameter sphere of swirling water that materializes in an unoccupied space within range that you can perceive. The GM controls the creature using standard water elemental statistics.\n\nThroughout the spell's duration, the water sentinel remains loyal to you and your allies. During combat encounters, it acts on your initiative count and takes its turn immediately following yours. It follows any spoken commands you provide without requiring any action from you to issue them.\n\nShould you give the water sentinel no commands, it acts defensively against any hostile creatures but otherwise remains inert.\n\nBeyond the capabilities of a typical water elemental, the sentinel gains access to additional action options. When you first cast this spell, the sentinel immediately uses one of these actions. On each of its subsequent turns, it may choose to use one of the following actions:\n\n• Overwhelm. When the sentinel's turn concludes while it occupies the same space as a creature through its Water Form trait, it can apply its Whelm trait without first establishing a grapple and ignoring any recharge limitations. The affected creature experiences the full effects of Whelm but can continue breathing and speaking if it succeeds on a Constitution save against your spell save DC.\n\n• Water Impact. The sentinel hurls a forceful blast of water toward a creature within 30 feet. The target makes a Dexterity save. If it fails, it suffers 6d10 bludgeoning damage and moves 10 feet in a direction you choose. If it succeeds, it takes half damage and doesn't move.\n\n• Water Jet. The sentinel projects a high-pressure stream of water at a creature within 30 feet. The target makes a Dexterity save. If it fails, it takes 6d10 cold damage and is driven 20 feet directly away from the sentinel. If it succeeds, it takes half damage and isn't pushed.\n\nAny nonmagical fires are snuffed out wherever the water sentinel ends its turn.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity","Constitution"],"damageTypes":["Bludgeoning","Cold"],"tags":["Damage","Summon"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Wind Walk","level":6,"circle":"6th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (fire and rainwater)","duration":"8 hours","description":"You grant yourself and up to ten willing creatures within range the ability to transform into wispy, cloud-like vapors. All affected creatures assume this gaseous form for the duration, gaining a flying speed of 300 feet and becoming resistant to damage dealt by nonmagical attacks. In this state, creatures may only use the Dash action or choose to return to their corporeal form.\n\nTransforming back to normal shape takes 1 minute, during which the creature becomes incapacitated and cannot move. For the spell's full duration, a creature may shift between cloud form and corporeal form repeatedly, with each transformation requiring the standard 1-minute transition period.\n\nShould the spell terminate while a creature remains aloft in cloud form, that creature descends at a rate of 60 feet per round. This descent continues for up to 1 minute until the creature comes to rest safely on solid ground. If the creature has not landed within that 1-minute window, it falls the remaining distance unimpeded.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Control","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Word Of Recall","level":6,"circle":"6th-Circle","traditions":["Divine"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"5 feet","components":"V","duration":"Instantaneous","description":"You and up to five willing allies standing within 5 feet of you are instantly transported to a sanctuary you have previously established. All teleported creatures materialize in the nearest available space to your designated sanctuary location. This spell fails entirely if you have not yet established a sanctuary.\n\nTo create a sanctuary, you must cast this spell within a location that is consecrated to or deeply connected with your deity. Casting the spell in a place lacking such dedication produces no effect and does not establish a sanctuary.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Wreath of Flames","level":6,"circle":"6th-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 hour","description":"A cloak of roiling flames materializes around your form, shielding you with intense heat. You gain immunity to fire damage and resistance to cold damage. Any creature within 5 feet of you that touches you or makes a melee attack against you suffers 6d8 fire damage and must succeed on a Dexterity save or become engulfed in flames. A burning creature takes 1d8 fire damage at the start of each of its turns unless it uses an action to extinguish the fire. If a creature grapples you or is grappled by you at the start of its turn, it takes 4d8 fire damage. You can spend an action to touch flammable objects and set them ablaze.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Cold","Fire"],"tags":["Buff","Control","Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Arcane Sword","level":7,"circle":"7th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a miniature platinum sword with a grip and pommel of copper and zinc worth 250 gp)","duration":"Concentration, up to 1 minute","description":"A manifestation of pure magical force takes the shape of a blade under your command. When it materializes, you direct it to strike twice, targeting any creatures you choose that stand within 5 feet of the weapon. Each attack is resolved as a melee spell attack, and a successful strike inflicts 3d10 + your spellcasting modifier force damage to its target. For as long as the spell persists, you may spend a bonus action during your turn to relocate the sword up to 30 feet away to any unoccupied location within your sight, whereupon it immediately attempts to strike again against any creatures positioned within 5 feet of its new location, using the same attack and damage mechanics.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Ashes on the Tongue","level":7,"circle":"7th-Circle","traditions":["Arcane","Wyrd"],"school":"Necromancy","isRitual":true,"castingTime":"10 minutes","range":"500 feet","components":"V, S, M (a piece of bread, charred to ashes)","duration":"Permanent","description":"You afflict a creature with an unending hunger that no meal can satisfy.\n\nYou place a curse upon a creature you are acquainted with and can reach. The cursed creature finds no nourishment in anything it consumes and experiences no satisfaction from eating. Beginning ten minutes after you complete the spell, the target becomes plagued by relentless, persistent hunger and ceases to gain sustenance from food. It enters a state of starvation (consult Starvation and Dehydration in Chapter 6 of the Player's Guide).\n\nThe curse persists indefinitely until the creature perishes, until a remove curse spell (detailed in the Player's Guide) is cast upon it, or until you expend an action to lift the curse yourself.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Blinding Revelation","level":7,"circle":"7th-Circle","traditions":["Divine","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"40 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You conjure an intense, brilliant radiance that emanates outward in a 40-foot radius centered on you. Every hostile creature caught within must succeed on a Dexterity save or suffer blindness until the end of its next turn, while simultaneously becoming wreathed in a luminous aura of a color you designate. This colored light emanates dim illumination in a 10-foot radius and persists for the spell's duration, granting advantage on attack rolls made against the outlined creature by any attacker who can see it.\n\nAny illusion magic of 7th circle or lower active within the radius instantly unravels and dissipates. Should a target be inhabiting a form that differs from its true appearance—whether through shapeshifting ability, polymorph magic, or similar transformation—you make an ability check using your spellcasting ability modifier. The check's DC is determined by adding 10 to either the spell's circle or the creature's CR, whichever applies. If your check succeeds, the target reverts to its authentic form and loses the capacity to alter its shape again for the duration of this spell.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":[],"tags":["Buff","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Breadcrumb Trail","level":7,"circle":"7th-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":true,"castingTime":"1 minute","range":"Touch","components":"V, S, M (handful of seasoned breadcrumbs)","duration":"24 hours","description":"You establish a magical path connecting your current position to a familiar destination on your current plane, marked by enchanted breadcrumbs perceptible only to you and creatures you choose to reveal it to. Should your destination shift its position after you cast this spell, the trail remains fixed to its original location and does not follow. The spell terminates and the trail vanishes if you stray more than 500 feet from the marked path while traversing it. As you progress along the trail, the sections behind you become visible to all creatures. Any c
