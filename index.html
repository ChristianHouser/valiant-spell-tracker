n the spell concludes, the weather gradually normalizes to its previous state.\n\nPRECIPITATION\nStage 1: Clear\nStage 2: Overcast or ground fog\nStage 3: Rain, hail, or snow\nStage 4: Torrential precipitation (see Hazards in Chapter 6)\n\nTEMPERATURE\nStage 1: Extreme heat (see Hazards in Chapter 6)\nStage 2: Hot\nStage 3: Warm\nStage 4: Cool\nStage 5: Cold\nStage 6: Extreme cold (see Hazards in Chapter 6)\n\nWIND\nStage 1: Calm\nStage 2: Moderate wind\nStage 3: Strong wind\nStage 4: Gale winds (see Hazards in Chapter 6)","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Cold"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Crawling Darkness","level":8,"circle":"8th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You weave together strands of shadow and void, creating a tangible mass of darkness that inflicts harm and ensnares those caught within it.\n\nYou manifest a roiling expanse of shadowy substance that you direct to move in a location of your choosing. This darkness occupies a total of up to three 10-foot cubes within range. The shadows possess a movement speed of 20 feet and advance each round following the end of your turn, bypassing difficult terrain without impediment. The shadowy mass can traverse vertical surfaces and move along ceilings in any orientation.\n\nWhenever the shadows advance into an area where a creature stands, that creature must succeed on a Constitution save or suffer the consequences of failure: it takes 6d6 necrotic damage and becomes restrained. A successful save reduces the damage by half and prevents the restrained condition. Additionally, any creature that begins its turn within the shadowy mass must make a Constitution save, taking 6d6 necrotic damage on a failed save, or half that amount on a successful one.\n\nA restrained creature is pulled along with the shadows during its own turn and remains restrained for as long as the darkness occupies any portion of its space. On its turn, a creature can attempt a Strength check against your spell save DC to break free from the restrained condition.\n\nThe space occupied by this spell functions as difficult terrain for all creatures.\n\nWithin the shadowy area, sunlight and bright light dim to dim light, while dim light reduces to complete darkness.\n\nRadiant damage can erode portions of the spell's effect. Any attack or effect that targets the shadows and deals radiant damage is guaranteed to hit. For each 12 radiant damage the shadows sustain, one 5-foot cube of the mass is destroyed. Radiant damage totaling less than 12 from a single source leaves the mass unaffected.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Strength","Constitution"],"damageTypes":["Necrotic","Radiant"],"tags":["Control","Damage","Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Demiplane","level":8,"circle":"8th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"S","duration":"1 hour","description":"You open a gateway into a pocket dimension of your own making.\n\nA shadowy portal materializes on any flat solid surface within range that you can perceive. This portal accommodates Medium-sized creatures passing through without obstruction. Beyond the threshold lies a demiplane—a barren chamber spanning 30 feet along each axis, constructed from wood or stone. When this spell's duration expires, the portal vanishes, and any creatures or objects trapped within the demiplane remain imprisoned there, as the passage seals from both sides.\n\nEach new casting allows you to either establish an entirely new demiplane or anchor the shadowy portal to a demiplane you previously created. Additionally, if you possess knowledge of another creature's demiplane created by this spell—specifically its nature and contents—you may direct the shadowy portal to connect to that demiplane instead.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["S"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Earth Clash","level":8,"circle":"8th-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (two pebbles)","duration":"Instantaneous","description":"You summon two colossal stones to collide catastrophically along a path, crushing everything caught between them.\n\nWhen you cast this spell, two Huge boulders (each 15 feet × 15 feet) manifest in unoccupied spaces within range, positioned up to 40 feet apart. These boulders immediately converge toward the midpoint between them. Every creature positioned in either boulder's trajectory must succeed on a Dexterity save or suffer the consequences of the collision.\n\nA creature that fails its save takes 10d12 bludgeoning damage. If that creature is Huge or smaller, it becomes stunned for 1 minute. A creature that succeeds on its save takes half damage and, if Huge or smaller, becomes stunned for only 1 round instead. A stunned creature may attempt a Constitution save at the end of each of its turns, ending the stunned condition on a success.\n\nObjects and structures in the boulders' paths take double damage. Should a boulder fail to destroy a structure it strikes, the boulder ceases its movement at that point.\n\nAt Higher Circles: When you cast this spell using a 9th circle spell slot, the boulders increase to Gargantuan size (each 20 feet × 20 feet) and may separate up to 60 feet apart before colliding. The damage increases to 15d12 bludgeoning damage, and the stun effect can now affect Gargantuan creatures as well.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Dexterity","Constitution"],"damageTypes":["Bludgeoning"],"tags":["Control","Damage"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Earthquake","level":8,"circle":"8th-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"500 feet (100-foot-radius circle)","components":"V, S, M (a pinch of dirt, a piece of rock, and a lump of clay)","duration":"Concentration, up to 1 minute","description":"You direct the earth itself to convulse violently, tearing open the ground, destroying structures, and injuring all creatures caught in the upheaval.\n\nAt a point on the ground within range that you can see, you trigger a powerful seismic event. For the spell's duration, intense tremors wrack the earth across a 100-foot-radius circle centered on that point, affecting all creatures and structures that touch the ground within this area.\n\nTerrain in the affected zone becomes difficult ground. Any creature on the ground currently maintaining concentration must attempt a Constitution save. If the save fails, that creature loses concentration.\n\nWhen you initially cast the spell and again at the end of each of your turns while you concentrate on it, each creature standing on the ground in the area must make a Dexterity save. Those who fail are knocked prone.\n\nThe GM may introduce additional effects based on the specific terrain present in the area.\n\nFissures. Starting at the beginning of your next turn after casting, the ground tears open. 1d6 fissures form at locations the GM selects. Each fissure measures 1d10 × 10 feet in depth, 10 feet across, and runs completely across the spell's area. When a fissure opens at a creature's location, that creature must succeed on a Dexterity save or fall inside. A creature that saves successfully moves with the fissure's opening edge. Any structure positioned over an opening fissure is automatically destroyed.\n\nStructures. Each structure touching the ground takes 50 bludgeoning damage when you cast the spell and again at the start of each of your turns until the spell concludes. When a structure is reduced to 0 HP, it collapses and endangers nearby creatures. Any creature within half the structure's height must succeed on a Dexterity save. On failure, it takes 5d6 bludgeoning damage, falls prone, and becomes trapped under rubble, requiring a DC 20 Strength (Athletics) check as an action to pull free. The GM may adjust this DC based on the rubble type. On success, the creature takes half damage and avoids falling prone or being buried.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength","Dexterity","Constitution"],"damageTypes":["Bludgeoning"],"tags":["Control","Damage","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Feeblemind","level":8,"circle":"8th-Circle","traditions":["Arcane"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"150 feet","components":"V, M (a handful of clay, crystal, glass, or mineral spheres)","duration":"Instantaneous","description":"You assault the intellect of a creature you can perceive within range, seeking to obliterate its reasoning and sense of self. The target suffers 4d6 psychic damage and must succeed on an Intelligence saving throw or have its Intelligence and Charisma scores reduced to 1 (−5). A creature reduced this way cannot cast spells, operate magical items, comprehend language, or produce intelligible communication. It retains enough awareness to recognize its allies, move alongside them, and provide them defense.\n\nThe creature can attempt another Intelligence saving throw at the end of each 30-day period, ending the spell's effects on itself if successful. The spells greater restoration, heal, or wish can also terminate the spell's effects.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","M"],"saves":["Intelligence","Charisma"],"damageTypes":["Psychic"],"tags":["Damage","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Geyser Surge","level":8,"circle":"8th-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (A pebble taken from a flowing river)","duration":"Instantaneous","description":"The earth erupts violently, releasing a towering pillar of superheated water and scalding steam toward the sky.\n\nYou summon a cylinder of pressurized water measuring 30 feet in radius and 60 feet tall at a point on any surface within range that you can perceive. This cylinder can manifest on vertical surfaces as well as horizontal ones. Each creature caught within the cylinder must attempt a Dexterity save. Those who fail the save suffer 6d12 bludgeoning damage and 6d12 fire damage, and are thrust 60 feet upward into the air. Those who succeed on the save take half damage and remain unaffected by the upward force. Unattended items and objects in the cylinder are launched 60 feet skyward. However, structures and items exceeding 1 ton in weight resist the launching effect, though they still sustain full damage from the surge.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Bludgeoning","Fire"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Glibness","level":8,"circle":"8th-Circle","traditions":["Arcane","Divine"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Concentration, up to 1 hour","description":"Your words gain an almost magical persuasiveness, causing those around you to instinctively believe in your sincerity and good intent.\n\nFor the duration, whenever you make a Charisma ability check or Charisma saving throw, you may treat the result of your roll as a 15 instead.\n\nFurthermore, divination magic and enchantments designed to discern falsehood cannot reveal your deceptions—any such magic perceives your statements as entirely truthful, regardless of their actual veracity.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":["Charisma"],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Greater Dominate","level":8,"circle":"8th-Circle","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 hour","description":"You endeavor to enchant a creature within your sight, forging a mental bond that grants you dominion over its behavior.\n\nYou target any creature you can see at range. Creatures with immunity to the charmed condition are unaffected by this spell. The target must make a Wisdom save; on a failure, it becomes charmed by you for the duration. It gains advantage on this save if you or your allies are engaged in combat with it.\n\nWhile charmed, you establish a telepathic connection with the creature so long as you both inhabit the same plane of existence. You may transmit commands through this link without expending an action, provided you remain conscious. The creature obeys your instructions to the best of its ability. You can direct it with broad commands such as \"attack that creature,\" \"run over there,\" or \"fetch that object.\" Should the creature complete your order without receiving new direction, it acts to defend itself and preserve its own well-being.\n\nAs an action, you can assume absolute control of the target. Until the end of your next turn, the creature performs only actions you dictate and refrains from any action you forbid.\n\nDuring this period of total control, you may compel the creature to use a reaction, though doing so requires you to expend your own reaction as well.\n\nWhenever the target suffers damage, it makes another Wisdom save against the spell. A successful save ends the spell.\n\nAt Higher Circles: When you cast this spell using a 9th-circle spell slot, the duration becomes concentration, up to 8 hours.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Control","Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Greater Personal Time Fold","level":8,"circle":"8th-Circle","traditions":["Wyrd"],"school":"Transmutation","isRitual":true,"castingTime":"1 minute","range":"Self","components":"V, S, M (hourglass)","duration":"8 hours","description":"You fold space and time around yourself, creating an isolated pocket dimension. This demiplane manifests as a 10-foot-square chamber furnished with a desk and bed, accessible only through a lockable, invisible door. You may occupy this space for up to 8 hours, during which you can complete a long rest or engage in other solitary pursuits using only items you carried inside with you. If any other creature crosses the threshold, the spell immediately terminates and grants you no benefit.\n\nWhile you rest within, external observers perceive only 1 minute passing before you reappear in your original location—or in the nearest unoccupied space if that spot is blocked. Upon the spell's conclusion, whether you spent the full 8 hours inside or departed early, the demiplane collapses and releases any items you left behind, which materialize beside you.\n\nThis temporal manipulation exacts a steep biological cost: you age 1 week for every hour spent within the demiplane. Additionally, should you regain spell slots while the spell is active, you cannot recover the specific spell slot consumed to cast this spell.","classes":["Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Greater Ward Dwelling","level":8,"circle":"8th-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":true,"castingTime":"1 hour","range":"100 feet","components":"V, S, M (a vial of holy water, which the spell consumes)","duration":"14 days","description":"You consecrate a structure with divine favor, shielding both the building itself and those within it.\n\nYou bestow a protective enchantment upon a building, its inhabitants, and any guests they have invited inside. The spell encompasses a structure spanning up to 10,000 square feet per floor, extending three floors both above and below ground level. It protects all creatures who consider the building their residence as well as any invited guests present when you cast the spell, including those invited at any point before the spell's duration ends.\n\nFor the spell's duration, the building becomes immune to fire damage and gains resistance to lightning and thunder damage. Every door, window, and other opening leading into or throughout the building functions as though under an arcane lock spell to anyone lacking resident or invited guest status.\n\nAll protected creatures gain the benefits of a protection from evil and good spell while they remain inside the building. Whenever an affected creature receives healing magic, they restore the maximum possible hit points instead of the normal amount. Similarly, any spell or effect granting temporary hit points grants the maximum amount available rather than a lesser quantity.","classes":["Cleric","Paladin"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Fire","Lightning","Thunder"],"tags":["Damage","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Holy Aura","level":8,"circle":"8th-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (a tiny reliquary worth at least 1,000 gp containing a sacred relic, such as a scrap of cloth from a saint’s robe)","duration":"Concentration, up to 1 minute","description":"Sacred radiance emanates from your form, establishing a protective zone extending 30 feet in all directions. You select which creatures within this radius receive the spell's blessing when you cast it; these chosen allies become sources of faint illumination in a 5-foot radius and gain advantage on all saving throws. Any creature attempting to strike these protected allies suffers disadvantage on its attack roll for the duration. Furthermore, whenever a Fiend or Undead successfully strikes one of your protected allies in melee combat, the aura flares with blinding luminescence. That attacker must make a Constitution saving throw or suffer blindness until the spell ends.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":[],"tags":["Buff","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Incendiary Cloud","level":8,"circle":"8th-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"150 feet (20-foot-radius sphere)","components":"V, S","duration":"Concentration, up to 1 minute","description":"You manifest a billowing inferno that consumes everything in its path.\n\nA roiling mass of ash and flame materializes in a 20-foot-radius sphere at a location you designate within range. The cloud winds through obstacles and blocks vision entirely. It persists for the spell's duration or until dispersed by wind of moderate strength or greater (at least 10 miles per hour).\n\nUpon the cloud's formation, all creatures within it must attempt a Dexterity save. Those who fail take 10d8 fire damage, while those who succeed take half damage. Creatures must make this save again whenever they first enter the cloud's area during a turn or whenever their turn ends while they remain inside it.\n\nThe cloud drifts 10 feet in a direction of your choosing, moving directly away from you, at the start of each of your turns.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Fire"],"tags":["Damage","Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Incite Strife","level":8,"circle":"8th-Circle","traditions":["Arcane"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a shard of broken glass or a twisted, rusted nail)","duration":"1 hour","description":"You force a creature to fixate on another as the cause of their troubles.\n\nWhen you cast this spell, select a target creature within range that understands a language. That creature must make a Wisdom saving throw. If it succeeds, it resists the spell's effects and becomes immune to this spell for 24 hours. If it fails, the creature selects another creature not yet affected by this spell and becomes convinced that creature is responsible for its recent misfortunes. The target then verbally assails this scapegoat with curses, accusations, and fabricated allegations.\n\nThe newly blamed creature must then attempt its own Wisdom saving throw. Should it fail, the spell's influence transfers to this creature, which must likewise identify a new target not yet under the spell's influence to accuse and disparage.\n\nThis chain reaction persists until either a creature succeeds on its saving throw or ten creatures have fallen under the spell's influence. You remain aware of how many creatures are affected, though you gain no information regarding their identities or locations.\n\nOnce the cascade concludes, all affected creatures perceive one another as enemies. Each affected creature must spend its turn advancing toward at least one other affected creature and attacking it if able. Such attacks are made with advantage. After the spell's effects fade, affected creatures retain no memory of their anger or the reason they fought.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Maze","level":8,"circle":"8th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 10 minutes","description":"You thrust a creature you can perceive within range into a twisting labyrinth existing on a separate plane. That creature stays trapped within this maze for the spell's duration unless it finds a way out. Each turn, the creature may spend its action trying to navigate free. To do so, it must succeed on an Intelligence check against a DC of 20. A successful check allows the creature to break free and terminate the spell immediately. When the spell concludes, whether through escape or duration's end, the creature returns to the location it originally occupied. If another creature or object now fills that space, it instead materializes in the nearest available empty space.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Intelligence"],"damageTypes":[],"tags":["Control"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Mind Blank","level":8,"circle":"8th-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"24 hours","description":"A protective enchantment surrounds a willing creature you make contact with, rendering it immune to psychic harm until the magic fades. The warded creature cannot be affected by abilities that detect emotions or penetrate thoughts, cannot be targeted by divination magic, and cannot be charmed. This protection is so thorough that it even thwarts wish spells and other effects of comparable strength that seek to influence the creature's mind or uncover secrets about it.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Psychic"],"tags":["Control","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Music of the Spheres","level":8,"circle":"8th-Circle","traditions":["Divine","Wyrd"],"school":"Evocation","isRitual":true,"castingTime":"1 minute","range":"Self","components":"S, V","duration":"1 hour","description":"You project an otherworldly symphony that radiates outward from your position, filling a 60-foot radius with cosmic harmonies for the spell's duration. A creature unable to hear you is unaffected by this spell entirely.\n\nWhen you first cast the spell, you choose which of the following modes the music embodies. You may spend a bonus action to switch to a different mode at any time.\n\nCacophonia. At the start of its turn, one creature of your choice within the aura must succeed on a Constitution saving throw or take 4d8 psychic damage and become stunned until the start of its next turn. A successful save reduces the damage by half and prevents the stunning effect.\n\nDiscordia. At the start of its turn, one creature of your choice within the aura must succeed on a Wisdom saving throw or be forced to use its action either to attack one of its allies or cast a spell targeting one of its allies; if it fails to do so, it takes 4d4 psychic damage and cannot take any other actions that turn.\n\nHarmonia. Each friendly creature of your choice within the aura gains advantage on attack rolls made against a target you designate, provided that at least one of your allies stands within 5 feet of that target and that ally is not incapacitated.\n\nMelodia. Each friendly creature of your choice within the aura gains 2d10 temporary hit points at the start of each of its turns.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["S"],"saves":["Constitution","Wisdom"],"damageTypes":["Psychic"],"tags":["Buff","Control","Damage","Healing"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Nine Lives","level":8,"circle":"8th-Circle","traditions":["Primordial"],"school":"Necromancy","isRitual":true,"castingTime":"1 minute","range":"Self","components":"V, S, M (cat’s whisker coated in platinum worth at least 500 gp)","duration":"24 hours","description":"A protective aura of resilience settles over you, making you exceptionally resistant to harm and debilitation.\n\nThis spell provides you with 9 charges that persist throughout its duration, each usable to stave off death or suffering. When damage would bring your hit points to 0, you may spend 1 charge to remain at 1 hit point instead. At the start of your turn, if you are suffering from an incapacitating or poisoning effect, you can expend 1 charge to rid yourself of it while conscious, or expend 2 charges to do so while unconscious—neither action requires a turn action. For effects that grant no saving throw to break free from them, you may expend 1 charge to terminate them.\n\nYou cannot cast this spell again until you finish a long rest. If you perform this ritual while the previous casting still has duration remaining, the earlier spell's effects cease immediately.","classes":["Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Overgrowth","level":8,"circle":"8th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"300 feet","components":"V, M (a leaf)","duration":"Concentration, up to 1 minute","description":"Thick, gnarled vines erupt from the earth within a 60-foot radius centered on a point you designate. Throughout the spell's duration, this overgrown region becomes difficult terrain for all who traverse it. Any creature present when the spell takes effect must attempt a Strength saving throw. Those who fail take 8d6 bludgeoning damage and become restrained as the vines coil around them until the spell ends. Successful saves reduce the damage by half and prevent the restrained condition entirely.\n\nRestrained creatures may make another Strength saving throw at the end of each of their turns, freeing themselves on a success. Additionally, any creature that moves into the area or begins its turn there must make this same saving throw, facing the same damage and restrained effects described above.\n\nThe encroaching vegetation also engulfs nearby structures and objects, inflicting 8d6 bludgeoning damage to them each round on your turn for the spell's duration.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","M"],"saves":["Strength"],"damageTypes":["Bludgeoning"],"tags":["Control","Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Pierce the Veil","level":8,"circle":"8th-Circle","traditions":["Arcane","Wyrd"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a sheet of thin cloth or gauze, which the spell consumes)","duration":"1 minute","description":"You force chosen creatures to perceive the incomprehensible expanse beyond mortal existence, shattering their ability to process reality. Each creature of your choice within 60 feet of you must make a Wisdom saving throw, except for Aberrations, Celestials, Elementals, Fiends, and creatures with the Outsider tag, which ignore this spell entirely. On a failed save, a creature takes 8d10 psychic damage and becomes incapacitated for 1 minute. Additionally, the creature is overwhelmed: it cannot comprehend speech from others, cannot read written text, speaks only in unintelligible sounds, and moves unpredictably. On a successful save, a creature takes half damage and avoids both the incapacitation and the overwhelmed condition. An overwhelmed creature may attempt another Wisdom saving throw at the end of each of its turns, ending the effect on itself with a success.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":["Psychic"],"tags":["Control","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Power Word Petrify","level":8,"circle":"8th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V","duration":"Instantaneous","description":"When you speak this potent incantation, you invoke a mystical force that transforms flesh into unyielding stone. Choose a single creature within range that you can perceive. If that creature's hit points do not exceed 80, it becomes petrified immediately. Should the target's hit points exceed this threshold, your utterance fails to take hold and the spell produces no result.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Power Word Stun","level":8,"circle":"8th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V","duration":"Instantaneous","description":"You speak a potent utterance that momentarily overwhelms a creature's consciousness. Choose one creature within range that you can see. If that creature has 150 hit points or fewer, it becomes stunned by the force of your words. Creatures with more than 150 hit points are unaffected by this magic.\n\nA stunned creature can attempt to shake off the effect by making a Constitution saving throw at the conclusion of each of its turns. A successful save ends the stunned condition.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":["Constitution"],"damageTypes":[],"tags":["Control"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Soul Entanglement","level":8,"circle":"8th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Necromancy","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (a ruby worth at least 500 gp, which is consumed by the spell)","duration":"Permanent","description":"You weave together the vital essences of two living beings, fusing their destinies into one.\n\nYou make contact with two creatures that are neither Constructs nor Undead, intertwining their life forces so completely that their fates become inseparable. Whenever one creature takes damage or is afflicted with a condition, the other creature experiences those same effects immediately. Should one creature perish, the other falls as well.\n\nIf only one creature opposes this magic, it gains a Constitution saving throw after 10 minutes have elapsed, severing the spell's connection on a successful save. The creature then gains one level of exhaustion from the tremendous toll of resistance.\n\nIf both creatures resist the spell, both must succeed on their Constitution saves to break free. If the ritual persists, new saves can be attempted after another 10 minutes pass. When one creature has already succeeded on a previous save, it rolls that save with advantage on all subsequent attempts.\n\nOnce the ritual takes hold, the bond persists indefinitely until one or both creatures die, or until a wish spell or equivalent magic forcibly breaks the connection.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Force"],"tags":["Buff","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Sunburst","level":8,"circle":"8th-Circle","traditions":["Divine","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"150 feet (60-foot-radius sphere)","components":"V, S, M (fire and a piece of sunstone)","duration":"Instantaneous","description":"You manifest an intense orb of radiant solar fire that floods the surrounding area with devastating light.\n\nA blinding flash of pure sunlight detonates in a 60-foot-radius sphere at a point of your choosing within range. Every creature caught in this luminous burst must attempt a Constitution save. Those who fail the save suffer 12d6 radiant damage and become blinded for 1 minute. Creatures that succeed on the save take half damage and avoid the blinding effect. Undead creatures are hindered by this spell, rolling their save with disadvantage.\n\nA blinded creature may attempt another Constitution save at the conclusion of each of its turns. If this save succeeds, the blindness ends.\n\nAny magical darkness present within the spell's area is immediately dispelled by this overwhelming radiance.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Radiant"],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Tidal Wave","level":8,"circle":"8th-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"1 mile","components":"V, S","duration":"Concentration, up to 1 minute","description":"You manifest a colossal aqueous barrier at a location within your range that you can perceive. This wall of water stretches 300 feet in length, reaches 300 feet in height, and extends 50 feet in depth. Any creature of Huge size or smaller standing within the wave's boundaries when it materializes becomes trapped within it and must succeed on a Strength saving throw. Creatures that fail this save suffer 6d10 bludgeoning damage, while those that succeed take half damage.\n\nUnattached Huge or smaller objects in the wave's space are likewise caught and carried along.\n\nTrapped creatures may attempt escape by swimming through the water. To do so, a creature must succeed on a Strength (Athletics) check against your spell save DC. Success allows the creature to swim a distance equal to its remaining movement. Failure reduces the creature's speed to 0 until the start of its next turn. Creatures that successfully swim free land in an unoccupied space adjacent to the wave.\n\nAt the beginning of each of your turns after the wave appears, it advances 50 feet in a single consistent direction, carrying all creatures and objects within it. Any Huge or smaller creature beginning its turn inside the wave, entering it for the first time on that turn, or occupying spaces through which the wave moves must make a Strength saving throw or take 5d10 bludgeoning damage. Each creature can be damaged this way only once per round.\n\nFollowing this movement each turn, the wave's height decreases by 50 feet and its damage output diminishes by 1d10. When the wave's height reaches 0 feet, the spell terminates.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Strength"],"damageTypes":["Bludgeoning"],"tags":["Damage","Debuff","Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Absorb Spell","level":9,"circle":"9th-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":false,"castingTime":"1 reaction, when you can see or hear that you’re a spell target","range":"Self","components":"V, M (a specially prepared amulet worth at least 1,000 gp)","duration":"instantaneous","description":"When you perceive that a spell is being directed at you, you may respond by casting this spell as a reaction. You channel the incoming spell's energy through your amulet and into yourself, negating any harmful effects from that spell.\n\nThe absorbed spell's circle determines the maximum circle of spell slots you may restore. You can distribute this energy among multiple expended slots of lower circles if you wish. For instance, absorbing a 6th-circle spell lets you restore one 6th-circle slot, two 3rd-circle slots, or any combination totaling 6 or fewer circles.\n\nShould you cast this spell but possess no expended spell slots, the energy remains stored within your amulet. On any of your subsequent turns, you may cast any spell you know using this stored energy instead of expending a spell slot, provided the spell's circle does not exceed the absorbed spell's circle. When you cast a spell of lower circle than your absorbed spell, any leftover energy disperses harmlessly once your turn ends.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["V","M"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Astral Projection","level":9,"circle":"9th-Circle","traditions":["Arcane","Wyrd"],"school":"Necromancy","isRitual":true,"castingTime":"1 hour","range":"10 feet","components":"V, S, M (for each creature you affect with this spell, you must provide one jacinth worth at least","duration":"Special","description":"You and up to eight willing creatures within range slip into a profound slumber and project your conscious minds into the Astral Plane (the spell fails if you are already on that plane when you cast it). Your physical bodies remain behind, unconscious and suspended in time—they require no sustenance, air, or biological progression.\n\nYour astral body mirrors your mortal self in nearly all aspects, retaining your abilities and equipment exactly as they are.\n\nThe sole exception is a gleaming silvery cord that emerges from between your shoulder blades and streams behind you, disappearing from sight after 1 foot of distance. This cord anchors your consciousness to your sleeping body. So long as this tether remains unbroken, you retain the path home. Should the cord be severed—only possible through effects that explicitly permit this—your spirit becomes irrevocably separated from your flesh, resulting in instant death.\n\nYour astral form traverses the Astral Plane without restriction and may pass through planar portals to reach any other plane of existence. Upon entering a new plane or returning to your original plane, your material body and possessions follow along the silver cord, enabling you to reawaken within your body as you arrive. Your astral form exists as a distinct entity. Harm inflicted upon it leaves your physical body unscathed and creates no lasting effects upon your return.\n\nYour action can dismiss the spell, ending its effects for you and all companions. Upon dismissal, each affected creature awakens within its physical body.\n\nThe spell may end prematurely through other means. A successful dispel magic targeting either an astral or material body ends the spell for that creature. Should a creature's original body or astral form be reduced to 0 HP, the spell terminates for that creature. If the spell ends while the silver cord remains intact, the cord reels the astral form back to the body, breaking its suspended state.\n\nIf you are pulled back prematurely, your companions remain in the Astral Plane and must achieve 0 HP or find another path to their bodies.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Foresight","level":9,"circle":"9th-Circle","traditions":["Arcane","Divine"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"Touch","components":"V, S, M (a gilded hourglass worth at least","duration":"8 hours","description":"You make contact with a willing creature, granting it a supernatural glimpse of moments yet to come. Until the spell ends, the target cannot be caught unaware, gains advantage on all its attack rolls, ability checks, and saving throws, and imposes disadvantage on any attack roll made against it by another creature.\n\nIf you cast this spell again before the current casting expires, the spell immediately ceases to function. A creature that has benefited from this spell cannot receive its benefits again until at least 7 days have elapsed.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Gate","level":9,"circle":"9th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a diamond worth at least 5,000 gp)","duration":"Concentration, up to 1 hour","description":"You establish a passage between this plane and another realm of existence.\n\nYou tear open a gateway connecting an empty space within your sight at spell range to a designated location on a different plane. This gateway appears as a circular aperture that measures between 5 and 20 feet across, and you determine which direction it faces. The gateway persists for the spell's duration.\n\nThe gateway maintains a front and rear surface on both planes it connects. Passage through the gateway requires entering from its front side. Any creature or object passing through is immediately whisked away to the other plane, arriving in the nearest unoccupied space available.\n\nPowerful entities and planar lords retain the ability to bar gateways conjured by this spell from forming within their presence or throughout their territorial influence.\n\nUpon casting, you may pronounce the true name of a particular creature (false names, epithets, and titles have no effect). Should that creature exist on a plane other than your current one, the gateway manifests beside the named creature and draws it forcefully through to the closest empty space on your side.\n\nThe creature falls under no compulsion from you, and the GM determines its subsequent actions. The creature might depart, attempt to harm you, or aid you in your endeavors.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Hostile Environment","level":9,"circle":"9th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"Self","components":"V, S","duration":"24 hours","description":"You marshal the environment itself as a weapon against your foes.\n\nUpon casting this spell, you designate one or more creatures as your targets. Your designation can be specific—a particular named individual, a creature category such as Fey, a combined group like \"orcs and bugbears,\" or a broader classification like \"all members of the rival faction.\" Beasts cannot be directly targeted by this spell; however, Beasts that serve as mounts or companions to your targets—such as cavalry horses or pack animals accompanying hunters—are affected by the unfavorable terrain effects described below. The spell transforms a 3-mile radius centered on you for the spell's duration, creating the following effects:\n\n• Hunted. All native Beasts within the area turn aggressive toward your targets and relentlessly pursue them until either the target dies or leaves the affected region. Beasts already under the target's command are unaffected by this hostility.\n\n• Primordial Empowerment. Your targets suffer disadvantage on all saving throws made against spells of the Primordial school while within the area.\n\n• Unfavorable Terrain. The region becomes difficult terrain for your targets. Additionally, your targets make ability checks and saving throws to overcome environmental obstacles and perils—such as fording rushing waters, scaling steep slopes, or evading pit traps—at disadvantage.","classes":["Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Buff","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Imprisonment","level":9,"circle":"9th-Circle","traditions":["Arcane","Wyrd"],"school":"Abjuration","isRitual":true,"castingTime":"1 minute","range":"30 feet","components":"V, S, M (a vellum depiction or a carved statuette in the likeness of the target and a special component that varies according to the version of the spell you choose worth at least 500 gp per hit die of the target)","duration":"Until dispelled","description":"You weave a potent enchantment to confine a creature you can see within range in an unbreakable magical prison. The target must make a Wisdom saving throw. On a failed save, the creature becomes bound by the spell; if it succeeds, it becomes immune to this spell for all future castings. While imprisoned, the creature requires no air, sustenance, or water, and does not grow older.\n\nNo divination magic can locate or sense the imprisoned target.\n\nWhen you cast this spell, you select one imprisonment form below.\n\nBurial. The target is sealed within an impenetrable sphere of magical force buried deep underground, sized precisely to contain only the creature. The sphere permits no passage—nothing can enter or exit through any means, including teleportation or planar travel.\nThis version requires a small mithral sphere as its special component.\n\nChaining. Massive chains, anchored firmly to the ground, lock the target in place. The target becomes restrained and cannot move or be moved by any method until the spell ends.\nThis version requires a precious metal chain of fine quality as its special component.\n\nHedged Prison. The target is transported to a cramped demiplane fortified against teleportation and planar travel. You decide the demiplane's form—a maze, dungeon, tower, or other confined space.\nThis version requires a jade miniature of the prison structure as its special component.\n\nMinimus Containment. The target shrinks to 1 inch tall and becomes trapped inside a gemstone or vessel. The gemstone remains transparent, permitting light and vision in both directions, but blocks all other passage, including teleportation or planar travel. The gemstone cannot be damaged or shattered while the spell persists.\nThis version requires a large transparent gemstone such as a corundum, diamond, or ruby as its special component.\n\nSlumber. The target falls into an unbreakable sleep from which no magic or mundane effort can rouse them.\nThis version requires rare sleeping herbs as its special component.\n\nEnding the Spell. During casting, you can establish any condition you choose that will terminate the spell and free the target. The condition's specificity or complexity is unlimited, but your GM must confirm the condition is logical and realistically achievable. Conditions may reference a creature's name, identity, or deity but otherwise must involve observable actions or properties—not abstract qualities like level, CR, class, or hit points.\n\nOnly a dispel magic cast at 9th level can break this spell, targeting either the prison itself or the special component used to establish it.\n\nEach special component can sustain only one prison at a time. If you cast the spell again using an identical component, the previous prison's target is immediately released.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":["Force"],"tags":["Control","Damage","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Infernal Dominion","level":9,"circle":"9th-Circle","traditions":["Divine"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","description":"You channel the raw power of the lower planes, tearing open a rift that disgorges infernal wrath upon the world. A roiling mass of demonflame and shadow manifests in a 30-foot-radius sphere at a point within range that you can perceive. Any creature that moves into this sphere or starts its turn there suffers 8d12 necrotic damage and 8d12 fire damage, and must make a Constitution saving throw. On a failed save, the creature gains one level of exhaustion.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Fire","Necrotic"],"tags":["Damage","Summon"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Mass Heal","level":9,"circle":"9th-Circle","traditions":["Divine","Primordial"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"Channeling tremendous restorative force, you emanate a wave of curative energy that mends the wounds of those nearby. You distribute up to 700 hit points of healing among any creatures of your choice that remain visible to you within range. In addition to restoring their vitality, this spell strips away all maladies—curing diseases while simultaneously dispelling blindness and deafness. The spell remains powerless against Constructs and Undead, leaving such beings untouched by its restorative effects.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Debuff","Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Metamorphosis","level":9,"circle":"9th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"10 minutes","range":"Touch","components":"V, S, M (raw silk worth 1,000 gp, which the spell consumes)","duration":"Instantaneous","description":"You place your hands upon a willing creature and reshape its fundamental form in one of four distinct ways (the target must consent to whichever transformation you select):\n\n• Should the target be Humanoid, you may alter its lineage to any other lineage of your choosing. It immediately loses all traits and abilities tied to its previous lineage and instead gains all traits and abilities of the new lineage.\n\n• You may reduce one of its ability scores by 2 (its modifier decreases by −1) while simultaneously raising a different ability score by 2 (its modifier increases by +1), provided the new score does not exceed 20.\n\n• You may manifest birdlike or batlike wings upon the creature's body, granting it a flying speed of 30 feet. Alternatively, you may strip away existing wings, removing any flying speed the creature possessed.\n\nYour GM may permit you to produce a different transformation of comparable scope.\n\nThis spell can affect any given creature no more than once per year. Should you attempt to cast this spell on a creature again before a year has elapsed since the previous casting, the spell automatically fails.","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Meteor Swarm","level":9,"circle":"9th-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"1 mile (40-foot-radius sphere)","components":"V, S","duration":"Instantaneous","description":"You channel the fury of the heavens, summoning a cataclysm of blazing projectiles that crash down upon the battlefield. Four brilliant meteors descend to four separate locations within range that you designate. Each of these impact sites generates an explosion that engulfs all creatures in a 40-foot-radius sphere centered on that point. The blast waves penetrate around barriers and obstructions, forcing each creature caught within to attempt a Dexterity saving throw. Those who fail take 20d6 fire damage and 20d6 bludgeoning damage, while successful saves reduce this total by half. Should a creature find itself within multiple blast radii, it suffers the effects only once, not multiple times. The spell's devastation extends to structures and unattended objects, consuming flammable materials that aren't being worn or held.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Bludgeoning","Fire"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Power Word Kill","level":9,"circle":"9th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V","duration":"Instantaneous","description":"You speak a devastating word of power aimed at a creature within your sight. If that creature possesses 100 hit points or fewer, it perishes instantly. Should the target exceed this threshold, the utterance fails to harm them.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Power Word Recover","level":9,"circle":"9th-Circle","traditions":["Divine"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V","duration":"Instantaneous","description":"You speak a celestial command that mends a willing creature within your sight up to 60 feet away, instantly filling their body with vitality. The target regains all lost hit points and returns to their maximum health. Simultaneously, any magical influence compelling them to charm, fear, paralysis, or stunning sensations dissipates completely. Constructs and Undead remain unaffected by this restorative utterance.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Control","Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Prismatic Wall","level":9,"circle":"9th-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"10 minutes","description":"You conjure a barrier of radiant, prismatic light that confounds perception and inflicts seven distinct magical punishments on those who breach it.\n\nA lustrous, multicolored barrier of luminous energy materializes as a vertical, solid wall—measuring up to 90 feet in length, 30 feet in height, and 1 inch in thickness—anchored at a point within range that you designate. You may alternatively form the wall into a spherical shape with a maximum diameter of 30 feet, positioned at any point you select within range. This wall persists for the spell's duration. Should the wall be positioned so it occupies the same space as a creature, the spell immediately fails and both your action and spell slot are consumed without effect.\n\nThe wall emanates bright illumination extending 100 feet outward, with dim light extending an additional 100 feet beyond that. You and any creatures you specify when casting the spell may move through and remain adjacent to the wall unharmed. Whenever another creature that can perceive the wall approaches within 20 feet of it or begins its turn in that area, it must make a Constitution save or suffer blindness for 1 minute.\n\nThe wall comprises seven distinct layers of different colors. A creature moving through or reaching into the wall traverses each layer sequentially. With each layer encountered, the creature must make a Dexterity save or endure the effects corresponding to that layer as detailed below.\n\nThe wall can be dismantled progressively, beginning with the red layer and proceeding toward violet, through methods specific to each layer. Once destroyed, a layer remains disabled throughout the spell's duration. An antimagic field cannot diminish this wall's function.\n\nRed. A failed save inflicts 10d6 fire damage; a successful save reduces this to half. Nonmagical ranged projectiles cannot penetrate while this layer remains. Inflicting at least 25 cold damage destroys this layer.\n\nOrange. A failed save inflicts 10d6 acid damage; a successful save reduces this to half. Magical ranged projectiles cannot penetrate while this layer remains. A potent wind destroys this layer.\n\nYellow. A failed save inflicts 10d6 lightning damage; a successful save reduces this to half. Inflicting at least 60 force damage destroys this layer.\n\nGreen. A failed save inflicts 10d6 poison damage; a successful save reduces this to half. Passwall or another spell of equal or greater level that creates portals through solid surfaces destroys this layer.\n\nBlue. A failed save inflicts 10d6 cold damage; a successful save reduces this to half. Inflicting at least 25 fire damage destroys this layer.\n\nIndigo. A failed save leaves the creature restrained. It must then make a Constitution save at the close of each of its turns. Three successful saves terminate the spell. Three failed saves permanently calcify the creature, applying the petrified condition. Successes and failures need not occur consecutively; track both until either outcome reaches three. Spellcasting cannot function through this layer. Bright light produced by daylight or a spell of equal or higher level destroys this layer.\n\nViolet. A failed save blinds the creature. It must then attempt a Wisdom save at the start of your following turn. Success ends the blindness. Failure transports the creature to another plane the GM selects, ending the blindness. Typically, creatures native to other planes return home, while others are typically thrust into the Astral or Ethereal plane. Dispel magic or a spell of equal or higher level capable of ending magical effects destroys this layer.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity","Constitution","Wisdom"],"damageTypes":["Acid","Cold","Fire","Force","Lightning","Poison"],"tags":["Control","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Shapechange","level":9,"circle":"9th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (a jade circlet worth at least 1,500 gp, which you must place on your head before you cast the spell)","duration":"Concentration, up to 1 hour","description":"You gain the ability to assume the form of a different creature for one hour. The creature you become must have a challenge rating equal to your level or lower, cannot be a Construct or Undead, and you must have encountered that type of creature previously.\n\nYou transform into a typical specimen of the chosen creature, without any class levels or spellcasting abilities. Your game statistics become those of the new form, except you keep your Intelligence, Wisdom, and Charisma scores along with all your proficiencies in skills and saving throws. When you make an ability check or saving throw, you may use either your own modifiers or the creature's modifiers, selecting whichever is higher. You cannot access any legendary actions or lair actions the new form might possess.\n\nYou gain the hit points and hit dice of your new form. Upon returning to your normal form, you revert to the hit points you possessed before transforming. If you revert because you reached 0 hit points, excess damage transfers to your normal form. As long as this transferred damage doesn't reduce your normal form to 0 hit points, you do not fall unconscious.\n\nYou retain all features from your class, lineage, and other sources and may use them if your new form is physically capable. You cannot access any special senses you have unless your new form also possesses them. You can only speak if the creature type can normally communicate.\n\nWhen you transform, you decide whether your equipment drops, merges into the new form, or is worn by it. Worn equipment functions normally. Your GM determines whether equipment is practical for the new form to wear based on its shape and size. Equipment doesn't resize, and anything the new form cannot wear must fall or merge. Merged equipment has no effect while merged.\n\nDuring the spell's duration, you may use your action to assume a different form using the same restrictions, except that if your new form has more hit points than your current total, your hit points do not increase.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Intelligence","Wisdom","Charisma"],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Star Well","level":9,"circle":"9th-Circle","traditions":["Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self (50 feet)","components":"V, S","duration":"1 minute","description":"You tear open a fissure in spacetime centered upon yourself, unleashing a gravitational maelstrom that consumes all in its path.\n\nA distortion of reality materializes within a 50-foot radius around you, generating an irresistible gravitational field. Every creature in this zone except you is seized by overwhelming gravitational force. These creatures immediately release whatever they carry, collapse to the ground prone, and become paralyzed by the relentless pull. Any creature that flies or hovers crashes downward at once, doubling the damage from the fall. Any creature other than you that moves into the area or begins its turn there must make a Strength save or succumb to these effects.\n\nAt the start of each turn, a creature that is both prone and paralyzed within the area attempts a Strength save. If it fails, it takes 10d6 bludgeoning damage as it is crushed against the floor or ground beneath it. If it succeeds, it takes 5d6 bludgeoning damage instead, is no longer paralyzed, and can move up to half its normal speed. Ranged weapon attacks and projectile-based spells originating within the area suffer severe limitations, reducing their normal range to 5 feet and their maximum range to 10 feet.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Strength"],"damageTypes":["Bludgeoning","Force"],"tags":["Control","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Storm Of Vengeance","level":9,"circle":"9th-Circle","traditions":["Divine","Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Sight","components":"V, S","duration":"Concentration, up to 1 minute","description":"You manifest a tremendous magical tempest that materializes at a point within your sight, its roiling clouds spreading outward in a radius of 360 feet. Lightning crackles throughout the zone, thunder crashes deafeningly, and violent winds sweep across the landscape. Any creature positioned beneath the cloud formation—up to 5,000 feet below it—when the storm first manifests must attempt a Constitution save. A creature that fails takes 2d6 thunder damage and is deafened until 5 minutes have passed.\n\nFor as long as you concentrate on maintaining this spell, your turn each round triggers escalating destructive phenomena.\n\nOn Round 2, caustic rain cascades from the cloud's base. All creatures and objects directly under the cloud sustain 1d6 acid damage.\n\nOn Round 3, you direct six separate lightning bolts to descend from the cloud, targeting any six creatures or objects of your selection beneath it. No single creature or object receives more than one bolt. Struck creatures must make a Dexterity save, taking 10d6 lightning damage if they fail or half that amount if they succeed.\n\nOn Round 4, frozen hail pummels downward from above. Each creature under the cloud takes 2d6 bludgeoning damage.\n\nOn Rounds 5 through 10, biting gusts and freezing precipitation ravage the storm's zone. The affected area becomes difficult terrain and is heavily obscured. Every creature within takes 1d6 cold damage. Ranged weapon attacks prove impossible to make in this area. Any creature beginning its turn within the storm's bounds while concentrating on a spell must succeed on a Constitution save against your spell save DC or have that concentration broken. Additionally, the violent winds—sustained at 20 to 50 miles per hour—automatically disperse all fog, mist, and analogous phenomena, whether created by magic or mundane means.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity","Constitution"],"damageTypes":["Acid","Bludgeoning","Cold","Lightning","Thunder"],"tags":["Damage","Debuff","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Sun Cycle","level":9,"circle":"9th-Circle","traditions":["Divine","Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"1 minute","range":"Self (300-foot sphere)","components":"V, S, M (an orrery worth at least 1,000 gp)","duration":"1 minute (24 hours outside the range)","description":"You weave together a temporal ritual that accelerates time itself across a localized region. Within a 300-foot sphere centered on you, all matter and energy moves at an accelerated pace. Over the course of 1 minute, the celestial bodies wheel across the sky as though a full day were occurring, and every creature and object within the sphere experiences the passage of an entire day's worth of aging. The boundary of this temporal acceleration is absolute—nothing existing outside the sphere can interact with anything trapped within it until the effect concludes.\n\nWhen the ritual completes, any game mechanics tied to the passage of time—whether expended charges on magical items, rechargeable class features, or timed conditions—replenish as though a complete day had truly elapsed. Note that this accelerated day does not count as a long rest for purposes of recovery and preparation.\n\nBefore you begin casting, designate any number of willing creatures within the sphere. Any creatures you do not designate must succeed on a Constitution saving throw when the spell ends or suffer three levels of exhaustion; those who succeed instead take one level of exhaustion.\n\nYou cannot cast this spell again until seven true days have elapsed.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Time Binding","level":9,"circle":"9th-Circle","traditions":["Arcane"],"school":"Enchantment","isRitual":true,"castingTime":"1 hour","range":"Self (100-foot radius centered on caster)","components":"V, S, M (an hourglass filled with sand, which shatters upon spell cast)","duration":"24 hours","description":"You manipulate temporal currents around yourself, warping the passage of time within a defined region. When you complete this ritual, a luminous circle materializes centered on your position, extending outward to a radius of 100 feet.\n\nThe spell's temporal distortion leaves you unaffected, but all other creatures caught within its boundaries suffer the following consequences:\n\n• Dilated Hours. Time flows differently within the affected area—one hour that passes inside equals five hours beyond the circle's boundary.\n\n• Hampered Locomotion. Creatures moving through the area find their speed reduced to half its normal value.\n\n• Prolonged Enchantments. Any spells active within the area have their remaining duration multiplied by three.\n\nUpon completion of this ritual, you immediately age 1 year as payment for bending time itself.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Time Stop","level":9,"circle":"9th-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Instantaneous","description":"You seize control of temporal flow, freezing the world around you while you act freely.\n\nYou momentarily suspend time's passage for all creatures except yourself. During this suspension, you gain 1d4 + 1 consecutive turns to act normally, using actions and movement without restriction while all other creatures remain frozen in temporal stasis.\n\nThe spell immediately terminates if any action you take during this period—or any effect you generate—directly impacts any creature besides yourself, or if you affect an object worn or carried by anyone other than you. The spell also ends instantly if you travel beyond 1,000 feet from the point where you initially cast it.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"True Polymorph","level":9,"circle":"9th-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a drop of mercury, a dollop of gum arabic, and a wisp of smoke)","duration":"Concentration, up to 1 hour","description":"You transform a creature into a different creature, a creature into an object, or an object into a creature.\n\nSelect a single creature or nonmagical object within range that you can perceive. You may transmute the creature into another creature, the creature into an object, or the object into a creature (the object cannot be worn or carried by another creature). This transformation persists for the spell's duration or until the target is reduced to 0 hit points or dies.\n\nShould you maintain concentration on this spell throughout its entire duration, the transformation becomes permanent and persists until dispelled.\n\nThe spell cannot affect creatures bearing the Shapechanger trait or creatures at 0 hit points. An unwilling creature can attempt a Wisdom saving throw; a successful save negates the spell's effects.\n\n**Creature into Creature.** When converting a creature to another creature type, the new form may be any creature you designate with a challenge rating no higher than the target's challenge rating (or level if the target lacks a challenge rating). The target's game statistics, including mental ability scores, are entirely replaced by those of the new form.\n\nThe target retains its original personality.\n\nThe target gains the hit points of its new form. Upon reverting to its natural form, the creature returns to the hit points it possessed before transformation. Should it revert due to reaching 0 hit points, any remaining damage transfers to its normal form. As long as the transferred damage does not reduce the creature's normal form below 0 hit points, it does not fall unconscious.\n\nThe creature is constrained by the capabilities of its new form in performing actions and cannot speak, cast spells, or perform any action requiring hands or speech unless its new form permits such actions.\n\nThe target's equipment melds with the new form. The creature cannot activate, use, wield, or gain benefit from any of its equipment.\n\n**Object into Creature.** You can convert an object into any creature, provided the creature's size does not exceed the object's size and the creature's challenge rating is 9 or lower. The resulting creature is friendly to you and your companions. It acts during your turn. You determine its actions and movement. The GM controls the creature's statistics and resolves its actions and movement.\n\nIf the spell becomes permanent, you lose control of the creature. It may remain friendly depending on your treatment of it.\n\n**Creature into Object.** When transforming a creature into an object, it transmutes along with all worn and carried equipment into that object form. The creature's statistics become those of the object, and the creature retains no memory of the time spent in this form after the spell ends and it reverts to its normal form.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"True Resurrection","level":9,"circle":"9th-Circle","traditions":["Divine"],"school":"Necromancy","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (a sprinkle of holy water and diamonds worth at least 25,000 gp, which the spell consumes)","duration":"Instantaneous","description":"You restore life to a dead creature by reuniting it with its willing soul, cleansing it of all afflictions that plagued its existence.\n\nYou touch a creature that has been dead for up to 200 years, provided it did not die of old age. If the creature's soul is willing and unbound, it returns to life fully restored with all its hit points intact.\n\nAll wounds seal, poisons neutralize, diseases vanish, and curses dissolve—removing every malady that burdened the creature at the moment of death. Damaged or missing organs and limbs are reconstructed whole.\n\nIf the creature's original body no longer exists, you may grant it an entirely new form by speaking its true name aloud. The creature then materializes in an unoccupied space of your choice within 10 feet of you.","classes":["Cleric","Paladin"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Poison"],"tags":["Damage","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Weird","level":9,"circle":"9th-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"120 feet (30-foot-radius sphere)","components":"V, S","duration":"Concentration, up to 1 minute","description":"You pluck the deepest terrors from the minds of nearby creatures, conjuring personalized nightmares visible only to each victim. Choose a point within range, and each creature in a 30-foot-radius sphere centered on that point must make a Wisdom saving throw. A creature that fails this save becomes frightened of you for the spell's duration. The manifestation preys upon what the creature fears most, forcing it to confront its worst nightmare as an unstoppable force. At the end of each turn while frightened, the creature must succeed on another Wisdom saving throw or take 4d10 psychic damage as its mind fractures under the psychological assault. If a creature succeeds on the initial saving throw, the spell's effects end for that creature immediately.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":["Psychic"],"tags":["Control","Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Wish","level":9,"circle":"9th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Instantaneous","description":"You fundamentally reshape reality itself, though doing so exacts a terrible price.\n\nWish is the most potent spell any mortal can perform. By speaking your desire aloud, you can remake the very fabric of reality to match your will. The simplest application duplicates any spell of 8th circle or lower without requiring you to meet its prerequisites or pay any of its costs—the spell activates immediately.\n\nAlternatively, you may instead produce one of these effects:\n\n• You conjure a single nonmagical object worth no more than 25,000 gp with dimensions not exceeding 300 feet in any direction, materializing in an unoccupied space on the ground within your sight.\n\n• You restore all hit points to up to twenty creatures you can see and remove all effects that greater restoration would dispel from them.\n\n• You grant up to ten creatures you can see resistance to a damage type of your choosing.\n\n• You grant up to ten creatures you can see immunity to a single spell or magical effect for 8 hours. For example, you could shield yourself and your allies from a lich's Life Drain.\n\n• You reverse a single event from the past round by forcing any roll made within that time to be remade. Reality adjusts to accommodate this new result. You might undo an enemy's successful saving throw, their critical hit, or an ally's failed save. You may impose advantage or disadvantage on the new roll and choose whether to keep it or use the original.\n\nYou might attempt an effect beyond these examples. Describe your wish to the GM with precision. The GM determines the outcome and bears no obligation to grant it fully—more ambitious wishes carry greater risk of failure, partial success, or unforeseen consequences tied to your exact wording. Wishing a villain dead might thrust you centuries forward in time. Wishing for a legendary artifact might transport you to whoever currently possesses it.\n\nAny use of this spell other than duplicating another spell demands a terrible toll. When you next cast any spell before finishing a long rest, you take 1d10 necrotic damage per circle of that spell—damage that cannot be reduced or prevented. Your Strength score becomes 3 if it isn't already 3 or lower, and remains so for 2d4 days. Each day you spend resting with only light activity reduces this duration by 2 days. Additionally, there is a 33 percent chance you can never cast wish again.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"sour
