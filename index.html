throw, or it succumbs to your banishment.\n\nThe destination depends on the creature's planar origin. If the target belongs to the plane where you currently stand, it is thrust into a safe demiplane where it becomes incapacitated. It remains trapped in this harmless realm for the spell's duration, after which it returns to the space it occupied or the nearest available space if its former location is blocked.\n\nShould the target hail from a different plane than your own, it vanishes with a soft pop and is immediately returned to its native plane. However, if you dispel or exhaust the spell within 1 minute of its banishment, the creature reappears in its original space or the nearest unoccupied space if needed. If more than 1 minute passes before the spell ends, the creature remains on its home plane and does not return.\n\nWhen you cast this spell using a spell slot of 5th circle or higher, you may select one additional creature as a target for each slot level above 4th.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":[],"tags":["Control"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Binding Oath","level":4,"circle":"4th-Circle","traditions":["Arcane","Divine"],"school":"Necromancy","isRitual":true,"castingTime":"10 minutes","range":"Touch","components":"V, S, M (a scroll, ink, and a quill [arcane] or a silver chain worth at least 25 gp [divine])","duration":"Until dispelled; see text","description":"You formalize a binding agreement among two or more willing participants through either a documented contract or a ceremonial oath spoken aloud. The accord and its penalties are magically established. Should any sworn party violate their pledge, they suffer a curse selected from the options provided by the bestow curse spell. The moment a vow is broken, all participants instantly sense the breach has occurred, though they learn no specifics about it.\n\nDispel magic cannot suppress this spell's curse effect, but dispel evil and good, remove curse, or wish can eliminate it. The remove curse spell works only if cast using a spell slot of equal or greater level than the spell slot used to cast binding oath. Depending on the oath's specific terms, one participant's violation may not necessarily void the agreement for the others. When the oath becomes completely invalid, the spell terminates for all affected creatures, though any curses already inflicted persist until removed through magic.\n\nAt Higher Circles: As you advance in your spellcasting ability, binding oath becomes more resistant to dismissal. When you cast this spell, it counts as a spell of the highest circle you can cast for purposes of using remove curse to dispel its effects. For instance, if you can cast 6th-circle spells, a caster must use at least a 6th-circle spell slot when casting remove curse to lift the curse imposed by this spell.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Black Tentacles","level":4,"circle":"4th-Circle","traditions":["Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M (a piece of tentacle from a giant octopus or a giant squid)","duration":"Concentration, up to 1 minute","description":"You summon a writhing mass of dark tentacles that lash out at those who enter their grasp. The spell fills a 20-foot square area on ground within your range with these sinuous, undulating appendages. Throughout the spell's duration, the ground in this space becomes difficult terrain to traverse.\n\nWhenever a creature first enters the affected area during a turn or begins its turn within it, that creature must make a Dexterity save. On a failed save, it takes 3d6 bludgeoning damage and becomes restrained by the tentacles for the spell's duration. If a creature that is already restrained by the tentacles begins its turn in the area, it immediately takes 3d6 bludgeoning damage.\n\nA restrained creature can expend its action to attempt a STR or Dexterity check of its choice against your spell save DC. If the check succeeds, the creature breaks free of the tentacles' grip.","classes":["Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength","Dexterity"],"damageTypes":["Bludgeoning"],"tags":["Control","Damage","Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Bladed Wings","level":4,"circle":"4th-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"self","components":"V, S, M (a silver needle)","duration":"Concentration, up to 10 minutes","description":"Metallic wings manifest upon your body, granting you the ability to fly at 60 feet per turn. Should the spell's duration expire while you remain airborne, you plummet to the ground below.\n\nUsing a bonus action, you may strike twice with your wings in melee combat, extending your reach to 10 feet. These strikes use your spellcasting ability modifier instead of Strength for both attack rolls and damage calculation. Each wing attack inflicts 2d8 slashing damage plus your spellcasting modifier, and the wings function as magical weapons.\n\nAlternatively, you may spend an action to discharge the wings' metallic plumage in a 60-foot cone of jagged blades. All creatures caught within this area must succeed on a Dexterity saving throw or suffer 6d8 piercing damage; a successful save reduces this damage by half. Using this action terminates the spell immediately.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Strength","Dexterity"],"damageTypes":["Piercing","Slashing"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Blight","level":4,"circle":"4th-Circle","traditions":["Divine","Primordial"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Instantaneous","description":"You channel waves of necrotic energy to drain the life essence from a target within range that you can perceive. A creature you select must attempt a Constitution save. On a failed save, it suffers 8d8 necrotic damage; on a successful save, it takes half that damage. Constructs and Undead are entirely unaffected by this spell.\n\nWhen targeting a Plant creature or a plant infused with magic, the target makes its save with disadvantage, and the spell automatically deals maximum damage instead of rolling. Against nonmagical plants that possess no creature type—such as a tree or bush—the spell causes them to wither away and perish immediately.\n\nAt Higher Circles. If you cast this spell using a spell slot of 5th circle or above, add 1d8 necrotic damage for each slot level beyond 4th.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Necrotic"],"tags":["Buff","Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Briar Rose","level":4,"circle":"4th-Circle","traditions":["Primordial"],"school":"Enchantment","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (a rose or similar flower cut within the past 24 hours and ritual oils worth 100 gp, which the spell consumes)","duration":"10 days","description":"You consecrate a flower with magic that induces slumber in those who come into contact with it.\n\nOver the course of an hour, you anoint a rose or comparable flower with fragrant oils while channeling potent magic through it, creating an enchanted flower that persists for the spell's duration. The first creature besides yourself to make physical contact with the flower before the spell concludes must succeed on a Charisma save. If the creature succeeds, the flower retains its enchantment, and that creature becomes immune to the flower's magic for the next 24 hours. If the creature fails, the flower loses its magic, and the creature enters a profound sleep lasting 24 hours. Only a greater restoration spell or equivalent magic can rouse the sleeper, or you can end the spell by using an action. During sleep, the creature requires neither food nor drink, and does not age.\n\nWhenever a sleeping creature takes damage, it makes another Charisma save. On a success, the spell ends for that creature.\n\nIf you cast this spell while a previously created magical flower remains active, that original flower immediately becomes nonmagical.\n\nAt Higher Circles. As you progress in spellcasting ability, this ritual becomes more potent. Once you can cast 6th-circle spells, you may extend the slumber to 7 days. Once you can cast 7th-circle spells, you may extend it to 30 days. Once you can cast 8th-circle spells, you may extend it to 180 days. Once you can cast 9th-circle spells, you may extend it to 1 year.","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":[],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Burning Pitch","level":4,"circle":"4th-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (chunk of tar)","duration":"1 minute","description":"You hurl a burning mass of tar at your target. Make a ranged spell attack roll against one creature. If you hit, that creature suffers 6d6 fire damage and becomes engulfed in flames. While aflame, the creature takes 2d6 fire damage whenever it begins its turn. Any creature can use an action to pour at least 1 gallon of water onto the burning creature to snuff out the flames, or the burning creature can submerge itself in water to extinguish them.\n\nIf your attack misses, the tar still strikes and deals half damage, but the flames do not ignite. Roll a d8 to determine which direction the tar scatters, then it lands 1d6 × 5 feet away in that direction.\n\nWherever the tar lands, toxic fumes billow outward. If you hit your attack, the noxious cloud spreads 5 feet from where the creature stands. If you missed, the poisonous cloud instead fills a 10-foot-radius sphere centered on the tar's landing spot. Any creature that enters this area or begins its turn there must make a Constitution saving throw. On a failure, it becomes poisoned until the start of its next turn. If the tar struck your initial target, that target makes this save with disadvantage.\n\nAt Higher Circles: When you cast this spell using a spell slot of 5th circle or higher, increase the initial fire damage by 1d6 for each slot level above 4th.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Fire"],"tags":["Buff","Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Compulsion","level":4,"circle":"4th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You force a creature's steps along a path of your choosing with each passing round.\n\nAny creature you select that you can perceive within range and that can hear you must succeed on a Wisdom saving throw. A target that cannot be charmed automatically passes this save.\n\nIf a target fails the save, this spell takes hold of it. For the duration of the spell, you can expend a bonus action on each of your turns to indicate a horizontal direction relative to your position.\n\nOn its next turn, each affected target must expend as much movement as it has available to advance in that direction. The target may take its action before moving. Once it has moved in this manner, it may attempt another Wisdom saving throw to break free from the spell's influence. A target will not be forced into an obviously lethal situation, such as an inferno or a chasm, but moving in your designated direction will trigger opportunity attacks against it.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":["Fire"],"tags":["Control","Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Confusion","level":4,"circle":"4th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M (three nut shells)","duration":"Concentration, up to 1 minute","description":"You perform a disorienting display, tangling the minds of those nearby in a web of bewilderment and irrational impulse. Each creature in a 10-foot-radius sphere centered on a point you choose within range must make a Wisdom save when you cast this spell or suffer its effects.\n\nAn affected creature cannot take reactions and must roll a d10 at the start of each of its turns to determine how it acts that turn.\n\nAt the end of each of its turns, an affected creature may make a Wisdom save, freeing itself from the spell on a success.\n\nAt Higher Circles. When you cast this spell using a spell slot of 5th circle or higher, the radius of the sphere expands by 5 feet for each slot level above 4th.\n\nCONFUSION EFFECTS d10 BEHAVIOR 1 The creature expends all its movement moving in a random direction. To establish the direction, roll a d8 and assign a direction to each die face. The creature takes no action this turn. 2–6 The creature neither moves nor takes actions this turn. 7–8 The creature uses its action to make a melee attack against a randomly selected creature within its reach. If no creature is within reach, the creature does nothing this turn. 9–10 The creature acts and moves freely this turn. At the end of each of its turns, an affected creature may make a Wisdom save, freeing itself from the spell on a success.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Conjure Minor Elementals","level":4,"circle":"4th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M","duration":"Concentration, up to 1 hour","description":"You conjure forth a collection of elemental beings that materialize in empty spaces within your sight and reach. Select one of these summoning configurations:\n\n• A single Elemental creature with a challenge rating of 2 or lower\n• A pair of Elemental creatures each with a challenge rating of 1 or lower\n• Four Elemental creatures each with a challenge rating of 1/2 or lower\n\nAny summoned creature vanishes when reduced to 0 hit points or when this spell's duration expires.\n\nThe creatures you summon regard you and your allies as friends. They take their turns using your initiative count, acting immediately after you finish your turn. You may issue verbal commands to direct them without spending an action yourself. In the absence of commands from you, they act defensively against any hostile creatures but otherwise remain idle. The Game Master possesses the statistics for these creatures.\n\nAt Higher Circles. When you expend a 6th-circle spell slot to cast this spell, double the number of creatures from your chosen option. When you expend an 8th-circle spell slot, triple the number of creatures from your chosen option.\n\nFilth Fever. A burning sickness ravages the creature's body. The creature suffers disadvantage on Strength checks, Strength saving throws, and melee attack rolls.\n\nFlesh Rot. Decay consumes the creature's body. The creature suffers disadvantage on Charisma checks and takes increased damage from all sources.\n\nMindfire. Fever consumes the creature's thoughts. The creature suffers disadvantage on Intelligence checks and Intelligence saving throws, and behaves as though affected by the confusion spell during combat.\n\nSeizure. Violent tremors overtake the creature. The creature suffers disadvantage on Dexterity checks, Dexterity saving throws, and ranged attack rolls.\n\nSlimy Doom. Uncontrolled bleeding erupts from the creature's form. The creature suffers disadvantage on Constitution checks and Constitution saving throws. Additionally, whenever the creature takes damage, it becomes stunned until the end of its next turn.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Control","Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Conjure Woodland Beings","level":4,"circle":"4th-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a holly berry for each creature summoned)","duration":"Concentration, up to 1 hour","description":"You call forth a contingent of fey beings to aid you.\n\nWithin range and in spaces you can perceive that are unoccupied, fey creatures manifest at your command. Select one of these summoning configurations:\n• A single Fey creature with a CR of 2 or lower\n• Two Fey creatures each with a CR of 1 or lower\n• Four Fey creatures each with a CR of 1/2 or lower\n\nAny summoned creature ceases to exist when its hit points reach 0 or when the spell's duration expires.\n\nThese summoned creatures regard you and your allies as friendly. They take their turns in the initiative order immediately following your own turn.\n\nThey respond to your spoken instructions (requiring no action from you to issue). If you provide no commands, they will act defensively against any creatures attempting to harm them, but otherwise remain inactive. The Game Master possesses the statistics for these creatures.\n\nAt Higher Circles: When you expend a 6th-circle spell slot, apply one of the summoning configurations above and double the quantity of creatures that appear. When you expend an 8th-circle spell slot, triple the quantity of creatures instead.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Control Water","level":4,"circle":"4th-Circle","traditions":["Divine","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"300 feet","components":"V, S, M (a drop of water and a pinch of dust)","duration":"Concentration, up to 10 minutes","description":"You bend a body of water to your will, commanding it to swell, recede, surge, and turn.\n\nFor the duration of this spell, you command all freestanding water contained within a cubic area of your choosing, measuring up to 100 feet on each side. You may select from the effects detailed below when you cast this spell. On each of your turns, you may use an action to apply the same effect again or switch to a different one.\n\nFlood. The surface level of all standing water throughout your chosen area rises by up to 20 feet. Should your area of effect include a shoreline, the rising water breaks over onto adjacent land. If you instead target a vast body of water, you generate a wave 20 feet in height that advances across your area from one edge to the opposite side before collapsing. Vehicles of Huge size or smaller that occupy the wave's trajectory are propelled along with it to the far side. Vehicles of Huge size or smaller that the wave strikes directly suffer damage.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Death Ward","level":4,"circle":"4th-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"8 hours","description":"You channel protective magic through your touch, shielding a creature from death's grasp. The next occasion the target would suffer a fall to 0 hit points from any damage, they instead remain conscious with 1 hit point remaining, and this spell's effect ceases. Should the target encounter any effect designed to end their life outright—bypassing the normal process of taking damage—that lethal effect fails to take hold, and the spell concludes.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Dimension Door","level":4,"circle":"4th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"500 feet","components":"V","duration":"Instantaneous","description":"You instantaneously shift yourself and one willing companion across space to a destination of your choosing. You may teleport to any location within range that you can see, have previously visualized, or can precisely describe using distance and direction measurements—such as \"200 feet directly below\" or \"300 feet toward the northwest at a 45-degree angle.\" Any objects you bring along must not exceed your carrying capacity. Additionally, you may transport one willing creature of your size or smaller, provided that creature remains within 5 feet of you when you cast the spell and carries equipment no heavier than its own carrying capacity allows.\n\nShould you attempt to materialize in a space occupied by an object or creature, both you and any companion traveling with you suffer 4d6 force damage each, and the teleportation fails to occur.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Divination","level":4,"circle":"4th-Circle","traditions":["Divine"],"school":"Divination","isRitual":true,"castingTime":"10 minutes","range":"Self","components":"V, S, M (incense or a sacrificial offering appropriate for your religion worth 25 gp, which the spell consumes)","duration":"1 minute","description":"You reach out through your magic and a ritual offering to establish contact with a divine entity—your deity or an agent acting in their stead. Upon casting, you select one approach:\n\n• Glimpse the Future. You pose a single question about a particular objective, occurrence, or undertaking expected to unfold within the next 7 days. Your divine contact provides an honest answer, which may take the form of a brief statement, an obscure verse, or a symbolic sign. The spell does not account for intervening factors that could alter the outcome, including the performance of additional spells or changes to your group's composition.\n\n• Perceive the Present. You ask up to three questions answerable with yes or no, and you must pose all questions before the spell concludes. Each question receives an accurate response. Since divine beings are not universally all-knowing, you may hear \"unclear\" if your inquiry touches upon knowledge beyond the deity's awareness or concerns future events not yet determined. Should a single-word response risk being misleading or conflict with the deity's own aims, the GM may instead provide a brief phrase to ensure proper understanding.\n\nIf you cast this spell two or more times before completing another long rest, each additional casting incurs a cumulative 25 percent chance that you receive no answer instead. The GM determines this result in secret. Should you receive no answer, you cannot cast this spell again until 24 hours have elapsed.","classes":["Cleric","Paladin"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Dread Echoes","level":4,"circle":"4th-Circle","traditions":["Wyrd"],"school":"Abjuration","isRitual":true,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Instantaneous","description":"You reach out and draw a target's dread into yourself, easing their burden at the cost of bearing it yourself.\n\nBy touching a target, you transfer and diminish their dread affliction. Any short-term dread affecting the target vanishes immediately and does not transfer to you.\n\nFor long-term dread, you convert its duration from hours to minutes for the target. Regardless of whether your attempt succeeds or fails, you assume the same long-term dread effect for its original duration. You may use an action to make an INT ability check against the target's original DC. If you succeed, you suppress the long-term dread effect until you complete a long rest. After each long rest, you can attempt another check until the long-term dread effect is fully resolved.\n\nIndefinite dread becomes long-term dread for both you and the target.","classes":["Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S"],"saves":["Intelligence"],"damageTypes":[],"tags":["Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Elemental Shield","level":4,"circle":"4th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (a bit of phosphorus or a firefly)","duration":"10 minutes","description":"Protective energy coalesces around your form, offering defense against both environmental extremes and physical assault.\n\nFor the spell's duration, your body radiates elemental force that sheds bright illumination out to 10 feet and dim light a further 10 feet beyond that. You may use an action at any time to end this spell prematurely. When the shield first manifests, you select its elemental composition: acid, cold, fire, lightning, or thunder.\n\nYou gain resistance to damage of the type you selected.\n\nWhenever a creature standing within 5 feet of you connects with a melee attack against you, the shield flares outward in a burst of energy, and the attacker suffers 2d8 damage of your chosen elemental type.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":["Acid","Cold","Fire","Lightning","Thunder"],"tags":["Buff","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Fabricate","level":4,"circle":"4th-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":true,"castingTime":"10 minutes","range":"120 feet","components":"V, S","duration":"Instantaneous","description":"Through your magic, you shape raw materials into finished, working objects.\n\nYou transmute unworked materials into crafted goods composed of that same substance. You might fashion a wooden footbridge from a stand of trees, a length of rope from growing hemp, or a garment from flax or wool stock.\n\nDesignate unworked materials within range that you can perceive. You may fashion a Large or smaller object (fitting within a 10-foot cube, or up to eight adjoining 5-foot cubes), provided you have enough raw material available. If your materials are metal, stone, or other mineral substances, the resulting object cannot exceed Medium size (contained within a single 5-foot cube). The finished object's craftsmanship matches the quality of the materials you began with.\n\nThis spell cannot create or transform living creatures or magical items. Additionally, you cannot use it to produce objects demanding exceptional artisan skill—such as fine jewelry, weapons, glasswork, or armor—unless you possess proficiency with the specific artisan's tools required to create that category of item.\n\nAfter casting this spell, you cannot cast it again until you finish a long rest.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Faithful Hound","level":4,"circle":"4th-Circle","traditions":["Divine","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a tiny silver whistle, a piece of bone, and a thread)","duration":"8 hours","description":"You summon a spectral hound that materializes in an unoccupied space within range that you can perceive. It persists for the spell's duration until you terminate it with an action or travel farther than 100 feet from its location.\n\nThe hound remains imperceptible to all beings save yourself and cannot be damaged or destroyed. When any creature of Small size or greater approaches within 30 feet without uttering the specific password you establish upon casting, the hound emits loud, aggressive barking. The hound perceives invisible creatures and perceives into the Ethereal Plane. It disregards all illusions.\n\nAt the beginning of each of your turns, the hound makes a bite attack against a single creature within 5 feet of it that harbors hostility toward you. The hound's attack bonus equals your spellcasting ability modifier plus your proficiency bonus. Upon a successful attack, the bite inflicts 4d8 piercing damage.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":["Piercing"],"tags":["Damage","Summon"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Freedom Of Movement","level":4,"circle":"4th-Circle","traditions":["Arcane","Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a leather strap, bound around the arm or a similar appendage)","duration":"1 hour","description":"You touch a willing creature, granting it protection from hindrances and captivity. Until the spell ends, the target ignores the movement penalties imposed by difficult terrain, and neither magical spells nor other enchantments can decrease its speed or inflict paralysis or the restrained condition upon it.\n\nAdditionally, the target may expend 5 feet of its movement to automatically break free from nonmagical restraints, including shackles, chains, or the grip of a creature holding it. Furthermore, the target suffers no movement or attack penalties while submerged in water.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Control"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Freeze Metal","level":4,"circle":"4th-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (ice chip)","duration":"Concentration, up to 1 minute","description":"You instantaneously flash-freeze a manufactured metal item, such as a metal weapon or suit of armor, that lacks the Natural Materials property and lies within your range. The item plunges to a dangerously frigid temperature. Any creature touching the item immediately suffers 4d8 cold damage. On each of your turns while the spell persists, you may spend a bonus action to inflict this same damage again.\n\nWhen a creature holding or wearing the item takes this damage, it must make a Constitution save or release the item if possible. Should the creature maintain its grip, the item becomes brittle and begins to degrade.\n\nFor weapons, each hit dealt until the start of your next turn reduces the weapon's damage rolls by 1 permanently and cumulatively. Once the penalty reaches −5, the weapon shatters beyond use.\n\nFor shields or armor, each time the wearer is struck, the protective item's AC bonus decreases by 1 permanently and cumulatively. Armor that reaches AC 10 or a shield reduced to a +0 AC bonus is destroyed.\n\nWhen you cast this spell using a spell slot of 5th circle or higher, the initial contact damage increases by 1d8 for each slot level above 4th.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Cold"],"tags":["Damage","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Giant Insect","level":4,"circle":"4th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Concentration, up to 10 minutes","description":"You summon and enlarge insects to serve as your allies in battle.\n\nWithin range, you magically transform up to ten centipedes, three spiders, five wasps, or one scorpion into colossal versions of themselves, maintaining this effect for the duration. Each centipede grows into a giant centipede, each spider becomes a giant spider, each wasp transforms into a giant wasp, and the scorpion becomes a giant scorpion.\n\nThese enlarged creatures respond to your spoken commands and engage in combat as extensions of your turn, each acting during your initiative round. The Game Master controls the mechanical details of these creatures, determining their statistics, actions, and movement.\n\nThe transformation persists until the spell's duration expires, until a transformed creature is reduced to zero hit points, or until you use an action to end the effect on a specific creature.\n\nYour Game Master may permit you to select alternative insect types to transform. For instance, transforming a bee might grant it the statistics of a giant wasp.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Greater Invisibility","level":4,"circle":"4th-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Concentration, up to 1 minute","description":"A creature within your reach is rendered invisible through your magic. You or an ally you make contact with vanishes from sight, and this invisibility persists for the spell's duration. Any equipment, garments, or objects held by the target remain equally concealed as long as they remain in the target's possession.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Guardian Of Faith","level":4,"circle":"4th-Circle","traditions":["Divine"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V","duration":"8 hours","description":"Through fervent prayer, you conjure a spectral defender to protect a designated location.\n\nA Large ghostly sentinel materializes and remains suspended throughout the spell's duration at an unoccupied location within range that you designate and can perceive. This phantom guardian anchors itself to that spot, remaining translucent and formless save for a luminous sword and shield bearing the holy insignia of your faith.\n\nWhen any creature that opposes you enters a space within 10 feet of the guardian for the first time during a turn, that creature must make a DEX saving throw. On a failed save, the creature suffers 20 radiant damage; on a successful save, it takes half that damage. The guardian dissipates once it has inflicted a cumulative total of 60 damage.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V"],"saves":["Dexterity"],"damageTypes":["Radiant"],"tags":["Damage","Summon"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Hallucinatory Terrain","level":4,"circle":"4th-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":true,"castingTime":"10 minutes","range":"300 feet","components":"V, S, M (a stone, a twig, and a bit of green plant) V, S, M (a gem-encrusted bowl worth at","duration":"24 hours","description":"You conjure a veil of illusions across a 150-foot cube of natural terrain within range, transforming its appearance, sound, and scent to mimic an entirely different natural landscape. A flat field might become a treacherous swamp, a worn path could shift into a cragasse, and a gentle slope might present itself as a sheer drop. Similarly, a meadow could mask a pond, or a smooth road could disguise a rocky ravine. Any constructed buildings, items, or living beings in the affected area retain their true appearance and remain visible.\n\nThe physical properties of the ground itself stay unaltered, so creatures that enter the illusory terrain will quickly discover the deception through touch alone. If the tactile differences are subtle enough to avoid immediate detection, a creature that deliberately studies the illusion may make an Intelligence (Investigation) check opposed by your spell save DC to pierce the deception. Any creature that successfully sees through the illusion perceives it as a faint, translucent image layered atop the actual terrain.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Intelligence"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Ice Storm","level":4,"circle":"4th-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"300 feet","components":"S, M (a pinch of dust and a few drops of water)","duration":"Instantaneous","description":"You conjure a devastating cascade of jagged ice shards that plummet from above, battering everything in their path and coating the ground in treacherous frozen debris.\n\nA cylindrical column of bone-hard hail descends upon a point you can see within range, covering a 20-foot radius and extending 40 feet upward. Every creature caught within this cylinder must succeed on a Dexterity save or suffer the full brunt of the assault, taking 2d8 bludgeoning damage and 4d6 cold damage. Those who successfully save take half damage.\n\nThe hailstones remain scattered across the affected area, transforming it into difficult terrain that persists until the end of your next turn.\n\nAt Higher Circles. If you expend a spell slot of 5th circle or greater to cast this spell, the bludgeoning damage increases by 1d8 for each slot level above 4th.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["S","M"],"saves":["Dexterity"],"damageTypes":["Bludgeoning","Cold"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Mass Faerie Fire","level":4,"circle":"4th-Circle","traditions":["Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V","duration":"Concentration, up to 1 minute","description":"You project shimmering radiance across multiple locations, rendering targets conspicuous and susceptible to harm.\n\nYou designate up to three 20-foot cubes, each anchored to a point within range that you can perceive. Every object filling these cubes becomes limned in radiant light—you select whether each cube glows blue, green, or violet. Any creature present within a cube at the moment you cast this spell must succeed on a Dexterity saving throw or become similarly outlined. Should a creature occupy overlapping cubes, the spell affects it only once regardless of how many areas it occupies. For the spell's duration, each outlined creature and object emits dim light extending 10 feet in all directions.\n\nAttack rolls against any illuminated creature or object gain advantage provided the attacker can see the target. Additionally, illuminated creatures and objects cannot gain the benefits of invisibility.","classes":["Warlock","Witch"],"source":"Player's Guide 1","componentList":["V"],"saves":["Dexterity"],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Otherworldly Orchestra","level":4,"circle":"4th-Circle","traditions":["Arcane","Divine"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You manifest a collection of luminous, floating instruments that produce magical music.\n\nYou establish stirring orchestral music emanating from a space of your choice within range that no creature currently occupies. Using a bonus action, you can command the orchestra to perform one of the following melodies, which affects one target you designate.\n\nThe chosen melody persists for the spell's duration, though you may spend another bonus action to switch to a different melody.\n\nDiscordant Clamor. The orchestra produces a cacophonous, discordant assault of harsh sound. One hostile creature within 30 feet of the orchestra that can hear it must succeed on a Wisdom saving throw or become frightened until the end of its next turn.\n\nInspiring Song. The orchestra performs a rousing, exhilarating composition. One friendly creature within 30 feet of the orchestra that can hear it gains advantage on ability checks, attack rolls, and saving throws until the end of its next turn.\n\nMournful Dirge. The orchestra performs a melancholic, sorrowful melody. One hostile creature within 30 feet of the orchestra that can hear it must succeed on a Wisdom saving throw or become poisoned until the end of its next turn.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Control","Debuff","Summon"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Personal Time Fold","level":4,"circle":"4th-Circle","traditions":["Wyrd"],"school":"Transmutation","isRitual":true,"castingTime":"1 minute","range":"Self","components":"V, S, M (hourglass)","duration":"1 hour","description":"You weave a fold in spacetime itself, carving out a hidden pocket dimension where an hour passes in isolation while mere moments elapse for the world beyond.\n\nA demiplane materializes before you—a modest 10-foot-square chamber furnished with a desk and bed, accessible through a lockable door invisible to all but you. Within this sanctuary, you can complete a short rest or engage in solitary pursuits using only those possessions you carried inside with you, for 1 hour of subjective time. Should any other creature cross the threshold, the spell collapses immediately, granting you none of its benefits. Furthermore, if you would regain spell slots through any means, you cannot regain the slot expended to cast this spell.\n\nUpon the spell's conclusion, the demiplane unravels and you emerge in your original location—or in the nearest unoccupied space if that spot is now blocked. Any belongings you left behind within the pocket dimension materialize at your side. From the perspective of outside observers, you vanish for 1 round, stepping back into view at the beginning of your subsequent turn. The dimensional incursion demands a toll: you age 1 day.","classes":["Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Phantasmal Killer","level":4,"circle":"4th-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You weave together the deepest terrors lurking within a creature's mind, manifesting them as a nightmarish illusion. Choose a creature within range that you can see. That creature witnesses an illusory form born from its own darkest fears—a vision visible to none but itself. The target must make a Wisdom saving throw. If it fails, the target is frightened of you until the spell ends. At the conclusion of each of the target's turns while the spell persists, the target must succeed on another Wisdom saving throw or suffer 4d10 psychic damage. If the target succeeds on its initial saving throw, the spell immediately ends.\n\nWhen you cast this spell using a spell slot of 5th circle or higher, increase the damage by 1d10 for each slot level above 4th.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":["Psychic"],"tags":["Control","Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Phantom Chariot","level":4,"circle":"4th-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":true,"castingTime":"1 minute","range":"30 feet","components":"V, S, M (a small gold wheel worth 25 gp)","duration":"1 hour","description":"You conjure a Large, ethereal conveyance that materializes in an unoccupied 10-foot square within range, its appearance determined by your will. Throughout the spell's duration, this phantom chariot accommodates up to 6 Medium or smaller creatures and propels itself without need of draft animals. It responds to your commands, moving at a speed of 100 feet and covering 10 miles in an hour of travel or 13 miles during forced march. When the duration expires, the chariot fades away over the course of 1 minute, allowing all passengers time to dismount. The spell terminates immediately if you expend an action to dismiss it, if the chariot sustains any damage, or if you cast this spell again to summon another chariot.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Damage","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Polymorph","level":4,"circle":"4th-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a caterpillar cocoon)","duration":"Concentration, up to 1 hour","description":"You reshape a creature within your range into a bestial form. The creature you target assumes the body of any Beast whose challenge rating does not exceed its own challenge rating (or its character level, if it lacks a challenge rating). The target's core attributes—its Intelligence, Wisdom, and Charisma scores—adopt those of the Beast form, though its personality remains unchanged.\n\nAn unwilling target may make a Wisdom saving throw to resist this transformation. The spell fails to take effect on creatures bearing the Shapechanger tag or on any creature at 0 hit points. The transformation persists for the spell's duration, concludes when the target reaches 0 hit points, or ends when the target dies.\n\nUpon assuming the new form, the target's hit point maximum becomes that of the Beast's form. When the target reverts to its original form, it recovers the hit points it possessed before transforming. Should reversion occur because the target dropped to 0 hit points, any damage exceeding the new form's maximum carries forward to the original form. Provided this overflow damage does not reduce the original form to 0 hit points, the creature remains conscious.\n\nThe new form imposes significant restrictions. The creature cannot speak or cast spells and cannot perform actions requiring hands or words. Any equipment the target carried melds seamlessly into the new form and becomes inaccessible—the creature cannot activate, use, wield, or derive any benefit from its gear while transformed.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Intelligence","Wisdom","Charisma"],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Private Sanctum","level":4,"circle":"4th-Circle","traditions":["Arcane","Divine"],"school":"Abjuration","isRitual":true,"castingTime":"10 minutes","range":"120 feet","components":"V, S, M (a thin sheet of lead, a piece of opaque glass, a wad of cloth, and powdered chrysolite)","duration":"24 hours","description":"You weave protective magic around a designated location, fortifying it against unwanted intrusion and observation.\n\nYou establish magical fortifications over an area you can see within range. This protected region forms a cube, measurable anywhere from 5 feet to 100 feet along each edge. The enchantment persists for the spell's duration, though you may dismiss it using an action.\n\nUpon casting, you select which safeguards take effect, activating any combination of these properties:\n\n• Acoustic isolation: Sound cannot penetrate the warded area's boundary.\n• Visual obscuration: The barrier becomes dark and hazy, blocking all vision through it, including darkvision.\n• Detection prevention: Divination spell sensors cannot manifest within the protected space or cross its perimeter.\n• Targeting immunity: Creatures sheltered here cannot become targets of divination spells.\n• Teleportation barrier: No creature may teleport into or out of the warded area.\n• Planar sealing: Planar travel cannot occur within the warded space.\n\nCasting this spell upon the same location daily for one year makes the effect permanent.\n\nShould you attempt to cast this spell a second time while the first remains active, the original spell's effects cease immediately.\n\nAt Higher Circles. When you cast this spell using a spell slot of 5th circle or higher, the cube's dimensions increase by 100 feet per spell slot you can access above 4th level.\n\nFor example, once you gain access to 5th-circle slots, you may protect a cube measuring up to 200 feet on each side.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Resilient Sphere","level":4,"circle":"4th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a hemispherical piece of clear crystal and a matching hemispherical piece of gum arabic)","duration":"Concentration, up to 1 minute","description":"You conjure a lustrous barrier of pure force that completely isolates a creature or object. Choose a creature or object of Large size or smaller you can see within range, and it becomes enclosed within an impenetrable sphere. If the target is an unwilling creature, it must make a Dexterity saving throw; only on a failed save does the enclosure take hold for the duration.\n\nThe sphere forms an absolute seal—no material substances, magical energies, or spell effects of any kind can penetrate its surface in either direction. The enclosed creature retains the ability to breathe normally within this space. The sphere itself cannot be harmed by any damage of any kind, and it reciprocally shields its contents from all harm originating outside while preventing those within from affecting anything beyond the barrier.\n\nThe sphere weighs nothing and automatically conforms to fit snugly around whatever it contains. A creature trapped inside can spend its action to press outward against the inner walls, causing the sphere to roll forward at a speed equal to half that creature's normal movement speed. The sphere can also be physically lifted and transported by other creatures.\n\nIf a disintegrate spell is cast directly upon the globe, it immediately shatters the sphere and vanishes, leaving the contents unharmed.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Scarification","level":4,"circle":"4th-Circle","traditions":["Divine","Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (a ritual knife)","duration":"8 hours","description":"You inscribe a mystical scar upon a willing creature's body, imbuing it with supernatural properties.\n\nBy tracing runic marks into a creature's skin, you create a permanent scar that grants it chosen benefits. Select one option below; the creature enjoys its effects for the duration.\n\nAir's Grace. Should the creature fall from a height, it mitigates falling damage by an amount equal to 5 × its level or CR (this reduction occurs automatically).\n\nEarth's Resistance. The creature develops resistance to a single damage type you select at the moment of casting—choose from cold, fire, lightning, or thunder.\n\nFire's Aggression. Whenever the creature lands a weapon attack, that attack inflicts an additional 1d4 fire damage.\n\nWater's Resilience. If the creature takes damage that would reduce it to 0 HP but does not kill it outright, it instead drops to 1 HP. The ritual's effects terminate immediately for that creature.\n\nA creature may only maintain one scar's benefits at any given time. Should it receive a second scar from another casting of this ritual while already bearing one, the original scar's effects cease at once.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Cold","Fire","Lightning","Thunder"],"tags":["Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Secret Chest","level":4,"circle":"4th-Circle","traditions":["Arcane","Wyrd"],"school":"Abjuration","isRitual":true,"castingTime":"1 minute","range":"Touch","components":"V, S, M (an exquisite chest, 3 feet by 2 feet by 2 feet, constructed from rare materials worth at least","duration":"Instantaneous","description":"You deposit a chest into the Ethereal Plane, where it remains hidden and accessible only through your command.\n\nYou must touch both the chest and a miniature replica that serves as this spell's material component. The chest holds up to 12 cubic feet of nonliving material, measuring a maximum of 3 feet by 2 feet by 2 feet.\n\nWhile the chest resides on the Ethereal Plane, you can use an action and touch the replica to summon the chest. It materializes in an empty space on the ground within 5 feet of you.\n\nTo return the chest to the Ethereal Plane, you use an action while touching both the chest itself and its replica.\n\nThe chest persists on the Ethereal Plane for up to 60 days. After this initial period, the spell has a cumulative 5 percent chance each day of ending. The spell also terminates if you cast it again, if the miniature replica is destroyed, or if you use an action to dismiss the spell. Should the spell end while the larger chest remains on the Ethereal Plane, the chest cannot be recovered and is lost forever.\n\nIf you cast this spell while another chest from a previous casting remains active, the new casting fails and produces no effect.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Song Of The Forest","level":4,"circle":"4th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"10 minutes","range":"Self","components":"V, S, M (a dried leaf, crumpled and released)","duration":"Concentration, up to 10 minutes","description":"Your awareness sharpens to supernatural levels, allowing you to catch whispers at the edge of perception. You establish a mystical connection with your surroundings that lets you detect every sound within 60 feet of you, forming a clear mental image of where each noise originates.\n\nFor the spell's duration, you gain tremorsense extending 10 feet in all directions, darkvision reaching 30 feet ahead, and you roll twice on any Wisdom (Perception) check and use the higher result.\n\nAfter casting this spell, you must finish a long rest before you can cast it again.","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Spirit Rend","level":4,"circle":"4th-Circle","traditions":["Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"You manifest spectral talons that claw at a foe's mind and body, leaving them wracked with pain and immobilized.\n\nEthereal claws of pure spirit materialize and rake across the consciousness of a creature within range that you can perceive. That creature must succeed on a Wisdom saving throw or suffer the spell's full effects. A failed save deals 3d8 necrotic damage and 3d8 psychic damage to the target, and it cannot move until the end of your next turn. If the save succeeds, the creature takes half damage and suffers no movement impediment.\n\nAt Higher Circles. When you expend a spell slot of 5th circle or greater to cast this spell, you may designate one additional target for each slot level above 4th.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":["Necrotic","Psychic"],"tags":["Damage","Debuff","Summon"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Stone Shape","level":4,"circle":"4th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (soft clay, which must be worked into roughly the desired shape of the stone object)","duration":"Instantaneous","description":"You touch a stone object and reshape it at your will, treating the material as though it were pliable clay. The stone object must be Medium or smaller in size, or you may target a discrete stone section measuring no more than 5 feet across in all directions. You mold this stone into whatever configuration serves your needs. You might fashion a hefty boulder into a crude weapon, a religious statue, or a lockable chest. Alternatively, you could carve a modest opening through stone barriers, provided that barrier does not exceed 5 feet in thickness. You retain the ability to reshape a stone door or the stone frame surrounding it to lock the door permanently in place. Any creation may incorporate up to two hinges and a functioning latch mechanism, though more intricate mechanical components remain beyond your ability to create.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Stoneskin","level":4,"circle":"4th-Circle","traditions":["Primordial"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (diamond dust worth 100 gp, which the spell consumes)","duration":"Concentration, up to 1 hour","description":"When you place your hand upon a willing creature, their flesh hardens into stone-like resilience. For the duration of this spell, the target's body becomes resistant to nonmagical bludgeoning, piercing, and slashing damage, deflecting the force of ordinary weapons and blunt force alike.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":["Bludgeoning","Piercing","Slashing"],"tags":["Buff","Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Tree Thump","level":4,"circle":"4th-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (bendable twig)","duration":"Instantaneous","description":"You imbue a nearby tree with momentary vigor, commanding it to strike at your enemies.\n\nA Large tree within range animates briefly and sweeps its boughs toward a creature of your choice within 10 feet of it. That creature must make a Dexterity saving throw. If it fails, it takes 4d6 bludgeoning damage, is hurled 1d6 × 10 feet away from the tree, and falls prone. If it succeeds, it takes half damage and avoids both the knockback and the prone condition.\n\nShould the target collide with an obstacle during its forced movement, it suffers an additional 1d6 bludgeoning damage for every 10 feet of distance it traveled before impact.\n\nWhen you cast this spell using a spell slot of 6th circle or higher, the tree grows larger for each slot level beyond 4th. For every 2 spell slot levels above 4th, you may increase the tree's size.\n\nIf the tree becomes Huge, it can strike targets within 15 feet of it, its damage increases to 7d6, and knocked targets are pushed 1d8 × 10 feet away on a failed save.\n\nIf the tree becomes Gargantuan, it can strike targets within 20 feet of it, its damage increases to 10d6, and knocked targets are pushed 1d10 × 10 feet away on a failed save.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Bludgeoning"],"tags":["Control","Damage","Summon"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Wall Of Fire","level":4,"circle":"4th-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (a small piece of phosphorus)","duration":"Concentration, up to 1 minute","description":"You conjure a barrier of intense flames on a solid surface within range. The wall can take the form of a straight line extending up to 60 feet with a height of 20 feet and thickness of 1 foot, or alternatively a circular configuration with a diameter up to 20 feet, height of 20 feet, and thickness of 1 foot. The wall remains solid and blocks vision, persisting for the spell's duration.\n\nUpon the wall's creation, every creature occupying its space must attempt a Dexterity saving throw. Those who fail the save suffer 5d8 fire damage, while successful saves reduce the damage by half.\n\nYou designate one side of the wall when casting. That chosen side inflicts 5d8 fire damage to any creature that finishes its turn within 10 feet of it or within the wall itself. Creatures also take this same damage upon first entering the wall during a turn or when their turn ends there. The opposite side of the wall produces no damage.\n\nWhen you cast this spell using a spell slot of 5th circle or higher, add 1d8 additional fire damage for each slot level above the 4th.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Fire"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Animate Objects","level":5,"circle":"5th-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"Your will animates the inert matter around you, forcing nearby objects to rise and serve your commands.\n\nSelect up to ten nonmagical objects within range that you neither wear nor carry. Medium objects count as two selections, Large objects as four selections, and Huge objects as eight selections. No object larger than Huge may be animated.\n\nANIMATED OBJECT STATISTICS SIZE EXAMPLE OBJECT HP AC STR DEX ATTACK Tiny Inkpot, ladle, throwing dart 20 18 4 (−3) 18 (+4) +8 to hit, 1d4 + 4 damage Small Book, chair, stew pot 25 16 6 (−2) 14 (+2) +6 to hit, 1d8 + 2 damage Medium Handcart, saddle, table 40 13 10 (+0) 12 (+1) +5 to hit, 2d6 + 1 damage Large Armoire, memorial statue, kiln 50 10 14 (+2) 10 (+0) +6 to hit, 2d10 + 2 damage Huge Carriage, dinosaur fossil, granary silo 80 10 18 (+4) 6 (−2) +8 to hit, 2d12 + 4 damage\n\nEach object animates and transforms into a creature under your control, remaining so until the spell ends or the creature reaches 0 hit points.\n\nUsing a bonus action, you may issue mental commands to any animated creature within 500 feet of you, commanding multiple creatures simultaneously if you wish by issuing the same order to each. You dictate the creature's actions and movement for its next turn, or assign a standing instruction such as defending a location. Without orders, the creature defends itself against attackers. Once commanded, it pursues that objective to completion.\n\nAn animated object is a Construct whose AC, hit points, attacks, Strength, and Dexterity derive from its size. It possesses Constitution 10 (+0), Intelligence and Wisdom 3 (−4), and Charisma 1 (−5). It moves at 30 feet per round; objects lacking limbs or suitable appendages instead fly at 30 feet per round and can hover in place. Objects permanently affixed to surfaces or larger structures have a speed of 0. It senses vibrations within 30 feet through tremorsense but is blind beyond that distance.\n\nWhen reduced to 0 hit points, an animated object reverts to its inanimate form, with excess damage applying to the original object.\n\nIf directed to attack, an animated object makes one melee attack against targets within 5 feet. It attacks with a Slam using an attack bonus and bludgeoning damage determined by its size. The Dungeon Master may substitute slashing or piercing damage if the object's form suggests it.\n\nAt Higher Circles. When you cast this spell using a spell slot of 6th circle or higher, you animate two additional objects for each slot level above 5th.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Bludgeoning","Piercing","Slashing"],"tags":["Control","Damage","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Antilife Shell","level":5,"circle":"5th-Circle","traditions":["Divine","Primordial"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Self (10-foot radius)","components":"V, S","duration":"Concentration, up to 1 hour","description":"You establish a protective ward around yourself that repels all living matter. A luminous field extends 10 feet outward from your position and stays fixed to you as you move. This barrier blocks entry to all creatures except Undead and Constructs.\n\nThe field persists for the spell's duration. Living creatures cannot cross the barrier's threshold or extend their bodies through it, though they retain the ability to cast spells or make attacks using ranged weapons or weapons with extended reach across the barrier's surface.\n\nShould your movement cause an affected creature to be pushed through the barrier, the spell immediately terminates.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Arcane Hand","level":5,"circle":"5th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (an eggshell and a snakeskin glove)","duration":"Concentration, up to 1 minute","description":"You conjure a Large hand of shimmering, translucent force in an unoccupied space within range that you can perceive. The hand persists for the spell's duration and responds to your will, replicating the motions of your own hand.\n\nThe hand functions as an object with an AC of 20 and hit points equal to your maximum hit points. When the hand is reduced to 0 hit points, the spell terminates immediately. It possesses a Strength of 26 (+8) and a Dexterity of 10 (+0).\n\nOther creatures are able to occupy the hand's space without restriction.\n\nOn the turn you cast this spell and as a bonus action each subsequent turn, you can move the hand up to 60 feet away and then select one of the following effects to perform.\n\nClenched Fist. The hand delivers a strike against one creature or object situated within 5 feet of it. You make a melee spell attack using your spellcasting attack modifier. If the attack connects, the target suffers 4d8 force damage.\n\nForceful Hand. The hand attempts to drive a creature within 5 feet of it in your chosen direction. You make a Strength check with the hand's modifier contested by the target's Strength (Athletics) check. When the target is Medium or smaller, you roll this check with advantage. Upon success, the target is thrust up to 5 feet plus a distance in feet equal to five times your spellcasting ability modifier. The hand follows the target to maintain proximity within 5 feet.\n\nGrasping Hand. The hand endeavors to establish a grapple with a creature of Huge size or smaller within 5 feet of it. You resolve this grapple using the hand's Strength. Medium or smaller creatures grant you advantage on this check. While the hand maintains the grapple, you can expend a bonus action to squeeze the target, inflicting bludgeoning damage equal to 2d6 plus your spellcasting ability modifier.\n\nInterposing Hand. The hand positions itself between you and a creature of your selection until you issue new commands to the hand. The hand maintains this position to keep itself between you and that creature, granting you half cover against that creature. The creature cannot traverse through the hand's space if its Strength score does not exceed the hand's Strength score of 26. If the creature's Strength score exceeds 26, it can advance toward you through the hand's space, though this area counts as difficult terrain for it.\n\nAt Higher Circles. When you cast this spell using a spell slot of 6th circle or higher, increase the damage of Clenched Fist by 2d8 and the damage of Grasping Hand by 2d6 for each slot level above 5th.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength","Dexterity"],"damageTypes":["Bludgeoning","Force"],"tags":["Buff","Damage","Healing"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Aura of Order","level":5,"circle":"5th-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Concentration, up to 10 minutes","description":"Sacred radiance emanates from your position, extending outward in a 30-foot radius and moving with you at its center. This protective aura persists until the spell ends. While within this aura, you and your allies gain advantage on saving throws made against spells and magical effects. Furthermore, whenever you or an allied creature within the aura successfully saves against a spell or magical effect that deals damage, that creature takes no damage from it.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Buff","Damage"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Awaken","level":5,"circle":"5th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"8 hours","range":"Touch","components":"V, S, M (an agate worth at least 1,000 gp, which the spell consumes)","duration":"Instantaneous","description":"Through careful manipulation of magical energies traced within a precious gemstone over the casting time, you touch a Beast or Plant no larger than Huge size. This spell only functions if the target currently lacks an Intelligence score or possesses an Intelligence of 3 or lower.\n\nUpon successful casting, the target's Intelligence becomes 10 and it gains the capacity to understand and speak one language of your choice. Should the target be a Plant, it develops the ability to move—animating its limbs, roots, vines, and similar appendages—and acquires sensory capabilities equivalent to those of a human. Your GM determines the appropriate game statistics for the awakened Plant, drawing from options such as the awakened shrub or awakened tree.\n\nThe awakened Beast or Plant becomes charmed by you for a duration of 30 days, or until you or your companions inflict harm upon it, whichever occurs first. Once this charmed condition expires, the awakened creature independently determines whether to maintain friendly relations with you, basing this decision on the treatment it received during the period it remained charmed.","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Intelligence"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Cloudfall","level":5,"circle":"5th-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Concentration, up to 10 minutes","description":"You compress clouds until they grow heavy enough to plummet earthward.\n\nYou either manipulate clouds already present in the sky or conjure a new 60-foot radius, 10-foot tall mass of clouds centered on a point you can see up to 100 feet directly above you. The spell fails if there isn't adequate space for the cloud formation.\n\nWhen you cast this spell, designate a point within range that you can see. A 10-foot-radius section of the cloud hardens and drops toward the ground. Every creature standing in the area directly beneath must succeed on a Dexterity save or suffer 10d6 bludgeoning damage and be knocked prone; those who succeed take half damage and remain standing. The fallen cloud disperses entirely upon impact.\n\nOn each of your turns while the spell persists, you may spend an action to make another section of cloud fall, selecting any location beneath it.\n\nAt Higher Circles. When you cast this spell using a spell slot of 6th circle or higher, the falling cloud's radius expands by 5 feet for each slot level above 5th.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Bludgeoning"],"tags":["Control","Damage"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Cloudkill","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Concentration, up to 10 minutes","description":"You summon a noxious cloud of yellow-green poison that engulfs a region around you. A sphere of toxic fog with a radius of 20 feet materializes at a point of your choosing within range. This miasma winds around obstacles and corners freely. The cloud persists for the spell's full duration or until dispersed by powerful winds, at which point the spell ends. The fog obscures vision completely within its boundaries.\n\nWhenever a creature first enters this area during a turn or begins its turn inside the fog, it must succeed on a Constitution saving throw or suffer 5d8 poison damage, taking only half damage on a successful save. This poisonous effect affects all creatures regardless of whether they can hold their breath or require air to survive.\n\nAt the start of each of your turns, the fog drifts 10 feet in a direction away from you, creeping across the ground's surface. Due to its density exceeding that of normal air, the vapor sinks toward low points in the terrain, pouring through gaps and openings as it advances.\n\nAt Higher Circles. If you cast this spell using a spell slot of 6th circle or higher, the damage dealt increases by 1d8 for each slot level above the 5th.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Poison"],"tags":["Damage","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Commune With Nature","level":5,"circle":"5th-Circle","traditions":["Primordial"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"Self","components":"V, S, M (a forked stick, a bowl of purified water, and a polished stone or bone of an animal native to where you are)","duration":"Instantaneous","description":"Your consciousness expands outward to merge with the natural world around you, granting you profound insight into your surroundings.\n\nThis spell requires you to be outdoors when you cast it. Upon casting, you gain knowledge of the land within 3 miles of your location. If you are in caves or other naturally occurring underground spaces, this awareness extends only 300 feet in all directions. The spell provides no information in areas where construction has supplanted nature, such as within dungeons and settlements.\n\nYou immediately learn up to three facts of your choosing about any of the following subjects as they pertain to the affected area:\n\n• The terrain and any bodies of water\n• Dominant flora, mineral deposits, fauna, or intelligent inhabitants\n• The presence and location of mighty Celestials, Fey, Fiends, Elementals, or Undead\n• Planar intrusions or otherworldly influences\n• Constructed structures\n\nFor instance, you might ascertain the whereabouts of a powerful Undead creature nearby, discover the location of a reliable water source, and pinpoint the nearest settlement.\n\nAfter casting this ritual, you must wait 24 hours before you may cast it again.","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Cone Of Cold","level":5,"circle":"5th-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self (60-foot cone)","components":"V, S, M (a small crystal or glass cone)","duration":"Instantaneous","description":"Your hands become the origin point of an intense wave of frigid energy that spreads outward in a deadly arc. Every creature within a 60-foot cone must succeed on a Constitution saving throw or suffer the full force of the cold. Those who fail take 8d8 cold damage, while those who succeed reduce this damage by half.\n\nAny creature reduced to 0 hit points by this spell is encased in ice and remains frozen in place until the ice naturally melts or is otherwise removed.\n\nWhen you cast this spell using a spell slot of 6th circle or higher, add 1d8 to the total damage for each circle above the 5th.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Cold"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Conjure Elemental","level":5,"circle":"5th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M (burning incense for air, soft clay for earth, sulfur and phosphorus for fire, or water and sand for water)","duration":"Concentration, up to 1 hour","description":"By channeling elemental forces through material components, you call forth a formidable Elemental to serve you.\n\nYou bring forth an Elemental servant into an unoccupied space within range that you can perceive. You determine which Elemental manifests: an air elemental, earth elemental, fire elemental, or water elemental. The GM possesses the creature's game statistics. With your GM's permission, you may instead use this spell to summon an alternative Elemental of your selection with a CR of 5 or lower. This spell cannot
