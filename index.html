triking the original point or selecting a new target.\n\nIf you cast this spell while outdoors during a storm, you seize control of that existing tempest rather than creating an independent cloud. When casting under these stormy conditions, the spell's damage output increases by 1d10.\n\nAt Higher Circles. When you cast this spell using a spell slot of 4th circle or higher, the damage increases by 1d10 for each slot level above 3rd.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Lightning"],"tags":["Damage","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Clairvoyance","level":3,"circle":"3rd-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Divination","isRitual":true,"castingTime":"10 minutes","range":"1 mile","components":"V, S, M (a focus worth at least 100 gp, either a jeweled horn for hearing or a glass eye for seeing)","duration":"Concentration, up to 10 minutes","description":"You manifest an intangible orb of magical perception that serves as your distant vantage point.\n\nWithin range, you establish this invisible sensor at a location you know intimately (somewhere you have physically visited or directly observed before) or at a location obviously present but unknown to you (such as concealed behind an obstacle, obscured by terrain, or hidden within natural cover). The sensor persists throughout the spell's duration without taking physical form—it cannot be targeted by attacks or manipulated by any means.\n\nUpon casting, you designate whether the sensor channels your sight or your hearing. You perceive through your chosen sense as though you occupied the sensor's location. By spending your action, you can alternate between the two sensory modes.\n\nAny creature capable of perceiving invisible objects (including those under the effects of see invisibility or possessing truesight) observes the sensor as a softly glowing, immaterial sphere roughly the size of a closed fist.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Conjure Animals","level":3,"circle":"3rd-Circle","traditions":["Primordial","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 hour","description":"You utter a mystical incantation, calling forth otherworldly spirits that manifest in the shapes of ordinary creatures.\n\nYou summon Fey spirits that materialize as Beasts in unoccupied spaces within range that you can perceive.\n\nSelect one of the following options for which creatures manifest:\n• One Beast of CR 2 or lower\n• Two Beasts of CR 1 or lower\n• Four Beasts of CR 1/2 or lower\n• Eight Beasts of CR 1/4 or lower\n\nEach summoned Beast is classified as Fey in addition to Beast, and it vanishes when reduced to 0 HP or when the spell's duration expires.\n\nThe creatures you summon regard you and your allies as friendly. They take their turns in the initiative order immediately following your own, and they follow any spoken instructions you provide without requiring an action from you. If you issue no commands, they will only take defensive actions against creatures that threaten them, otherwise remaining still. The Game Master possesses the creature statistics.\n\nAt Higher Circles: When you cast this spell using a 5th-circle spell slot, you choose one summoning option above and double the number of creatures that appear. Using a 7th-circle slot triplicates the number of creatures, and using a 9th-circle slot quadruples them.","classes":["Druid","Ranger","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Counterspell","level":3,"circle":"3rd-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":false,"castingTime":"1 reaction, when you see a creature within","range":"60 feet","components":"S","duration":"Instantaneous","description":"Through a swift gesture, you unravel the magical threads of a spell being cast by a creature within your sight.\n\nYou move to disrupt a creature actively in the midst of casting a spell. When targeting a creature casting a spell of 3rd circle or lower, the spell collapses entirely and produces no result. Should the creature be casting a spell of 4th circle or above, you must make an ability check using your spellcasting ability. The check's difficulty class is 10 plus the spell's circle. If you succeed, the spell unravels and fails to take effect.\n\nAt Higher Circles. When you cast this spell using a spell slot of 4th circle or higher, any interrupted spell automatically fails to take effect if its circle does not exceed the circle of the spell slot you expended.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["S"],"saves":[],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Create Food And Water","level":3,"circle":"3rd-Circle","traditions":["Divine","Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Instantaneous","description":"By your magic, sustenance materializes before you. Within range, you conjure 45 pounds of food and 30 gallons of water, manifesting on the ground or within existing containers. This provision suffices to nourish up to twenty creatures of Large size or smaller for a full day and night. The food, though lacking in flavor, provides adequate nutrition yet decays and becomes inedible if left unconsumed beyond 24 hours. The water remains pure and wholesome, never spoiling regardless of time.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Summon"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Curse Shuffle","level":3,"circle":"3rd-Circle","traditions":["Wyrd"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"30 feet","components":"V, S, M (a handful of butterfly wings)","duration":"Instantaneous","description":"You tap into the capricious power of the fey to reshape a cursed object or creature.\n\nWhen you are within range of a cursed creature or object, you may harness the unpredictable nature of the Fey, moving the curse from one creature or object to another creature or object also within range. The curse must transfer between items or between living beings—it cannot jump from creature to item or vice versa.\n\nThe curse does not remain unchanged. Upon casting this spell, you roll a d8 and reference the Chaotic Fey Magic Effects table to determine how the curse is transformed.\n\nChaotic Fey Magic Effects d8 Effect 1 Amplify. The curse grows stronger, its power magnified, its influence expanded in duration, or both. 2 Bounce. The curse ricochets unpredictably, striking a random target within range instead. 3 Curse of the Lost. The cursed creature or item vanishes, banished to another plane of existence (chosen by the GM). The caster learns which plane receives it. 4 Mutate. The curse warps into an entirely new manifestation. It might crystallize as a fey spirit taking the shape of a raccoon, or assume some other unforeseen form. 5 Reflect. The caster bears a fragment of the curse's burden. If the curse imposed disadvantage on ability checks, the caster experiences disadvantage on their next ability check, then the effect dissipates. 6 Reverse. The curse inverts itself into a blessing. Harmful effects transform into beneficial ones where feasible. 7 Swap. The curse exchanges places with a different curse entirely (determined by the GM). 8 Whimsy. The curse dissolves into a mild, harmless oddity. The target might find their garments shifting hue hourly, or discover they can only speak in verse.","classes":["Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Daylight","level":3,"circle":"3rd-Circle","traditions":["Divine","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"1 hour","description":"You conjure a radiant sphere of sunlight that overwhelms enchanted shadows.\n\nA sphere of bright daylight emanates outward from a point within range that you designate, expanding to fill a 60-foot radius. This bright illumination extends an additional 60 feet beyond the sphere's edge as dim light.\n\nShould you select a point on an object in your possession or an object neither worn nor being carried, the light originates from that object and follows it wherever it moves. If you completely obscure the object with an opaque covering—such as a bowl or helmet—the light becomes blocked.\n\nWherever this spell's luminous area overlaps a region of magical darkness created by a spell of 3rd circle or lower, including the darkness spell itself, that darkness-creating spell is immediately dispelled.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Dispel Magic","level":3,"circle":"3rd-Circle","traditions":["Arcane","Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","description":"You gesture sharply and speak a word of cancellation, unraveling magical energies.\n\nSelect a single creature, object, or magical effect you can see within range. All spells of 3rd circle or lower affecting that target immediately dissipate.\n\nFor any spell of 4th circle or higher present on the target, you must make an ability check using your spellcasting ability modifier. Your check must meet or exceed a DC of 10 plus the spell's circle. If your check succeeds, that spell's effects cease.\n\nAt Higher Circles. When you use this spell with a spell slot of 4th circle or higher, you automatically dispel any spell affecting the target whose circle does not exceed the circle of the spell slot you expended.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Electrify Metal","level":3,"circle":"3rd-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (ball of lint)","duration":"Concentration, up to 1 minute","description":"You infuse a metal object with electrical energy that courses through any creature making contact with it.\n\nSelect a manufactured metal object within range, such as a metal weapon or suit of armor, that does not possess the Natural Materials property and that you can perceive. You energize the object with electricity. Any creature that touches the object immediately takes 3d8 lightning damage upon the spell's casting.\n\nIf the object is unattended, it sends an arc of electricity toward one creature of your choice within 5 feet of it. That creature must make a Constitution save; on a failure, it takes 1d8 lightning damage. For the duration of the spell, you may spend a bonus action on each of your subsequent turns to deal this damage again.\n\nWhen a creature holding or wearing the object takes damage from it, that creature must succeed on a Constitution save or be forced to drop the object. Should the creature fail to drop it, the creature becomes stunned until the start of its next turn and may only take an action or a bonus action on its following turn.\n\nAt Higher Circles. When you cast this spell using a spell slot of 4th circle or higher, the direct contact damage increases by 1d8 for each slot level above 3rd. The arc extends 5 additional feet in range, and its damage increases by 1d8 for every two slot levels above 3rd.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Lightning"],"tags":["Control","Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Elemental Attunement","level":3,"circle":"3rd-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":true,"castingTime":"1 action","range":"Touch","components":"V, S, M (a gemstone worth 50 gp)","duration":"Concentration, up to 1 hour","description":"You channel the primal forces of the elemental planes into a willing creature, granting them attunement to one of the four fundamental elements.\n\nUpon casting, designate whether your target becomes attuned to fire, earth, water, or air. The creature immediately manifests all abilities associated with the chosen element.\n\n**Fire Elemental Attunement**\n• Flame Lore. The creature has advantage on Intelligence (Investigation) ability checks concerning fire, heat, or volcanic history.\n• Heat Awareness. The creature perceives temperature shifts within 60 feet, revealing hidden heat sources and environmental variations.\n• Blazing Flames. The creature may use a bonus action to produce a controlled flame capable of igniting torches or flammable materials within 30 feet.\n\n**Earth Elemental Attunement**\n• Ground Tracking. The creature gains advantage on Wisdom (Survival) checks for underground navigation and tracking, as well as identifying minerals and gemstones.\n• Vibration Hearing. The creature develops tremorsense to 60 feet, sensing subtle ground vibrations.\n• Move Stone. As a bonus action, the creature manipulates stone or earth, shaping simple forms or displacing obstacles at a rate of 500 pounds per minute.\n\n**Water Elemental Attunement**\n• Sea Wisdom. The creature gains advantage on Wisdom (Survival) checks related to aquatic navigation, weather prediction, and identifying aquatic creatures.\n• Aquatic Sense. The creature detects water currents and pressure changes, revealing concealed underwater passages and approaching aquatic entities.\n• Misty Cleansing. As a bonus action, the creature purifies up to 1 gallon of water or generates a mist in a 30-foot area that provides light obscuration and persists for 1 minute.\n\n**Air Elemental Attunement**\n• Cloud Sight. The creature gains advantage on Wisdom (Perception) ability checks for distant observation, sound detection, and wind pattern prediction.\n• Wind Sense. The creature perceives air pressure fluctuations, detecting approaching storms and concealed air currents.\n• Air Control. As a bonus action, the creature summons a small gust capable of moving objects weighing up to 10 pounds and dispersing gases across a 30-foot area.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Intelligence","Wisdom"],"damageTypes":["Fire"],"tags":["Buff","Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Elemental Fusion","level":3,"circle":"3rd-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S ,","duration":"Concentration, up to 1 minute","description":"You draw elemental power from the Elemental Planes themselves, binding fire, earth, water, or wind to your form to reshape the world around you.\n\nSelect one of the four elemental fusions below. While fused with your chosen element, you can activate that fusion's effect as an action. You may use a bonus action to dismiss your current fusion and establish a new one. All effects persist for the spell's duration.\n\nEarth Fusion. Your arms solidify into living stone. Make a melee spell attack against a creature you can reach within 5 feet. If you hit, the creature suffers 4d6 bludgeoning damage and must make a Strength saving throw or fall prone.\n\nFire Fusion. Your arms ignite with harmless flames. Make a ranged spell attack against a creature within 30 feet. If you hit, the creature takes 4d6 fire damage and must make a Constitution saving throw or become ignited, taking 1d6 fire damage at the start of each of its turns. The creature can use an action to extinguish these flames.\n\nWater Fusion. Liquid water swirls around your arms. Make a ranged spell attack against a creature within 30 feet. If you hit, the creature takes 4d6 cold damage and must make a Constitution saving throw or have its speed reduced by half until the start of your next turn.\n\nWind Fusion. Powerful winds spiral around you. Make a ranged spell attack against a creature within 60 feet. If you hit, the creature takes 4d6 slashing damage and must make a Dexterity saving throw or be pushed 15 feet away from you.\n\nAt Higher Circles. When you cast this spell using a spell slot of 4th circle or higher, increase the damage dealt by each fusion by 1d6 for each slot level above 3rd.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Strength","Dexterity","Constitution"],"damageTypes":["Bludgeoning","Cold","Fire","Slashing"],"tags":["Control","Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Energizing Aegis","level":3,"circle":"3rd-Circle","traditions":["Divine","Wyrd"],"school":"Abjuration","isRitual":false,"castingTime":"1 reaction, when you or a creature are targeted with a spell or effect that deals acid, cold, fire, lightning, or thunder damage","range":"5 feet","components":"V, S, M (iron golem shaving)","duration":"1 round","description":"You tap into a creature's fundamental nature and transform harmful energy into a source of vitality and renewal.\n\nWhen you react to a damaging moment, choose acid, cold, fire, lightning, or thunder and touch one willing creature within reach. That creature gains immunity to the chosen damage type until the start of your next turn, including the triggering damage itself.\n\nWhen the target first encounters damage of that type, it must make a saving throw against the original spell or effect. If that spell or effect provides no save, the target instead makes a Constitution saving throw against your spell save DC. If the target succeeds, it regains hit points equal to the full damage amount. If it fails, it regains hit points equal to 10% of the damage dealt.\n\nAt Higher Circles. When you cast this spell using a spell slot of 4th circle or higher, you may target one additional willing creature for each slot above 6th.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Erratic Distraction","level":3,"circle":"3rd-Circle","traditions":["Arcane"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"S","duration":"Concentration, up to 1 minute","description":"You conjure a fist-sized orb that shimmers with an unsettling luminescence at a location within range that you can perceive. Any creature positioned within 10 feet of this orb must make a Wisdom saving throw, or else fall under its charm. A charmed creature finds itself compelled to expend its movement traveling along the shortest available route toward the orb. However, the creature will not willingly move into obviously hazardous terrain, such as flames or bottomless chasms. Upon reaching the orb, the creature must dedicate its action to grasping it, succeeding only if it makes a Dexterity check that meets or exceeds your spell save DC. Should the creature successfully seize the orb, it suffers 4d6 psychic damage, releases the orb from its grip, and the charm ceases to affect it.\n\nThroughout the spell's duration, the orb hurtles 40 feet in an unpredictable direction at the beginning of each of your turns. Should the orb collide with an obstacle such as a wall or floor, it rebounds in a random direction, continuing until it completes its full 40-foot movement. Every creature situated within 10 feet of the orb's final position must succeed on a Wisdom saving throw or become charmed by it.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["S"],"saves":["Dexterity","Wisdom"],"damageTypes":["Fire","Psychic"],"tags":["Control","Damage"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Fear","level":3,"circle":"3rd-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"Self (30-foot cone)","components":"V, S, M (a white feather or the heart of a hen)","duration":"Concentration, up to 1 minute","description":"You manifest nightmarish visions that strike terror into the hearts of those nearby.\n\nEach creature within a 30-foot cone must make a Wisdom save or immediately drop any objects it carries and become frightened of you for the duration.\n\nA creature affected by this spell must use its action to Dash on each of its turns, moving away from you along the safest path available, except when no escape route exists.\n\nIf an affected creature completes a turn without being able to see you, it may attempt a Wisdom save to break free from the spell's effects on a success.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Fireball","level":3,"circle":"3rd-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"150 feet","components":"V, S, M (a tiny ball of bat guano and sulfur)","duration":"Instantaneous","description":"You thrust your finger toward a point within range, releasing a brilliant streak of flame that detonates with a thunderous roar. The explosion unfolds outward in a 20-foot-radius sphere centered on that point, engulfing all creatures in the blast zone.\n\nEach creature in the area must attempt a Dexterity save. Those who fail the save take 8d6 fire damage, while those who succeed take half damage.\n\nThe flames curve around corners and obstacles. Any flammable objects within the area ignite, provided they are neither being worn nor carried by anyone.\n\nWhen you cast this spell using a spell slot of 4th circle or higher, the damage increases by 1d6 for each slot level above 3rd.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Fire"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Fly","level":3,"circle":"3rd-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a wing feather from any bird)","duration":"Concentration, up to 10 minutes","description":"You establish contact with a willing being and grant it temporary mastery of the air. For the spell's duration, the target's movement includes a flight speed of 60 feet. Should the magic fade while the target remains airborne, it plummets toward the ground unless it possesses another means of arrest its descent.\n\nAt Higher Circles. If you expend a 4th-circle spell slot or one of greater power to cast this spell, you may extend the magic to one additional creature for each circle above the 3rd.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Gaseous Form","level":3,"circle":"3rd-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a bit of gauze and a wisp of smoke)","duration":"Concentration, up to 1 hour","description":"You imbue a willing creature you touch—along with all its equipment and possessions—with the ability to assume a gaseous form for the duration. The transformation ends immediately if the creature is reduced to 0 hit points.\n\nIncorporeal beings cannot be affected by this spell.\n\nWithin this vaporous state, the creature's sole means of locomotion becomes a flight speed of 10 feet. It gains the ability to move through occupied spaces shared by other creatures. The creature benefits from resistance to damage inflicted by nonmagical sources and gains advantage on Strength, Dexterity, and Constitution saving throws. It can slip through small apertures, tight passages, and minuscule fissures, though liquid barriers function as solid obstacles to its movement.\n\nThe creature cannot fall while gaseous and remains suspended in the air regardless of whether it is stunned or otherwise incapacitated.\n\nIn this misty form, the creature loses the capacity for speech and cannot interact with objects. Any items it carried or held before transformation remain inaccessible and cannot be manipulated, dropped, or used in any way. The creature cannot make attacks or cast spells.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength","Dexterity","Constitution"],"damageTypes":[],"tags":["Buff","Control","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Glyph Of Warding","level":3,"circle":"3rd-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (incense and powdered diamond worth at least 200 gp, which the spell consumes)","duration":"Until dispelled or triggered","description":"You inscribe a magical ward upon a surface or within a closable object that triggers an explosion or releases stored magic when activated.\n\nWhen you inscribe this glyph, select whether to place it on a surface (such as a floor, wall, or table) or inside an object that can be sealed (like a book, scroll, or chest). A glyph on a surface can cover up to 10 feet in diameter. If placed in an object, that object cannot move more than 10 feet from its casting location; any greater distance breaks the glyph and ends the spell without triggering it.\n\nThe glyph appears nearly invisible. A creature must succeed on an Intelligence (Investigation) check against your spell save DC to spot it.\n\nYou determine what activates the glyph when inscribing it. For surface glyphs, typical triggers include being touched, stood upon, having objects removed from atop it, approaching within a set distance, or manipulating the surface itself. For object glyphs, common triggers include opening the object, approaching within a certain distance, or observing the glyph directly. The spell ends immediately once triggered.\n\nYou may refine the trigger further by specifying circumstances, physical traits (such as height or weight), or creature types affected. You can also establish exceptions—such as designating a password—to prevent triggering under specific conditions.\n\nChoose either explosive runes or a spell glyph when creating the ward.\n\nExplosive Runes: The glyph detonates in a 20-foot-radius sphere centered on itself, spreading around corners. Each creature in the area must make a Dexterity saving throw. On a failure, it takes 5d8 damage of your chosen type (acid, cold, fire, lightning, or thunder) determined when you create the glyph, or half damage on a success.\n\nSpell Glyph: You embed a known spell of 3rd circle or lower into the glyph by casting it during creation. The spell must target a single creature or affect an area. It produces no effect when cast this way. Upon triggering, the stored spell activates, targeting the creature that triggered the glyph if it requires a target, or centered on that creature if it affects an area. Hostile creatures or harmful objects summoned or created appear as close as possible to the triggering creature and attack it. Spells requiring concentration persist for their full duration.\n\nAt Higher Circles: When you gain access to higher circles, this spell becomes more potent. Upon accessing 4th-circle slots, an explosive runes glyph's damage increases by 1d8 for each circle of spell slots above 3rd that you can access. For spell glyphs, you may store any spell up to the highest circle of spell slots available to you.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Dexterity","Intelligence"],"damageTypes":["Acid","Cold","Fire","Lightning","Thunder"],"tags":["Damage","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Haste","level":3,"circle":"3rd-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a shaving of licorice root)","duration":"Concentration, up to 1 minute","description":"You infuse a willing creature within range with arcane swiftness, elevating their combat prowess and mobility beyond normal limits.\n\nThe target's movement speed doubles for the duration. They gain a +2 bonus to their AC, advantage on Dexterity saving throws, and an extra action during each turn. This bonus action may be spent only on a single weapon attack, Dash, Disengage, Hide, or Use an Object action.\n\nOnce the spell's magic fades, the target becomes sluggish and exhausted. They cannot move or take any actions until the completion of their next turn, held fast by overwhelming fatigue.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Healing Sleep","level":3,"circle":"3rd-Circle","traditions":["Divine","Primordial"],"school":"Conjuration","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (incense which is burned during the casting)","duration":"4 hours","description":"You reach out and touch a willing creature, drawing it into a restorative slumber suffused with curative magic that persists for the spell's duration. The creature remains locked in sleep and cannot be awakened by any means until the spell concludes. Upon waking, the creature's hit points are completely restored to their maximum. Should the creature have been afflicted by blindness, deafness, paralysis, poison, or disease at the moment you cast this ritual, you may select a number of these conditions and diseases equal to your proficiency bonus to be cured when the creature finally awakens.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Control","Debuff","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Hypnotic Pattern","level":3,"circle":"3rd-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"S, M (a glowing stick of incense or a crystal vial filled with phosphorescent material)","duration":"Concentration, up to 1 minute","description":"You conjure a spiraling arrangement of captivating hues that fills a 30-foot cube within range before dissolving from sight. Any creature capable of perceiving this display must succeed on a Wisdom saving throw or fall under the spell's enchantment for its duration.\n\nA creature charmed by this spell becomes incapacitated and cannot move, with its speed reduced to 0. The enchantment breaks immediately if the affected creature suffers damage or if another creature uses an action to forcefully rouse it from its mesmerized state.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control","Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Lightning Bolt","level":3,"circle":"3rd-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self (100-foot line)","components":"V, S, M (a bit of fur and a rod of amber, crystal, or glass)","duration":"Instantaneous","description":"You unleash a torrent of electrical energy that tears across the battlefield in a devastating line.\n\nA jagged bolt of lightning streaks outward from your fingers in a direction you designate, extending 100 feet forward and spanning 5 feet in width. Every creature caught within this line must succeed on a Dexterity save to resist the full force of the discharge. Those who fail take 8d6 lightning damage, while those who succeed take half damage.\n\nAny flammable objects in the line that are neither worn nor carried instantly ignite from the electrical strike.\n\nAt Higher Circles. If you cast this spell using a spell slot of 4th circle or higher, increase the damage by 1d6 for each slot level above 3rd.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Lightning"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Magic Circle","level":3,"circle":"3rd-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Abjuration","isRitual":true,"castingTime":"1 minute","range":"10 feet","components":"V, S, M (holy water or powdered silver and iron worth at least 100 gp, which the spell consumes)","duration":"1 hour","description":"You inscribe a zone of protective warding magic upon the ground, establishing a barrier against extraplanar intruders.\n\nYou establish a cylinder of magical force extending 10 feet outward from a central point on the ground within your range and rising 20 feet high. Luminous runes manifest along every edge where this cylinder meets solid surfaces.\n\nYou designate one or more creature types to be affected by this magic: Celestials, Elementals, Fey, Fiends, or Undead. Creatures of your chosen type experience the following effects:\n\n• The creature cannot enter the cylinder through ordinary, non-magical movement. Should it attempt to bypass the barrier via teleportation or planar transit, it must succeed on a Charisma saving throw first.\n\n• The creature makes attack rolls against creatures inside the cylinder at disadvantage.\n\n• Creatures within the cylinder cannot be charmed, frightened, or possessed by the creature.\n\nAt the moment of casting, you may reverse the circle's orientation, causing it to contain the chosen creature type within its bounds instead while shielding those outside from its influence.\n\nAt Higher Circles. As you gain access to more powerful spell slots, the magic intensifies. Upon gaining access to 4th-circle spell slots, the duration extends by 1 hour for each spell slot tier above 3rd that you can access.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":[],"tags":["Buff","Control","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Major Image","level":3,"circle":"3rd-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (a bit of fleece)","duration":"Concentration, up to 10 minutes","description":"You manifest a detailed illusion that responds to your will.\n\nWithin range, you conjure the image of an object, creature, or other visible phenomenon measuring no more than a 20-foot cube. This image materializes at a location you can perceive and persists for the duration. It appears entirely convincing to the senses, complete with accompanying sounds, odors, and thermal properties befitting the depicted subject. However, you cannot generate sufficient heat or cold to inflict damage, produce sound intense enough to deal thunder damage or render a creature deaf, or create an odor capable of causing sickness in a creature (such as a troglodyte's stench).\n\nWhile you remain within range of your illusion, you may expend an action to relocate the image to another spot within range. As the image shifts position, you can modify its appearance to make these movements seem authentic to what is being depicted. Should you have created an image of a creature, for instance, you can adjust it to appear as though it walks. You may also vary the sounds the illusion produces at different moments, including making it engage in dialogue.\n\nDirect physical contact with the image exposes its illusory nature, as solid objects pass through it without resistance. A creature spending an action to scrutinize the image can discern its false nature with a successful Intelligence (Investigation) check against your spell save DC. Once a creature recognizes the illusion's true character, it can see through the image, and all other sensory aspects of the illusion grow indistinct to that creature.\n\nAt Higher Circles. When you cast this spell using a spell slot of 6th circle or higher, the spell remains in effect until dispelled and no longer requires your concentration.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Intelligence"],"damageTypes":["Cold","Thunder"],"tags":["Damage","Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Mantle of Death","level":3,"circle":"3rd-Circle","traditions":["Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Concentration, up to 1 minute","description":"A shroud of shadow drapes across you, wreathing your form in deathly power. Until the spell ends, you gain resistance to necrotic damage, and whenever you hit with a spell attack or weapon attack, you deal an additional 2d10 necrotic damage.\n\nWhen you cast this spell using a 4th circle spell slot or higher, the extra necrotic damage increases by 1d10 for each circle above the 3rd.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V"],"saves":[],"damageTypes":["Necrotic"],"tags":["Buff","Damage"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Mass Healing Word","level":3,"circle":"3rd-Circle","traditions":["Divine"],"school":"Necromancy","isRitual":false,"castingTime":"1 bonus action","range":"60 feet","components":"V","duration":"Instantaneous","description":"Uttering restorative incantations, you mend the wounds of multiple allies at once. Up to six creatures within range that you can perceive regain hit points equal to 1d4 + your spellcasting ability modifier. Constructs and Undead cannot benefit from this magic.\n\nWhen you cast this spell using a spell slot of 4th circle or higher, add 1d4 to the healing for each slot level above 3rd.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Meld Into Stone","level":3,"circle":"3rd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"8 hours","description":"You become one with a stone surface, sinking into its mass for hours at a time.\n\nBy expending your movement, you enter a stone object or surface large enough to accommodate your entire body, integrating yourself along with all your possessions into the stone for the spell's duration. You step into the stone at a location within your reach. Your form becomes completely imperceptible—neither visible nor detectable through nonmagical means.\n\nWhile absorbed into the stone, you cannot perceive events happening outside it, and any Wisdom (Perception) checks made to detect external sounds suffer disadvantage. You maintain awareness of time's passage and retain the ability to cast spells that target only yourself. Using your movement, you can exit through the same point where you entered, ending the spell immediately. Beyond this, you cannot move while merged.\n\nMinor surface damage to the stone leaves you unharmed. However, significant destruction or reshaping of the stone that renders it too small for your form expels you violently, inflicting 6d6 bludgeoning damage. Complete destruction of the stone or its transformation into a different material forcibly ejects you and deals 50 bludgeoning damage instead. Upon expulsion, you land prone in the nearest unoccupied space to your original entry point.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Necrotic Pustules","level":3,"circle":"3rd-Circle","traditions":["Arcane","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a piece of rotting wood)","duration":"Instantaneous","description":"You curse a single enemy within your sight with a festering affliction that propagates to those who draw near.\n\nYou choose one creature you can see at a distance you can reach and force it to resist a virulent infection. Constructs and Undead cannot be affected by this spell. The target must make a Constitution saving throw. If it fails, pustules erupt across its skin, dealing 2d8 poison damage and 2d8 necrotic damage, and the creature becomes poisoned for 1 minute. At the start of each subsequent turn, the poisoned creature must repeat this saving throw, taking the damage again on a failure or recovering from the effect on a success. A creature that succeeds on its initial save becomes immune to this spell for 24 hours.\n\nAdditionally, any creature that begins its turn within 5 feet of a creature poisoned by this spell must make the same Constitution saving throw. On a failed save, that creature experiences the spell's full effects as described above.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Necrotic","Poison"],"tags":["Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Nondetection","level":3,"circle":"3rd-Circle","traditions":["Arcane","Wyrd"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a pinch of diamond dust worth 25 gp sprinkled over the target, which the spell consumes)","duration":"8 hours","description":"Your touch conceals a target, shielding it from magical means of discovery and remote observation.\n\nFor the spell's duration, a touched target becomes invisible to all divination magic. You may conceal a willing creature, location, or object provided it measures no more than 10 feet across in any direction.\n\nNo divination spell can establish a target lock on the concealed subject, nor can any magical sensor designed for scrying pierce this veil to perceive it.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Phantom Steed","level":3,"circle":"3rd-Circle","traditions":["Wyrd"],"school":"Illusion","isRitual":true,"castingTime":"1 minute","range":"30 feet","components":"V, S, M (an apple made of gold worth 5 gp)","duration":"1 hour","description":"You manifest a phantom equine form that materializes as a Large, quasi-real creature in an unoccupied space within range of your choice. You determine its outward appearance, though it manifests complete with saddle, bit, and bridle. Should any equipment conjured by this spell travel more than 10 feet away from the steed, it dissolves into smoke.\n\nThroughout the spell's duration, you or another creature of your selection may serve as the steed's rider. The creature possesses the statistics of a riding horse with one exception: it moves at a speed of 100 feet per round and covers 10 miles in one hour of travel, or 13 miles when maintaining a fast pace. Upon the spell's termination, the steed fades gradually over the course of 1 minute, allowing the rider sufficient time to dismount. The spell concludes if you expend an action to end it, if the steed sustains any damage whatsoever, or if you cast this spell again to summon a different steed.","classes":["Warlock","Witch"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Damage","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Plant Growth","level":3,"circle":"3rd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action or 8 hours","range":"150 feet","components":"V, S","duration":"Instantaneous","description":"You manipulate the growth of plants to achieve one of two distinct effects, each determined by how long you spend casting the spell.\n\nIf you cast this spell as an action, designate a point within range. Normal plants in a 100-foot radius spreading out from that point rapidly proliferate into dense, tangled growth. Any creature traversing this thickened terrain expends 4 feet of movement for each foot of distance traveled. You may designate one or more areas of any size within the spell's radius to remain unaffected.\n\nAlternatively, you may cast this spell over the course of 8 hours to permanently enrich the soil and vegetation. All plants within a half-mile radius centered on a point within range become magically nourished for 1 year. When these plants are harvested, they yield twice their usual quantity of food.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Pocket Portal","level":3,"circle":"3rd-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 bonus action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You establish a hidden passage connecting two distant locations within your view. Using a bonus action, designate two vacant spaces visible to you within 60 feet. Imperceptible, non-physical portals materialize at each location. When a Large or smaller creature enters a space containing a portal, it may either stay put or expend movement to teleport to an adjacent space next to its counterpart. Traversing a portal does not trigger opportunity attacks.\n\nAny creature that begins its turn in a portal's space gets shunted to a random vacant location up to 5 feet away.\n\nThe portals persist for 1 minute until you voluntarily dismiss them (requiring no action).","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Protection From Energy","level":3,"circle":"3rd-Circle","traditions":["Arcane","Divine","Primordial"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Concentration, up to 1 hour","description":"You shield a willing creature you touch against a single element, granting them resilience against its destructive force. For the spell's duration, the protected creature gains resistance to one damage type you select: acid, cold, fire, lightning, or thunder.","classes":["Bard","Cleric","Druid","Paladin","Ranger","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Reinforcing Ward","level":3,"circle":"3rd-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (adamantine shavings worth at least","duration":"Until dispelled","description":"You fortify an entryway, making it both sealed and hazardous to those who attempt to breach it.\n\nYou seal a door, window, gate, or similar opening for the spell's duration. You may render the entryway opaque when viewed from outside, even if it would normally be open. You and any creatures you specify at the moment of casting can pass through unimpeded. All others find it impassable until destroyed, the spell is dispelled, or its effects are suppressed.\n\nThe warded entry becomes exceptionally difficult to force, adding 10 to the DC for breaking it or picking its locks. Should a creature employ a nonmagical tool or item in a failed attempt to breach the ward, that item shatters. A nonmagical weapon similarly suffers a permanent −1 penalty to its damage rolls for each failed attempt, and upon reaching a −5 cumulative penalty, the weapon is destroyed. If a creature attempts to breach the ward using only its body and fails, and that creature lacks the Siege Monster trait or similar ability, it sustains bludgeoning damage equal to how much its check fell short of the required DC.\n\nWhen a knock spell is cast upon the warded entry, the caster must make an ability check using its spellcasting ability contested against your spell save DC. On a successful check, the caster bypasses this spell's effects for 1 minute.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Bludgeoning","Force"],"tags":["Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Remove Curse","level":3,"circle":"3rd-Circle","traditions":["Divine","Wyrd"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Instantaneous","description":"You reach out and touch your target, severing the supernatural bonds that bind them. All curses plaguing a single creature or object are instantly dispelled by your touch. However, if the target is a magic item bearing a curse, the curse itself persists within the object—your spell instead severs the connection between the item and its attuned owner, freeing them to abandon or dispose of the accursed thing.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Revivify","level":3,"circle":"3rd-Circle","traditions":["Divine","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (diamonds worth 300 gp, which the spell consumes)","duration":"Instantaneous","description":"By touching the body of a creature that fell within the past minute, you mend the thread of life that has been severed. The creature awakens with merely 1 hit point coursing through its form. This magic cannot overcome the ravages of age or restore limbs that have been lost to time or violence.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Sending","level":3,"circle":"3rd-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"Unlimited","components":"V, S, M (a short piece of fine copper wire)","duration":"1 round","description":"You project a focused mental communication toward a creature you know. The recipient perceives your message directly in their mind—a transmission of no more than twenty-five words. Language and intelligence pose no barrier to comprehension; the creature understands your meaning clearly and recognizes you as the sender if you are known to them. They may respond with an equally brief reply, delivered through the same mental channel.\n\nThis communication traverses any distance without limitation and pierces the boundaries between planes of existence. However, when sending a message to a target on a different plane than your own, there is a 5 percent chance the message fails to reach its destination.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Intelligence"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Sleet Storm","level":3,"circle":"3rd-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"150 feet","components":"V, S, M (a pinch of dust and a few drops of water)","duration":"Concentration, up to 1 minute","description":"You call forth a tempest of frozen precipitation that impedes passage and disrupts magical focus.\n\nA cylindrical region of sleet and freezing rain materializes in a space of your choosing within range, spanning 40 feet in radius and reaching 20 feet in height. This area persists for the spell's duration. Heavy obscurement fills the entire zone, and any unprotected flames within it are immediately extinguished.\n\nThe ground throughout becomes treacherous with a layer of ice, transforming it into difficult terrain. Any creature that moves into this area for the first time during a turn or begins a turn within it must succeed on a Dexterity save or be knocked prone.\n\nAny creature maintaining concentration while inside this storm must make a Constitution save against your spell save DC. Failure breaks the creature's concentration.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity","Constitution"],"damageTypes":[],"tags":["Control","Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Slow","level":3,"circle":"3rd-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (a drop of molasses)","duration":"Concentration, up to 1 minute","description":"You warp the flow of time around your targets, dulling their reflexes and slowing their movements.\n\nChoose up to six creatures within a 40-foot cube that you can see within range. Each creature must make a Wisdom saving throw, or it is affected by this spell until the spell ends.\n\nWhile affected, a creature suffers the following effects: its speed is cut in half, it takes a −2 penalty to its AC and to Dexterity saving throws, and it cannot take reactions. During its turn, it may take either an action or a bonus action, but not both.\n\nThe creature cannot make more than one melee attack or ranged attack on its turn, regardless of what class features, spells, or magic items it possesses.\n\nWhenever an affected creature attempts to cast a spell with a casting time of 1 action, roll a d20. If the result is 11 or higher, the spell is delayed—it takes effect at the start of the creature's next turn instead. The creature must then spend its action on that turn to complete the spell. Should it be unable to do so, the spell is lost.\n\nAt the end of each of its turns, an affected creature may repeat the Wisdom saving throw. If it succeeds, the spell's effect on it ends.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity","Wisdom"],"damageTypes":[],"tags":["Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Speak With Dead","level":3,"circle":"3rd-Circle","traditions":["Divine","Wyrd"],"school":"Necromancy","isRitual":true,"castingTime":"1 minute","range":"10 feet","components":"V, S, M (burning incense)","duration":"10 minutes","description":"You temporarily animate a corpse with just enough consciousness to respond to your inquiries. Choose a corpse within range and grant it a semblance of sentience and speech. The corpse must possess an intact mouth and cannot be an Undead creature. The spell has no effect if that same corpse has been targeted by this spell at any point during the last 10 days.\n\nWhile active, you may pose up to five questions to the animated corpse. It can only articulate knowledge it possessed while alive, including any languages it once spoke. Its responses tend toward brevity, obscurity, or repetition, and the corpse feels no obligation to answer truthfully if you have treated it with hostility or if it considers you an enemy. Note that this spell does not restore the creature's soul—merely a fragment of its former consciousness animates the remains.\n\nConsequently, the corpse cannot absorb new information, has no awareness of events that transpired after its death, and cannot offer predictions or theories about what may come to pass.\n\nOnce you have cast this spell upon a particular corpse, you cannot cast it on that same corpse ever again.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Speak With Plants","level":3,"circle":"3rd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self (30-foot radius)","components":"V, S","duration":"10 minutes","description":"You grant nearby plants a primitive consciousness, enabling them to perceive and respond to your communication and instructions.\n\nWithin 30 feet of you, plants awaken to rudimentary awareness and can interact with you vocally and obey your straightforward directives. You may interrogate these plants about events that occurred within the spell's range during the past day, learning details about the creatures that traveled through, atmospheric conditions, and other relevant details.\n\nAdditionally, you can convert difficult terrain created by plant growth—such as dense thickets or tangled vegetation—into normal terrain for the spell's duration. Alternatively, you can transform ordinary terrain where plants are growing into difficult terrain lasting for the duration, causing vines and branches to entangle and obstruct movement in your pursuers' paths.\n\nPlants may undertake additional tasks at your caster's discretion. Though this spell does not grant plants the ability to uproot themselves and relocate, they remain capable of moving their branches, tendrils, and stalks freely.\n\nIf a Plant creature occupies the area, you can converse with it as though you both spoke the same language, though you gain no enchantment to sway its actions or will.\n\nThis spell can compel plants conjured by the entangle spell to release any creature they are currently restraining.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Spirit Guardians","level":3,"circle":"3rd-Circle","traditions":["Divine","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Self (15-foot radius)","components":"V, S, M (a memento from a dead person)","duration":"Concentration, up to 10 minutes","description":"You summon spectral protectors that manifest around you in a shroud of otherworldly presence. These spirits occupy the space within 15 feet of you and persist for the spell's duration.\n\nUpon casting, you may choose any number of creatures within your sight to remain unharmed by the spirits' interference. Any creature caught within the spirits' domain finds its movement speed reduced by half. Whenever such a creature first enters the affected area during a turn or begins its turn within it, that creature must attempt a Wisdom saving throw.\n\nIf the creature fails this save, it suffers 3d8 radiant damage or 3d8 necrotic damage—you choose which type. A successful save reduces the damage taken by half.\n\nAt Higher Circles. When you cast this spell using a spell slot of 4th circle or higher, the damage dealt increases by 1d8 for each slot level above 3rd.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":["Necrotic","Radiant"],"tags":["Damage","Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Stinger Spray","level":3,"circle":"3rd-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self (30-foot cone)","components":"V, S, M (hornet stinger)","duration":"Instantaneous","description":"Your hands become the epicenter of a violent eruption, releasing a torrent of venomous spines in a spreading cone. Every creature caught within 30 feet of your position must succeed on a Constitution saving throw or suffer the full brunt of the assault. Those who fail take 3d10 piercing damage as the stingers rake across their bodies and 3d6 poison damage from the venom coursing through their wounds, and they become poisoned for 1 minute. Creatures that succeed on their save take half the damage and avoid the poisoned condition entirely. A poisoned creature may attempt another Constitution saving throw at the end of each of its turns, freeing itself from the poison on a success.\n\nWhen you cast this spell using a spell slot of 4th circle or higher, the spell's potency increases. For each slot level above 3rd, you may boost either the piercing damage by 1d10 or the poison damage by 1d6, choosing which type of damage to enhance with each additional slot level.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Piercing","Poison"],"tags":["Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Stinking Cloud","level":3,"circle":"3rd-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M (a rotten egg or several skunk cabbage leaves)","duration":"Concentration, up to 1 minute","description":"You conjure a noxious cloud that overwhelms the senses of those caught within it.\n\nA sphere of acrid, yellowish gas materializes in a 20-foot radius around a point you designate within range. The cloud winds freely around obstacles and terrain, and the space it occupies becomes heavily obscured. The cloud persists for the duration you have set.\n\nAt the start of each of its turns, any creature that is wholly contained within the cloud's boundaries must attempt a Constitution saving throw against poison damage. If the creature fails this save, it must spend its entire action on that turn vomiting and staggering about. Creatures that have no need to breathe, or those that possess immunity to poison, automatically succeed on this saving throw instead.\n\nA moderate wind moving at a minimum of 10 miles per hour will scatter the cloud completely after 4 rounds have elapsed. A strong wind moving at a minimum of 20 miles per hour will disperse the cloud after only 1 round.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Poison"],"tags":["Damage","Summon"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Structured Mind","level":3,"circle":"3rd-Circle","traditions":["Primordial"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"8 hours","description":"You fortify a creature's mental resilience against external influences and deception.\n\nYou harmonize a creature's inner essence to strengthen its cognitive defenses. Select a willing creature you can see within range that isn't a Construct or Undead. Until the spell ends, the target gains resistance to psychic damage and rolls with advantage on saving throws made to resist becoming charmed, frightened, or stunned.\n\nAdditionally, creatures under this spell's effect roll with advantage on Insight checks used to pierce through illusions or discern the genuine appearance of targets concealed by magical disguise.\n\nAt Higher Circles. When you cast this spell using a spell slot of 4th circle or higher, you may affect one additional creature for each slot level above 3rd. All targeted creatures must be positioned within 30 feet of one another at the moment of casting.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":["Psychic"],"tags":["Buff","Control","Damage"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Tiny Hut","level":3,"circle":"3rd-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":true,"castingTime":"10 minutes","range":"Self (10-foot-radius dome)","components":"V, S, M (a small crystal bead)","duration":"8 hours","description":"You conjure a shielding dome of magical force to shelter you and your companions.\n\nAn immobile barrier of pure force materializes in a 10-foot radius centered on you, encompassing the space above as well, and persists for the spell's duration. If you depart from within the dome's boundaries, the spell terminates immediately.\n\nThe dome's interior can accommodate you alongside up to nine creatures of Medium size or smaller. The spell does not take effect if a creature larger than Medium would be enclosed or if more than nine creatures would occupy the space. Any creature or object present when you cast the spell can traverse the dome's interior freely and pass through its boundaries without hindrance. All other creatures and objects find the dome impenetrable and cannot cross its threshold. Magical spells and effects cannot penetrate the dome's surface or originate from beyond it. The interior maintains a comfortable, dry atmosphere regardless of external weather conditions.\n\nAs long as the spell remains active, you can adjust the interior lighting between dim illumination and complete darkness at will. The dome appears as an opaque color of your choosing when viewed from outside, yet becomes transparent when viewed from within.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Force"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Tongues","level":3,"circle":"3rd-Circle","traditions":["Arcane","Divine"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a small clay model of a ziggurat)","duration":"1 hour","description":"When you touch a creature, you weave enchantment through its mind and voice. For the duration, the target comprehends the meaning behind any spoken language it encounters. Simultaneously, whenever the target speaks aloud, any creature within earshot that possesses knowledge of at least one language automatically grasps the intended meaning of its words, regardless of what tongue the target actually uses.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Trestle","level":3,"circle":"3rd-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":true,"castingTime":"10 minutes","range":"30 feet","components":"V, S, M (a 1-inch piece of green vine, which the spell consumes)","duration":"Until destroyed or dispelled","description":"You infuse a vine with preternatural growth, commanding it to rapidly extend across terrain or through the air.\n\nA vine materializes from a solid foundation—such as earth or stone—and extends in a direction of your choosing, either sprawling across surfaces or climbing skyward. The vine must originate from a sturdy surface, and it possesses sufficient structural integrity to bear up to 600 pounds distributed along its full span, extending for a distance measured in feet equal to 5 times your highest accessible Primordial circle. Should the weight ever exceed this limit, the vine instantly fails and crumbles to dust. Similarly, any vine destroyed through excessive damage or structural failure immediately disintegrates completely.\n\nThe vine's surface features numerous small tendrils suited for climbing, requiring a successful DC 5 Strength (Athletics) check to ascend. The vine has AC 8, hit points equal to 5 times your highest accessible Primordial circle, and a damage threshold of 5.\n\nAt Higher Circles. Your mastery of higher circle magic enhances this ritual's capabilities. Upon gaining access to 4th-circle spell slots or beyond, the vine gains the ability to support an additional 30 pounds of weight, and its damage threshold increases by 1 for each spell slot tier you can access above the 3rd circle.","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Strength"],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Vampiric Touch","level":3,"circle":"3rd-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 minute","description":"Your hand wreathed in shadow reaches out to steal the vitality of another being, converting their life essence into your own restoration. Make a melee spell attack against a creature you can reach. When your attack connects, the creature suffers 3d6 necrotic damage, and you recover hit points equal to half the necrotic damage you inflicted. For the duration of this spell, you may repeat this attack on each of your turns by spending an action.\n\nAt Higher Circles. If you cast this spell using a spell slot of 4th circle or above, add 1d6 to the damage for each slot level beyond the 3rd.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Force","Necrotic"],"tags":["Damage","Healing"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Veil of Waves","level":3,"circle":"3rd-Circle","traditions":["Primordial","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 hour","description":"Flowing water manifests around your form, creating a shimmering barrier of aqueous magic. This protective shell grants you resistance against both cold and fire damage while rendering you immune to any poisons delivered through contact. The veil enhances your mobility in water, granting you a swimming speed of 50 feet, and allows you to extract oxygen directly from water as though it were air. As an action, you may touch a nonmagical fire that occupies no more than a 5-foot square within your reach and snuff it out entirely.","classes":["Druid","Ranger","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":["Cold","Fire"],"tags":["Damage","Summon"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Venomous Smite","level":3,"circle":"3rd-Circle","traditions":["Divine","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, M (a melee weapon)","duration":"Concentration, up to 1 minute","description":"You infuse a weapon in your grasp with toxic venom designed to wound and sicken your enemies.\n\nUpon casting, you imbue a weapon you currently hold with this spell's magic. The instant that weapon strikes a creature before the spell's duration expires, the hit inflicts an additional 3d6 poison damage, and the struck creature becomes poisoned until the spell concludes. At the beginning of each turn the poisoned creature takes, it may attempt a Constitution saving throw, freeing itself from the poisoned condition on a successful save.\n\nAt Higher Circles. Should you cast this spell by expending a spell slot of 4th circle or greater, the additional poison damage increases by 1d6 for every circle of the spell slot above 2nd.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","M"],"saves":["Constitution"],"damageTypes":["Poison"],"tags":["Damage","Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Water Breathing","level":3,"circle":"3rd-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a short reed or a piece of straw)","duration":"24 hours","description":"Water Breathing\n\nBy casting this spell, you bestow upon a sizable gathering of creatures the gift of aquatic respiration. Up to ten willing creatures within your range that you can perceive gain the capacity to extract oxygen from water and breathe freely beneath its surface for the duration. These enchanted creatures maintain their original breathing methods alongside this newfound ability, allowing them to function equally well in water or in air.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Water Walk","level":3,"circle":"3rd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a piece of cork)","duration":"1 hour","description":"You bestow the ability to traverse liquid surfaces without sinking. Up to ten willing creatures you can see within range gain the ability to move across any liquid surface—such as water, acid, mud, snow, quicksand, or lava—as if it were solid ground. A creature moving over lava still takes fire damage from contact with it. If you target a creature submerged in a liquid, the spell carries it to the surface at a rate of 60 feet per round.","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Wind Wall","level":3,"circle":"3rd-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S, M (a tiny fan and a feather)","duration":"Concentration, up to 1 minute","description":"You manifest a barrier of forceful wind that erupts from the ground at a location of your choice within range. This wall can extend up to 50 feet in length, stand 15 feet tall, and measure 1 foot thick. You may configure it into any shape you wish, provided it forms a single unbroken line along the ground. The wall persists for the full duration.\n\nUpon its creation, every creature occupying the wall's space must succeed on a Strength save or suffer 3d8 bludgeoning damage; those who save take half damage instead.\n\nThe intense wind prevents fog, smoke, and gases from passing through. Tiny or smaller flying creatures and flying objects cannot cross the barrier. Lightweight, unsecured materials that enter the wall are swept upward. Standard projectiles such as arrows and bolts fired at creatures beyond the wall are deflected skyward and invariably fail to hit their targets. (Heavy projectiles like giant-hurled boulders and siege engine ammunition ignore this effect.) Entities in a gaseous form are unable to traverse it.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength"],"damageTypes":["Bludgeoning"],"tags":["Damage","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Acid Rain","level":4,"circle":"4th-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You summon a caustic tempest that drenches the ground with corrosive precipitation.\n\nA murky, verdant cloud manifests in a cylindrical form measuring 10 feet in height and spanning a 20-foot radius, positioned at a point within your sight. The summoning fails if no visible point in the air exists where such a cloud could materialize—such as within an enclosed chamber too small to contain it.\n\nUpon casting, acidic rain immediately begins falling. Any creature positioned directly beneath the cloud must succeed on a DEX saving throw or take 5d8 acid damage, suffering half damage on a successful save. Whenever a creature moves into the cloud's area for the first time during a turn or begins its turn within the cloud, it must make the saving throw again.\n\nYou may expend a bonus action to relocate the cloud up to 30 feet.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Acid"],"tags":["Damage","Summon"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Arcane Eye","level":4,"circle":"4th-Circle","traditions":["Arcane"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a bit of bat fur)","duration":"Concentration, up to 1 hour","description":"You conjure an invisible magical eye that floats in place within range and persists for the spell's duration. This eye transmits visual information directly to your mind—it perceives the world through normal vision and darkvision extending 30 feet in all directions simultaneously.\n\nOn your turn, you may spend an action to command the eye to move up to 30 feet in any direction you choose. The eye can travel to any distance from you without restriction, though it cannot cross into other planes of existence. Physical obstructions stop the eye's movement, but it can slip through any gap measuring 1 inch in diameter or larger.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Aura of Mercy","level":4,"circle":"4th-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Concentration, up to 1 minute","description":"A calming emanation spreads outward from your form, extending ten feet in all directions. This radiant field of restorative power remains centered upon you as you move, traveling wherever you go. While the aura persists, whenever a creature you designate begins its turn within this zone of healing energy, it restores hit points equal to 1d4 plus your spellcasting ability modifier.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Healing"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Banishment","level":4,"circle":"4th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (an item distasteful to the target)","duration":"Concentration, up to 1 minute","description":"You reach out toward a creature within range, attempting to wrench it away to another plane of existence. The target must make a Charisma saving
