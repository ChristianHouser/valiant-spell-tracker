 Intelligence or Charisma ability check benefits from advantage, and you add double your proficiency bonus to that check. Yet such knowledge exacts a price. Roll a d20; if the result is a 1, you become momentarily touched by forces beyond comprehension, gaining a short-term dread effect as detailed in the Game Master's Guide. At the Game Master's discretion, you may instead receive cryptic counsel or a fragmented revelation drawn from the void itself.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Intelligence","Charisma"],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Volley","level":1,"circle":"1st-Circle","traditions":["Divine","Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 bonus action","range":"Touch","components":"V, S","duration":"1 round","description":"When you touch a willing creature, you imbue it with the ability to multiply its ranged attacks. The next time that creature makes a ranged attack, a duplicate missile materializes and makes a separate attack roll against the same target, using the identical attack bonus and damage mechanics. Should the original weapon or ammunition carry magical properties, the conjured missile inherits those same magical effects. The duplicate projectile dissipates immediately after the attack resolves. This spell's magic fades if the affected creature fails to make a ranged attack before your next turn begins.\n\nWhen cast using a spell slot of 2nd circle or higher, you generate one additional duplicate missile for each slot level above 1st.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Summon"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Warding Charm","level":1,"circle":"1st-Circle","traditions":["Divine","Wyrd"],"school":"Abjuration","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (an amulet, bracelet, ring, or other small piece of jewelry)","duration":"8 hours","description":"You weave protective magic into a small item, designating one present creature as its bearer. The bearer gains a bonus to saving throws equal to half your spellcasting ability modifier, with a minimum bonus of +1. This benefit persists for the spell's duration or until the bearer fails a saving throw, at which point the charm ends.\n\nWhen you gain access to 4th-circle spell slots, the bonus increases to your full spellcasting ability modifier. At 6th-circle spell slots, the charm grants advantage on saving throws against spells from one school of magic you choose at the time of casting. Once you unlock 8th-circle spell slots, if the bearer fails a saving throw, they may choose to reroll it instead, and the charm ends.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Withering Gaze","level":1,"circle":"1st-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You focus your eyes upon a creature you can perceive within range, channeling the wrathful attention of a terrible power. The target, provided it can also see you, must succeed at a Charisma saving throw or suffer the consequences of your malevolent stare. Those who fail take 1d10 psychic damage and become frightened of you until the end of their next turn. If the creature was already frightened before this spell took effect, it must expend all its movement during its next turn fleeing directly away from you. Creatures who succeed on their saving throw take half damage and avoid the frightened condition entirely.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Charisma"],"damageTypes":["Piercing","Psychic"],"tags":["Control","Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Acid Arrow","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M (powdered rhubarb leaf and an adder’s stomach)","duration":"Instantaneous","description":"A corrosive projectile materializes and hurtles toward your chosen target. This gleaming emerald bolt travels up to your spell's range before detonating into a caustic deluge. You make a ranged spell attack roll against the target. If the attack succeeds, the target suffers 4d4 acid damage at once, then takes an additional 2d4 acid damage when its next turn ends. Should your attack fail, the arrow still reaches the target but only as a glancing spray—dealing half the initial damage with no lingering effect at the end of its next turn.\n\nWhen you cast this spell at 3rd circle or higher, both the immediate damage and the delayed damage each increase by 1d4 for every spell circle above 2nd.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":["Acid"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Acidic Secretion","level":2,"circle":"2nd-Circle","traditions":["Arcane","Primordial","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Concentration, up to 10 minutes","description":"Your body secretes a corrosive acid that coats your skin and belongings. You and any equipment you possess at the moment of casting remain unharmed by this acid. For the duration, you may deliver unarmed melee strikes that inflict 5d4 acid damage upon contact. When you maintain a grapple with a creature, that creature suffers 5d4 acid damage at the start of each of your turns. Should a creature grapple you, or should you be restrained or immobilized by physical means such as ropes or chains, the offending creature or restraining object takes 5d4 acid damage at the start of your turn if restrained, or at the start of the creature's turn if grappled.","classes":["Bard","Druid","Ranger","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V"],"saves":[],"damageTypes":["Acid"],"tags":["Control","Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Aid","level":2,"circle":"2nd-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a tiny strip of white cloth)","duration":"8 hours","description":"This spell reinforces your companions with fortitude, hardening their resolve against harm.\n\nSelect up to three creatures you can reach. For the spell's duration, each chosen creature gains 5 additional hit points to both their current total and their maximum capacity.\n\nAt Higher Circles. If you expend a spell slot of 3rd circle or greater to cast this spell, increase each target's hit point gain by an additional 5 for every slot level beyond 2nd.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Alter Room","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":true,"castingTime":"10 minutes","range":"30 feet","components":"V, S, M (a mix of masonry dust, wood shavings, and thread)","duration":"24 hours","description":"Through your magic, you transform the perceived character of an enclosed chamber. You designate a fully enclosed area within range—covering up to 100 square feet—and alter its appearance to resemble an entirely different environment. The space must possess a floor, ceiling, and four walls, though these structures may contain breaches or openings. You might make a dank dungeon chamber look like a cozy bedroom, or transform a crumbling ruin into an opulent, well-furnished room. However, the room's actual physical structure and the objects within it remain unchanged. Any creature that attempts to interact with the illusory elements may discover the deception through tactile contact. If the illusion cannot be detected through touch alone, a creature that scrutinizes it closely can make an Intelligence (Investigation) check against your spell save DC to discern the truth. Upon succeeding, the creature perceives the illusion as a translucent overlay flickering across the actual space.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Intelligence"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Alter Self","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 hour","description":"You magically reshape your physical form in one of three ways.\n\nUpon casting, select one option below. Your choice persists for the spell's duration, though you may spend an action to exchange your current option for a different one.\n\nAquatic Adaptation. Your body transforms to thrive underwater. You develop gills and webbing between your digits, allowing you to breathe beneath the surface. You gain a swimming speed equal to your walking speed.\n\nChange Appearance. You alter your outward form at will. You control your height, weight, facial features, voice quality, hair length, skin tone, and any distinctive marks. You may adopt the appearance of another lineage, though this does not alter your game statistics. Your new form must match your current size category, and your fundamental body structure remains unchanged—a bipedal creature cannot become quadrupedal, for example. You may use your action at any point during the spell's duration to shift your appearance again.\n\nNatural Weapons. You manifest a natural weapon of your choosing—such as claws, fangs, spines, or horns. Your unarmed strikes using this weapon deal 1d6 damage of the appropriate type (bludgeoning, piercing, or slashing), and you gain proficiency with these strikes. The weapon counts as magical, and you enjoy a +1 bonus to both your attack rolls and damage rolls made with it.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Bludgeoning","Piercing","Slashing"],"tags":["Buff","Damage","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Animal Messenger","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Enchantment","isRitual":true,"castingTime":"1 minute","range":"30 feet","components":"V, S, M (a morsel of food)","duration":"24 hours","description":"You call upon a nearby small beast to serve as your courier.\n\nSelect a Tiny Beast within range that you can perceive, such as a squirrel, blue jay, or bat. Designate a specific location you have previously visited and identify a recipient by general description—for example, \"a guard wearing the town's uniform\" or \"a red-haired dwarf in a pointed hat.\" Speak your message, which must not exceed twenty-five words. The Beast travels toward your designated location for the spell's duration, moving approximately 50 miles each day if it flies, or 25 miles each day if it travels by other means.\n\nUpon reaching the destination, the messenger delivers your message to a creature matching your description, reproducing the tone and quality of your voice. The spell then ends, and the Beast returns to the location where you cast it. The messenger speaks only to creatures that fit your stated description. Should the messenger fail to reach its destination before the spell's duration expires, your message is lost, and the Beast returns to the casting location.\n\nYou cannot cast this spell again while a previous casting remains active; any attempt to do so fails.\n\nAt Higher Circles: When you gain access to 3rd circle spell slots or beyond, the spell's duration extends by an additional 48 hours for each circle level above 2nd for which you possess spell slots.","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Animal Spy","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"30 feet","components":"V, S, M (a silken cord, woven with amethysts, worth at least 10 gp)","duration":"1 hour","description":"Through this magic, you forge a sensory bridge with a Beast or creature bearing the Animal subtype within range. Once established, this connection persists for the spell's duration.\n\nOn your turn, you may spend a bonus action to project your consciousness into the creature, perceiving the world through any combination of its senses. On any following turn, you can use another bonus action to withdraw your awareness back into your body. You may also use an action to sever the connection entirely at will.\n\nSummoned animals and magical familiars cannot be targeted by this spell. The magic grants you no ability to command the creature or influence its disposition toward you. Should your awareness inhabit the creature's body, your physical form falls unconscious and perceives nothing of its surroundings—you remain oblivious even to harm inflicted upon it.\n\nThe connection breaks automatically if your body moves more than 1 mile away from the creature, if the creature dies, or when the spell's duration expires. Should the creature be killed while you are perceiving through its senses, you must make a DC 14 Wisdom saving throw. Failure leaves you stunned for 1d4 rounds, overcome by the violent severance of the link.","classes":["Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Appease Local Spirits","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Abjuration","isRitual":true,"castingTime":"1 hour","range":"Self (20-foot radius)","components":"V, S, M (herbs, incense, and wine worth 50 gp, which the spell consumes)","duration":"12 hours","description":"Your respectful petition to the spirits of nature grants you and your companions safe passage through their domain. By offering tribute and swearing reverence to these ethereal guardians, you secure their blessing—or at minimum, their tolerance—enabling swifter movement across the land.\n\nFor the spell's duration, you and all allies present when you perform the ritual ignore difficult terrain caused by natural sources. Difficult terrain created by creatures, magical spells, or other enchantments continues to impede movement normally. Travel distance covered by affected creatures increases by one category at their current pace—those moving at a slow pace now cover ground as if traveling normally, while those at a fast pace cover an additional twenty-five percent of their usual distance.\n\nYou and your allies gain advantage on Wisdom (Survival) checks when attempting to evade natural dangers, locate and harvest wild provisions, or guide your group safely through terrain without losing your way.\n\nThe spell terminates immediately if any affected creature uses an action to inflict harm upon the natural world, such as igniting an uncontrolled fire or contaminating a freshwater source. The spell also ends when your traveling group crosses from one terrain type into another—transitioning from woodland to grassland, or departing mountains to explore subterranean passages beneath.","classes":["Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Arc Burst","level":2,"circle":"2nd-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Instantaneous","description":"You conjure a violent arc of electrical energy that lashes out with crackling fury. A jagged bolt of lightning streaks toward a creature within range of your choice. Make a ranged spell attack roll against that target. If you hit, the target suffers 2d6 lightning damage as the electricity courses through it. The remaining energy branches outward, arcing to every creature standing within 5 feet of the target and dealing lightning damage equal to your spellcasting ability modifier to each of them.\n\nWhen you cast this spell using a 3rd-circle spell slot or higher, increase the initial damage by 1d6 for every circle above 2nd.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":["Fire","Lightning"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Arcane Lock","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":true,"castingTime":"1 action","range":"Touch","components":"V, S, M (gold dust worth at least 25 gp, which the spell consumes) V, S, M (a small square of silk and burning","duration":"Until dispelled","description":"You place a magical seal upon an entryway or container, binding it shut through arcane means. After touching a closed door, window, gate, chest, or similar object, that object remains locked throughout the spell's duration. You may freely open the sealed object, as can any creatures you specify at the moment of casting. Additionally, you may establish a password—speaking this phrase within 5 feet of the object temporarily deactivates the spell for 1 minute. Without the password, the object cannot be opened except by breaking through it, or by dispelling or suppressing the spell through magical means. The knock spell, when cast upon the object, suppresses arcane lock's effects for 10 minutes. The magical seal strengthens the object's structural integrity; any attempt to break it or force open its locks faces a DC increased by 10.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Force"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Arcane Trap","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":true,"castingTime":"1 minute","range":"Touch","components":"V, S, M (a bit of twine)","duration":"8 hours","description":"You inscribe a magical trap onto a 5-foot-wide area of solid surface (floor, wall, or similar) that you touch.\n\nAny creature actively searching for this trap must succeed on an Intelligence (Investigation) or Wisdom (Perception) check against your spell save DC to detect it.\n\nThe trap activates when a creature enters its space. All trap-related save DCs equal your spell save DC. When you cast this spell, you select which trap variety to create: flash, snare, or thundercrack.\n\nFlash. A brilliant light erupts from the trap. Each creature within 5 feet must succeed on a Constitution save or become blinded for 1 minute. A blinded creature can make another save at the end of each turn to end the condition.\n\nSnare. An ethereal cord lashes out from the trap. The creature that triggered it must succeed on a Dexterity save or become grappled. While grappled, the creature can use an action to make a Strength (Athletics) or Dexterity (Acrobatics) check of its choice against your spell save DC, freeing itself on a success.\n\nThundercrack. The trap releases a concussive wave of sound and force. Each creature within 5 feet must succeed on a Strength save or take 1d8 thunder damage and be pushed 10 feet away from the trap. The detonation produces a thunderous sound audible up to 300 feet away.\n\nAt Higher Circles. When you gain access to 5th-circle spell slots, you unlock two additional trap options: arcane brand or dazzling lights.\n\nArcane Brand. The trap applies a mystical mark to the triggering creature. It must succeed on an Intelligence save or become marked by a magical glyph for the duration. You know the marked creature's direction from you if it remains within 1,000 feet, and you also perceive the direction of its movement. A marked creature repeats the save at the end of each hour; success removes the glyph. Any creature can discover a glyph on itself or another through a successful Intelligence (Investigation) check. You can maintain only one active glyph. If you mark a second creature while a glyph persists on another, the first glyph immediately disappears.\n\nDazzling Lights. The trap explodes with prismatic colors and radiance. Each creature within 5 feet that can see the display must succeed on a Wisdom save or take 4d4 psychic damage and become stunned for 1 minute. A stunned creature can repeat the save at the end of each turn to end the condition.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Dexterity","Constitution"],"damageTypes":["Force","Psychic","Thunder"],"tags":["Control","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Augury","level":2,"circle":"2nd-Circle","traditions":["Divine","Wyrd"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"Self","components":"V, S, M (specially marked sticks, bones, or similar tokens worth at least 25 gp)","duration":"Instantaneous","description":"Through the manipulation of mystical implements—whether gem-studded rods, ancient bones, arcane cards, or similar divination apparatus—you petition an otherworldly intelligence to glimpse the fate of an action you intend to undertake within the next 30 minutes. Your otherworldly contact conveys their insight through one of four omens, which the GM selects:\n\n• Weal, indicating favorable circumstances\n• Woe, indicating unfavorable circumstances\n• Weal and woe, indicating both favorable and unfavorable elements\n• Nothing, indicating circumstances of neutral consequence\n\nThe omen reflects only the most probable outcome under current conditions and does not account for variables that may yet shift the result—including the casting of future spells or changes in your party composition.\n\nShould you cast this spell multiple times before finishing your next long rest, each casting beyond the first carries a cumulative 25 percent chance that the GM provides a false reading instead. The GM determines this outcome in secret.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Bad Eggs","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (six unfertilized eggs)","duration":"Instantaneous","description":"You transmute six ordinary eggs into volatile explosive projectiles.\n\nEach egg becomes infused with a distinct form of magical energy and is assigned both a damage type and identifying color: acid (black), cold (blue), fire (red), lightning (yellow), poison (green), and thunder (gray). When a creature uses an action to hurl an egg toward a location within 60 feet, the egg ruptures in a 20-foot-radius sphere centered on that point. Every creature within the affected area must succeed on a Dexterity save or suffer 1d8 damage matching the egg's type; those who succeed take half damage instead.\n\nThe eggs remain fragile and unstable. Should an egg break before being thrown, it immediately detonates at that very location, creating the same 20-foot-radius explosion.\n\nAt Higher Circles. When you cast this spell using a spell slot of 3rd circle or higher, you select one additional egg for each slot level above 2nd, and each selected egg deals an extra 1d8 damage. If you cast this spell using a 9th circle spell slot, every egg deals 3d8 damage.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Acid","Cold","Fire","Lightning","Poison","Thunder"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Barkskin","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a handful of oak bark)","duration":"Concentration, up to 1 hour","description":"A protective shell of hardened wood forms across your target's body, granting them nature's own defense.\n\nYou touch a willing creature. For the duration of this spell, the creature's epidermis takes on the appearance of weathered bark, and the creature's armor class cannot fall below 16, regardless of any armor the creature is wearing.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Beneficent Effigy","level":2,"circle":"2nd-Circle","traditions":["Divine","Wyrd"],"school":"Necromancy","isRitual":true,"castingTime":"10 minutes or 1 minute (see text)","range":"300 ft","components":"V, S, M (clay, mud, or wax, and a body part or personal possession of a creature)","duration":"1 hour","description":"You fashion a protective figurine that absorbs harm meant for another.\n\nWhen you cast this spell, you spend 10 minutes crafting a doll shaped like a Humanoid from clay, mud, or wax. You must incorporate a part of the target creature—such as hair, fingernail clippings, or blood—into the doll's construction. You may instead use a small object of genuine or sentimental importance to the creature, like a keepsake or jewelry. After the doll is complete, you can cast this spell on the same target again within 1 minute without creating a new doll, provided the previous one remains intact and undestroyed.\n\nFor the duration, while you maintain possession of the doll, you gain the following capabilities.\n\nAssist. You can use your reaction to aid the target creature through careful manipulation of the doll, granting them the benefits of the Help action, provided you can perceive them and they remain within range.\n\nCast Spell. You can cast cure wounds, lesser restoration, protection from poison, resistance, and restoration through the effigy onto the target creature, so long as the target remains in range.\n\nDivert Pain. As a reaction, you can redirect half of the damage from an attack or spell away from the target and onto the effigy instead. The target takes half the total damage dealt, and the effigy is destroyed, which ends the spell.\n\nSpontaneous Help. With the GM's approval, you can use an action to perform an improvised protective action outside the spell's normal effects. For instance, you might douse the effigy with water to extinguish flames currently burning the target.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Fire","Poison"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Blindness/Deafness","level":2,"circle":"2nd-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V","duration":"1 minute","description":"You project a curse of sensory deprivation at a creature within your reach. Select one creature you can perceive within range and force it to make a Constitution saving throw. Should it fail this save, you decide whether the target suffers blindness or deafness, and this condition persists for the spell's duration. At the conclusion of each of the target's turns, it may attempt another Constitution saving throw, immediately ending the spell's effect on itself if successful.\n\nWhen you cast this spell using a spell slot of 3rd circle or higher, you may target one additional creature for each slot level beyond 2nd.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":["Constitution"],"damageTypes":[],"tags":["Debuff"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Blur","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Concentration, up to 1 minute","description":"Your form shimmers and distorts, becoming difficult to focus upon. For the duration, any creature attempting to strike you must roll their attack twice and use the lower result. This blurring effect fails to hinder attackers that don't depend on vision to locate their targets, such as those with keensense, or those capable of seeing past illusory magic, such as those with truesight.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Buff","Debuff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Boulder Toss","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 minute","description":"Mountain's grip surges through your body, granting you the raw power needed to hurl stone as effortlessly as a giant would.\n\nYou channel the strength of the peaks into yourself, gaining the capability to use an action to fling a rock or similar object with tremendous force. For the purpose of calculating hit and damage bonuses when hurling objects, your Strength counts as 19.\n\nYou gain proficiency with hurled objects for this spell's duration. Objects you hurl have a standard range of 60 feet and a maximum range of 240 feet. When you hit a target, you deal 2d10 + 4 bludgeoning damage to it, with the Strength 19 bonus already factored into this total. If your target is a creature and your attack connects, that creature must make a Strength check against your spell save DC or fall prone.\n\nShould your attack roll be a critical hit, the target makes its Strength check with disadvantage instead.\n\nThis spell grants only the supernatural strength and ability to hurl rocks and similar objects—it does not conjure the projectiles themselves. You must possess or otherwise obtain suitable stones before casting this spell to make use of its benefits.\n\nAt Higher Circles. When you cast this spell using a 4th or 5th circle spell slot, your Strength for hurling increases to 21, and the bludgeoning damage becomes 3d10 + 5. When you cast this spell using a 6th circle spell slot or higher, your Strength for hurling increases to 23, and the bludgeoning damage becomes 4d10 + 6.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Strength"],"damageTypes":["Bludgeoning"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Branding Smite","level":2,"circle":"2nd-Circle","traditions":["Divine"],"school":"Evocation","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V","duration":"Concentration, up to 1 minute","description":"You channel brilliant radiance through a weapon to burn away concealment and reveal hidden foes.\n\nThe next weapon attack you make before this spell ends strikes with blazing astral light. That attack inflicts an additional 2d6 radiant damage to the target. If the target is invisible, it becomes visible. Until the spell ends, the target emits dim light in a 5-foot radius and cannot become invisible through any means.\n\nAt Higher Circles. If you cast this spell using a spell slot of 3rd circle or higher, add 1d6 to the extra damage for each slot level above 2nd.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":["Radiant"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Calm Emotions","level":2,"circle":"2nd-Circle","traditions":["Divine"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"Drawing upon primal forces of tranquility, you flood an area with calming energy designed to pacify troubled minds. You target a 20-foot-radius sphere centered on a point within range and force each Humanoid in that area to make a Charisma saving throw. Any creature may voluntarily fail this save. Those who fail must be affected by one of the following outcomes, chosen by you.\n\n• Suppression. Any magical or supernatural condition causing a target to be charmed or frightened is temporarily nullified. Should this spell's duration expire, the suppressed condition reasserts itself, assuming its original duration has not already elapsed.\n\n• Indifference. You designate specific creatures that your target currently opposes, and the target becomes emotionally indifferent toward them. This induced apathy shatters immediately if the target takes damage from any source, is struck by a spell, or observes an ally suffering harm. Once this spell concludes, the target's hostility returns in full, barring the Game Master's discretion to rule otherwise.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Charisma"],"damageTypes":[],"tags":["Control"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Circle Of Stones","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"1 minute","range":"30 feet (10-foot-radius circle)","components":"V, S, M (four or more crystals worth at least","duration":"8 hours","description":"You imbue four crystalline shards with warding enchantments, positioning them within a designated area no larger than a 10-foot-radius circle at a range you can reach. During the casting, you select which specific creatures or creature types the spell will not target.\n\nAs long as the spell remains active, whenever a non-designated creature enters within 30 feet of the crystals for the first time during a turn or completes its turn in that area, one crystal erupts toward the intruder. That creature must make a Dexterity save; on a failure, it takes 1d6 magical bludgeoning damage. After striking its target, the crystal loses its magical properties and drops to the ground where the creature stood. You gain immediate awareness whenever a crystal is triggered, regardless of your line of sight.\n\nThe spell concludes once all four crystals have been rendered nonmagical. If you cast this spell while maintaining another active Circle of Stones, the crystals from your previous casting instantly lose their magic and that spell terminates.\n\nWhen you unlock higher circles: Upon gaining access to 3rd-circle spell slots or above, you may place one additional crystal for each spell slot level above 2nd that you can access, provided you possess the required components.","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Bludgeoning"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Continual Flame","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (ruby dust worth 50 gp, which the spell consumes)","duration":"Until dispelled","description":"A magical flame manifests upon a touched object, burning with the radiance of a torch yet producing neither warmth nor consuming air. This ethereal fire persists indefinitely, maintained by enchantment rather than combustion, and cannot be extinguished by conventional means—though it may be obscured or veiled. The flame endures only until dispelled by magic.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Corrosive Slime","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"Caustic sludge manifests beneath your feet in a roiling mass. Within range, you create a 10-foot square of corrosive slime that persists for the duration. Creatures find movement through this area impeded. Whenever a creature begins or completes movement within the slime, it must endure 4d6 acid damage. Those harmed by this acid must additionally make a CON saving throw or suffer a 10-foot reduction to their speed until the next turn begins.\n\nWhen cast using a 3rd circle slot, the slime spreads across a 15-foot square and inflicts 5d6 acid damage. When cast using a 4th circle slot or higher, the slime expands to a 20-foot square and deals 6d6 acid damage.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Acid"],"tags":["Damage","Debuff","Summon"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Darkness","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, M (bat fur and a drop of pitch or piece of coal)","duration":"Concentration, up to 10 minutes","description":"You create an impenetrable sphere of magical shadow. Beginning from a point within range that you designate, this shadowy sphere expands outward in all directions, occupying a 15-foot-radius area and persisting for the spell's duration. The darkness flows freely around corners and obstructions. Even creatures blessed with darkvision find themselves unable to pierce this shadow, and ordinary light sources prove wholly ineffective at dispelling it.\n\nShould you select a point upon an object in your possession—whether held in hand or resting nearby but not worn—the darkness originates from that object itself and shifts whenever it moves. However, if you place an opaque barrier directly over the darkness's source, such as a bowl or helmet, the shadow is prevented from spreading outward.\n\nWhenever this spell's shadowed region intersects with any illuminated space created by a spell of 2nd circle or lower, that light-creating spell is immediately dispelled and its effects cease.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Darkvision","level":2,"circle":"2nd-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a pinch of dried carrot or an agate)","duration":"8 hours","description":"You touch a willing creature and grant it enhanced vision that pierces through darkness. For the spell's duration, the target gains the ability to see clearly in nonmagical darkness out to 60 feet away.\n\nWhen you cast this spell using a spell slot of 3rd circle or higher, you may affect an additional creature for each slot level above 2nd.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Deadly Weapon","level":2,"circle":"2nd-Circle","traditions":["Arcane","Divine"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (silver worth at least 1 gp, which the spell consumes)","duration":"1 hour","description":"You channel magic into a weapon, honing its edge and strengthening its structure so it cuts with supernatural precision.\n\nYou touch a weapon. Until the spell ends, the wielder of that weapon treats any d20 roll of 19 or 20 as a critical hit. If the wielder's weapon already grants a critical hit on a roll of 19 or 20, the critical hit range expands instead to include 18, 19, and 20.\n\nAt Higher Circles. If you cast this spell using a spell slot of 4th circle or higher, the weapon inflicts an additional damage die whenever a critical hit is scored. For each two circles above 2nd, add one more damage die.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Detect Thoughts","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Divination","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (a copper piece)","duration":"Concentration, up to 1 minute","description":"You extend your consciousness outward, brushing against the minds of those around you.\n\nFor the duration, you can read the thoughts of certain creatures. When you cast this spell and as your action on each turn until the spell ends, you can focus your awareness on any one creature within 30 feet that you can see. Creatures with an INT of 3 (−4) or lower, or those that speak no languages, are immune to this effect.\n\nYou first perceive only the creature's surface thoughts—the matters most pressing in its mind at that moment. As an action, you can shift your focus to another creature's mind or delve deeper into the same target's consciousness. When probing deeper, the target must make a Wisdom save. On a failed save, you perceive its thought processes (if it has any), its emotional state, and whatever dominates its mind—its fears, desires, or hatreds. On a successful save, the spell ends. Regardless of the outcome, the target becomes aware of your mental intrusion. If you continue focusing on that creature rather than shifting to another mind, it can use its action on its turn to make an Intelligence check opposed by your Intelligence check; if the target wins, the spell ends.\n\nSpeaking questions aloud to the target naturally influences the flow of its thoughts, making this spell invaluable during interrogations.\n\nYou may also detect thinking creatures beyond your line of sight. When you cast the spell or as your action during its duration, you can sense thoughts within 30 feet of you. The spell pierces most barriers, though 2 feet of rock, 2 inches of metal other than lead, or a thin sheet of lead blocks it entirely. You cannot detect creatures with an INT of 3 (−4) or lower or those that speak no languages.\n\nOnce you detect a creature's presence this way, you can read its thoughts for the remainder of the duration as described above, even without seeing it, provided it remains within range.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Intelligence","Wisdom"],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Diffuse Potion","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":true,"castingTime":"10 minutes","range":"5 feet","components":"V, S, M (a candle made with rare herbs, powdered gemstones worth 50 gp, and a potion which is consumed)","duration":"Instantaneous","description":"You ignite a specially treated candle and position it beneath an uncorked potion while speaking the incantation. The liquid transforms into a shimmering vapor that spreads outward from your location in a 5-foot radius. Any creature present within this radius that breathes air inhales the enchanted mist and experiences the potion's effects as though they had consumed it directly.\n\nShould the potion carry a duration, that duration is split evenly among all affected creatures, with any remainder discarded. When used with a healing potion, each creature in the radius gains a number of hit points equal to the average amount that potion type would normally restore.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Discrete Pathing","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You designate a creature you can reach, compelling it to abandon lateral maneuvers. That creature must make a Wisdom saving throw. If it fails, it loses the ability to alter its course mid-movement or while dashing. However, the creature may complete one straight trajectory using its movement, then execute a separate straight trajectory using its Dash action on the same turn.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Earthen Tomb","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"Jagged stone and earth surge upward around your target, rapidly solidifying into a confining shell. The creature must make a Dexterity save or become restrained for the spell's duration. At the start of each of the trapped creature's turns, the compressing earth deals 3d6 bludgeoning damage. The restrained creature can use its action on its turn to make a Strength check against your spell save DC, breaking free on a success. Alternatively, the tomb shatters and releases its prisoner if it sustains damage equal to your spell save DC. The earthen tomb resists acid and poison but is vulnerable to thunder damage.\n\nAt Higher Circles. When you cast this spell using a spell slot of 4th circle or higher, you may entrap one additional creature for each spell slot level above 3rd circle. All targeted creatures must be within 30 feet of one another at the moment of casting.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Bludgeoning"],"tags":["Control","Damage"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Ectoplasmic Snare","level":2,"circle":"2nd-Circle","traditions":["Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a bit of sap)","duration":"Concentration, up to 1 minute","description":"You weave together strands of ectoplasm that manifest as a shimmering net within a 20-foot cube of unoccupied space you can perceive within range. For incorporeal creatures and those using incorporeal movement, these strands appear as pearly gray gossamer, rendering the area both difficult terrain and lightly obscured. Creatures on the Material Plane perceive only faint traces of the strands and remain unaffected.\n\nWhen a creature on the Ethereal Plane or possessing incorporeal movement enters the cube or begins its turn there, it must make a Dexterity saving throw. If it fails, its speed becomes 0. A creature whose speed has been reduced to 0 by this spell may use an action to make a Charisma check against your spell save DC. On a success, the speed reduction ends for that creature.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Dexterity","Charisma"],"damageTypes":[],"tags":["Debuff","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Eldritch Smite","level":2,"circle":"2nd-Circle","traditions":["Divine","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, M (a melee weapon)","duration":"Concentration, up to 1 minute","description":"You imbue a weapon in your grasp with otherworldly energy, making it supernaturally effective against your enemies.\n\nWhen you cast this spell, designate a weapon you currently wield. The next time you successfully strike a creature with that weapon while the spell persists, that attack inflicts an additional 2d8 force damage. Furthermore, the struck target becomes wreathed in shimmering radiance, casting dim illumination in a 10-foot radius for the spell's duration. Any creature attempting to hit the illuminated target gains advantage on its attack roll if it can perceive the light, and the target gains no advantage from invisibility. At the conclusion of each turn, the affected target may attempt a Constitution saving throw, ending this spell's effect on a success.\n\nAt Higher Circles. When you cast this spell using a spell slot of 3rd circle or higher, the bonus force damage increases by 1d8 for every slot level beyond 2nd.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","M"],"saves":["Constitution"],"damageTypes":["Force"],"tags":["Buff","Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Elemental Blade","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 bonus action","range":"Self","components":"V, S, M (a leaf of sumac)","duration":"Concentration, up to 10 minutes","description":"You toss a leaf skyward, and elemental energy coalesces into a blade within your grasp.\n\nAn elemental blade materializes in one of your free hands, assuming the proportions and profile of a scimitar. The blade persists for the spell's duration. Should you release your grip on the blade, it dissipates instantly, though you may summon it again using a bonus action. Upon the blade's initial manifestation, you select whether it inflicts acid, cold, fire, lightning, or thunder damage.\n\nYou may expend your action to make a melee spell attack using the elemental blade. When your attack connects, the struck target sustains 3d6 damage of your chosen type. The blade radiates bright illumination within a 10-foot radius, with dim light extending an additional 10 feet beyond.\n\nAt Higher Circles. When you cast this spell using a spell slot of 4th circle or higher, the damage increases by 1d6 for every two slots above 2nd.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":["Acid","Cold","Fire","Lightning","Thunder"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Enhance Ability","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (fur or a feather from a beast)","duration":"Concentration, up to 1 hour","description":"You touch a creature and grant it one of the following blessings, which persists for the spell's duration.\n\nBear's Endurance. The creature gains advantage on Constitution checks and receives 2d6 temporary hit points that vanish when the spell ends.\n\nBull's Strength. The creature gains advantage on Strength checks, and its carrying capacity is doubled.\n\nCat's Grace. The creature gains advantage on Dexterity checks and takes no damage from falls of 20 feet or less unless it is incapacitated.\n\nEagle's Splendor. The creature gains advantage on Charisma checks and on saving throws against being charmed.\n\nFox's Cunning. The creature gains advantage on Intelligence checks and on checks to Hide or remain undetected.\n\nOwl's Wisdom. The creature gains advantage on Wisdom checks and cannot be surprised.\n\nAt Higher Circles. When you cast this spell using a spell slot of 3rd circle or higher, you may affect one additional creature for every slot level above 2nd.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Enhance Familiar","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Transmutation","isRitual":true,"castingTime":"1 minute","range":"10 feet","components":"V, S, M (a pinch of powdered iron)","duration":"1 hour","description":"You strengthen your familiar, augmenting its physical form and combat prowess. Throughout the spell's duration, your familiar assumes the full statistics of the giant variant appropriate to its kind—with the exception of cats, which instead gain the statistics of a panther, and fish familiars such as quippers, which instead gain the statistics of a reef shark. Your familiar maintains all special abilities granted by the find familiar ritual spell.\n\nShould your familiar be reduced to 0 hit points and vanish, or should you choose to dismiss your familiar, this spell concludes immediately. Your familiar reverts to its natural form upon the next occasion you summon it.\n\nAt Higher Circles. As you progress through higher circles of magic, this ritual becomes increasingly potent. When you gain access to 3rd-circle spell slots, the duration extends by 1 hour for each circle of spellcasting above 2nd circle that you can access. Once you gain access to 6th-circle spell slots, the duration becomes 24 hours.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Enlarge/Reduce","level":2,"circle":"2nd-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (a pinch of powdered iron)","duration":"Concentration, up to 1 minute","description":"You magnify or diminish a creature or object you can perceive within range, altering its size for the spell's duration. You must select a creature or object that nothing is currently wearing or carrying.\n\nIf the target is a creature that opposes this magic, it can attempt a Constitution saving throw. The spell fails to take effect if it succeeds. Any equipment a creature is wearing or carrying grows or shrinks alongside it. Equipment that an affected creature drops immediately reverts to its normal size.\n\n**Enlargement:** The target expands until its dimensions double and its weight multiplies eightfold. Its size category increases by one step—such as from Medium to Large. Should insufficient space exist for this doubling, the target instead becomes as large as the available space permits. For the duration, the target gains advantage on Strength checks and Strength saving throws.\n\nThe target's weapons enlarge proportionally with it. When attacking with enlarged weapons, the target adds 1d4 extra damage to each hit.\n\n**Reduction:** The target shrinks until its dimensions halve and its weight becomes one-eighth of normal. Its size category decreases by one step—such as from Medium to Small. For the duration, the target has disadvantage on Strength checks and Strength saving throws.\n\nThe target's weapons shrink proportionally with it. When attacking with reduced weapons, the target deals 1d4 less damage with each hit. Damage cannot be reduced below 1 in this way.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength","Constitution"],"damageTypes":[],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Enthrall","level":2,"circle":"2nd-Circle","traditions":["Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"1 minute","description":"You speak with such compelling force that your audience finds themselves unable to notice anything but you. Select creatures within range that you can see and that can hear you—they must make a Wisdom saving throw. Any creature immune to being charmed automatically succeeds, and any creature currently in combat with you or your allies gains advantage on this save. If a creature fails its save, it suffers disadvantage on Wisdom (Perception) checks made to detect any creature except you until the spell's duration ends or it can no longer hear your voice. The spell immediately terminates if you fall incapacitated or lose the ability to speak.","classes":["Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":[],"tags":["Buff","Control","Debuff"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Find Steed","level":2,"circle":"2nd-Circle","traditions":["Divine","Primordial"],"school":"Conjuration","isRitual":true,"castingTime":"10 minutes","range":"30 feet","components":"V, S","duration":"Instantaneous","description":"You call forth a celestial, fey, or fiend spirit and bind it into a living mount, establishing a connection that transcends ordinary rider and beast.\n\nA spirit materializes in an empty space within range, taking on the physical form of a creature you designate: warhorse, pony, camel, elk, or mastiff. (Your GM may permit alternative animal forms.) This steed possesses all the game statistics of its chosen creature type, except that its creature type becomes Celestial, Fey, or Fiend based on your selection. Should the steed's form normally possess an Intelligence score of 5 (−3) or lower, the steed's Intelligence becomes 6 (−2) instead, and it gains the capacity to comprehend one language that you know and speak.\n\nThe steed functions as your faithful mount in all circumstances—whether traversing wilderness or joining battle. You share an intuitive understanding that allows the two of you to act as one coordinated entity. While you ride upon your steed, any spell you cast that affects only you may instead affect your steed as well.\n\nIf your steed is reduced to 0 hit points, it vanishes instantly without leaving behind any corporeal remains. You may also dismiss the steed as an action, causing it to disappear. In either case, when you cast this spell again, the same steed returns, fully healed to its maximum hit points.\n\nSo long as your steed remains within 1 mile of your position, you may communicate with it through telepathy. You may maintain a bond with only one steed through this spell at any given time. As an action, you may sever the magical bond, causing the steed to vanish.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S"],"saves":["Intelligence"],"damageTypes":[],"tags":["Healing","Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Flaming Sphere","level":2,"circle":"2nd-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a bit of tallow, a pinch of brimstone, and a dusting of powdered iron)","duration":"Concentration, up to 1 minute","description":"You manifest a writhing orb of flame beneath your command.\n\nWithin range, a sphere of fire measuring 5 feet across materializes in an empty space you designate. This sphere persists for the spell's duration.\n\nEach creature that finishes its turn within 5 feet of the sphere must succeed on a Dexterity save or suffer 2d6 fire damage; a successful save reduces the damage by half.\n\nAs a bonus action each turn, you may propel the sphere up to 30 feet in any direction.\n\nIf you drive the sphere directly into a creature, that creature must make the save described above against the sphere's damage. The sphere ceases its movement for that turn.\n\nAs you move the sphere, you may guide it over walls and barriers no taller than 5 feet, and leap it across chasms or gaps up to 10 feet across.\n\nThe sphere ignites any flammable objects not currently being worn or held. It produces bright light extending 20 feet outward and dim light extending an additional 20 feet beyond that.\n\nAt Higher Circles. If you cast this spell using a spell slot of 3rd circle or higher, the damage dealt increases by 1d6 for each slot level above 2nd.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Fire"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Flat Form","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S","duration":"Concentration, up to 1 hour","description":"You touch a consenting creature and reshape it into a flattened, parchment-like version of itself. The transformed creature becomes foldable without suffering injury, much like ordinary paper. While flattenated this way, the target loses the ability to move, act, or communicate through speech, yet retains its senses of sight, hearing, and smell provided its face remains uncovered. The transformation concludes prematurely if the flattened creature sustains any damage, or if you use an action to end the effect.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Font of Mucus","level":2,"circle":"2nd-Circle","traditions":["Wyrd"],"school":"Necromancy","isRitual":true,"castingTime":"1 minute","range":"Unlimited","components":"V, S, M (a bit of hair, nail clippings, or other sympathetic item from the target)","duration":"24 hours","description":"You afflict a humanoid with a persistent and revolting ailment. The target becomes congested and secretes copious mucus, suffering from this malady for the duration. During this time, the creature rolls with disadvantage on all Charisma checks and on Strength (Athletics), Dexterity (Acrobatics), and Dexterity (Stealth) checks. As an additional consequence determined at the Game Master's discretion, other creatures often isolate the target socially, either repelled by its unsightly appearance or wary of catching the infection.","classes":["Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Strength","Dexterity","Charisma"],"damageTypes":["Cold"],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Gear Barrage","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Self (30-foot cone)","components":"V, S, M (a handful of gears worth 5 gp)","duration":"Instantaneous","description":"You unleash a torrent of enchanted gears that spin and slash through the air in front of you. Every creature within a 30-foot cone must succeed on a Dexterity saving throw or suffer the consequences. Those who fail take 3d8 slashing damage from the whirling metal, while those who succeed take half that amount. Construct creatures find themselves particularly vulnerable to this assault, rolling their save with disadvantage.\n\nWhen you channel this spell through a spell slot of 3rd circle or greater, the damage output intensifies. For each circle of the spell slot beyond 2nd, an additional 1d8 of slashing damage is added to the barrage.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Slashing"],"tags":["Buff","Damage","Debuff","Summon"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Gentle Repose","level":2,"circle":"2nd-Circle","traditions":["Divine"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a pinch of salt and one copper piece placed on each of the corpse’s eyes, which must remain there for the duration)","duration":"10 days","description":"You place a protective ward upon a corpse or skeletal remains through touch. Throughout the spell's duration, the touched target resists natural decomposition and remains barred from rising as an undead creature.\n\nAdditionally, this spell effectively pauses the countdown on resurrection magic. Any days the corpse spends protected by this ward do not accumulate toward the time restrictions imposed by spells like raise dead.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Grasping Earth","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"1 minute","description":"You bind your foes to the ground through elemental force, inflicting harm and immobilizing them.\n\nSelect a ground location within range that you can perceive. From that point, jagged spikes of earth and stone thrust upward to bind a creature standing within 10 feet. That creature must succeed on a Dexterity save or suffer the following: it takes 1d6 bludgeoning damage and becomes grappled and restrained (escape DC equals your spellcasting DC) until the spell ends.\n\nA grappled creature remains restrained for as long as the grapple persists.\n\nAs an action on your turn, you may attempt to crush a restrained target. That creature must make a Strength save, taking 2d6 bludgeoning damage on a failed save, or half damage on a successful one.\n\nAt Higher Circles. When you cast this spell using a spell slot of 4th circle or higher, you can affect one additional creature for every two slots above 2nd.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Strength","Dexterity"],"damageTypes":["Bludgeoning"],"tags":["Control","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Gust Of Wind","level":2,"circle":"2nd-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self (60-foot line)","components":"V, S, M (a legume seed)","duration":"Concentration, up to 1 minute","description":"You channel a torrent of forceful air that streams outward in a direction of your choosing. A corridor of wind extends 60 feet from you and spans 10 feet across, persisting for the spell's duration.\n\nWhen a creature begins its turn within this wind corridor, it must make a Strength save. On a failed save, the creature is thrust 15 feet away from you, moving in the direction the wind travels.\n\nAny creature attempting to move toward you through the wind finds the effort exhausting, requiring 2 feet of movement for each 1 foot of distance closed. The gust sweeps away clouds of gas and vapor, snuffing out unprotected open flames like candles and torches in its path. Enclosed flames such as those sheltered within lanterns flicker dangerously, with a 50 percent chance of being extinguished.\n\nOn each of your turns while the spell remains active, you may use a bonus action to redirect the wind corridor to blast in a new direction from your position.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Heat Metal","level":2,"circle":"2nd-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a piece of iron and a flame)","duration":"Concentration, up to 1 minute","description":"You ignite a manufactured metal object with intense heat, burning anyone who maintains contact with it.\n\nSelect a crafted metal item you can see within range—such as a metal weapon or suit of armor without the Natural Materials property—and cause it to radiate scorching heat. Each creature touching the object immediately takes 2d8 fire damage. On each of your subsequent turns while the spell persists, you may spend a bonus action to inflict this damage once more.\n\nWhenever a creature holding or wearing the object suffers damage from it, that creature must make a CON saving throw or release the object if possible. Should the creature fail to drop it, it suffers disadvantage on all attack rolls and ability checks until the next turn begins.\n\nAt Higher Circles. When you cast this spell using a 3rd-circle spell slot or a slot of greater power, the damage increases by 1d8 for each slot level above 2nd.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Fire"],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Hold","level":2,"circle":"2nd-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Enchantment","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a small, straight piece of iron)","duration":"Concentration, up to 1 minute","description":"You render a Medium or smaller creature immobile through magical restraint.\n\nTarget a Medium or smaller creature within range that you can perceive. That creature must make a Wisdom save; failure leaves it paralyzed until the spell ends. Each turn, the paralyzed creature may attempt another Wisdom save to free itself, succeeding ends the effect. Undead are unaffected by this magic. When casting this spell at 3rd circle or higher, you may paralyze one additional creature for each circle above 2nd. All targeted creatures must be positioned within 30 feet of one another when you select them.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Ice Glide","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":null,"duration":"Concentration, up to 10 minutes","description":"Range: Touch\nComponents: V, S\nDuration: 1 minute\n\nYou channel magical essence into a weapon designed for throwing or an improvised projectile that you're about to hurl. The moment you make your first attack with this enchanted weapon during the spell's effect, that strike inflicts an extra 2d6 force damage.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":[],"saves":[],"damageTypes":["Force"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Imbue Projectile","level":2,"circle":"2nd-Circle","traditions":["Arcane","Divine"],"school":"Enchantment","isRitual":false,"castingTime":"1 bonus action","range":"Touch","components":"V, S","duration":"1 minute","description":"Your touch channels arcane force into a weapon meant for throwing. Select a weapon possessing the Thrown property or an improvised weapon you plan to hurl, and suffuse it with magical energy. When that weapon is used to make its first attack while this spell remains active, the strike inflicts an extra 2d6 force damage.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":[],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Inter","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","description":"The terrain beneath your foes churns into violent motion, swallowing them whole.\n\nA 10-foot cube of ground centered on a point within range that you can perceive shifts violently. Every creature occupying this space must succeed on a Dexterity save or suffer the consequences. Those who fail take 1d12 bludgeoning damage, fall prone, and become trapped beneath the shifting soil. Those who succeed take half damage and avoid being knocked down or entombed.\n\nWhile buried, a creature cannot see, is unable to move freely, gains total cover from anything outside the earthen prison, and cannot breathe. Any buried creature—or an ally attempting a rescue—may spend an action to attempt a Strength check against your spell save DC, freeing the trapped creature if successful.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Strength","Dexterity"],"damageTypes":["Bludgeoning"],"tags":["Control","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Invisibility","level":2,"circle":"2nd-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (an eyelash encased in tree sap)","duration":"Concentration, up to 1 hour","description":"You touch a creature, rendering it from sight until the spell concludes. All equipment and possessions worn or carried by the target remain hidden from view so long as they remain on the target's body. The spell terminates immediately if the target makes an attack or casts a spell. The effect persists for up to one hour.\n\nWhen you cast this spell using a spell slot of 3rd circle or above, you may select one extra creature for each slot level beyond 2nd.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Knock","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V","duration":"Instantaneous","description":"By speaking a single word, you cause an object to unlock and open.\n\nSelect an object within range that you can perceive. This object might be a door, box, chest, set of manacles, padlock, or any similar item that employs either mundane or magical mechanisms to restrict access.\n\nAny object fastened by a conventional lock, stuck in place, or barred shut becomes immediately unlocked, unstuck, or unbarred. Should the object possess multiple locks, you unlock only one.\n\nIf the target is secured by the arcane lock spell, that spell becomes dormant for 10 minutes, allowing the target to be freely opened and closed during this period.\n\nThe casting produces a forceful knocking sound that reverberates from the target object and can be heard up to 300 feet away.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Lesser Eyebite","level":2,"circle":"2nd-Circle","traditions":["Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"Concentration, up to 1 minute","description":"Your gaze fills those who meet it with unease, manifesting in different ways depending on your will.\n\nFor this spell's duration, your eyes transform into abyssal voids crackling with terrible power. Choose one creature within 30 feet of you that you can see; it must make a Wisdom saving throw or suffer one effect of your choice for the duration. Each turn, you may use your action to subject another creature to this effect, though you cannot affect any creature that has already succeeded on a save against this casting of lesser eyebite.\n\nGroggy. The target becomes incapacitated by overwhelming drowsiness. The condition ends immediately if the target takes any damage or if another creature uses its action to shake the target awake.\n\nRattled. The target suffers disadvantage on all ability checks. At the conclusion of each of its turns, it may attempt another Wisdom saving throw to end this effect.\n\nUnnerved. The target perceives you as deeply disturbing. It cannot move closer to you and must move away whenever it moves at all. This effect ends if the target reaches a location at least 60 feet distant from you where it cannot perceive you.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control","Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Levitate","level":2,"circle":"2nd-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a small leather loop or a piece of golden wire with a long shank on one end)","duration":"Concentration, up to 10 minutes","description":"You elevate a creature or object of your choosing into the air, holding it aloft through magical force.\n\nA single creature or object within your sight that you select rises upward up to 20 feet and hovers there throughout the spell's duration. This levitation can support creatures and objects weighing no more than 500 pounds. If the target is an unwilling creature, it may attempt a Constitution saving throw; those who succeed are not affected by the spell.\n\nWhile levitated, the target can only move by grasping or pressing against any stationary object or surface it can touch (such as a wall, ceiling, or ledge), propelling itself as though climbing. On each of your turns, you may adjust the target's height by as much as 20 feet upward or downward. If you are the levitated target, you may move vertically as part of your normal movement. If the target is another creature or object, you must spend an action to move it, and it cannot travel beyond the spell's range.\n\nOnce the spell concludes, the target descends slowly and safely to the ground, even if it remains suspended when the magic fades.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Lightning Sphere","level":2,"circle":"2nd-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S, M (a bit of cotton)","duration":"Concentration, up to 1 minute","description":"You manifest a sphere of crackling electrical energy that responds to your will. This 5-foot-diameter orb appears in any unoccupied space within range that you can perceive. Any creature beginning its turn within 5 feet of the sphere or moving into that space for the first time during a turn must succeed on a Dexterity save or take 2d6 lightning damage, suffering half damage on a successful save. The sphere emanates bright illumination in a 20-foot radius, with dim light extending an additional 20 feet beyond that.\n\nAs a bonus action, you can reposition the sphere, moving it up to 30 feet.\n\nShould your concentration lapse or you choose to dismiss the spell, the sphere detonates catastrophically. Each creature posit
