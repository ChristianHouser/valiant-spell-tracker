reature that travels the now-visible portion must make a Wisdom save or succumb to the compulsion to consume the breadcrumbs, halving its speed for the duration. The breadcrumbs regenerate continuously throughout the spell's effect, creating a potential hazard for any creatures attempting to follow in your wake.","classes":["Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Corrosive Cloudburst","level":7,"circle":"7th-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"100 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You summon a towering mass of acrid, acid-laced fog that rises into the air. A roiling dark cloud of caustic mist and acidic vapors takes form in a cylinder 40 feet wide and 40 feet tall. Any creature occupying this space must succeed on a Constitution saving throw or suffer 10d8 acid damage; those who succeed take half damage instead. Whenever a creature enters the cylinder's area for the first time on a turn or starts its turn there, it must repeat this saving throw, suffering the same damage on a failure. Creatures that take acid damage from this spell find their focus wavering, imposing disadvantage on concentration checks. Additionally, the corrosive fumes impair the effectiveness of metal—both metal weapons and creatures composed of metal attack with disadvantage while inside the cylinder, as the acid gradually corrodes their metallic forms.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Acid"],"tags":["Buff","Damage","Debuff","Summon"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Delayed Blast Fireball","level":7,"circle":"7th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"150 feet (20-foot-radius sphere)","components":"V, S, M (a tiny ball of bat guano and sulfur)","duration":"Concentration, up to 1 minute","description":"You conjure a radiant bead of fire that detonates at your command. A shaft of golden light springs from your outstretched finger, coalescing into a luminous sphere at a location you designate within range, where it hangs suspended for the duration. The bead erupts with a thunderous boom into a roiling inferno that sweeps around obstructions when the spell terminates—either through a break in your concentration or through your deliberate choice to trigger it. Every creature occupying a 20-foot-radius sphere from the bead's position must attempt a Dexterity save. Those who fail take fire damage equal to the accumulated damage total, while successful saves reduce the damage by half.\n\nThe bead initially deals 12d6 fire damage. Each round that passes without detonation increases the damage by 1d6.\n\nShould any creature touch the suspended bead before it detonates, that creature must make a Dexterity save. If the save fails, the spell immediately ends and the bead explodes. A successful save allows the creature to hurl the bead up to 40 feet away. The spell ends and the bead detonates when it strikes either a creature or solid surface.\n\nThe flames consume objects in the explosion's radius and ignite any flammable objects not actively being worn or held.\n\nAt Higher Circles. When you cast this spell using an 8th-circle spell slot or higher, increase the base damage by 1d6 for each slot above 7th.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":["Fire"],"tags":["Damage","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Diabolical Form","level":7,"circle":"7th-Circle","traditions":["Divine"],"school":"Transmutation","isRitual":true,"castingTime":"1 minute","range":"Self","components":"V, S, M (piece of parchment, ink pen, and blood)","duration":"1 hour","description":"You inscribe a blood-stained pact that grants you infernal traits. Through a ritual using your own blood as ink, you undergo a transformation that reshapes your body to mirror a creature of diabolical origin. Roll a d6 and reference the Devilish Forms table below to learn which trait manifests. You may attempt to gain control over the specifics of your transformation, but doing so exacts a price. Each time you roll again hoping for a different result, you suffer 2d6 force damage. When the spell's duration ends, your body reverts to its natural form.\n\nDevilish Forms d6 Effect\n1 Armored Hide. Your skin calcifies into crimson scales. You gain a +2 bonus to your AC and become resistant to bludgeoning, piercing, and slashing damage.\n2 Barbed Chains. Infernal chains tear free from your forearms, extending your reach to 15 feet for your unarmed strikes. When you hit with an unarmed strike, you can use a bonus action to attempt to grapple the target.\n3 Hellish Mien. Your visage warps into something scaled, horned, and fanged, your eyes blackening entirely. You become immune to fire damage. Any creature beginning its turn within 5 feet of you takes 3d6 fire damage.\n4 Infernal Command. Your head and hands burn with crimson radiance. You gain advantage on Wisdom (Insight) checks and Charisma (Intimidation) checks, and you automatically detect lies told to you.\n5 Vertical Eyeslits. Your pupils transform into narrow slits, granting you a predatory gaze. You gain advantage on Charisma (Persuasion) checks and Intelligence (Investigation) checks, and you perceive invisible creatures and objects as if they were visible.\n6 Voice of Temptation. Your voice becomes a hypnotic murmur capable of crafting elaborate falsehoods. You gain advantage on Charisma (Deception) checks and can cast the suggestion spell once before the duration ends (spell save DC equals your own spellcasting DC).\n\nAt Higher Circles. When you cast this spell using a spell slot of 8th circle or higher, you manifest an additional devilish form for each circle above 7th that you have access to.","classes":["Cleric","Paladin"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Fire","Poison"],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Divine Word","level":7,"circle":"7th-Circle","traditions":["Divine"],"school":"Evocation","isRitual":false,"castingTime":"1 bonus action","range":"30 feet","components":"V","duration":"Instantaneous","description":"You speak forth a singular utterance of celestial authority, capable of afflicting enemies and expelling beings of supernatural origin.\n\nYou pronounce a word saturated with divine essence, the same force that established existence in time's earliest moments. Designate any quantity of creatures within your range that you are able to perceive. All such creatures capable of hearing your utterance must succeed at a Charisma saving throw. Should a creature fail this save, it endures a consequence determined by its remaining hit points:\n\n• 50 hit points or fewer: rendered deafened lasting 1 minute\n• 40 hit points or fewer: rendered deafened and blinded lasting 10 minutes\n• 30 hit points or fewer: rendered blinded, deafened, and stunned lasting 1 hour\n• 20 hit points or fewer: slain outright\n\nAdditionally, regardless of how many hit points it possesses, any Celestial, Elemental, Fey, or Fiend that fails its saving throw is thrust backward to its native plane of existence (provided it does not currently occupy that plane) and is barred from manifesting on your present plane for 24 hours, with no exception save for the casting of a wish spell.","classes":["Cleric","Paladin"],"source":"Player's Guide 1","componentList":["V"],"saves":["Charisma"],"damageTypes":[],"tags":["Control","Debuff","Healing"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Earth Vortex","level":7,"circle":"7th-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"100 feet","components":"V, S","duration":"Concentration, up to 1 minute","description":"You gesture toward a location, and the earth beneath convulses violently upward. A churning vortex of soil and stone erupts into being, manifesting as a cylinder 40 feet tall and 40 feet across, centered on a point within range that you can see. The roiling dust and debris fill the vortex's space with heavy obscuration. Each creature caught within must attempt a Strength saving throw; those who fail take 8d10 bludgeoning damage, while those who succeed take half damage. Whenever a creature enters the vortex for the first time on a turn or starts its turn there, it must repeat the Strength saving throw, facing the same damage on a failure or half damage on a success. The ground throughout the vortex counts as difficult terrain. Additionally, any creature that begins its turn within the vortex has disadvantage on Strength and Dexterity saving throws until the turn ends, as the violently churning earth pulls and destabilizes its footing.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Strength","Dexterity"],"damageTypes":["Bludgeoning"],"tags":["Buff","Damage","Debuff","Summon"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Etherealness","level":7,"circle":"7th-Circle","traditions":["Arcane","Wyrd"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S","duration":"8 hours","description":"You depart the material world and enter the Ethereal Plane.\n\nYou shift into the border regions of the Ethereal Plane, the area where it overlaps with your current plane of existence. You persist within the Ethereal Plane for the duration, or until you expend your action to end the spell. Throughout this time, you move freely in any direction. Vertical movement—whether ascending or descending—requires an additional foot of movement for every foot traveled. You retain the ability to perceive the plane you departed from through sight and sound, though everything appears in shades of gray, and your vision cannot penetrate beyond 60 feet.\n\nWhile existing on the Ethereal Plane, only other creatures present on that plane can affect you or be affected by you. Creatures inhabiting other planes cannot perceive you and cannot interact with you unless they possess a special ability or magical effect granting them such capability.\n\nAll objects and effects not present on the Ethereal Plane become insubstantial to you. You pass through objects that exist only on your origin plane as though they were not there.\n\nUpon the spell's conclusion, you immediately return to your origin plane at your current location. Should you materialize in the same space as a solid object or creature, you are instantly displaced to the nearest available unoccupied space you can inhabit, and you sustain force damage equal to twice the number of feet displaced.\n\nThe spell produces no effect if cast while you already inhabit the Ethereal Plane or a plane that does not border it.\n\nAt Higher Circles: When you cast this spell using a spell slot of 8th circle or higher, you may target up to three willing creatures (including yourself) for each slot level above 7th. All targeted creatures must be within 10 feet of you at the moment of casting.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":[],"damageTypes":["Force"],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Finger Of Death","level":7,"circle":"7th-Circle","traditions":["Arcane","Divine","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","description":"You hurl a bolt of corrupting shadow at a creature within range that you can perceive, wracking its body with agonizing torment. The creature must succeed on a Constitution save or suffer 7d8 + 30 necrotic damage; a successful save reduces the damage by half.\n\nIf this spell kills a Humanoid, it returns to unlife as a zombie when your next turn begins. This zombie becomes your permanent thrall, obeying your spoken commands as faithfully as it can manage.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Constitution"],"damageTypes":["Necrotic"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Fire Storm","level":7,"circle":"7th-Circle","traditions":["Arcane","Primordial"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"150 feet","components":"V, S","duration":"Instantaneous","description":"You summon a tempestuous inferno that descends from above at your command. Within range, you designate a location where a maelstrom of blazing fire materializes. This conflagration occupies up to ten 10-foot cubes that you arrange in any configuration you desire, provided each cube shares at least one adjacent face with another cube.\n\nEvery creature within this burning region must attempt a Dexterity saving throw. A creature that fails this save suffers 7d10 fire damage, while one that succeeds takes half damage.\n\nThe flames consume objects caught within the storm's reach and ignite any flammable items left unattended—those neither worn nor carried. At your discretion, you may preserve plant life in the area from the spell's destructive effects.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Fire"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Forcecage","level":7,"circle":"7th-Circle","traditions":["Arcane","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"100 feet","components":"V, S, M (ruby dust worth at least 1,500 gp)","duration":"Concentration, up to 1 hour","description":"You instantiate an inescapable barrier of pure magical force designed to confine creatures within its bounds.\n\nA stationary, imperceptible, cubic containment construct of solidified magical force manifests at a location of your choosing within range. You determine whether the prison takes the form of a cage or a sealed box.\n\nShould you opt for a cage configuration, it may measure up to 20 feet along each edge and consists of 1/2-inch-thick bars positioned 1/2 inch apart from one another.\n\nShould you opt for a box configuration, it may measure up to 10 feet along each edge, forming an impenetrable solid partition that stops any physical objects and obstructs all spellcasting directed into or emanating from its interior.\n\nUpon casting, any creature situated fully within the cage's boundaries becomes imprisoned. Creatures that occupy only partial space within the area, or those whose size exceeds the cage's capacity, are thrust outward from the area's center until they occupy no space within it.\n\nA confined creature cannot escape through ordinary, non-magical methods. Should the creature attempt to employ a spell or magical ability permitting teleportation or planar movement to flee the cage, it must succeed on a Charisma save. If it succeeds, the creature executes that magical departure successfully. If it fails, the creature remains trapped and the spell or ability is consumed without effect. The cage's boundaries additionally manifest within the Ethereal Plane, preventing ethereal transit.\n\nDispel magic cannot affect or discharge this spell.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Four Winds","level":7,"circle":"7th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"90 feet","components":"V, S, M (an ivory war horn or set of pipes worth at least 500 gp)","duration":"1 minute","description":"You generate four rotating columns of tempestuous air that strike and displace anything in their grasp.\n\nYou conjure four whirlwinds that manifest on the ground at visible points within range. Each whirlwind occupies a 5-foot-radius, 30-foot-tall cylindrical space of churning air. These whirlwinds persist for the spell's full duration.\n\nAny creature entering a whirlwind's space for the first time during a turn—whether upon the whirlwinds' initial creation or later—or beginning its turn within a whirlwind must make a Strength saving throw. If it fails, a Large or smaller creature suffers 4d10 bludgeoning damage and is launched up to 60 feet in an arbitrary direction, landing prone. If it fails, a Huge or larger creature takes the same bludgeoning damage without being hurled, though it becomes restrained until the start of its following turn. On a successful save, all creatures regardless of size take half damage and are pushed out into a random unoccupied space within 5 feet of the whirlwind.\n\nA creature hurled into a solid object sustains 1d6 bludgeoning damage for each 10 feet of travel. Should a hurled creature collide with another creature, that creature must succeed on a Dexterity saving throw against your spell save DC or take equivalent damage and fall prone. If a hurled creature enters another whirlwind's space, it is immediately flung from that whirlwind up to 60 feet in a random direction.\n\nAt the beginning of each of your turns after manifesting the whirlwinds, you may spend an action controlling them by moving each one up to 30 feet in your chosen direction. If you cannot spend an action or decline to do so, each whirlwind drifts up to 30 feet randomly, potentially striking you and any other creatures encountered. Should multiple whirlwinds occupy or overlap the same space, one remains while the other shifts to the nearest unoccupied adjacent space.\n\nYou may spend an action to dismiss the spell, dispersing the whirlwinds instantly. The spell also terminates prematurely if you become incapacitated or perish.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength","Dexterity"],"damageTypes":["Bludgeoning"],"tags":["Control","Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Imbue Spell Ability","level":7,"circle":"7th-Circle","traditions":["Arcane","Divine"],"school":"Transmutation","isRitual":true,"castingTime":"8 hours","range":"Touch","components":"V, S, M (rare oils and incense worth at least","duration":"30 days","description":"You transfer a portion of your magical prowess to another being.\n\nThrough this ritual, you grant one creature access to a spell from your prepared repertoire along with the capacity to cast it. Upon completing the ritual, the target gains complete understanding of one prepared spell of 4th-circle or lower, and receives a spell slot capable of casting it. You maintain your own knowledge of the spell but forfeit one spell slot of that circle while the target remains imbued.\n\nThe target must possess both an INT and WIS score of at least 8 (−1) to receive spellcasting ability through this method. Once the target casts the imbued spell, their knowledge of it vanishes and the borrowed slot returns to you in an expended state—it counts as spent as though you had personally cast the spell, remaining unavailable until you complete a long rest. Should the ritual's duration expire without the creature casting the spell, they lose all knowledge of it, and your spell slot restores to you in an unexpended, usable condition.\n\nYou may perform this ritual repeatedly, selecting a different creature as your target each time.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Intelligence","Wisdom"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Impersonate Creature","level":7,"circle":"7th-Circle","traditions":["Arcane","Wyrd"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (a drop of blood, lock of hair, or personal possession of the creature being impersonated)","duration":"7 days","description":"You transform a willing target into a convincing facsimile of another creature.\n\nThe target takes on the physical form of a creature of your choice, provided that creature falls within one size category of the target's own (a Medium creature might mimic a Large or Small creature, for instance). The transformation is thorough—the target's body mirrors every detail of the impersonated creature, including skin texture, weight distribution, vocal patterns, physical bearing, and behavioral quirks. However, this physical metamorphosis grants no access to the original creature's special abilities, instincts, or knowledge. The target retains only the languages it already knew before the spell took effect.\n\nWhen the target acts in ways that deviate from expected behavior, any creature with intimate familiarity of the impersonated form may attempt a Wisdom (Insight) check opposed by your spell save DC. If successful, the observer senses something is amiss—the target's actions feel wrong or inconsistent with what they know of this creature. While this check doesn't necessarily expose the target as an impostor, it plants doubt and may prompt alternative explanations: perhaps the creature has been magically dominated, threatened into compliance, or is simply having an uncharacteristic moment.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Magnificent Mansion","level":7,"circle":"7th-Circle","traditions":["Arcane","Wyrd"],"school":"Conjuration","isRitual":true,"castingTime":"10 minutes","range":"300 feet","components":"V, S, M (a miniature portal carved from ivory, a small piece of polished marble, and a tiny silver spoon, each item worth at least 5 gp)","duration":"24 hours","description":"You manifest an extradimensional dwelling within range that persists for the spell's duration. You determine the location of its singular entrance, which glimmers with a faint shimmer and measures 5 feet in width and 10 feet in height. You and any creatures you designate at the moment of casting may pass through the entrance whenever the portal stands open. If you position yourself within 30 feet of the portal, you can open or seal it at will. When closed, the portal becomes invisible to the eye. Beyond the threshold lies a grand foyer that opens into numerous adjoining chambers. The interior air remains clean, fresh, and pleasantly warm.\n\nYou may design the floor plan to your specifications, provided the total space does not surpass 50 cubes, with each cube measuring 10 feet on every side.\n\nThe interior furnishings and décor reflect your preferences. The mansion contains ample provisions for a nine-course feast to accommodate up to one hundred guests. A complement of one hundred nearly transparent servants inhabit the space, ready to attend to all visitors. You determine their visual form and clothing. They follow your commands without question. Each servant performs tasks equivalent to those a mortal human servant could accomplish, though they cannot engage in combat or perform actions intended to cause harm to any living being. They may retrieve items, maintain cleanliness, repair garments, kindle flames, serve meals, dispense beverages, and undertake similar duties. The servants may traverse every area within the mansion but cannot venture beyond its boundaries. Any furnishings or objects conjured by this spell transform into wisp and dissipate if carried past the mansion's threshold. When the spell's duration expires, all creatures within the extradimensional space are ejected to the nearest unoccupied areas adjacent to the entrance.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Summon","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Mirage Arcane","level":7,"circle":"7th-Circle","traditions":["Arcane","Wyrd"],"school":"Illusion","isRitual":true,"castingTime":"10 minutes","range":"Sight","components":"V, S","duration":"10 days","description":"You weave together sensory deceptions across a vast expanse of land.\n\nWithin a 1 mile square area, you alter terrain to present a false appearance—modifying how it looks, sounds, smells, and feels to create the impression of an entirely different landscape. The fundamental topography persists unchanged beneath the illusion. Fields and pathways might appear as treacherous swamps, jagged hills, or impassable chasms. Water features transform into meadows, steep drops flatten into gentle inclines, or broken terrain manifests as smooth thoroughfares.\n\nYou may similarly reshape or fabricate the appearance of buildings and structures within the affected region, though the spell cannot mask, hide, or simulate living creatures.\n\nThe illusion engages all four senses—sight, hearing, touch, and smell—allowing it to convert navigable ground into difficult terrain or obstruct passage accordingly, changing the practical traversability of the region.\n\nAny component of the illusory terrain—a stone, branch, or similar object—that exits the spell's boundary ceases to exist instantaneously. Those possessing truesight perceive the terrain's authentic form beneath the deception; nevertheless, all other sensory aspects of the illusion persist unaffected. Such creatures recognize the illusion's presence yet remain subject to its physical effects.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Mutual Doom","level":7,"circle":"7th-Circle","traditions":["Arcane","Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S, M (two iron rings)","duration":"Permanent","description":"You weave a binding thread of fate between yourself and another creature, gambling that shared suffering will guarantee mutual protection.\n\nChoose a creature within range. That creature must make a Charisma saving throw or become permanently bound to you through this connection.\n\nFor as long as you remain linked, any damage you sustain redirects to your bound partner instead, and any damage they receive flows to you in equal measure. Similarly, any affliction or condition that befalls one of you manifests upon the other. This reciprocal transfer does not apply to harm or afflictions you or your partner deliberately inflict upon yourselves. Should either you or your bound partner fall to 0 HP, the survivor must make a Constitution saving throw at disadvantage or be reduced to 0 HP as well.\n\nOnce this spell takes hold, only a wish spell or magic of comparable power can sever it. The sole exception occurs if both you and your bound partner perish simultaneously—in that moment, the connection dissolves entirely and cannot reestablish itself should either of you return to life.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Constitution","Charisma"],"damageTypes":[],"tags":["Buff","Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Nacreous Shell","level":7,"circle":"7th-Circle","traditions":["Primordial"],"school":"Conjuration","isRitual":false,"castingTime":"1 reaction, when target drops to 0 HP","range":"60 feet","components":"V, M (an abalone shell)","duration":"Variable","description":"When you or an ally would be reduced to 0 hit points, you may cast this spell as a reaction. An iridescent, magically-formed shell materializes instantly around the affected creature. This shell possesses an armor class of 19 and 50 hit points, and resists acid, lightning, fire, psychic, bludgeoning, slashing, and piercing damage entirely. The sheltered creature suffers no damage while the shell persists.\n\nThe creature sheltered within gains immunity to falling damage and exhaustion, and remains protected from suffocation, harmful environmental conditions, and toxic gases—the shell maintains a supply of fresh, breathable air. Each turn the creature begins while sheltered, it regains 1d8 plus your spellcasting modifier hit points, continuing until it reaches half its maximum hit points, at which point the spell concludes.\n\nAllied creatures may freely pass through the shell's barrier, enabling them to cast spells targeting the sheltered creature, administer healing potions, or render other forms of assistance. The sheltered creature cannot take any actions while enclosed, though it may voluntarily end the spell on its turn. You may also dismiss the spell affecting another creature by spending a bonus action.","classes":["Druid","Ranger"],"source":"Player's Guide 2","componentList":["V","M"],"saves":[],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Oculus Blossoms","level":7,"circle":"7th-Circle","traditions":["Primordial"],"school":"Divination","isRitual":true,"castingTime":"1 minute","range":"60 feet","components":"V, S, M (a seed or bulb carved with the image of an eye)","duration":"24 hours","description":"You conjure a network of magical observation points disguised as living flora.\n\nYou create up to five Tiny enchanted flowers that materialize in unoccupied spaces within range that you can perceive. Each space must be suitable for sustaining plant life—bare earth, a planter filled with soil, or equivalent terrain. These blossoms always resemble flowers native to their location and appear entirely mundane to ordinary observation.\n\nFor the spell's duration, you may expend an action to perceive through any single flower as though your senses were positioned in that space. This connection functions regardless of distance, provided you and the flowers occupy the same plane of existence. While channeling your perception through a flower, you may use a bonus action either to shift your senses to another flower or to terminate the sensory link.\n\nCreatures capable of perceiving hidden things—through spells such as see invisibility or abilities like truesight—observe a glowing, incorporeal eye hovering where each flower grows instead of seeing the blossom itself.\n\nShould you cast this spell again while flowers from a previous casting remain active, those earlier flowers immediately wither and vanish.\n\nAt Higher Circles. Upon accessing 8th-circle spell slots, the duration extends to 7 days. Upon accessing 9th-circle spell slots, the duration becomes 30 days.","classes":["Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Plague","level":7,"circle":"7th-Circle","traditions":["Primordial","Wyrd"],"school":"Necromancy","isRitual":true,"castingTime":"1 minute","range":"Sight","components":"V, S, M (a black sapphire worth at least 250 gp, which the spell consumes)","duration":"Special","description":"You unleash a wave of pestilence that spreads across the land, bringing disease and suffering to all within reach. A cloud of necrotic force emanates from your position, forcing each creature within 1 mile of you to make a Constitution saving throw. Those who fail become infected with the plague at Stage 1, as detailed in the Plague Stages table below. Every 24 hours, an infected creature must repeat this saving throw. If it fails, the disease advances to the next stage. If it succeeds, the disease retreats to the previous stage. A creature at Stage 1 that succeeds on its save recovers completely. Creatures experience all symptoms of their current stage as well as those of all preceding stages.\n\nLesser restoration or similar magic cast at 5th circle or lower reduces the disease by one stage. When cast using a 6th-circle spell slot or higher, the disease is cured entirely for that creature.\n\nAt Higher Circles. Once you can cast 7th-circle spells, the spell's radius expands by 1 mile for each circle above 6th that you have access to.\n\nPlague Stages\nStage 1: A starry pattern of rash spreads across the creature's skin.\nStage 2: The creature suffers headaches while the rash expands. The creature gains one level of exhaustion.\nStage 3: Confusion and memory loss plague the creature. It has disadvantage on Intelligence checks.\nStage 4: Loss of coordination affects the creature's movements. It gains one level of exhaustion and has disadvantage on Dexterity checks.\nStage 5: The creature's fingers and toes blacken and stiffen. It gains one level of exhaustion.\nStage 6: The creature perishes.","classes":["Druid","Ranger","Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Dexterity","Constitution","Intelligence"],"damageTypes":["Necrotic"],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Plane Shift","level":7,"circle":"7th-Circle","traditions":["Divine","Wyrd"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a forked, metal rod worth at least","duration":"Instantaneous","description":"You and up to eight willing creatures grasp hands within a circle and vanish, arriving on a different plane of existence of your choosing. You may describe your destination in broad strokes—such as naming a specific city or landmark—and the group materializes in or nearby that location, with the exact arrival spot determined by your GM. Alternatively, if you possess knowledge of a teleportation circle's sigil sequence on another plane, you may instead transport the group directly to that circle. Should the circle prove too cramped to accommodate all travelers, excess creatures materialize in the nearest available spaces adjacent to it.\n\nYou may also weaponize this spell against a hostile creature. Select one creature within your reach and make a melee spell attack roll against it. If you succeed, the target must make a Charisma saving throw. If it fails this save, the creature is forcibly transported to a random location on the plane you designate. The transported creature must discover its own means of returning to your plane of existence.","classes":["Cleric","Paladin","Warlock","Witch"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Charisma"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Prismatic Spray","level":7,"circle":"7th-Circle","traditions":["Arcane"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self (60-foot cone)","components":"V, S","duration":"Instantaneous","description":"From your outstretched hand, eight distinct rays of radiant energy burst forth in a luminous cone. Each ray displays a unique hue and carries its own devastating effect.\n\nEvery creature within a 60-foot cone must succeed on a Dexterity save. For each affected target, roll a d8 to determine which colored ray strikes it.\n\n**d8 COLOR RAY**\n\n**1 Red.** The target suffers 10d6 fire damage on a failed save, or half that damage on a successful one.\n\n**2 Orange.** The target suffers 10d6 acid damage on a failed save, or half that damage on a successful one.\n\n**3 Yellow.** The target suffers 10d6 lightning damage on a failed save, or half that damage on a successful one.\n\n**4 Green.** The target suffers 10d6 poison damage on a failed save, or half that damage on a successful one.\n\n**5 Blue.** The target suffers 10d6 cold damage on a failed save, or half that damage on a successful one.\n\n**6 Indigo.** On a failed save, the target becomes restrained. At the end of each of its turns, it must make a Constitution save. Once it accumulates three successful saves, the effect ends. Once it accumulates three failed saves, it transforms into stone and gains the petrified condition. Track successes and failures separately; they need not occur consecutively.\n\n**7 Violet.** On a failed save, the target is blinded. At the start of your next turn, it must make a Wisdom save. A successful save removes the blindness. A failed save instead transports the creature to another plane of existence determined by the GM, ending the blindness. Creatures native to other planes are typically banished to their home plane; all others are usually sent to the Astral or Ethereal planes.\n\n**8 Special.** The target is struck by two rays. Roll twice more on this table, rerolling any results of 8.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Dexterity","Constitution","Wisdom"],"damageTypes":["Acid","Cold","Fire","Lightning","Poison"],"tags":["Control","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Project Image","level":7,"circle":"7th-Circle","traditions":["Arcane"],"school":"Illusion","isRitual":false,"castingTime":"1 action","range":"500 feet","components":"V, S, M (a small replica of you made from materials worth at least 5 gp)","duration":"Concentration, up to 1 day","description":"You conjure an insubstantial duplicate of yourself that persists for the spell's duration. This illusory double manifests at any point within range you have previously observed, passing through physical barriers as needed. It bears your exact appearance and voice, though it remains incorporeal and unable to interact physically with the world. Should the illusion sustain any damage, it vanishes immediately and the spell terminates.\n\nAs an action on your turn, you may animate the illusion, commanding it to travel up to twice your speed while gesturing, speaking, and acting according to your wishes. Its movements and expressions mirror your own with perfect fidelity.\n\nYou perceive the world through the illusion's eyes and ears as though occupying its location. During your turn, you may use a bonus action to toggle between perceiving through the illusion's senses or your own. While channeling the illusion's senses, you become blind and deaf to your actual surroundings.\n\nAny creature attempting physical contact with the image discovers its illusory nature, as their touch passes harmlessly through it. A creature that spends its action scrutinizing the image can discern its true nature with a successful Intelligence (Investigation) check against your spell save DC. Once a creature identifies the illusion, it gains the ability to see through the image clearly, and any sound the illusion produces reaches that creature as hollow and echoing.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Intelligence"],"damageTypes":[],"tags":["Damage","Debuff"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Regenerate","level":7,"circle":"7th-Circle","traditions":["Divine","Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"1 minute","range":"Touch","components":"V, S, M (a prayer wheel or an intact sleeve of snakeskin and holy water)","duration":"1 hour","description":"You touch a creature and awaken its inherent capacity to mend itself. The target immediately recovers 4d8 + 15 hit points. Throughout the spell's duration, the target heals by 1 HP at the beginning of each of its turns (totaling 10 HP per minute).\n\nAny severed limbs the target has lost—such as fingers, legs, tails, or similar appendages—grow back fully after 2 minutes. If you possess the actual severed part and press it against the wound site, the spell causes the limb to fuse with the stump instantaneously.\n\nAfter casting this spell, you must finish a long rest before you can cast it again.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Resurrection","level":7,"circle":"7th-Circle","traditions":["Divine"],"school":"Necromancy","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (a diamond worth at least 1,000 gp, which the spell consumes)","duration":"Instantaneous","description":"You perform a divine act, drawing back a soul from beyond death before its proper time has come.\n\nYou touch a dead creature that has been dead no longer than one century, did not perish from advancing age, and is not an Undead being. If its soul is unbound and consents to return, the target is restored to life with full hit points restored.\n\nThis spell purges any poisons and mends ordinary diseases that were present in the creature at the moment of death. However, it cannot expunge magical diseases, curses, and similar afflictions; if these persist before you cast the spell, they will continue to affect the target upon its revival.\n\nThis spell mends all lethal injuries and regenerates any severed or missing body parts.\n\nThe experience of returning to the living world leaves the target weakened. The target suffers a −4 penalty to all attack rolls, saving throws, and ability checks.\n\nAfter each long rest the target completes, this penalty decreases by 1 until it vanishes entirely.\n\nIf you use this spell to restore a creature that has been dead for one year or more, the exertion profoundly drains you. Until you complete a long rest, you cannot cast any spells, and you have disadvantage on all attack rolls, ability checks, and saving throws.","classes":["Cleric","Paladin"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Buff","Debuff","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Reverse Gravity","level":7,"circle":"7th-Circle","traditions":["Arcane","Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"100 feet","components":"V, S, M (a lodestone and iron filings)","duration":"Concentration, up to 1 minute","description":"You invert the pull of gravity within a massive zone, sending everything unsecured hurtling skyward.\n\nThis spell inverts gravity throughout a cylinder 50 feet in radius and 100 feet tall, centered on a point you designate within range. Any creature or object lacking a secure anchor to the ground immediately rises upward, traveling to the apex of the cylinder the moment you complete the spell. A creature threatened by this upward plunge can attempt a Dexterity save to seize hold of a stationary object within its reach, thereby avoiding the aerial fall.\n\nShould the rising creature or object collide with solid matter above it—such as a ceiling or roof—it sustains impact damage equivalent to what it would suffer from an equivalent downward fall. When a creature or object reaches the upper boundary of the cylinder without striking an obstruction, it locks in place there for the spell's full duration, hovering with gentle oscillations.\n\nOnce the duration expires, affected creatures and objects descend normally back toward the ground.","classes":["Bard","Sorcerer","Wizard","Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Dexterity"],"damageTypes":[],"tags":["Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Sequester","level":7,"circle":"7th-Circle","traditions":["Arcane","Divine"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Touch","components":"V, S, M (a powder composed of gemstone dust worth at least 5,000 gp, which the spell consumes)","duration":"Until dispelled","description":"Through this spell, you conceal a willing creature or object in a state of magical stasis, rendering it undetectable and temporally frozen until predetermined circumstances arise.\n\nWhen you cast this spell and establish contact with the target, it becomes invisible and remains beyond the reach of divination spells—neither can it be sensed through scrying sensors created by divination magic.\n\nShould the target be a creature, it enters a condition of suspended animation wherein time ceases its passage. The creature does not age while sequestered in this state.\n\nYou may establish a specific condition that will cause the spell to terminate ahead of its normal duration. This condition may be virtually anything you designate, provided it occurs or becomes perceptible within 1 mile of the target's location. Possible conditions include \"after 1,000 years have elapsed\" or \"when the tarrasque awakens.\" The spell also ends prematurely if the target sustains any damage.","classes":["Bard","Cleric","Paladin","Sorcerer","Theurge","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Damage","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Shadowed Expanse","level":7,"circle":"7th-Circle","traditions":["Wyrd"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"Self (1-mile radius)","components":"V, S, M (handful of grave dirt and a piece of petrified wood)","duration":"24 hours","description":"You draw forth the essence of a shadowed realm steeped in eternal night and suffocating mist, channeling its power into the world around you.\n\nUpon completing this ritual, the natural landscape within a 1-mile radius transforms into a place of dread and malevolence for 24 hours. The following effects manifest throughout the duration:\n\n• Overwhelming Dread. Any sentient creature dwelling in this region feels the weight of creeping terror and hears disturbing voices at the edge of perception. Creatures possessing an INT of 4 (−3) or higher, excluding yourself, suffer disadvantage on WIS saving throws against fear effects.\n\n• Corrupted Growth. The plant life warps into grotesque and unnatural forms, with thorns and brambles sharpening to dangerous points. Up to 1 percent of the trees present in the area, capped at a maximum of 100 trees and distributed throughout, become awakened trees. These creatures ignore your commands but compulsively advance toward and strike any creature they perceive through sight or sound, with the exception of yourself.\n\n• Hostile Elements. Dense mist blankets the region while biting winds sweep through the woodland. The entire area becomes lightly obscured, and any creature attempting to rest outdoors gains one level of exhaustion. Undead creatures with Undead Fortitude, such as zombies, gain advantage on their CON saving throws.\n\nShould this area's effects overlap with those from a legendary creature's lair, both sets of effects apply to affected creatures. The legendary creature can detect this intrusion with a successful Intelligence check against your spell save DC. While this ritual does not force a legendary creature to act, most view such an encroachment as an unacceptable affront to their domain.","classes":["Warlock","Witch"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":["Constitution","Intelligence","Wisdom"],"damageTypes":["Cold"],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Ship Ward","level":7,"circle":"7th-Circle","traditions":["Divine","Primordial"],"school":"Abjuration","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (artist tools and specially made pigments worth at least 250 gp, which the spell consumes)","duration":"7 days","description":"You inscribe protective enchantments upon a water vessel, strengthening both its construction and its capabilities.\n\nFor the spell's duration, every component of the ship gains resistance against fire and lightning damage. The vessel immediately mends all accumulated damage and functions as though brand new. Its AC and damage threshold each rise by 2, and it gains additional hit points equal to half its current hit point maximum.\n\nFurthermore, the ship's travel speed increases by 50 percent, rounded down. As an example, a rowboat whose normal speed is 3 mph would accelerate to 4 mph, whereas a galley traveling at 4 mph would instead move at 6 mph.","classes":["Cleric","Paladin","Druid","Ranger"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":["Fire","Lightning"],"tags":["Buff","Damage","Healing","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Simulacrum","level":7,"circle":"7th-Circle","traditions":["Arcane"],"school":"Illusion","isRitual":true,"castingTime":"12 hours","range":"Touch","components":"V, S, M (snow or ice in quantities sufficient to make a life-size copy of the duplicated creature; some hair, fingernail clippings, or other piece of that creature’s body placed inside the snow or ice; and powdered ruby worth 1,500 gp sprinkled over the duplicate, which the spell consumes)","duration":"Until dispelled","description":"You fashion a replica of a creature using snow, strands of hair, and powdered crystal.\n\nYou mold an illusory copy of a single Beast or Humanoid present within range throughout the entire duration of your spellcasting.\n\nThe copy is a partially tangible creature composed of ice or snow, capable of performing actions and receiving effects as a typical creature would. It matches the original's appearance but possesses half the creature's maximum hit points and manifests without any gear. In all other respects, the illusion mirrors the complete statistics of the creature it replicates.\n\nThe simulacrum regards you and designated creatures as allies. It follows your verbal instructions, moving and acting according to your commands and taking turns during combat on your initiative. The simulacrum cannot learn or grow stronger, meaning it never gains levels or develops new abilities, and it cannot recover expended spell slots.\n\nWhen the simulacrum sustains damage, you may mend it within an alchemical laboratory using rare botanical and mineral components worth 100 gp per hit point restored. The simulacrum persists until it reaches 0 HP, at which point it dissolves into snow and evaporates immediately.\n\nWhen you cast this spell again, all previously summoned duplicates from this spell vanish without a trace.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Symbol","level":7,"circle":"7th-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":true,"castingTime":"1 action","range":"Touch","components":"V, S, M (mercury, phosphorus, and powdered diamond and opal with a total value of at least","duration":"Until dispelled or triggered","description":"You inscribe an almost imperceptible magical glyph as a protective or destructive ward upon a location or object of your choosing.\n\nWhen you cast this spell, you mark a harmful glyph either on a surface (such as flooring, a wall, or furnishings) or within a closable object designed to hide the glyph (such as a book, scroll, or chest). For surfaces, the glyph occupies no more than a 10-foot-diameter area. For objects, that object must remain stationary; should it travel beyond 10 feet from the casting location, the glyph becomes inert and the spell terminates without triggering.\n\nThe glyph is nearly invisible and requires an Intelligence (Investigation) check against your spell save DC to discover.\n\nYou establish the glyph's trigger condition during casting. For surface-inscribed glyphs, typical triggers include contact with or stepping upon the glyph, removing covering objects, approaching within a set distance, or tampering with the object containing it. For object-inscribed glyphs, common triggers are opening the object, approaching within a set distance, or perceiving or reading the glyph itself. You may further customize the trigger to activate only under specific circumstances or based on a creature's physical attributes (such as height or weight) or type (such as affecting hags or shapechangers exclusively). You can also designate creatures immune to the glyph's effect, such as those who speak a particular password.\n\nUpon inscribing the glyph, select one effect below. When triggered, the glyph radiates bright light across a 60-foot-radius sphere as dim light for 10 minutes, at which point the spell ends. All creatures within the sphere when the glyph activates are affected, as are creatures entering the sphere for the first time during a turn or ending their turn within it.\n\nDeath. A target must make a Constitution save, taking 10d10 necrotic damage on a failure or half damage on a success.\n\nDiscord. A target must make a Constitution save. On a failure, it quarrels with other creatures for 1 minute, unable to communicate meaningfully and having disadvantage on attack rolls and ability checks.\n\nFear. A target must make a Wisdom save, becoming frightened for 1 minute on a failure. While frightened, it drops held items and must move at least 30 feet away from the glyph each turn if possible.\n\nHopelessness. A target must make a Charisma save. On a failure, despair grips it for 1 minute, preventing attacks or targeting any creature with harmful abilities, spells, or magic.\n\nOverwhelm. A target must make an Intelligence save. On a failure, it becomes incapacitated for 1 minute, unable to take actions, understand speech, read, or speak coherently, with the GM controlling its erratic movement.\n\nPain. A target must make a Constitution save, becoming incapacitated by overwhelming pain for 1 minute on a failure.\n\nSleep. A target must make a Wisdom save, falling unconscious for 10 minutes on a failure. It awakens if damaged or if another creature uses an action to shake or slap it awake.\n\nStunning. A target must make a Wisdom save, becoming stunned for 1 minute on a failure.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Constitution","Intelligence","Wisdom","Charisma"],"damageTypes":["Necrotic"],"tags":["Control","Damage","Debuff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Teleport","level":7,"circle":"7th-Circle","traditions":["Arcane"],"school":"Conjuration","isRitual":false,"castingTime":"1 action","range":"10 feet","components":"V","duration":"Instantaneous","description":"You instantly transport yourself and up to eight willing creatures of your choice that you can see within range, or a single object that you can see within range, to a destination you select. If you target an object, it must fit entirely within a 10-foot cube and cannot be held or carried by an unwilling creature.\n\nYour chosen destination must be a location you know and must exist on the same plane of existence where you currently are. Success depends on your familiarity with the destination. The GM rolls d100 against the Destination Accuracy table to determine the outcome.\n\nFamiliarity is measured by these categories: \"Permanent circle\" refers to a permanent teleportation circle whose sigil sequence you know. \"Associated object\" means you possess something taken from the destination within the last six months, such as a book from a wizard's library, bedding from a royal chamber, or stone from a lich's hidden tomb. \"Very familiar\" describes a place you have visited frequently, studied carefully, or can see during the casting. \"Seen casually\" means a place you have visited multiple times but do not know well. \"Viewed once\" is a location you have observed a single time, possibly through magical means. \"Description\" is a place you know only through someone else's account or a map. \"False destination\" is a nonexistent location, whether you mistook an illusion for a real location or are attempting to reach a place that no longer exists.\n\nOn Target: You and your group (or the object) arrive at your intended destination.\n\nOff Target: You and your group (or the object) appear at a random distance and direction from your destination. The distance off target equals 1d10 × 1d10 percent of the total distance traveled. The GM randomly determines direction by rolling d8, with 1 representing north, 2 northeast, 3 east, and so forth around the compass points.\n\nSimilar Area: You and your group (or the object) materialize in a different location that resembles your target visually or thematically. You generally appear in the closest similar location, though without a range limit, you could theoretically arrive anywhere on the plane.\n\nMishap: The spell's chaotic magic creates a perilous transport. Each creature that teleports (or the object) takes 3d10 force damage, and the GM rerolls on the table to determine where you actually end up. Multiple mishaps can occur, with each one inflicting additional damage.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V"],"saves":[],"damageTypes":["Force"],"tags":["Damage"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Transmogrification","level":7,"circle":"7th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V, S, M (flesh from a Fiend, a feather from a Celestial, or a scale from a Dragon worth 50 gp)","duration":"1 minute","description":"You undergo a rapid metamorphosis, infusing yourself with monstrous characteristics and supernatural abilities. When you cast this spell, select one transformation from the options below to assume first.\n\nWhile this spell persists, you may spend a bonus action to shift into a different transformation you have not yet adopted during this casting. After you have assumed your third distinct form, you become locked into that transformation for the spell's duration, though you may use a bonus action to terminate the spell early and return to your natural state. The spell ends prematurely if you become incapacitated or die.\n\nWings. Leathery or feathered wings erupt from your shoulders, granting you a flying speed of 60 feet.\n\nBreath Weapon. You develop a breath weapon dealing acid, cold, fire, lightning, or poison damage of your choice. As an action, you expel a 15-foot line that extends 5 feet wide in front of you. All creatures caught within must succeed on a Dexterity save or suffer 8d8 damage of the chosen type, taking half damage on a successful save. This breath weapon functions three times before becoming exhausted.\n\nLimbs. Tentacle-like, insectoid, pincered, or comparable appendages manifest from your body without displacing your existing limbs. Upon creation, designate whether these appendages deal bludgeoning, piercing, or slashing damage. As an action, you may attack using both appendages against one or multiple targets within 10 feet, making two melee weapon attacks total. You gain proficiency with these appendages and add your spellcasting modifier to your attack rolls. A successful hit deals 2d12 plus your spellcasting modifier damage of the designated type.\n\nRadiating Light. You emanate brilliant light in a 10-foot radius, manifesting as a halo, spectral flames, luminous eyes, or similar phenomena. Upon manifestation, choose whether this light inflicts necrotic, fire, or radiant damage. Any creature other than yourself that enters this light for the first time during a turn or begins its turn within the light must make a Constitution save, taking 2d10 damage of the chosen type on failure or half on success. Each creature can only be damaged by this light once per turn.\n\nRegeneration. While this transformation is active, you may choose to restore 10 hit points at the start of your turn. This ability functions three times before exhausting.\n\nOverwhelming Might. When your weapon attack connects with a target, that target takes the attack's normal damage plus an additional 2d8 force damage and must succeed on a Strength save or fall prone.\n\nFrightening Presence. You can take an action to target any number of creatures within 30 feet that can perceive you. Each must make a Wisdom save or become frightened of you for 1 minute. A frightened creature can repeat its save at the end of each of its turns, ending the condition on success. Once a creature saves successfully or the effect ends, it becomes immune to this ability for the following 24 hours. This ability can be used three times before expiring.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":["Strength","Dexterity"],"damageTypes":["Bludgeoning","Fire","Necrotic","Piercing","Poison","Slashing"],"tags":["Buff","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Void Embrace","level":7,"circle":"7th-Circle","traditions":["Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"40 feet","components":"V, S","duration":"Instantaneous","description":"Your eyes roll backward as visions of starless voids and oppressive darkness flood your consciousness and emanate outward in a destructive wave.\n\nA torrent of frigid wind tears through the minds of all creatures within range, exposing them to the incomprehensible and sanity-shattering void. Each creature in range must succeed on a Dexterity save or take 9d8 psychic damage, taking half damage on a successful save.\n\nAdditionally, each creature in the affected area must make a Wisdom save. On a failed save, roll 1d6 to determine which effect from the Void Embrace Effects table afflicts it.\n\nAt Higher Circles. When you cast this spell using a spell slot of 8th circle or higher, the damage increases by 1d6 for each slot level above 7th.\n\nVoid Embrace Effects\n1–2 Fragmented Memories. For 1 minute, the creature's memories shatter into disjointed pieces, becoming unreliable. It has disadvantage on all Intelligence checks and Wisdom (Insight) checks.\n3–4 Cosmic Paranoia. For 1 minute, the creature succumbs to overwhelming cosmic paranoia, convinced that unseen forces observe its every action. It has disadvantage on all Charisma checks and Wisdom (Perception) checks.\n5–6 Existential Dread. The creature is seized by profound existential dread, its grip on reality shaken by terrible truths. It is frightened of you for 1 minute.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S"],"saves":["Dexterity"],"damageTypes":["Psychic"],"tags":["Control","Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Animal Shapes","level":8,"circle":"8th-Circle","traditions":["Primordial"],"school":"Transmutation","isRitual":false,"castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Concentration, up to 24 hours","description":"Your magic reshapes willing creatures into beasts. Select any number of willing creatures within range that you can see. Each target assumes the form of a Large or smaller Beast or creature bearing the Animal tag with a CR of 4 or lower.\n\nOn your subsequent turns, you may spend an action to shift affected creatures into different forms.\n\nEach target maintains this transformed state for the spell's duration, or until it suffers 0 hit points or perishes. You may assign a distinct form to each target. The target's game statistics transform to match its new form's statistics, yet it preserves its original personality and INT, WIS, and CHA scores. The target acquires the hit points of its new form, and upon reverting to its natural form, it regains the hit points it possessed before transformation. Should reversion occur due to reaching 0 hit points, any remaining damage transfers to its natural form. Provided this overflow damage fails to reduce the creature's natural form to 0 hit points, unconsciousness does not occur. The creature's capacity for actions becomes constrained by its new form's nature, and it cannot speak or cast spells.\n\nThe target's equipment fuses with the new form. The target cannot activate, wield, or gain any advantage from its gear.","classes":["Druid","Ranger"],"source":"Player's Guide 1","componentList":["V","S"],"saves":["Intelligence","Wisdom","Charisma"],"damageTypes":[],"tags":["Healing","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Antimagic Field","level":8,"circle":"8th-Circle","traditions":["Arcane"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Self (10-foot-radius sphere)","components":"V, S, M (powdered iron or iron filings)","duration":"Concentration, up to 1 hour","description":"You weave a barrier of pure antimagic around yourself that strips away all magical influence.\n\nAn invisible sphere of dead magic with a 10-foot radius materializes centered on you. This pocket of reality contains none of the magical essence that permeates existence elsewhere. Spells cannot be cast within it, summoned beings vanish from sight, and enchanted objects lose all supernatural properties. The sphere persists with you at its center until the spell concludes.\n\nAll magical spells and effects originating from sources other than artifacts or divine beings cease functioning within the sphere's boundaries and cannot penetrate its edge. When a spellcaster expends a slot to cast a spell that becomes suppressed this way, that slot is still consumed. A suppressed magical effect remains inactive, yet the duration it was meant to have continues counting down regardless.\n\nTargeted Spells and Effects. Magical spells and effects designed to target creatures or objects inside the sphere—such as magic missile or charm spells—have no impact on those targets.\n\nExpanding Areas of Effect. Other spells and magical effects that create larger areas, like fireball, cannot spread into the sphere's space. Where the sphere overlaps with an existing magical effect's area, that overlapped portion ceases to function. For instance, the flames of a wall of fire vanish within the sphere, potentially opening a breach in the barrier if the overlap covers sufficient ground.\n\nActive Magic. Any magical spell or effect already placed upon a creature or object within the sphere becomes inert while that target remains inside.\n\nMagical Objects. All magical properties and abilities granted by magic items stop working in the sphere. A +1 longsword, for example, functions as ordinary steel while inside. Magic weapons used to strike targets in the sphere, or wielded by attackers standing in the sphere, lose their enchantments. However, if a magic weapon or magical ammunition completely exits the sphere's boundary (such as a magic arrow fired outward), its powers resume immediately.\n\nMagical Movement. Teleportation and interdimensional travel cannot function within the sphere, whether departing from it or arriving at it. Portals connecting to distant locations or other planes of existence, along with passages to extradimensional spaces like those created by rope trick, seal themselves temporarily while they occupy the sphere.\n\nSummoned Creatures and Objects. Any creature or object brought into existence through magic flickers out of visibility within the sphere. The moment that creature or object moves outside the sphere's radius, it reappears.\n\nCountering the Sphere. Spells like dispel magic and similar magical effects cannot affect the antimagic field itself. Multiple antimagic field spells do not interfere with or cancel each other out.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1","componentList":["V","S","M"],"saves":[],"damageTypes":["Fire"],"tags":["Damage","Summon","Utility"],"isConcentration":true,"book":"Player's Guide 1"},{"name":"Antipathy/Sympathy","level":8,"circle":"8th-Circle","traditions":["Arcane","Divine","Primordial","Wyrd"],"school":"Enchantment","isRitual":true,"castingTime":"1 hour","range":"60 feet","components":"V, S, M (either a lump of alum soaked in vinegar for the antipathy effect or a drop of honey for the sympathy effect)","duration":"10 days","description":"You imbue a target with a magical aura that compels nearby creatures toward or away from it.\n\nYou enchant a single target within range—either a Huge or smaller object or creature, or an area spanning no more than a 200-foot cube. You designate a specific kind of intelligent creature, such as red dragons, goblins, or vampires. The target gains an aura lasting for the spell's duration that either attracts or repels creatures of that kind. You choose whether the aura functions as antipathy or sympathy.\n\nAntipathy. The aura fills the designated creatures with an overwhelming compulsion to flee. Any such creature that can see the target or comes within 60 feet of it must make a Wisdom save. On a failed save, the creature becomes frightened. The frightened condition persists as long as the creature can see the target or remains within 60 feet of it. A frightened creature must spend its movement traveling to the nearest safe location from which the target is no longer visible. Once the creature is more than 60 feet away and cannot see the target, it is no longer frightened—though it becomes frightened again if it sees the target or comes within 60 feet of it once more.\n\nSympathy. The aura instills a powerful urge to approach. Any designated creature that can see the target or comes within 60 feet of it must make a Wisdom save. On a failed save, the creature must spend its movement on each turn entering the area or moving within reach of the target. Once the creature reaches the target, it cannot willingly move away.\n\nEnding the Effect. When an affected creature finishes its turn more than 60 feet from the target and unable to see it, that creature makes a Wisdom save. Success ends the effect, and the creature recognizes the compulsion as magical in nature. Additionally, an affected creature may repeat the Wisdom save every 24 hours while the spell remains active. If the target damages or harms an affected creature, that creature can immediately make a Wisdom save to end the effect.\n\nA creature that succeeds on any save against this spell cannot be affected by it again for 1 minute. Casting this spell again while an earlier casting is still active immediately ends the previous effect.","classes":["Bard","Cleric","Druid","Paladin","Ranger","Sorcerer","Theurge","Warlock","Witch","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":["Wisdom"],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Arcane Nullification","level":8,"circle":"8th-Circle","traditions":["Arcane"],"school":"Transmutation","isRitual":true,"castingTime":"1 hour","range":"Self (1 mile radius)","components":"V, S, M (a perfectly cut crystal prism worth","duration":"1 year","description":"You reshape the fundamental nature of magic within a region.\n\nDuring casting, you position a precisely faceted prism of dirt or stone upon the ground and inscribe elaborate arcane patterns around it. Upon completing the ritual, all magical mechanisms within 1 mile of the ritual site are suppressed and neutralized. The affected area functions according to these rules:\n\n• Construct Impediment. Magically animated beings, including Constructs, suffer impaired function. Such creatures gain disadvantage on attack rolls and ability checks made within the area. Additionally, these creatures treat the area as difficult terrain.\n\n• Magical Hindrance. Any creature within the area gains advantage on saving throws against spells and magical abilities. Constructs are not affected by this particular effect.\n\n• Slower Summons. Spellcasting that influences plant growth or calls forth creatures requires triple the normal casting time.\n\nThe spell terminates if you die or fail a death saving throw. Should you cast this ritual at a different location while maintaining an active spell at another site, the original spell immediately ends.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 2 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Control","Utility"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Aura of Quietus","level":8,"circle":"8th-Circle","traditions":["Divine"],"school":"Abjuration","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Concentration, up to 1 minute","description":"A sphere of deadly silence emanates from your form, extending outward in all directions for 5 feet. This aura remains anchored to you, shifting to maintain its position around your body throughout the spell's duration. Any creature within this area that suffers damage from a weapon strike or magical effect automatically takes the maximum possible damage from that attack or spell, accounting for all bonuses granted by class abilities, feats, and other sources of damage enhancement. Furthermore, all creatures besides yourself who occupy this space find themselves at a disadvantage when making saving throws against death.","classes":["Cleric","Paladin"],"source":"Player's Guide 2","componentList":["V"],"saves":[],"damageTypes":[],"tags":["Buff","Damage","Debuff"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Blossom of Death","level":8,"circle":"8th-Circle","traditions":["Wyrd"],"school":"Necromancy","isRitual":false,"castingTime":"1 action","range":"150 feet","components":"V, S, M (grave dust)","duration":"Instantaneous","description":"You unleash a torrent of death magic across a massive region, transforming the fallen into spectral servants.\n\nA 60-foot cube originating from a point within range that you can perceive becomes saturated with potent necrotic force. Every creature occupying this zone must succeed on a Constitution save or suffer the consequences. Those who fail take 8d10 + 20 necrotic damage; those who succeed take half damage instead. Constructs and Undead remain unharmed by this spell's effects.\n\nWhen a Humanoid perishes as a result of this spell, it manifests as a specter beholden to your command at the beginning of your next turn. This spectral form persists for 1 hour or until reduced to 0 hit points, whichever occurs first.","classes":["Warlock","Witch"],"source":"Player's Guide 2","componentList":["V","S","M"],"saves":["Constitution"],"damageTypes":["Necrotic"],"tags":["Damage","Debuff"],"isConcentration":false,"book":"Player's Guide 2"},{"name":"Cacophonous Howl","level":8,"circle":"8th-Circle","traditions":["Arcane","Wyrd"],"school":"Evocation","isRitual":false,"castingTime":"1 action","range":"Self","components":"V","duration":"Concentration, up to 1 minute","description":"Your voice erupts in a piercing wail that carries across the landscape for up to 1 mile. Within 50 feet of you, all spoken words become unintelligible—no creature can communicate verbally in this zone. Every creature in the radius immediately suffers deafness, an affliction that persists even after they depart, lasting until the end of their next turn.\n\nThe cacophony suppresses all spellcasting that requires verbal components within its radius. Creatures attempting to maintain concentration on active spells find their focus shattered, rolling concentration checks at disadvantage while in the howling zone. At the start of each creature's turn within the affected area, it must make a Constitution saving throw or suffer permanent deafness.\n\nCreatures whose bodies are fashioned from crystal, glass, or stone face particular peril. Whenever such a creature enters the radius or begins its turn there, it must succeed on a Constitution saving throw or take 5d10 thunder damage, suffering only half damage on a successful save. Unattended structures and objects composed of these materials take 5d10 thunder damage at the start of your turn for the duration of the spell.\n\nFor the entire concentration period, you cannot cast spells containing verbal components or trigger magic items through spoken command words.","classes":["Bard","Sorcerer","Warlock","Witch","Wizard"],"source":"Player's Guide 2","componentList":["V"],"saves":["Constitution"],"damageTypes":["Thunder"],"tags":["Buff","Damage","Debuff","Utility"],"isConcentration":true,"book":"Player's Guide 2"},{"name":"Clone","level":8,"circle":"8th-Circle","traditions":["Arcane"],"school":"Necromancy","isRitual":true,"castingTime":"1 hour","range":"Touch","components":"V, S, M (a diamond worth at least 1,000 gp; at least 1 cubic inch of flesh of the creature that is to be cloned, which the spell consumes; and a vessel worth at least 2,000 gp that has a sealable lid and is large enough to hold a Medium creature, such as a huge urn, coffin, mud-filled cyst in the ground, or crystal container filled with salt water)","duration":"Instantaneous","description":"You cultivate a duplicate body for a creature you designate, created as insurance against mortality. This spell develops an inactive clone of a living being within a sealed container, reaching full maturity and size over 120 days; you may instead choose for the clone to appear younger than the original creature. The clone remains dormant and persists indefinitely so long as its vessel stays sealed and unbroken.\n\nOnce the clone achieves maturity, should the original creature perish, its soul automatically transfers into the clone provided the soul remains unbound and consents to the transference. The clone proves physically identical to the original and possesses the same personality, knowledge, and capabilities, though it carries none of the original's possessions or equipment. Should the original's body still exist, it becomes inert at that moment and cannot be brought back to life by any means, for the creature's soul has already relocated elsewhere.\n\nIf you cast this spell intending to create a clone of a creature that already possesses an active clone created by this spell, the spell fails and produces no effect.","classes":["Bard","Sorcerer","Wizard"],"source":"Player's Guide 1 (Rituals)","componentList":["V","S","M"],"saves":[],"damageTypes":[],"tags":["Utility"],"isConcentration":false,"book":"Player's Guide 1"},{"name":"Control Weather","level":8,"circle":"8th-Circle","traditions":["Divine","Primordial"],"school":"Transmutation","isRitual":true,"castingTime":"10 minutes","range":"Self (5-mile radius)","components":"V, S, M (burning incense and bits of earth and wood mixed in water)","duration":"Concentration, up to 8 hours","description":"You seize command of the weather within a 5-mile radius centered on you, bending atmospheric conditions to your will for the spell's duration. You must be standing outdoors to cast this spell, and if you move beneath shelter or lose your line of sight to the sky, the spell immediately ends.\n\nWhen you cast the spell, you establish new weather patterns by selecting from the precipitation, temperature, and wind tables below and adjusting each condition up or down by one stage. You may also alter wind direction as desired. The GM determines the current weather based on the region's climate and season. These new conditions manifest after 1d4 × 10 minutes pass. Once the new weather has taken hold, you may adjust the conditions again during the spell's duration.\n\nWhe
